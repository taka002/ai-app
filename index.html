<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:60px;
}
header{height:28vh;}
header img{width:100%;height:100%;object-fit:cover;}
main{flex:1;overflow-y:auto;padding:10px;}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{padding:10px;border-radius:16px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}

footer{
position:fixed;bottom:0;width:100%;
background:#fff;padding:6px;
display:flex;justify-content:center;
}
#dock{width:100%;max-width:600px;display:flex;gap:6px;}
#input{width:58%;height:36px;border-radius:20px;border:none;padding:8px;}
.dockBtn{width:40px;height:36px;border:none;border-radius:10px;background:#eee;}

#menu{
position:fixed;bottom:-100%;
width:100%;height:88%;
background:#111;color:#fff;
display:flex;flex-direction:column;
border-radius:20px 20px 0 0;
transition:.3s;z-index:1000;
}
#menu.active{bottom:0;}
#menuTop{flex:1;overflow:auto;padding:20px;}
.menuInput,.menuBtn{
width:100%;height:44px;border-radius:10px;border:none;
margin-bottom:10px;padding:10px;
}
.menuBtn{background:#444;color:#fff;}
</style>
</head>

<body>

<header><img src="normal.png"></header>
<main id="chat"></main>

<footer>
<div id="dock">
<input id="input" placeholder="話しかけてください">
<button class="dockBtn" onclick="send()">➤</button>
<button class="dockBtn" id="micBtn">🎤</button>
<button class="dockBtn" onclick="openMenu()">☰</button>
</div>
</footer>

<!-- 設定 -->
<div id="menu">
<div id="menuTop">

<input id="apiKey" class="menuInput" placeholder="APIキー">
<input id="userName" class="menuInput" placeholder="あなたの名前">
<input id="charName" class="menuInput" placeholder="キャラ名">

<textarea id="systemPrompt" class="menuInput"
placeholder="キャラ設定"></textarea>

<label>
<input type="checkbox" id="voiceToggle"> 音声ON
</label>

<select id="voiceType" class="menuInput">
<option value="normal">通常</option>
<option value="slow">ゆっくり</option>
<option value="veryslow">かなりゆっくり</option>
<option value="ultraslow">超ゆっくり</option>
</select>

<button class="menuBtn" onclick="saveSettings()">保存</button>
<button class="menuBtn" onclick="closeMenu()">閉じる</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const menu=document.getElementById("menu");
const micBtn=document.getElementById("micBtn");

/* ===== 設定 ===== */
const apiKeyInput=document.getElementById("apiKey");
const userNameInput=document.getElementById("userName");
const charNameInput=document.getElementById("charName");
const systemPromptInput=document.getElementById("systemPrompt");
const voiceToggleInput=document.getElementById("voiceToggle");
const voiceTypeSelect=document.getElementById("voiceType");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let voiceType=localStorage.getItem("voiceType")||"normal";

/* ===== 表示 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* ===== 音声 ===== */
function speak(text){
if(!voiceOn)return;
speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(text);
u.lang="ja-JP";

if(voiceType==="slow")u.rate=0.6;
if(voiceType==="veryslow")u.rate=0.45;
if(voiceType==="ultraslow")u.rate=0.3;

speechSynthesis.speak(u);
}

/* ===== 天気 ===== */
async function getWeather(lat,lon){
const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const d=await res.json();
return `${Math.round(d.current_weather.temperature)}℃`;
}

/* ===== 位置 ===== */
function getLocation(){
return new Promise((res,rej)=>{
navigator.geolocation.getCurrentPosition(res,rej);
});
}

/* ===== 会話送信 ===== */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

/* 意図判定 */
if(t.includes("天気")||t.includes("気温")){
const pos=await getLocation();
const temp=await getWeather(pos.coords.latitude,pos.coords.longitude);
const msg=`今の気温は ${temp}だよ`;
add(msg,"ai"); speak(msg); return;
}

if(t.includes("時間")){
const now=new Date();
const msg=`今は ${now.getHours()}時${now.getMinutes()}分`;
add(msg,"ai"); speak(msg); return;
}

/* 通常AI */
add("（AI返答）","ai");
}

/* ===== メニュー ===== */
function openMenu(){
menu.classList.add("active");

apiKeyInput.value=localStorage.getItem("apiKey")||"";
userNameInput.value=localStorage.getItem("userName")||"";
charNameInput.value=localStorage.getItem("charName")||"";
systemPromptInput.value=localStorage.getItem("systemPrompt")||"";
voiceToggleInput.checked=voiceOn;
voiceTypeSelect.value=voiceType;
}

function closeMenu(){menu.classList.remove("active");}

function saveSettings(){
localStorage.setItem("apiKey",apiKeyInput.value);
localStorage.setItem("userName",userNameInput.value);
localStorage.setItem("charName",charNameInput.value);
localStorage.setItem("systemPrompt",systemPromptInput.value);
localStorage.setItem("voiceOn",voiceToggleInput.checked);
localStorage.setItem("voiceType",voiceTypeSelect.value);

voiceOn=voiceToggleInput.checked;
voiceType=voiceTypeSelect.value;

add("保存しました😊","ai");
closeMenu();
}

/* ===== 起動 ===== */
window.onload=async()=>{
const name=localStorage.getItem("userName")||"";
const char=localStorage.getItem("charName")||"美咲";

try{
const pos=await getLocation();
const temp=await getWeather(pos.coords.latitude,pos.coords.longitude);

const now=new Date();
const greet=now.getHours()<12?"おはよう":"こんにちは";

const msg=`${greet}😊 ${name}さん
今は ${now.getHours()}時
気温は ${temp}だよ`;

add(msg,"ai");
speak(msg);

}catch{
add(`${char}だよ😊 こんにちは！`,"ai");
}
};
</script>

</body>
</html>

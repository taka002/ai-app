<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
font-family:sans-serif;
background:#f5f5f5;
min-height:100dvh;
overflow:hidden;
position:relative;
}

.avatar{
position:absolute;
inset:0;
width:100%;
height:100%;
overflow:hidden;
background:#f6f3f1;
}

.face-layer{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
object-position:center 38%;
transform:scale(0.96);
transition:transform .22s ease, filter .22s ease, opacity .14s ease;
will-change:transform, filter, opacity;
pointer-events:none;
backface-visibility:hidden;
}

#baseFace{
z-index:1;
opacity:1;
}

#blinkFace{
z-index:2;
opacity:0;
}

.avatar.idle .face-layer{
animation:idleFloat 4.8s ease-in-out infinite;
}

.avatar.speaking .face-layer{
filter:brightness(1.04);
transform:scale(0.985) translateY(-2px);
}

.avatar.thinking .face-layer{
filter:brightness(1.02);
transform:scale(0.97) translateY(-1px);
}

@keyframes idleFloat{
0%{transform:scale(0.96) translateY(0);}
25%{transform:scale(0.965) translateY(-2px);}
50%{transform:scale(0.968) translateY(-4px);}
75%{transform:scale(0.963) translateY(-2px);}
100%{transform:scale(0.96) translateY(0);}
}

#bubble{
position:absolute;
bottom:72px;
left:50%;
transform:translateX(-50%) translateY(10px);
width:84%;
max-width:420px;
background:rgba(255,255,255,0.28);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
border-radius:20px;
padding:10px 12px;
font-size:14px;
line-height:1.5;
text-align:center;
z-index:5;
max-height:84px;
overflow:auto;
opacity:0;
color:#2a2a2a;
box-shadow:0 6px 24px rgba(0,0,0,.06);
transition:all .35s ease;
}

#bubble.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

#bottomBar{
position:fixed;
left:50%;
transform:translateX(-50%);
bottom:calc(10px + env(safe-area-inset-bottom, 0px));
width:calc(100% - 16px);
max-width:430px;
display:flex;
align-items:center;
gap:8px;
background:rgba(255,255,255,0.92);
border-radius:24px;
padding:6px;
z-index:10;
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
box-shadow:0 10px 26px rgba(0,0,0,.10);
}

#bottomBar button{
height:40px;
width:40px;
border:none;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
font-size:18px;
flex:0 0 auto;
box-shadow:0 2px 8px rgba(0,0,0,.06);
}

#send{
border-radius:20px !important;
width:auto !important;
height:40px;
padding:0 14px;
background:#4da6ff !important;
color:#fff;
font-size:14px;
font-weight:700;
}

#input{
flex:1;
height:42px;
border:none;
border-radius:21px;
padding:0 14px;
min-width:0;
font-size:16px;
background:#fff;
outline:none;
}

#input::placeholder{
color:#8d8d8d;
}

@media (max-width:390px){
#bubble{
width:86%;
bottom:70px;
max-height:80px;
}
#bottomBar{
width:calc(100% - 12px);
gap:6px;
}
#bottomBar button{
width:38px;
height:38px;
font-size:16px;
}
#send{
height:38px;
padding:0 12px;
}
#input{
height:40px;
}
}

@media (prefers-reduced-motion: reduce){
.avatar.idle .face-layer{
animation:none;
}
.face-layer,
#bubble{
transition:none;
}
}
</style>
</head>
<body>

<div class="avatar idle" id="avatarWrap">
  <img id="baseFace" src="normal.png" class="face-layer" alt="美咲AI">
  <img id="blinkFace" src="blink2.png" class="face-layer" alt="">
</div>

<div id="bubble" class="show">どうしたのかな？😊</div>

<div id="bottomBar">
  <button id="mic" aria-label="音声入力">🎤</button>
  <input id="input" placeholder="話しかけて" aria-label="メッセージ入力">
  <button id="send">送信</button>
  <button id="settingsBtn" aria-label="設定">⚙️</button>
  <button id="appBtn" aria-label="アプリ">📱</button>
</div>

<script>
const bubble = document.getElementById("bubble");
const input = document.getElementById("input");
const baseFace = document.getElementById("baseFace");
const blinkFace = document.getElementById("blinkFace");
const avatarWrap = document.getElementById("avatarWrap");
const sendBtn = document.getElementById("send");
const micBtn = document.getElementById("mic");
const settingsBtn = document.getElementById("settingsBtn");
const appBtn = document.getElementById("appBtn");
const STORAGE_PREFIX = "misaki-ai-mobile:";

let isSpeaking = false;
let isThinking = false;
let isBlinking = false;
let blinkTimer = null;
let recognition = null;

const FACE = {
  normal: "normal.png",
  blink: "blink.png",
  blink2: "blink2.png",
  smile: "smile.png",
  curious: "curious.png",
  typing: "typing.png"
};

const MOUTHS = ["mouth1.png","mouth2.png","mouth3.png"];

[FACE.normal, FACE.blink, FACE.blink2, FACE.smile, FACE.curious, FACE.typing, ...MOUTHS].forEach(src=>{
  const img = new Image();
  img.src = src;
});

let conversation = [
  {role:"system", content:"優しい女性。共感重視。短く自然に話す"}
];

let memory = [];
try{
  memory = JSON.parse(localStorage.getItem(STORAGE_PREFIX + "memory") || "[]");
  if(!Array.isArray(memory)) memory = [];
}catch{
  memory = [];
}

function setAvatarMode(mode){
  avatarWrap.classList.remove("idle","speaking","thinking");
  avatarWrap.classList.add(mode);
}

function setBaseFace(src){
  baseFace.src = src;
}

function hideBlinkLayer(){
  blinkFace.style.opacity = "0";
}

function showBlinkLayer(src){
  blinkFace.src = src;
  requestAnimationFrame(()=>{
    blinkFace.style.opacity = "1";
  });
}

function saveMemory(text){
  memory.push(text);
  if(memory.length > 20) memory = memory.slice(-20);
  try{
    localStorage.setItem(STORAGE_PREFIX + "memory", JSON.stringify(memory));
  }catch(e){
    console.log("記憶保存失敗", e);
  }
}

function showBubble(text){
  bubble.classList.remove("show");
  setTimeout(()=>{
    bubble.innerText = text;
    bubble.classList.add("show");
  },150);
}

function stopLipSync(){
  isSpeaking = false;
  setAvatarMode("idle");
  setBaseFace(FACE.normal);
  hideBlinkLayer();
  startBlinkLoop();
}

function startLipSync(){
  stopBlinkLoop();
  hideBlinkLayer();
  isSpeaking = true;
  setAvatarMode("speaking");

  let i = 0;
  function loop(){
    if(!isSpeaking) return;
    setBaseFace(MOUTHS[i % MOUTHS.length]);
    i++;
    setTimeout(loop, 110);
  }
  loop();
}

function stopBlinkLoop(){
  if(blinkTimer){
    clearTimeout(blinkTimer);
    blinkTimer = null;
  }
}

function scheduleBlink(){
  stopBlinkLoop();
  const delay = 3800 + Math.random() * 4200;
  blinkTimer = setTimeout(async ()=>{
    await doBlink();
    scheduleBlink();
  }, delay);
}

async function doBlink(){
  if(isSpeaking || isThinking || isBlinking) return;
  isBlinking = true;

  const deepBlink = Math.random() < 0.18;

  showBlinkLayer(FACE.blink2);
  await sleep(120);

  if(deepBlink){
    showBlinkLayer(FACE.blink);
    await sleep(120);
  }

  hideBlinkLayer();
  await sleep(120);

  isBlinking = false;
}

function startBlinkLoop(){
  if(isSpeaking || isThinking) return;
  setAvatarMode("idle");
  scheduleBlink();
}

function sleep(ms){
  return new Promise(r=>setTimeout(r, ms));
}

let API_KEY = "";
try{
  API_KEY = localStorage.getItem(STORAGE_PREFIX + "apiKey") || "";
}catch{
  API_KEY = "";
}

async function speakWithBrowser(text){
  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang = "ja-JP";

  uttr.onstart = ()=>{
    startLipSync();
  };

  uttr.onend = ()=>{
    stopLipSync();
  };

  uttr.onerror = ()=>{
    stopLipSync();
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(uttr);
}

async function speak(text){
  if(!API_KEY){
    return speakWithBrowser(text);
  }

  try{
    const res = await fetch("https://api.openai.com/v1/audio/speech",{
      method:"POST",
      headers:{
        "Authorization":"Bearer " + API_KEY,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"gpt-4o-mini-tts",
        voice:"aria",
        input:text
      })
    });

    if(!res.ok){
      throw new Error(await res.text());
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);

    audio.onplay = ()=>{
      startLipSync();
    };

    audio.onended = ()=>{
      URL.revokeObjectURL(url);
      stopLipSync();
    };

    audio.onerror = ()=>{
      URL.revokeObjectURL(url);
      stopLipSync();
      speakWithBrowser(text);
    };

    await audio.play();
  }catch(e){
    console.log("音声エラー", e);
    speakWithBrowser(text);
  }
}

async function getAIResponse(msg){
  if(msg.includes("好き") || msg.includes("疲れ") || msg.includes("仕事")){
    saveMemory(msg);
  }

  const memoryText = memory.join(" / ");
  conversation[0] = {
    role:"system",
    content:"優しい女性。共感重視。短く自然に話す。ユーザー情報:" + memoryText
  };

  conversation.push({role:"user", content:msg});

  if(conversation.length > 9){
    conversation = [conversation[0], ...conversation.slice(-8)];
  }

  if(!API_KEY){
    return "今はAPIキーが入っていないみたい。設定から入れてくれると、もっと自然にお話しできるよ。";
  }

  try{
    const r = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + API_KEY
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:conversation
      })
    });

    if(!r.ok){
      throw new Error(await r.text());
    }

    const d = await r.json();
    const reply = d.choices?.[0]?.message?.content || "うまく話せない…";
    conversation.push({role:"assistant", content:reply});
    return reply;
  }catch(e){
    console.log("会話エラー", e);
    return "ごめんね、今ちょっと通信が不安定みたい…。少ししてからもう一度話しかけて。";
  }
}

async function send(){
  const text = input.value.trim();

  if(!text){
    showBubble("何か話して😊");
    return;
  }

  input.value = "";
  isThinking = true;
  stopBlinkLoop();
  hideBlinkLayer();
  setAvatarMode("thinking");
  setBaseFace(FACE.typing);
  showBubble("…");

  await sleep(300);

  let reply = await getAIResponse(text);
  reply = reply.replace(/。/g,"。… ").replace(/、/g,"、 ");

  isThinking = false;
  showBubble(reply);
  speak(reply);
}

sendBtn.addEventListener("click", send);

input.addEventListener("keydown", e=>{
  if(e.key === "Enter") send();
});

if("webkitSpeechRecognition" in window){
  recognition = new webkitSpeechRecognition();
  recognition.lang = "ja-JP";
  recognition.interimResults = false;
  recognition.continuous = false;

  micBtn.onclick = ()=>{
    recognition.start();
  };

  recognition.onstart = ()=>{
    isThinking = true;
    stopBlinkLoop();
    hideBlinkLayer();
    setAvatarMode("thinking");
    setBaseFace(FACE.curious);
    showBubble("聞いてるよ…");
  };

  recognition.onresult = e=>{
    input.value = e.results[0][0].transcript;
    isThinking = false;
    setBaseFace(FACE.normal);
    setAvatarMode("idle");
    send();
  };

  recognition.onerror = ()=>{
    isThinking = false;
    setBaseFace(FACE.normal);
    setAvatarMode("idle");
    hideBlinkLayer();
    startBlinkLoop();
    showBubble("うまく聞き取れなかったみたい…もう一度話してみて。");
  };

  recognition.onend = ()=>{
    if(!isSpeaking && !isThinking){
      setBaseFace(FACE.normal);
      setAvatarMode("idle");
      hideBlinkLayer();
      startBlinkLoop();
    }
  };
}else{
  micBtn.disabled = true;
  micBtn.style.opacity = 0.45;
}

settingsBtn.onclick = ()=>{
  const key = prompt("APIキー入力", API_KEY || "");
  if(key !== null){
    API_KEY = key.trim();
    try{
      localStorage.setItem(STORAGE_PREFIX + "apiKey", API_KEY);
    }catch(e){
      console.log("APIキー保存失敗", e);
    }
    alert(API_KEY ? "保存したよ" : "APIキーを空にしたよ");
  }
};

appBtn.onclick = ()=>{
  showBubble("ここに生活アプリ呼び出しを増やしていけるよ。🌷");
};

window.addEventListener("load", ()=>{
  setAvatarMode("idle");
  setBaseFace(FACE.normal);
  hideBlinkLayer();
  startBlinkLoop();

  setTimeout(()=>{
    const text = "おかえり。今日もお疲れさま。";
    showBubble(text);
    speak(text);
  },800);
});
</script>

</body>
</html>

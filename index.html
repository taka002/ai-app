<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新人AIアプリ</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#eef3ff;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* 上：キャラ */
#avatarArea{
  height:30%;
  background:#dbe9ff;
}

#avatar{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 中：チャット（ここだけスクロール） */
#chatArea{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* 吹き出し */
.msg{
  margin:8px 0;
  padding:10px;
  border-radius:10px;
  max-width:80%;
}

.user{
  background:#4facfe;
  color:white;
  margin-left:auto;
}

.ai{
  background:white;
}

/* YouTube */
#youtube{
  width:100%;
  height:200px;
  display:none;
}

/* 下：固定バー */
#inputArea{
  position:fixed;
  bottom:0;
  width:100%;
  background:#ddd;
  padding:10px;
}

/* ボタン横並び */
#controls{
  display:flex;
  align-items:center;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}

button{
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
}

/* 設定ボタン */
#settings{
  position:fixed;
  top:10px;
  right:10px;
  background:#333;
  color:white;
  border-radius:50%;
  width:40px;
  height:40px;
}
</style>
</head>

<body>

<!-- 設定 -->
<button id="settings" onclick="openSettings()">⚙️</button>

<!-- 上：キャラ -->
<div id="avatarArea">
  <img id="avatar" src="normal.png">
</div>

<!-- 中：チャット -->
<div id="chatArea"></div>

<!-- YouTube -->
<iframe id="youtube"></iframe>

<!-- 下：入力 -->
<div id="inputArea">
  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button onclick="send()">送信</button>
    <button onclick="openCamera()">📷</button>
  </div>
</div>

<script>

// メッセージ追加
function addMessage(text, type){
  const chat = document.getElementById("chatArea");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 画像切替
function changeAvatar(name){
  document.getElementById("avatar").src = name;
}

// AIロジック
function aiReply(text){

  let reply = "はい！承知しました！";
  let img = "normal.png";

  if(text.includes("おはよう")){
    reply = "おはようございます！";
    img = "smile.png";
  }

  if(text.includes("疲れた")){
    reply = "お疲れ様です！無理しないでください！";
    img = "relieved.png";
  }

  if(text.includes("ありがとう")){
    reply = "嬉しいです！ありがとうございます！";
    img = "happy.png";
  }

  if(text.includes("悲しい")){
    reply = "大丈夫です、そばにいますよ。";
    img = "sad.png";
  }

  if(text.includes("楽しい")){
    reply = "いいですね！楽しみましょう！";
    img = "smile.png";
  }

  changeAvatar(img);
  return reply;
}

// 送信
function send(){
  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  addMessage(text, "user");

  setTimeout(()=>{
    addMessage(aiReply(text), "ai");
  }, 300);

  input.value = "";
}

// カメラ
function openCamera(){
  alert("次でカメラ解析入れる🔥");
}

// 設定
function openSettings(){
  alert("ここに設定（音声・AI切替など）追加予定🔥");
}

</script>

</body>
</html>

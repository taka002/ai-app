<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
  background:#eef3ff;
}

#app{
  display:flex;
  flex-direction:column;
  height:100%;
}

/* 上 */
#avatarArea{
  height:22%;
}
#avatar{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 中 */
#chatArea{
  height:60%;
  overflow-y:auto;
  padding:6px;
}

.msg{
  margin:4px 0;
  padding:8px;
  border-radius:10px;
  max-width:85%;
  font-size:13px;
}
.user{background:#4facfe;color:#fff;margin-left:auto;}
.ai{background:#fff;}

/* 下 */
#inputArea{
  height:18%;
  background:#ddd;
  padding:5px;
  display:flex;
  flex-direction:column;
  gap:4px;
}

#controls{
  display:flex;
}

input{
  flex:1;
  padding:8px;
  border:none;
  border-radius:10px;
}

/* ボタン */
button{
  margin-left:3px;
  padding:6px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
  font-size:11px;
}

#settingsBtn{
  background:#333;
}

/* カメラ */
#cameraBox{
  position:fixed;
  bottom:90px;
  right:10px;
  width:140px;
  display:none;
}

video,canvas{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="app">

<!-- 上 -->
<div id="avatarArea">
  <img id="avatar" src="normal.png">
</div>

<!-- 中 -->
<div id="chatArea"></div>

<!-- 下 -->
<div id="inputArea">

  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button onclick="send()">送信</button>
    <button onclick="startCamera()">📷</button>
    <button onclick="takePhoto()">📸</button>
  </div>

  <button id="settingsBtn" onclick="openSettings()">⚙️設定</button>

</div>

</div>

<!-- カメラ -->
<div id="cameraBox">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<script>

let voiceOn=false;
let apiKey="";
let systemPrompt="優しいAIとして話す";

let stream=null;

/* メッセージ */
function addMessage(text,type){
  const chat=document.getElementById("chatArea");
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* 画像 */
function changeAvatar(name){
  document.getElementById("avatar").src=name;
}

/* ChatGPT */
async function askGPT(text){

  if(!apiKey){
    return "APIキー未設定";
  }

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:systemPrompt},
          {role:"user",content:text}
        ]
      })
    });

    const data=await res.json();
    return data.choices[0].message.content;

  }catch(e){
    return "エラー";
  }
}

/* AI返答 */
async function aiReply(text){

  let reply=await askGPT(text);

  // 表情
  if(text.includes("疲れ")){
    changeAvatar("relieved.png");
  }else if(text.includes("悲しい")){
    changeAvatar("sad.png");
  }else{
    changeAvatar("normal.png");
  }

  // 音声
  if(voiceOn){
    const uttr=new SpeechSynthesisUtterance(reply);
    uttr.lang="ja-JP";
    speechSynthesis.speak(uttr);
  }

  return reply;
}

/* 送信 */
async function send(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text)return;

  addMessage(text,"user");

  const reply=await aiReply(text);
  addMessage(reply,"ai");

  input.value="";
}

/* カメラ起動（バック） */
async function startCamera(){

  const box=document.getElementById("cameraBox");
  const video=document.getElementById("video");

  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"environment"}
    });
    video.srcObject=stream;
    box.style.display="block";
  }catch(e){
    alert("カメラ許可して");
  }
}

/* 撮影 */
function takePhoto(){

  const video=document.getElementById("video");
  const canvas=document.getElementById("canvas");

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  const ctx=canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  const img=canvas.toDataURL();

  const chat=document.getElementById("chatArea");
  const image=document.createElement("img");
  image.src=img;
  image.style.maxWidth="60%";
  image.style.borderRadius="10px";
  image.style.display="block";
  image.style.marginLeft="auto";

  chat.appendChild(image);
  chat.scrollTop=chat.scrollHeight;
}

/* 設定 */
function openSettings(){

  const key=prompt("APIキー入力");
  if(key) apiKey=key;

  const p=prompt("AIの性格（プロンプト）");
  if(p) systemPrompt=p;

  voiceOn=confirm("音声ONにする？");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI フル完成版</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100vh;
display:flex;
flex-direction:column;
}

/* キャラ */
#character{height:28vh;}
#character img{width:100%;height:100%;object-fit:cover;}

/* 情報 */
#infoBar{
text-align:center;
font-size:13px;
padding:6px;
background:rgba(255,255,255,0.7);
}

/* チャット */
#chat{flex:1;overflow-y:auto;padding:10px;padding-bottom:120px;}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}

.bubble{
display:inline-block;
padding:12px;
border-radius:16px;
background:#fff;
line-height:1.6;
}
.user .bubble{background:#0072ff;color:#fff;}

/* 入力 */
#bottom{
position:fixed;bottom:0;width:100%;
background:#fff;padding:8px;
}
#controls{display:flex;gap:6px;max-width:600px;margin:auto;}
#input{flex:1;padding:10px;border-radius:20px;border:none;}

#sendBtn,#micBtn,#presentBtn{
width:44px;height:44px;border-radius:50%;
border:none;color:#fff;
}
#sendBtn{background:#0072ff;}
#micBtn{background:#ff4081;}
#presentBtn{background:#4caf50;}

/* 設定 */
#fab{position:fixed;right:10px;bottom:90px;}
#setBtn{
width:50px;height:50px;border-radius:50%;
border:none;background:#333;color:#fff;
}

/* モーダル */
#modal{
position:fixed;width:100%;height:100%;
display:none;background:rgba(0,0,0,0.5);
justify-content:center;align-items:center;
}
#modalContent{
background:#222;color:#fff;padding:20px;
border-radius:12px;width:90%;
max-height:80%;overflow:auto;
}
#modal input,#modal textarea,#modal select,#modal button{
width:100%;margin:6px 0;padding:10px;
}

/* プレゼン */
#presentation{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#000;color:#fff;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}
#slideText{
font-size:28px;
text-align:center;
padding:20px;
}
</style>
</head>

<body>

<div id="character">
<img id="avatar" src="normal.png">
</div>

<div id="infoBar"></div>
<div id="chat"></div>

<div id="bottom">
<div id="controls">
<input id="input">
<button id="micBtn">🎤</button>
<button id="sendBtn">➤</button>
<button id="presentBtn">🎤</button>
</div>
</div>

<div id="fab">
<button id="setBtn" onclick="openSettings()">⚙</button>
</div>

<div id="modal">
<div id="modalContent">

<h3>API</h3>
<input id="apiKey" placeholder="ChatGPTキー">
<input id="elevenKey" placeholder="Elevenキー">
<input id="voiceId" placeholder="VoiceID">

<h3>プロンプト</h3>
<textarea id="prompt"></textarea>

<h3>音声</h3>
<select id="voiceType">
<option value="local">ローカル</option>
<option value="eleven">ElevenLabs</option>
</select>
音声ON<input type="checkbox" id="voiceToggle">

<button onclick="saveSettings()">保存</button>

<hr>

<button onclick="openYahooNews()">ニュース</button>
<button onclick="openGoogleMap()">マップ</button>
<button onclick="openYahooTransit()">乗換</button>
<button onclick="openLine()">LINE</button>

<button onclick="logHealth()">体調</button>
<button onclick="addExpense()">支出</button>

</div>
</div>

<div id="presentation" onclick="nextSlide()">
<div id="slideText"></div>
</div>

<script>
const chat=document.getElementById("chat");
const avatar=document.getElementById("avatar");
const slideText=document.getElementById("slideText");

let history=[];
let voiceOn=true;
let slides=[],index=0,isPres=false;
let lastTalk=Date.now();

/* ===== 表示 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;

if(c==="ai"){
changeFace(t);
handleAction(t);
if(voiceOn)speak(t);
}
}

/* 表情 */
function changeFace(t){
if(t.includes("ありがとう")) avatar.src="agree.png";
else avatar.src="normal.png";
}

/* 音声 */
function speak(t){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

/* Eleven */
async function speakEleven(t){
const key=localStorage.getItem("elevenKey");
const vid=localStorage.getItem("voiceId");
if(!key||!vid)return speak(t);

try{
const r=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vid}`,{
method:"POST",
headers:{
"xi-api-key":key,
"Content-Type":"application/json"
},
body:JSON.stringify({text:t})
});
const b=await r.blob();
new Audio(URL.createObjectURL(b)).play();
}catch{speak(t);}
}

/* AI操作 */
function handleAction(t){
if(t.includes("ニュース")) openYahooNews();
if(t.includes("地図")) openGoogleMap();
}

/* ===== AI ===== */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";
lastTalk=Date.now();

const key=localStorage.getItem("apiKey");
if(!key)return add("APIキー未設定","ai");

const p=localStorage.getItem("prompt")||"";

const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:p},
{role:"user",content:t}
]
})
});

const d=await r.json();
const reply=d.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");

/* スライド */
slides=reply.split(/[。！？\n]/).filter(s=>s);
index=0;
}

/* ===== プレゼン ===== */
function togglePresentation(){
isPres=!isPres;
presentation.style.display=isPres?"flex":"none";
showSlide();
}
function showSlide(){
if(!slides.length)return;
slideText.innerText=slides[index];
speak(slides[index]);
}
function nextSlide(){
index=(index+1)%slides.length;
showSlide();
}

/* ===== 自動AI ===== */
setInterval(()=>{
const h=new Date().getHours();
if(h===7)add("おはよう","ai");
if(h===12)add("昼だよ","ai");
if(h===21)add("お疲れ様","ai");
},60000);

setInterval(()=>{
if(Date.now()-lastTalk>300000){
add("話そうか？","ai");
}
},60000);

/* ===== 外部 ===== */
function openYahooNews(){window.open("https://news.yahoo.co.jp");}
function openGoogleMap(){window.open("https://maps.google.com");}
function openYahooTransit(){window.open("https://transit.yahoo.co.jp");}
function openLine(){window.open("https://line.me");}

/* ===== 体調 ===== */
let health=JSON.parse(localStorage.getItem("health")||"[]");
function logHealth(){
const t=prompt("体調");
health.push({t,date:new Date()});
localStorage.setItem("health",JSON.stringify(health));
add("記録した","ai");
}

/* ===== 家計 ===== */
let money=JSON.parse(localStorage.getItem("money")||"[]");
function addExpense(){
const p=prompt("金額");
money.push(Number(p));
localStorage.setItem("money",JSON.stringify(money));
add("追加OK","ai");
}

/* ===== 設定 ===== */
function openSettings(){
modal.style.display="flex";
}
function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
localStorage.setItem("prompt",prompt.value);
localStorage.setItem("voiceOn",voiceToggle.checked);
modal.style.display="none";
add("保存OK","ai");
}

/* 音声入力 */
const R=window.SpeechRecognition||window.webkitSpeechRecognition;
if(R){
const rec=new R();
rec.lang="ja-JP";
micBtn.onclick=()=>rec.start();
rec.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}

sendBtn.onclick=send;
presentBtn.onclick=togglePresentation;
</script>

</body>
</html>

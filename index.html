<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 神アプリ</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:60px;
}
header{height:28vh;}
header img{width:100%;height:100%;object-fit:cover;}

main{flex:1;overflow-y:auto;padding:10px;}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{padding:10px;border-radius:16px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}

footer{
position:fixed;bottom:0;width:100%;
background:#fff;padding:6px;
display:flex;justify-content:center;
}
#dock{width:100%;max-width:600px;display:flex;gap:6px;}
#input{width:58%;height:36px;border-radius:20px;border:none;padding:8px;}
.dockBtn{width:40px;height:36px;border:none;border-radius:10px;background:#eee;}

#menu{
position:fixed;bottom:-100%;width:100%;height:88%;
background:#111;color:#fff;
border-radius:20px 20px 0 0;
transition:.3s;z-index:1000;
}
#menu.active{bottom:0;}

.menuGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;padding:20px;
}
.menuItem{
height:90px;background:#333;border-radius:16px;
display:flex;flex-direction:column;justify-content:center;align-items:center;
}
</style>
</head>

<body>

<header>
<img src="normal.png">
</header>

<main id="chat"></main>

<footer>
<div id="dock">
<input id="input" placeholder="話しかけてください">
<button class="dockBtn" onclick="send()">➤</button>
<button class="dockBtn" id="micBtn">🎤</button>
<button class="dockBtn" onclick="menu.classList.add('active')">☰</button>
</div>
</footer>

<div id="menu">
<div class="menuGrid">

<div class="menuItem" onclick="openSearch()">🔍検索</div>
<div class="menuItem" onclick="openMap()">🗺地図</div>
<div class="menuItem" onclick="openWeather()">☀️天気</div>

<div class="menuItem" onclick="openTrain()">🚆電車</div>
<div class="menuItem" onclick="openCalendar()">📅予定</div>
<div class="menuItem" onclick="openGmail()">📧メール</div>

<div class="menuItem" onclick="openYouTube()">▶YouTube</div>
<div class="menuItem" onclick="openAmazon()">🛒買い物</div>
<div class="menuItem" onclick="openMemo()">📝メモ</div>

<div class="menuItem" onclick="openChatGPT()">🤖ChatGPT</div>
<div class="menuItem" onclick="openGemini()">✨Gemini</div>
<div class="menuItem" onclick="openPerplexity()">🔎Perplexity</div>

<div class="menuItem" onclick="openPrime()">🎬Prime</div>
<div class="menuItem" onclick="openRakuten()">🛍楽天</div>
<div class="menuItem" onclick="openRakutenMag()">📚楽天マガジン</div>

<div class="menuItem" onclick="callPhone()">📞電話</div>
<div class="menuItem" onclick="openSMS()">💬SMS</div>

<div class="menuItem" onclick="openCamera()">📷カメラ</div>
<div class="menuItem" onclick="openPhotos()">🖼写真</div>
<div class="menuItem" onclick="openSettings()">⚙️設定</div>

<div class="menuItem" onclick="openDAZN()">⚽DAZN</div>
<div class="menuItem" onclick="openTVer()">📺TVer</div>
<div class="menuItem" onclick="openDMM()">🎥DMM</div>

</div>
</div>

<script>

/* ===== 音声ロック解除 ===== */
document.body.addEventListener("click",()=>{
speechSynthesis.speak(new SpeechSynthesisUtterance(" "));
},{once:true});

/* ===== 基本 ===== */
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const menu=document.getElementById("menu");

let voiceOn=true;
let history=[];

/* ===== 表示 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* ===== 音声 ===== */
function speak(t){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

/* ===== AI ===== */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

add("考え中...","ai");

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+localStorage.getItem("apiKey")
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"優しい女性"},
...history,
{role:"user",content:t}
]
})
});

const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");
speak(reply);

history.push({role:"user",content:t});
history.push({role:"assistant",content:reply});
}

/* ===== intent ===== */
function detectIntent(t){
t=t.toLowerCase();

if(t.includes("検索")) return openSearch;
if(t.includes("地図")) return openMap;
if(t.includes("天気")) return openWeather;
if(t.includes("電車")) return openTrain;
if(t.includes("youtube")) return openYouTube;

if(t.includes("chatgpt")) return openChatGPT;
if(t.includes("gemini")) return openGemini;
if(t.includes("perplexity")) return openPerplexity;

return null;
}

function handleInput(text){
const fn=detectIntent(text);
if(fn){ fn(); return; }
input.value=text;
send();
}

/* ===== 🎤 安定版 ===== */
let rec;
let listening=false;

if(window.SpeechRecognition||window.webkitSpeechRecognition){

rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="ja-JP";

document.getElementById("micBtn").onclick=()=>{

if(!listening){
rec.start();
listening=true;
add("聞いてるよ🎤","ai");
}else{
rec.stop();
listening=false;
}

};

rec.onresult=e=>{
handleInput(e.results[0][0].transcript);
};

rec.onend=()=>{listening=false;}

}

/* ===== アプリ（ブロック回避） ===== */
function openSearch(){location.href="https://google.com";}
function openMap(){location.href="https://maps.google.com";}
function openWeather(){location.href="https://weather.yahoo.co.jp";}
function openTrain(){location.href="https://www.google.com/maps/dir/?api=1&travelmode=transit";}
function openCalendar(){location.href="https://calendar.google.com";}
function openGmail(){location.href="https://mail.google.com";}
function openYouTube(){location.href="https://youtube.com";}
function openAmazon(){location.href="https://amazon.co.jp";}
function openMemo(){location.href="https://keep.google.com";}

function openChatGPT(){location.href="https://chat.openai.com";}
function openGemini(){location.href="https://gemini.google.com";}
function openPerplexity(){location.href="https://perplexity.ai";}

function openPrime(){location.href="https://www.amazon.co.jp/gp/video";}
function openRakuten(){location.href="https://rakuten.co.jp";}
function openRakutenMag(){location.href="https://magazine.rakuten.co.jp";}

function callPhone(){location.href="tel:";}
function openSMS(){location.href="sms:";}

function openCamera(){
const i=document.createElement("input");
i.type="file";
i.accept="image/*";
i.capture="environment";
i.click();
}

function openPhotos(){location.href="https://photos.google.com";}
function openSettings(){alert("端末設定は開けない仕様");}

function openDAZN(){location.href="https://dazn.com";}
function openTVer(){location.href="https://tver.jp";}
function openDMM(){location.href="https://tv.dmm.com";}

</script>

</body>
</html>

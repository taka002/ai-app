<!-- 完全統合版 -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:linear-gradient(135deg,#6ec6ff,#a0e0ff);height:100vh;display:flex;flex-direction:column;}
#character{height:30vh;}
#character img{width:100%;height:100%;object-fit:cover;}
#chat{flex:1;overflow-y:auto;padding:10px;padding-bottom:100px;}
.msg{max-width:85%;margin:8px;}
.user{text-align:right;}
.bubble{display:inline-block;padding:12px;border-radius:16px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}
#bottom{position:fixed;bottom:0;width:100%;background:#fff;padding:8px;}
#controls{display:flex;gap:6px;}
#input{flex:1;padding:10px;border-radius:20px;border:none;}
#sendBtn{width:44px;height:44px;border-radius:50%;background:#0072ff;color:#fff;border:none;}
#fab{position:fixed;right:10px;bottom:90px;}
#setBtn{width:50px;height:50px;border-radius:50%;background:#333;color:#fff;border:none;}
#modal{position:fixed;width:100%;height:100%;display:none;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
#modalContent{background:#222;color:#fff;padding:20px;border-radius:12px;width:90%;}
img.preview{max-width:200px;border-radius:10px;margin-top:10px;}
video{width:90%;border-radius:10px;margin-top:10px;}
textarea{width:100%;}
</style>
</head>

<body>

<div id="character"><img src="normal.png"></div>
<div id="chat"></div>

<div id="bottom">
<div id="controls">
<input id="input" placeholder="話しかけてください">
<button id="sendBtn">➤</button>
</div>
</div>

<div id="fab">
<button id="setBtn" onclick="openSettings()">⚙</button>
</div>

<input type="file" id="imageInput" accept="image/*" style="display:none">

<div id="modal">
<div id="modalContent">

ChatGPTキー<input id="openaiKey">
Geminiキー<input id="geminiKey">

<h3>モード</h3>
<select id="mode">
<option value="child">子供</option>
<option value="teacher">家庭教師</option>
<option value="parent">親</option>
<option value="work">仕事</option>
<option value="research">研究</option>
<option value="counselor">カウンセラー</option>
<option value="hostess">ホステス</option>
<option value="elder">年配</option>
<option value="medical">医療</option>
<option value="consult">相談</option>
</select>

カスタムプロンプト
<textarea id="customPrompt"></textarea>

<hr>

<button onclick="openCamera()">📷カメラ</button>
<button onclick="openGallery()">🖼画像</button>
<button onclick="getLocation()">📍位置+天気</button>
<button onclick="openCalendar()">📅カレンダー</button>

<button onclick="showMemory()">📖記憶</button>
<button onclick="clearMemory()">🧹リセット</button>

<button onclick="saveSettings()">閉じる</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let history = JSON.parse(localStorage.getItem("history")||"[]");
let memory = JSON.parse(localStorage.getItem("memory")||"[]");

let lastImageBase64="";
let currentStream;

/* UI */
function addMessage(text,cls){
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML=`<div class="bubble">${text}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* 音声 */
function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

/* モード */
function getModePrompt(mode){
  return {
    child:"子供に優しく",
    teacher:"わかりやすく教える",
    parent:"親のように",
    work:"仕事として正確に",
    research:"専門的に",
    counselor:"寄り添う",
    hostess:"楽しく会話",
    elder:"落ち着いて",
    medical:"医療的に慎重に",
    consult:"相談に乗る"
  }[mode]||"";
}

/* ChatGPT */
sendBtn.onclick=sendMessage;

async function sendMessage(){
  const text=input.value.trim();
  if(!text)return;

  addMessage(text,"user");
  input.value="";

  const key=openaiKey.value;
  const mode=mode.value;
  const custom=customPrompt.value;

  history.push({role:"user",content:text});
  if(history.length>20) history=history.slice(-20);

  const system = getModePrompt(mode)+"\n"+custom+"\n記憶:\n"+memory.join("\n");

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+key
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[{role:"system",content:system},...history]
    })
  });

  const data=await res.json();
  const reply=data.choices?.[0]?.message?.content||"エラー";

  addMessage(reply,"ai");
  speak(reply);

  history.push({role:"assistant",content:reply});
  localStorage.setItem("history",JSON.stringify(history));

  extractMemory(text);
  extractMemory(reply);
}

/* 長期記憶 */
function extractMemory(text){
  if(["好き","嫌い","体調","名前","仕事","家族"].some(k=>text.includes(k))){
    memory.push(text);
    if(memory.length>10) memory=memory.slice(-10);
    localStorage.setItem("memory",JSON.stringify(memory));
  }
}

function showMemory(){
  addMessage(memory.join("<br>"),"ai");
}

function clearMemory(){
  memory=[];
  history=[];
  localStorage.clear();
  chat.innerHTML="";
}

/* カメラ→即解析 */
async function openCamera(){
  currentStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  const video=document.createElement("video");
  video.autoplay=true;
  video.srcObject=currentStream;

  const btn=document.createElement("button");
  btn.innerText="📸";

  btn.onclick=async()=>{
    const canvas=document.createElement("canvas");
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    canvas.getContext("2d").drawImage(video,0,0);

    const img=canvas.toDataURL("image/jpeg");
    lastImageBase64=img.split(",")[1];
    addMessage(`<img src="${img}" class="preview">`,"ai");

    currentStream.getTracks().forEach(t=>t.stop());
    await analyzeImage();
  };

  chat.appendChild(video);
  chat.appendChild(btn);
}

/* Gemini */
async function analyzeImage(){
  const key=geminiKey.value;

  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      contents:[{parts:[
        {text:"これは何か説明して"},
        {inline_data:{mime_type:"image/jpeg",data:lastImageBase64}}
      ]}]
    })
  });

  const data=await res.json();
  const text=data.candidates?.[0]?.content?.parts?.[0]?.text;
  addMessage(text,"ai");
  speak(text);
}

/* その他 */
function openGallery(){imageInput.click();}
imageInput.onchange=e=>{
  const r=new FileReader();
  r.onload=ev=>{
    lastImageBase64=ev.target.result.split(",")[1];
    addMessage(`<img src="${ev.target.result}" class="preview">`,"ai");
  };
  r.readAsDataURL(e.target.files[0]);
};

function getLocation(){
  navigator.geolocation.getCurrentPosition(async pos=>{
    const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`);
    const d=await w.json();
    addMessage(`🌤 ${d.current_weather.temperature}℃`,"ai");
  });
}

function openCalendar(){
  const iframe=document.createElement("iframe");
  iframe.src="https://calendar.google.com";
  iframe.style.width="100%";
  iframe.style.height="400px";
  chat.appendChild(iframe);
}

function openSettings(){modal.style.display="flex";}
function saveSettings(){modal.style.display="none";}

/* 復元 */
history.forEach(m=>addMessage(m.content,m.role==="user"?"user":"ai"));
</script>

</body>
</html>

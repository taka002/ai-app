<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
overflow:hidden;
}

/* ===== キャラ全画面 ===== */
#characterWrap{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

#character{
width:100%;
height:100%;
object-fit:cover;
transition:0.3s;
}

/* ===== UI ===== */
#ui{
position:relative;
z-index:10;
height:100dvh;
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:10px;
}

/* 吹き出し */
.bubble{
background:rgba(255,255,255,0.9);
border-radius:20px;
padding:15px;
margin:5px;
max-width:80%;
}

/* 入力 */
#inputArea{
display:flex;
gap:5px;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:20px;
background:#007bff;
color:#fff;
}

/* 下ボタン */
#menuBtn{
position:absolute;
right:10px;
bottom:80px;
width:60px;
height:60px;
border-radius:50%;
background:rgba(0,0,0,0.5);
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

</style>
</head>

<body>

<!-- キャラ -->
<div id="characterWrap">
  <img id="character" src="normal.png">
</div>

<!-- UI -->
<div id="ui">

  <div id="chat">
    <div class="bubble">こんにちは😊</div>
  </div>

  <div id="inputArea">
    <input id="input" placeholder="話しかけて">
    <button onclick="send()">送信</button>
  </div>

</div>

<div id="menuBtn">≡</div>

<script>

/* ===== 感情切り替え ===== */
function changeEmotion(text){

  let img = "normal.png";

  if(text.includes("ありがとう")){
    img = "happy.png";
  }
  else if(text.includes("疲れ") || text.includes("しんどい")){
    img = "sad.png";
  }
  else if(text.includes("不安") || text.includes("怖い")){
    img = "anxiety.png";
  }
  else if(text.includes("ごめん")){
    img = "apologize.png";
  }
  else if(text.includes("怒") || text.includes("イライラ")){
    img = "anger.png";
  }
  else if(text.includes("眠い")){
    img = "sleepy.png";
  }
  else if(text.includes("すごい") || text.includes("いい")){
    img = "impressed.png";
  }
  else if(text.includes("なんで") || text.includes("なぜ")){
    img = "curious.png";
  }
  else if(text.includes("嫌") || text.includes("無理")){
    img = "refuse.png";
  }
  else if(text.includes("嬉しい")){
    img = "smile.png";
  }
  else if(text.includes("びっくり")){
    img = "surprise.png";
  }

  document.getElementById("character").src = img;
}


/* ===== 会話 ===== */
function send(){

  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  addBubble(text);

  changeEmotion(text);

  setTimeout(()=>{
    const reply = "そうなんだね😊";
    addBubble(reply);
    changeEmotion(reply);
  },500);

  input.value="";
}


/* ===== 吹き出し ===== */
function addBubble(text){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "bubble";
  div.innerText = text;
  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>

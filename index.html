<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  background:#cfd6e0;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* キャラ */
#character{height:28vh;overflow:hidden;}
#character img{width:100%;height:100%;object-fit:cover;}

/* チャット */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* 吹き出し */
.msg{
  max-width:85%;
  margin:6px 0;
  padding:10px;
  border-radius:12px;
}

.user{background:#5aa0e6;color:#fff;margin-left:auto;}
.ai{background:#eee;}

/* UI */
#bottom{background:#ddd;padding:6px;}
#controls{display:flex;gap:6px;}
#input{flex:1;padding:10px;border-radius:10px;border:none;}

button{
  border:none;
  border-radius:10px;
  background:#5aa0e6;
  color:white;
  padding:8px;
}

/* 設定 */
#settingBtn{
  margin-top:6px;
  width:100%;
  background:#333;
}

/* モーダル */
#modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

#modalContent{
  background:#222;
  color:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
}

#modal input,#modal textarea,#modal select{
  width:100%;
  margin:6px 0;
  padding:8px;
}

/* ===== 表示 ===== */
.card{
  background:#fff;
  padding:12px;
  border-radius:10px;
  margin-bottom:8px;
  white-space:pre-wrap;
}

/* ===== YouTube ===== */
.ytWrap{
  display:flex;
  gap:8px;
  overflow-x:auto;
}

.ytCard{
  min-width:160px;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
}

.ytCard img{width:100%;}

.ytPlayer{margin-top:8px;}

/* ===== スライド ===== */
#slideViewer{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#111;
  z-index:999;
  display:none;
}

#slides{
  display:flex;
  width:100%;
  height:100%;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.slide{
  min-width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.slideCard{
  background:#fff;
  padding:20px;
  border-radius:12px;
  max-width:90%;
}
</style>
</head>

<body>

<div id="character">
  <img id="avatar" src="normal.png">
</div>

<div id="chat"></div>

<div id="bottom">
  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button id="sendBtn">送信</button>
    <button onclick="toggleSlide()">📊</button>
  </div>
  <button id="settingBtn">⚙ 設定</button>
</div>

<!-- スライド -->
<div id="slideViewer"><div id="slides"></div></div>

<!-- 設定 -->
<div id="modal">
<div id="modalContent">

APIキー
<input id="apiKey">

プロンプト
<textarea id="prompt"></textarea>

モード
<select id="mode">
<option value="teacher">家庭教師</option>
<option value="counselor">カウンセラー</option>
<option value="sales">営業</option>
<option value="medical">医療</option>
<option value="normal">通常</option>
</select>

音声
<input type="checkbox" id="voiceToggle">

スライド
<input type="checkbox" id="slideToggle">

<button onclick="saveSettings()">保存</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let slideMode=localStorage.getItem("slideMode")==="true";

/* ===== 表示 ===== */
function formatMessage(text){
  return `<div class="card">${text}</div>`;
}

/* YouTube */
function showYouTube(text,container){
  const wrap=document.createElement("div");
  wrap.className="ytWrap";

  const url=`https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(text)}`;

  const card=document.createElement("div");
  card.className="ytCard";
  card.innerHTML=`<img src="https://img.youtube.com/vi/0/hqdefault.jpg"><div>関連動画</div>`;

  card.onclick=()=>{
    const player=document.createElement("div");
    player.className="ytPlayer";
    player.innerHTML=`<iframe width="100%" height="200" src="${url}" frameborder="0"></iframe>`;
    container.appendChild(player);
  };

  wrap.appendChild(card);
  container.appendChild(wrap);
}

/* メッセージ */
function addMessage(text,cls){
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML=formatMessage(text);
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;

  if(cls==="ai"){
    speak(text);
    showYouTube(text,div);
  }
}

/* 音声 */
function speak(text){
  if(!voiceOn) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

/* 表情 */
function changeFace(text){
  let f="normal.png";
  if(text.includes("悲")) f="sad.png";
  if(text.includes("疲")) f="sleepy.png";
  document.getElementById("avatar").src=f;
}

/* 医療 */
function medicalSafety(text){
  if(text.includes("死にたい")){
    return "すぐに周囲や医療機関へ相談してください。";
  }
  return text;
}

/* ===== スライド ===== */
function showSlides(text){
  const viewer=document.getElementById("slideViewer");
  const slides=document.getElementById("slides");

  slides.innerHTML="";
  text.split("\n").forEach(t=>{
    const d=document.createElement("div");
    d.className="slide";
    d.innerHTML=`<div class="slideCard">${t}</div>`;
    slides.appendChild(d);
  });

  viewer.style.display="block";
}

document.getElementById("slideViewer").onclick=()=>{
  document.getElementById("slideViewer").style.display="none";
};

/* トグル */
function toggleSlide(){
  slideMode=!slideMode;
  localStorage.setItem("slideMode",slideMode);
}

/* ===== 送信 ===== */
async function sendMessage(){
  const text=input.value;
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  const apiKey=localStorage.getItem("apiKey");
  const mode=localStorage.getItem("mode")||"teacher";

  let modePrompt="";

  if(mode==="teacher") modePrompt="わかりやすく説明";
  if(mode==="counselor") modePrompt="優しく寄り添う";
  if(mode==="sales") modePrompt="提案型";
  if(mode==="medical") modePrompt="安全に説明";

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:modePrompt},
        {role:"user",content:text}
      ]
    })
  });

  const data=await res.json();
  let reply=data.choices[0].message.content;

  if(mode==="medical") reply=medicalSafety(reply);

  addMessage(reply,"ai");
  changeFace(reply);

  if(slideMode){
    showSlides(reply);
  }
}

document.getElementById("sendBtn").onclick=sendMessage;

/* 設定 */
document.getElementById("settingBtn").onclick=()=>{
  modal.style.display="flex";
  apiKey.value=localStorage.getItem("apiKey")||"";
  prompt.value=localStorage.getItem("prompt")||"";
  mode.value=localStorage.getItem("mode")||"teacher";
  voiceToggle.checked=voiceOn;
  slideToggle.checked=slideMode;
};

function saveSettings(){
  localStorage.setItem("apiKey",apiKey.value);
  localStorage.setItem("prompt",prompt.value);
  localStorage.setItem("mode",mode.value);
  voiceOn=voiceToggle.checked;
  slideMode=slideToggle.checked;
  localStorage.setItem("voiceOn",voiceOn);
  localStorage.setItem("slideMode",slideMode);
  modal.style.display="none";
}
</script>

</body>
</html>

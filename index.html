<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
height:100dvh;
overflow:hidden;
}

/* キャラ */
#character{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
}

/* ✅ 吹き出し（少し上に逃がす） */
#bubble{
position:absolute;
bottom:160px; /* ← 120 → 160 に変更（ここが核心） */
left:50%;
transform:translateX(-50%);
width:85%;
background:rgba(255,255,255,0.85);
border-radius:25px;
padding:14px;
font-size:16px;
text-align:center;
backdrop-filter:blur(8px);
z-index:5;
}

/* ✅ 入力エリア（下に逃がしつつ追従） */
#inputArea{
position:absolute;
left:50%;
transform:translateX(-50%);
width:90%;

display:flex;
align-items:center;
gap:6px;

padding:6px;
background:rgba(255,255,255,0.95);
border-radius:20px;

z-index:10;

/* 🔥 追加：最低位置を確保 */
bottom:20px;
}

/* 入力 */
#input{
flex:1;
min-width:0;
height:38px;
padding:0 10px;
border-radius:18px;
border:none;
font-size:14px;
background:#eee;
}

/* 送信 */
#send{
flex:0 0 auto;
height:38px;
padding:0 14px;
border:none;
border-radius:999px;
background:#4da6ff;
color:white;
font-size:14px;
}

/* マイク */
#mic{
width:38px;
height:38px;
border-radius:50%;
border:none;
background:#eee;
font-size:16px;
}

/* 左 */
#settingsBtn{
position:absolute;
top:20px;
left:20px;
width:50px;
height:50px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
font-size:22px;
z-index:20;
}

/* 右 */
#appBtn{
position:absolute;
top:20px;
right:20px;
width:50px;
height:50px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
font-size:20px;
z-index:20;
}
</style>
</head>

<body>

<img id="character" src="normal.png">

<div id="bubble">どうしたのかな？話してくれると嬉しいな😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* 設定 */
document.getElementById("settingsBtn").onclick = ()=>{
  const key = prompt("APIキーを入力");
  if(key){
    localStorage.setItem("apiKey", key);
    API_KEY = key;
    alert("保存したよ！");
  }
};

/* 位置追従 */
function adjustInputPosition(){
  const bubble = document.getElementById("bubble");
  const inputArea = document.getElementById("inputArea");

  const rect = bubble.getBoundingClientRect();
  inputArea.style.top = (rect.bottom + 8) + "px";
}

window.addEventListener("load", adjustInputPosition);
window.addEventListener("resize", adjustInputPosition);

const observer = new MutationObserver(adjustInputPosition);
observer.observe(document.getElementById("bubble"), {childList:true});

/* 感情 */
function changeEmotion(text){
  let img = "normal.png";

  if(text.includes("疲れ")) img="sad.png";
  else if(text.includes("怒")) img="anger.png";
  else if(text.includes("不安")) img="anxiety.png";
  else if(text.includes("嬉")) img="happy.png";
  else if(text.includes("驚")) img="surprise.png";

  document.getElementById("character").src = img;
}

/* 考え中 */
function startThinking(){
  const bubble = document.getElementById("bubble");
  let dots = "";
  let count = 0;

  const interval = setInterval(()=>{
    dots += "…";
    bubble.innerText = dots;
    count++;

    if(count > 5){
      dots="";
      count=0;
    }
  },300);

  return interval;
}

/* 文字 */
async function typeText(text){
  const bubble = document.getElementById("bubble");
  bubble.innerText="";

  for(let i=0;i<text.length;i++){
    bubble.innerText += text[i];
    await new Promise(r=>setTimeout(r,25));
  }
}

/* API */
async function getAIResponse(message){
  if(!API_KEY){
    return "設定からAPIキー入れてね🙏";
  }

  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:"短く優しく会話して"},
        {role:"user",content:message}
      ]
    })
  });

  const data = await res.json();
  return data.choices[0].message.content;
}

/* 送信 */
async function send(){
  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  input.value="";
  document.getElementById("character").src="typing.png";

  const thinking = startThinking();

  try{
    const reply = await getAIResponse(text);

    clearInterval(thinking);
    await typeText(reply);
    changeEmotion(reply);

  }catch(e){
    clearInterval(thinking);
    document.getElementById("bubble").innerText="エラー...";
    document.getElementById("character").src="glitch.png";
  }
}
</script>

</body>
</html>

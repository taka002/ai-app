<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;}

.avatar{
position:absolute;top:0;left:0;width:100%;height:100%;
}

.base-face{
position:absolute;width:100%;height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
}

#bubble{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%) translateY(10px);
width:88%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
border-radius:20px;
padding:10px 12px;
font-size:14px;
line-height:1.5;
text-align:center;
z-index:5;
max-height:160px;
overflow:auto;
opacity:0;
transition:all 0.4s ease;
}

#bubble.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

#bottomBar{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:95%;
display:flex;
align-items:center;
gap:6px;
background:rgba(255,255,255,0.9);
border-radius:20px;
padding:6px;
z-index:10;
backdrop-filter:blur(10px);
}

#bottomBar button{
height:36px;
width:36px;
border:none;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
}

#send{
border-radius:18px !important;
width:auto !important;
padding:0 10px;
background:#4da6ff !important;
color:#fff;
}

#input{
flex:1;
height:36px;
border:none;
border-radius:18px;
padding:0 10px;
min-width:0;
}
</style>
</head>

<body>

<div class="avatar">
  <img id="character" src="normal.png" class="base-face">
</div>

<div id="bubble" class="show">どうしたのかな？😊</div>

<div id="bottomBar">
  <button id="mic">🎤</button>
  <input id="input" placeholder="話しかけて">
  <button id="send">送信</button>
  <button id="settingsBtn">⚙️</button>
  <button id="appBtn">📱</button>
</div>

<script>

/* ===== 要素 ===== */
const bubble = document.getElementById("bubble");
const input = document.getElementById("input");
const character = document.getElementById("character");
const sendBtn = document.getElementById("send");
const micBtn = document.getElementById("mic");
const settingsBtn = document.getElementById("settingsBtn");

/* ===== 状態 ===== */
let isSpeaking = false;

/* ===== 会話履歴（文脈） ===== */
let conversation = [
{role:"system", content:"優しい女性。共感重視。短く自然に話す"}
];

/* ===== 長期記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");

/* =========================
   記憶保存
========================= */
function saveMemory(text){

memory.push(text);

if(memory.length > 20){
memory.shift();
}

localStorage.setItem("memory", JSON.stringify(memory));
}

/* =========================
   口パク
========================= */
function startLipSync(){
let i = 0;
const frames = ["mouth1.png","mouth2.png","mouth3.png"];

function loop(){
if(!isSpeaking) return;

character.src = frames[i % frames.length];
i++;

setTimeout(loop, 90);
}
loop();
}

/* =========================
   停止
========================= */
function stopLipSync(){
isSpeaking = false;
character.src = "normal.png";
}

/* =========================
   吹き出し
========================= */
function showBubble(text){
bubble.classList.remove("show");
setTimeout(()=>{
bubble.innerText = text;
bubble.classList.add("show");
},150);
}

/* =========================
   音声
========================= */
let API_KEY = localStorage.getItem("apiKey") || "";

async function speak(text){

if(!API_KEY){
const uttr = new SpeechSynthesisUtterance(text);
uttr.lang="ja-JP";

uttr.onstart=()=>{
isSpeaking = true;
startLipSync();
};

uttr.onend=()=>{
stopLipSync();
};

speechSynthesis.speak(uttr);
return;
}

try{
const res = await fetch("https://api.openai.com/v1/audio/speech",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"gpt-4o-mini-tts",
voice:"aria",
input:text
})
});

const blob = await res.blob();
const url = URL.createObjectURL(blob);
const audio = new Audio(url);

audio.onplay = ()=>{
isSpeaking = true;
startLipSync();
};

audio.onended = stopLipSync;

await audio.play();

}catch(e){
console.log("音声エラー", e);
}
}

/* =========================
   AI（文脈＋記憶）
========================= */
async function getAIResponse(msg){

/* 記憶追加 */
if(msg.includes("好き") || msg.includes("疲れ") || msg.includes("仕事")){
saveMemory(msg);
}

/* 記憶をシステムに反映 */
const memoryText = memory.join(" / ");

conversation[0] = {
role:"system",
content:"優しい女性。共感重視。ユーザー情報:"+memoryText
};

conversation.push({role:"user", content:msg});

/* 履歴制限 */
if(conversation.length > 10){
conversation.splice(1,2);
}

const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:conversation
})
});

const d=await r.json();
const reply = d.choices?.[0]?.message?.content || "うまく話せない…";

/* AI返答も記憶 */
conversation.push({role:"assistant", content:reply});

return reply;
}

/* =========================
   送信
========================= */
async function send(){

const text=input.value;

if(!text.trim()){
showBubble("何か話して😊");
return;
}

input.value="";
showBubble("…");

await new Promise(r=>setTimeout(r,300));

let reply = await getAIResponse(text);

reply = reply.replace(/。/g,"。… ").replace(/、/g,"、 ");

showBubble(reply);
speak(reply);
}

sendBtn.addEventListener("click", send);

input.addEventListener("keydown", e=>{
if(e.key==="Enter") send();
});

/* =========================
   マイク
========================= */
if('webkitSpeechRecognition' in window){
const r=new webkitSpeechRecognition();
r.lang='ja-JP';

micBtn.onclick=()=>r.start();

r.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}

/* =========================
   設定
========================= */
settingsBtn.onclick = ()=>{
const key = prompt("APIキー入力", API_KEY || "");
if(key){
API_KEY = key;
localStorage.setItem("apiKey", key);
alert("保存したよ");
}
};

/* =========================
   起動ボイス
========================= */
window.addEventListener("load", ()=>{
setTimeout(()=>{
const text = "おかえり。今日もお疲れさま。";
showBubble(text);
speak(text);
},800);
});

</script>

</body>
</html>

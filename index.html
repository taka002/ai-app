<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* 上 */
#character{
  height:25%;
}
#character img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 中 */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  background:#eef3ff;
}

/* 吹き出し */
.msg{
  max-width:80%;
  padding:10px;
  border-radius:12px;
  margin:6px 0;
}
.user{background:#4facfe;color:white;margin-left:auto;}
.ai{background:white;}

/* 下 */
#bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#ddd;
  padding:6px;
}

/* 入力 */
#controls{
  display:flex;
  gap:5px;
}

#input{
  flex:1;
  min-width:0;
  padding:10px;
  border:none;
  border-radius:10px;
}

/* ボタン */
#controls button{
  flex:0 0 44px;
  height:44px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
}

#sendBtn{flex:0 0 60px;}

#settingBtn, #resetBtn{
  width:100%;
  margin-top:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  color:white;
}

#settingBtn{background:#333;}
#resetBtn{background:#e74c3c;}

/* モーダル */
#modal{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

#modalContent{
  background:#222;
  color:white;
  padding:20px;
  width:90%;
  max-height:80%;
  overflow:auto;
  border-radius:12px;
}

#modal textarea,#modal input{
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<div id="character">
  <img src="normal.png">
</div>

<div id="chat"></div>

<div id="bottom">

  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button id="sendBtn">送信</button>
    <button>📷</button>
    <button>📸</button>
  </div>

  <button id="settingBtn">⚙ 設定</button>
  <button id="resetBtn">🗑 リセット</button>

</div>

<!-- 設定 -->
<div id="modal">
  <div id="modalContent">
    APIキー
    <input id="apiKey">

    プロンプト
    <textarea id="basePrompt"></textarea>

    音声ON
    <input type="checkbox" id="voiceToggle">

    <button onclick="saveSettings()">保存</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let messages = JSON.parse(localStorage.getItem("chatHistory")||"[]");
let learnedPrompt = localStorage.getItem("learnedPrompt")||"";
let voiceOn=false;

/* 表示復元 */
messages.forEach(m=>{
  addMessage(m.content,m.role==="user"?"user":"ai");
});

/* メッセージ */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.textContent=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;

  if(type==="ai"&&voiceOn){
    speech(text);
  }
}

/* 音声 */
function speech(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

/* 送信 */
document.getElementById("sendBtn").onclick=async()=>{
  const text=input.value;
  if(!text)return;

  addMessage(text,"user");
  input.value="";

  const apiKey=localStorage.getItem("apiKey");
  const basePrompt=localStorage.getItem("basePrompt")||"";

  messages.push({role:"user",content:text});

  const systemPrompt=`
${basePrompt}

${learnedPrompt}

やさしくわかりやすく説明
`;

  const sendMessages=[
    {role:"system",content:systemPrompt},
    ...messages
  ];

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:sendMessages
    })
  });

  const data=await res.json();
  const reply=data.choices[0].message.content;

  addMessage(reply,"ai");

  messages.push({role:"assistant",content:reply});

  localStorage.setItem("chatHistory",JSON.stringify(messages));

  learn(text);
};

/* 学習 */
function learn(text){
  if(!learnedPrompt.includes(text)){
    learnedPrompt+="\n・"+text;
    localStorage.setItem("learnedPrompt",learnedPrompt);
  }
}

/* 設定 */
document.getElementById("settingBtn").onclick=()=>{
  document.getElementById("modal").style.display="flex";
};

function saveSettings(){
  localStorage.setItem("apiKey",document.getElementById("apiKey").value);
  localStorage.setItem("basePrompt",document.getElementById("basePrompt").value);
  voiceOn=document.getElementById("voiceToggle").checked;
  document.getElementById("modal").style.display="none";
}

/* リセット */
document.getElementById("resetBtn").onclick=()=>{
  if(!confirm("リセットする？"))return;

  messages=[];
  learnedPrompt="";
  localStorage.clear();
  chat.innerHTML="";
};
</script>

</body>
</html>

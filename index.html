<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  background:#cfd6e0;
  height:100vh;
  display:flex;
  flex-direction:column;
}

#character{
  height:28vh;
  overflow:hidden;
}
#character img{
  width:100%;
  height:100%;
  object-fit:cover;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  max-width:80%;
  margin:6px 0;
  padding:10px;
  border-radius:12px;
  word-break:break-word;
}

.user{
  background:#5aa0e6;
  color:#fff;
  margin-left:auto;
}

.ai{
  background:#eee;
}

#bottom{
  background:#ddd;
  padding:6px;
}

#controls{
  display:flex;
  gap:6px;
}

#input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

#controls button{
  width:44px;
  height:44px;
  border:none;
  border-radius:10px;
  background:#5aa0e6;
  color:white;
}

#sendBtn{
  width:60px;
}

#settingBtn{
  margin-top:6px;
  width:100%;
  padding:10px;
  background:#333;
  color:#fff;
  border:none;
  border-radius:10px;
}

#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

#modalContent{
  background:#222;
  color:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
}

#modal input,#modal textarea{
  width:100%;
  margin:6px 0;
  padding:8px;
}
</style>
</head>

<body>

<!-- キャラ -->
<div id="character">
  <img id="avatar" src="normal.png">
</div>

<!-- チャット -->
<div id="chat"></div>

<!-- 下 -->
<div id="bottom">
  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button id="sendBtn">送信</button>
    <button id="cameraBtn">📷</button>
    <button id="shutterBtn">📸</button>
  </div>
  <button id="settingBtn">⚙ 設定</button>
</div>

<!-- 設定 -->
<div id="modal">
  <div id="modalContent">
    APIキー
    <input id="apiKey">
    プロンプト
    <textarea id="prompt"></textarea>
    <button onclick="saveSettings()">保存</button>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

/* メッセージ */
function addMessage(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* 表情切り替え */
function changeFace(text){
  let file = "normal.png";

  if(text.includes("疲")) file="sleepy.png";
  else if(text.includes("悲")) file="sad.png";
  else if(text.includes("嬉")) file="happy.png";
  else if(text.includes("怒")) file="anger.png";
  else if(text.includes("不安")) file="anxiety.png";
  else if(text.includes("ごめん")) file="apologize.png";
  else if(text.includes("すごい")) file="applause.png";

  document.getElementById("avatar").src = file;
}

/* 送信（統一版） */
async function sendMessage(){
  const text = input.value;
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  document.getElementById("avatar").src="typing.png";

  const apiKey = localStorage.getItem("apiKey");
  const prompt = localStorage.getItem("prompt") || "";

  if(!apiKey){
    addMessage("APIキー未設定","ai");
    return;
  }

  try{
    const res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:prompt},
          {role:"user",content:text}
        ]
      })
    });

    const data = await res.json();
    const reply = data.choices[0].message.content;

    addMessage(reply,"ai");
    changeFace(reply);

  }catch(e){
    addMessage("通信エラー","ai");
    document.getElementById("avatar").src="glitch.png";
  }
}

/* ボタン */
document.getElementById("sendBtn").onclick = sendMessage;

input.addEventListener("keydown",e=>{
  if(e.key==="Enter") sendMessage();
});

/* 設定 */
document.getElementById("settingBtn").onclick=()=>{
  document.getElementById("modal").style.display="flex";
};

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function saveSettings(){
  localStorage.setItem("apiKey",document.getElementById("apiKey").value);
  localStorage.setItem("prompt",document.getElementById("prompt").value);
  closeModal();
}
</script>

</body>
</html>

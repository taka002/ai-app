<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
height:100dvh;
overflow:hidden;
}

#character{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
}

#bubble{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:92%;
background:rgba(255,255,255,0.9);
border-radius:25px;
padding:14px;
font-size:16px;
line-height:1.4;
text-align:center;
backdrop-filter:blur(8px);
z-index:5;
}

#bubble::after{
content:"";
position:absolute;
top:-12px;
left:50%;
transform:translateX(-50%) rotate(45deg);
width:22px;
height:22px;
background:rgba(255,255,255,0.9);
}

#inputArea{
position:fixed;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
align-items:center;
gap:6px;
padding:8px 10px calc(env(safe-area-inset-bottom) + 10px);
background:rgba(255,255,255,0.95);
border-radius:20px;
z-index:10;
bottom:0;
}

#input{
flex:1;
min-width:0;
height:38px;
padding:0 10px;
border-radius:18px;
border:none;
font-size:14px;
background:#eee;
}

#send{
height:38px;
padding:0 14px;
border:none;
border-radius:999px;
background:#4da6ff;
color:white;
font-size:14px;
}

#mic{
width:38px;
height:38px;
border-radius:50%;
border:none;
background:#eee;
font-size:16px;
}

#settingsBtn,#appBtn{
position:fixed;
bottom:60px;
width:44px;
height:44px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:20;
font-size:18px;
}

#settingsBtn{left:20px;}
#appBtn{right:20px;}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">どうしたのかな？話してくれると嬉しいな😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 性格モード ===== */
let mode = localStorage.getItem("mode") || "優しい";

const modePrompts = {
  "優しい":"やさしく寄り添う女性。共感重視。",
  "甘え":"少し甘えた女性。距離近めで話す。",
  "ツンデレ":"基本ツンだけど少し優しい女性。",
  "冷静":"落ち着いた女性。淡々と短く話す。"
};

/* ===== 名前 ===== */
let userName = localStorage.getItem("userName") || "";

function getCallName(name){
  if(!name) return "";
  if(/子$|ちゃん$/.test(name)) return name + "ちゃん";
  if(/くん$/.test(name)) return name;
  if(/さん$/.test(name)) return name;
  return name + "さん";
}

/* ===== 記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");

function saveMemory(user, ai){
  memory.push({user, ai});
  if(memory.length > 20) memory.shift();
  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== 設定 ===== */
settingsBtn.onclick = ()=>{
  const choice = prompt(
`設定
1: APIキー
2: 性格モード
3: 名前設定

現在モード: ${mode}
名前: ${userName || "未設定"}`
  );

  if(choice === "1"){
    const key = prompt("APIキー");
    if(key){
      localStorage.setItem("apiKey", key);
      API_KEY = key;
    }
  }

  if(choice === "2"){
    const m = prompt("優しい / 甘え / ツンデレ / 冷静");
    if(modePrompts[m]){
      mode = m;
      localStorage.setItem("mode", m);
      alert("変更: " + m);
    }
  }

  if(choice === "3"){
    const name = prompt("名前を入力");
    if(name){
      userName = name;
      localStorage.setItem("userName", name);
      alert("登録: " + name);
    }
  }
};

/* ===== 表情 ===== */
const emotionGroups = {
  happy:["happy.png","smile.png","applause.png","impressed.png"],
  sad:["sad.png","cry.png"],
  anger:["anger.png","irritation.png"],
  anxiety:["anxiety.png","panic.png"],
  calm:["relieved.png","normal.png"]
};

function getEmotionGroup(text){
  if(/ありがとう|嬉/.test(text)) return "happy";
  if(/悲|辛|泣/.test(text)) return "sad";
  if(/怒/.test(text)) return "anger";
  if(/不安|怖/.test(text)) return "anxiety";
  return "calm";
}

let lastImage="";

function hashString(str){
  let hash=0;
  for(let i=0;i<str.length;i++){
    hash = str.charCodeAt(i) + ((hash<<5)-hash);
  }
  return hash;
}

function pickImage(list,text){
  let index=Math.abs(hashString(text))%list.length;
  let selected=list[index];

  if(selected===lastImage){
    index=(index+1)%list.length;
    selected=list[index];
  }

  lastImage=selected;
  return selected;
}

function changeEmotion(text){
  const group=getEmotionGroup(text);
  const list=emotionGroups[group]||["normal.png"];
  character.src=pickImage(list,text);
}

/* ===== 思考中 ===== */
function startThinking(){
  let dots=0;
  return setInterval(()=>{
    dots=(dots+1)%4;
    bubble.innerText="・・・".slice(0,dots+1);
  },400);
}

/* ===== 会話自然化 ===== */
function softText(t){

  if(t.includes("。")){
    t = t.split("。")[0] + "。";
  }

  t = t
    .replace(/です。/g,"だよ。")
    .replace(/ます。/g,"するね。")
    .replace(/でしょう。/g,"かな。")
    .replace(/と思います。/g,"かな。")
    .slice(0,40);

  if(userName && Math.random()<0.3){
    t = getCallName(userName) + "、" + t;
  }

  return t;
}

/* ===== タイピング ===== */
async function typeText(t){
  bubble.innerText="";
  for(let c of t){
    bubble.innerText+=c;
    await new Promise(r=>setTimeout(r,15));
  }
}

/* ===== AI ===== */
async function getAIResponse(msg){

  if(!API_KEY) return "設定からAPIキー入れてね🙏";

  const history=[];
  memory.forEach(m=>{
    history.push({role:"user",content:m.user});
    history.push({role:"assistant",content:m.ai});
  });

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+API_KEY
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        max_tokens:60,
        messages:[
          {
            role:"system",
            content:`1文で話す女性キャラ。${modePrompts[mode]} 共感優先。ユーザー名:${userName}`
          },
          ...history,
          {role:"user",content:msg}
        ]
      })
    });

    const data=await res.json();
    return data.choices?.[0]?.message?.content || "うまく話せなかった";

  }catch{
    return "通信エラー…";
  }
}

/* ===== 送信 ===== */
async function send(){
  const text=input.value;
  if(!text) return;

  input.value="";
  character.src="typing.png";

  const thinking=startThinking();

  let reply=await getAIResponse(text);

  clearInterval(thinking);

  reply=softText(reply);

  await typeText(reply);
  changeEmotion(reply);
  saveMemory(text,reply);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>新人AIアプリ</title>

<style>
*{
  box-sizing:border-box;
}

/* 画面固定 */
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
  background:#eef3ff;
}

/* 全体 */
#app{
  height:100%;
  display:flex;
  flex-direction:column;
}

/* 上：画像（固定） */
#avatarArea{
  height:28%;
  flex-shrink:0;
  background:#dbe9ff;
  position:relative;
}

#avatar{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ← ここで右上ボタン完全削除 */
#avatarArea button{
  display:none !important;
}

/* 中：チャット（スクロール） */
#chatArea{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* 吹き出し */
.msg{
  margin:8px 0;
  padding:12px;
  border-radius:12px;
  max-width:80%;
  font-size:16px;
}

.user{
  background:#4facfe;
  color:white;
  margin-left:auto;
}

.ai{
  background:white;
}

/* 下：固定 */
#inputArea{
  height:22%;
  flex-shrink:0;
  background:#ddd;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:8px;
}

/* 入力 */
#controls{
  display:flex;
  align-items:center;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:16px;
}

button{
  margin-left:6px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#4facfe;
  color:white;
  font-size:14px;
}

/* 設定バー（ここが下） */
#bottomBar{
  display:flex;
  justify-content:center;
  margin-top:6px;
}

#settingsBtn{
  background:#333;
  width:100%;
}
</style>
</head>

<body>

<div id="app">

<!-- 上 -->
<div id="avatarArea">
  <img id="avatar" src="normal.png">
</div>

<!-- 中 -->
<div id="chatArea"></div>

<!-- 下 -->
<div id="inputArea">

  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button onclick="send()">送信</button>
    <button onclick="openCamera()">📷</button>
  </div>

  <div id="bottomBar">
    <button id="settingsBtn" onclick="openSettings()">⚙️ 設定</button>
  </div>

</div>

</div>

<script>

// メッセージ
function addMessage(text,type){
  const chat=document.getElementById("chatArea");
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

// 画像変更
function changeAvatar(name){
  document.getElementById("avatar").src=name;
}

// AI
function aiReply(text){

  let reply="はい！承知しました！";
  let img="normal.png";

  if(text.includes("疲れた")){
    reply="お疲れ様です！無理しないでください！";
    img="relieved.png";
  }

  if(text.includes("楽しい")){
    reply="いいですね！楽しみましょう！";
    img="smile.png";
  }

  if(text.includes("悲しい")){
    reply="大丈夫です、そばにいますよ";
    img="sad.png";
  }

  if(text.includes("ありがとう")){
    reply="ありがとうございます！嬉しいです！";
    img="happy.png";
  }

  changeAvatar(img);
  return reply;
}

// 送信
function send(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text)return;

  addMessage(text,"user");

  setTimeout(()=>{
    addMessage(aiReply(text),"ai");
  },300);

  input.value="";
}

// カメラ
function openCamera(){
  alert("次でカメラ解析🔥");
}

// 設定
function openSettings(){
  alert("音声・AI切替ここに入れる🔥");
}

</script>

</body>
</html>

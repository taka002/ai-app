<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;}

.avatar{
position:absolute;top:0;left:0;width:100%;height:100%;
pointer-events:none;
}

.base-face{
position:absolute;width:100%;height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
transition:transform .2s ease, filter .2s ease;
}

#bubble{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%) translateY(10px);
width:88%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-radius:20px;
padding:10px 12px;
font-size:14px;
line-height:1.5;
text-align:center;
z-index:5;
max-height:160px;
overflow:auto;
opacity:0;
transition:all 0.4s ease;
}

#bubble.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

#bottomBar{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:95%;
display:flex;
align-items:center;
gap:6px;
background:rgba(255,255,255,0.9);
border-radius:20px;
padding:6px;
z-index:10;
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
}

#bottomBar button{
height:36px;
width:36px;
border:none;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
font-size:16px;
}

#send{
border-radius:18px !important;
width:auto !important;
padding:0 10px;
background:#4da6ff !important;
color:#fff;
font-weight:700;
}

#input{
flex:1;
height:36px;
border:none;
border-radius:18px;
padding:0 10px;
min-width:0;
font-size:16px;
}

#status{
position:fixed;
top:10px;
left:10px;
z-index:10;
background:rgba(255,255,255,0.88);
padding:7px 11px;
border-radius:999px;
font-size:12px;
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
box-shadow:0 4px 14px rgba(0,0,0,.06);
}
</style>
</head>

<body>

<div id="status">OpenAI / やさしい</div>

<div class="avatar">
  <img id="character" src="normal.png" class="base-face">
</div>

<div id="bubble" class="show">どうしたのかな？😊</div>

<div id="bottomBar">
  <button id="mic">🎤</button>
  <input id="input" placeholder="話しかけて">
  <button id="send">送信</button>
  <button id="settingsBtn">⚙️</button>
  <button id="appBtn">📱</button>
</div>

<script>
const bubble = document.getElementById("bubble");
const input = document.getElementById("input");
const character = document.getElementById("character");
const sendBtn = document.getElementById("send");
const micBtn = document.getElementById("mic");
const settingsBtn = document.getElementById("settingsBtn");
const appBtn = document.getElementById("appBtn");
const statusEl = document.getElementById("status");

let isSpeaking = false;
let API_KEY = "";
let personaKey = "gentle";

const PERSONAS = {
  gentle: {
    label: "やさしい",
    prompt: "優しい女性。共感重視。短く自然に話す。安心感を大切にする。"
  },
  sister: {
    label: "お姉さん",
    prompt: "少しお姉さんっぽい女性。近い距離感で、やわらかく包み込むように話す。"
  },
  counselor: {
    label: "相談役",
    prompt: "傾聴重視の相談役。まず気持ちを受け止めて、落ち着いて整理して話す。"
  }
};

let conversation = [];

function updateStatus(){
  statusEl.textContent = "OpenAI / " + PERSONAS[personaKey].label;
}

function resetConversation(){
  conversation = [
    {role:"system", content:PERSONAS[personaKey].prompt}
  ];
}

function startLipSync(){
  isSpeaking = true;
  let i = 0;
  const frames = ["mouth1.png","mouth2.png","mouth3.png"];
  function loop(){
    if(!isSpeaking) return;
    character.src = frames[i % frames.length];
    i++;
    setTimeout(loop, 95);
  }
  loop();
}

function stopLipSync(){
  isSpeaking = false;
  character.src = "normal.png";
}

function showBubble(text){
  bubble.classList.remove("show");
  setTimeout(()=>{
    bubble.innerText = text;
    bubble.classList.add("show");
  },150);
}

async function speakWithBrowser(text){
  if(!("speechSynthesis" in window)) return;
  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang = "ja-JP";
  uttr.onstart = ()=> startLipSync();
  uttr.onend = ()=> stopLipSync();
  uttr.onerror = ()=> stopLipSync();
  speechSynthesis.cancel();
  speechSynthesis.speak(uttr);
}

async function speakWithOpenAI(text){
  if(!API_KEY) throw new Error("APIキー未設定");

  const res = await fetch("https://api.openai.com/v1/audio/speech",{
    method:"POST",
    headers:{
      "Authorization":"Bearer " + API_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      model:"gpt-4o-mini-tts",
      voice:"aria",
      input:text
    })
  });

  if(!res.ok){
    throw new Error(await res.text());
  }

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const audio = new Audio(url);

  audio.onplay = ()=> startLipSync();
  audio.onended = ()=>{
    URL.revokeObjectURL(url);
    stopLipSync();
  };
  audio.onerror = ()=>{
    URL.revokeObjectURL(url);
    stopLipSync();
  };

  await audio.play();
}

async function speak(text){
  try{
    await speakWithOpenAI(text);
  }catch(e){
    console.log("OpenAI TTS失敗", e);
    await speakWithBrowser(text);
  }
}

async function getAIResponse(msg){
  if(!API_KEY){
    return "設定からOpenAIのAPIキーを入れてね。";
  }

  conversation.push({role:"user", content:msg});

  if(conversation.length > 10){
    conversation = [conversation[0], ...conversation.slice(-9)];
  }

  const r = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:conversation
    })
  });

  if(!r.ok){
    throw new Error(await r.text());
  }

  const d = await r.json();
  const reply = d.choices?.[0]?.message?.content || "うまく話せない…";
  conversation.push({role:"assistant", content:reply});
  return reply;
}

async function send(){
  const text = input.value.trim();

  if(!text){
    showBubble("何か話して😊");
    return;
  }

  input.value = "";
  character.src = "typing.png";
  showBubble("…");

  await new Promise(r=>setTimeout(r,300));

  try{
    let reply = await getAIResponse(text);
    reply = reply.replace(/。/g,"。… ").replace(/、/g,"、 ");
    showBubble(reply);
    speak(reply);
  }catch(e){
    console.log("会話エラー", e);
    character.src = "normal.png";
    showBubble("ごめんね、今ちょっと通信が不安定みたい…。");
  }
}

sendBtn.onclick = send;

input.addEventListener("keydown", e=>{
  if(e.key === "Enter") send();
});

if("webkitSpeechRecognition" in window){
  const r = new webkitSpeechRecognition();
  r.lang = "ja-JP";
  r.interimResults = false;
  r.continuous = false;

  micBtn.onclick = ()=> r.start();

  r.onstart = ()=>{
    character.src = "curious.png";
    showBubble("聞いてるよ…");
  };

  r.onresult = e=>{
    input.value = e.results[0][0].transcript;
    character.src = "normal.png";
    send();
  };

  r.onerror = ()=>{
    character.src = "normal.png";
    showBubble("うまく聞き取れなかったみたい…");
  };

  r.onend = ()=>{
    if(!isSpeaking) character.src = "normal.png";
  };
}else{
  micBtn.onclick = ()=>{
    showBubble("この端末では音声入力に対応していないみたい。");
  };
}

settingsBtn.onclick = ()=>{
  const menu = prompt(
`設定を選んでね
1: OpenAI APIキー
2: 人格を切り替え
`,
"1"
  );

  if(menu === "1"){
    const key = prompt("OpenAI APIキーを入力", API_KEY || "");
    if(key !== null){
      API_KEY = key.trim();
      showBubble(API_KEY ? "APIキーを入れたよ。" : "APIキーを空にしたよ。");
    }
  }else if(menu === "2"){
    const p = prompt(
`人格を選んでね
1: やさしい
2: お姉さん
3: 相談役`,
"1"
    );

    if(p === "1") personaKey = "gentle";
    if(p === "2") personaKey = "sister";
    if(p === "3") personaKey = "counselor";

    resetConversation();
    updateStatus();
    showBubble("人格を切り替えたよ。");
  }
};

appBtn.onclick = ()=>{
  showBubble("今はここを予備ボタンにしてあるよ。");
};

window.addEventListener("load", ()=>{
  resetConversation();
  updateStatus();
});
</script>

</body>
</html>

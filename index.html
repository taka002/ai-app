<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ビジュアルAI</title>

<style>
html,body{
  margin:0;
  height:100%;
  display:flex;
  flex-direction:column;
  font-family:sans-serif;
  background:#eef2f7;
}

/* キャラ */
.header img{
  width:100%;
  height:180px;
  object-fit:cover;
}

/* チャット（ここ重要） */
.chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* メッセージ */
.msg{
  margin:8px;
  padding:12px;
  border-radius:14px;
  max-width:80%;
  word-break:break-word;
}

.user{
  background:#5da9e9;
  color:#fff;
  margin-left:auto;
}

.ai{
  background:#fff;
}

/* カード */
.card{
  background:#fff;
  border-radius:14px;
  padding:10px;
  margin-top:8px;
}

.diagram{
  font-size:20px;
  text-align:center;
}

/* 入力エリア（固定＆安全） */
.input-area{
  display:flex;
  gap:6px;
  padding:8px;
  background:#fff;
  border-top:1px solid #ccc;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#5da9e9;
  color:#fff;
}

/* 設定モーダル（完全修正） */
.modal{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  max-height:80%;
  overflow-y:auto;
  background:#222;
  color:#fff;
  padding:15px;
  border-radius:20px 20px 0 0;
  display:none;
}

textarea{
  width:100%;
  height:120px;
}
</style>
</head>

<body>

<div class="header">
<img src="https://picsum.photos/400/200">
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="話しかけてください">
<button onclick="send()">送信</button>
<button onclick="openCamera()">📷</button>
<button onclick="openSettings()">⚙</button>
</div>

<!-- 設定 -->
<div class="modal" id="settings">
<h3>設定</h3>

APIキー<br>
<input id="apiKey"><br><br>

プロンプト<br>
<textarea id="prompt"></textarea><br>

音声ON
<input type="checkbox" id="voice"><br><br>

<button onclick="saveSettings()">保存</button>
<button onclick="resetMemory()">リセット</button>
<button onclick="closeSettings()">閉じる</button>
</div>

<video id="video" style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
let memory = JSON.parse(localStorage.getItem("memory")||"[]");

function addMsg(text,cls){
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

async function send(){
  const input=document.getElementById("input").value;
  if(!input)return;

  addMsg(input,"user");
  document.getElementById("input").value="";

  const apiKey=localStorage.getItem("apiKey");
  if(!apiKey){
    addMsg("APIキー未設定","ai");
    return;
  }

  const prompt=localStorage.getItem("prompt")||"";

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:prompt},
        ...memory,
        {role:"user",content:input}
      ]
    })
  });

  const data=await res.json();
  const reply=data.choices[0].message.content;

  memory.push({role:"user",content:input});
  memory.push({role:"assistant",content:reply});
  localStorage.setItem("memory",JSON.stringify(memory));

  addMsg(reply,"ai");

  if(document.getElementById("voice").checked){
    speechSynthesis.speak(new SpeechSynthesisUtterance(reply));
  }
}

/* 設定 */
function openSettings(){
  document.getElementById("settings").style.display="block";
}
function closeSettings(){
  document.getElementById("settings").style.display="none";
}
function saveSettings(){
  localStorage.setItem("apiKey",document.getElementById("apiKey").value);
  localStorage.setItem("prompt",document.getElementById("prompt").value);
  alert("保存OK");
}
function resetMemory(){
  localStorage.removeItem("memory");
  memory=[];
  alert("リセット完了");
}

/* カメラ */
async function openCamera(){
  const video=document.getElementById("video");
  video.style.display="block";

  const stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject=stream;
  video.play();

  setTimeout(()=>{
    const canvas=document.getElementById("canvas");
    const ctx=canvas.getContext("2d");

    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);

    const img=canvas.toDataURL();
    addMsg("<img src='"+img+"' width='150'>","user");
  },1500);
}
</script>

</body>
</html>

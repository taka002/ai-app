<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;}

#character{
position:absolute;top:0;left:0;width:100%;height:100%;
object-fit:cover;object-position:center 28%;transform:scale(1.08);
}

#bubble{
position:absolute;bottom:65px;left:50%;transform:translateX(-50%);
width:92%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
border-radius:25px;
padding:14px;
font-size:16px;
text-align:center;
z-index:5;
}

#inputArea{
position:fixed;left:50%;transform:translateX(-50%);
width:92%;display:flex;gap:6px;
bottom:50px;
}

#mic{width:34px;height:34px;border-radius:50%;border:none;}
#input{flex:1;height:34px;border-radius:16px;border:none;}
#send{height:34px;border-radius:999px;background:#4da6ff;color:white;border:none;}

#settingsBtn,#appBtn{
position:fixed;bottom:10px;width:36px;height:36px;border-radius:50%;
background:white;display:flex;align-items:center;justify-content:center;
}
#settingsBtn{left:calc(50% - 45px);}
#appBtn{left:calc(50% + 10px);}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">どうしたのかな？😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");
function saveMemory(u,a){
memory.push({user:u,ai:a});
if(memory.length>20) memory.shift();
localStorage.setItem("memory",JSON.stringify(memory));
}

/* ===== 設定 ===== */
settingsBtn.onclick=()=>{
const m=prompt("1:APIキー 2:名前 3:性格 4:履歴 5:リセット");

if(m==="1"){
const k=prompt("APIキー");
if(k){localStorage.setItem("apiKey",k);API_KEY=k;}
}
if(m==="2"){
const n=prompt("名前");
if(n)localStorage.setItem("userName",n);
}
if(m==="3"){
const mode=prompt("性格");
if(mode)localStorage.setItem("aiMode",mode);
}
if(m==="4"){
alert(memory.map(m=>"あなた: "+m.user+"\nAI: "+m.ai).join("\n\n"));
}
if(m==="5"){
localStorage.clear();location.reload();
}
};

/* ===== 感情 ===== */
const emotionGroups={
happy:["happy.png","smile.png"],
sad:["sad.png","cry.png"],
neutral:["normal.png"],
thinking:["thinking.png"]
};

function getEmotionGroup(t){
if(/嬉|ありがとう/.test(t)) return "happy";
if(/悲|つらい/.test(t)) return "sad";
return "neutral";
}

let currentEmotion="", lastImage="", timer;

function changeEmotion(text){
const group=getEmotionGroup(text);
if(group===currentEmotion) return;

clearTimeout(timer);
timer=setTimeout(()=>{
const list=emotionGroups[group]||["normal.png"];
let img=list[Math.floor(Math.random()*list.length)];
if(img===lastImage && list.length>1) img=list[0];
lastImage=img;
character.src=img;
currentEmotion=group;
},700+Math.random()*800);
}

/* ===== 会話強化 ===== */

// 🔥 短くする
function shorten(text){
if(text.length>60){
return text.slice(0,60)+"…";
}
return text;
}

// 🔥 余韻＋質問
function softenEnding(text){

const endings=[
"どう思う？",
"少し話してみる？",
"今どんな感じ？",
"もう少し聞いてもいい？"
];

if(!text.match(/？|\?/)){
text += " " + endings[Math.floor(Math.random()*endings.length)];
}

return text;
}

// 🔥 名前
function addName(text){
const name=localStorage.getItem("userName");
if(name && Math.random()<0.4){
return name+"、"+text;
}
return text;
}

/* ===== タイピング ===== */
async function typeText(t){
bubble.innerText="";
for(let c of t){
bubble.innerText+=c;
await new Promise(r=>setTimeout(r,15));
}
}

/* ===== AI ===== */
async function getAIResponse(msg){

if(!API_KEY) return "APIキー入れてね";

try{

const controller=new AbortController();
setTimeout(()=>controller.abort(),10000);

const mode=localStorage.getItem("aiMode")||"優しい";

const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
signal:controller.signal,
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{
role:"system",
content:`
${mode}女性キャラ。
返答は1〜2文で短く。
言い切らず余韻を残す。
最後は軽く問いかけ。
寄り添うが重くしすぎない。
`
},
...memory.flatMap(m=>[
{role:"user",content:m.user},
{role:"assistant",content:m.ai}
]),
{role:"user",content:msg}
]
})
});

if(!r.ok) return "ちょっと調子悪いみたい…もう一回いい？";

const d=await r.json();
if(!d.choices) return "うまく考えられない…もう一回いい？";

return d.choices[0].message.content;

}catch(e){

if(e.name==="AbortError"){
return "少し時間かかっちゃった…もう一回いい？";
}
return "通信が不安定みたい…少し待ってね";
}
}

/* ===== 送信 ===== */
async function send(){

const text=input.value;

if(!text.trim()){
bubble.innerText="何か話して😊";
return;
}

input.value="";
character.src="thinking.png";
bubble.innerText="考え中…";

let reply=await getAIResponse(text);

// 🔥 会話を止めない処理
reply=shorten(reply);
reply=softenEnding(reply);
reply=addName(reply);

await typeText(reply);
changeEmotion(reply);

saveMemory(text,reply);
}

/* ===== 音声 ===== */
if('webkitSpeechRecognition' in window){
const r=new webkitSpeechRecognition();
r.lang='ja-JP';
mic.onclick=()=>r.start();
r.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}else{
mic.onclick=()=>alert("非対応");
}
</script>

</body>
</html>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 長期記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");
let userName = localStorage.getItem("userName") || "";

function saveMemory(user, ai){
  memory.push({user, ai});
  if(memory.length > 20) memory.shift();
  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== 設定 ===== */
document.getElementById("settingsBtn").onclick = ()=>{
  const key = prompt("APIキーを入力");
  if(key){
    localStorage.setItem("apiKey", key);
    API_KEY = key;
    alert("保存したよ！");
  }
};

/* ===== 名前抽出 ===== */
function extractName(text){
  const match = text.match(/俺は(.+)|私は(.+)|名前は(.+)/);
  if(match){
    const name = match[1] || match[2] || match[3];
    if(name){
      userName = name;
      localStorage.setItem("userName", name);
    }
  }
}

/* ===== 全画像 ===== */
const emotionGroups = {
  happy:["happy.png","smile.png","applause.png","impressed.png"],
  sad:["sad.png","cry.png"],
  anger:["anger.png","irritation.png"],
  anxiety:["anxiety.png","panic.png"],
  shy:["shy.png","embarrassed.png"],
  surprise:["surprise.png"],
  thinking:["curious.png","focused.png","explaining.png"],
  agree:["agree.png"],
  disagree:["disagree.png","refuse.png"],
  calm:["relieved.png","normal.png"],
  tired:["sleepy.png","hesitation.png"],
  action:["hold.png","typing.png"],
  special:["glitch.png","robot.png"]
};

/* ===== 感情判定 ===== */
function getEmotionGroup(text){
  if(/ありがとう|嬉|最高/.test(text)) return "happy";
  if(/悲|辛|泣/.test(text)) return "sad";
  if(/怒|イライラ/.test(text)) return "anger";
  if(/不安|怖/.test(text)) return "anxiety";
  if(/恥|照/.test(text)) return "shy";
  if(/え|！？/.test(text)) return "surprise";
  if(/考え|説明/.test(text)) return "thinking";
  if(/そうだね/.test(text)) return "agree";
  if(/違う/.test(text)) return "disagree";
  if(/安心|よかった/.test(text)) return "calm";
  if(/眠い/.test(text)) return "tired";
  return "calm";
}

/* ===== 被り防止 ===== */
let lastImage = "";

function hashString(str){
  let hash=0;
  for(let i=0;i<str.length;i++){
    hash = str.charCodeAt(i) + ((hash<<5)-hash);
  }
  return hash;
}

function pickImage(list, text){
  let index = Math.abs(hashString(text)) % list.length;
  let selected = list[index];

  if(selected === lastImage){
    index = (index + 1) % list.length;
    selected = list[index];
  }

  lastImage = selected;
  return selected;
}

/* ===== 表情変更 ===== */
function changeEmotion(text){
  const group = getEmotionGroup(text);
  const list = emotionGroups[group] || ["normal.png"];
  const next = pickImage(list, text);
  document.getElementById("character").src = next;
}

/* ===== 考え中 ===== */
function startThinking(){
  const bubble=document.getElementById("bubble");
  let dots=0;
  return setInterval(()=>{
    dots=(dots+1)%4;
    bubble.innerText="・・・".slice(0,dots+1);
  },400);
}

/* ===== タイピング（間あり） ===== */
async function typeText(text){
  const bubble=document.getElementById("bubble");

  if(text.length>60){
    bubble.style.fontSize="14px";
  }else{
    bubble.style.fontSize="16px";
  }

  bubble.innerText="";

  await new Promise(r=>setTimeout(r,300)); // ← 人間っぽい間

  for(let i=0;i<text.length;i++){
    bubble.innerText+=text[i];
    await new Promise(r=>setTimeout(r,18));
  }
}

/* ===== API ===== */
async function getAIResponse(message){
  if(!API_KEY) return "APIキー入れてね🙏";

  extractName(message);

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {
          role:"system",
          content:`
美咲という女性キャラ。

・会話は短く（1〜2文）
・自然な口調
・優しく寄り添う
・敬語すぎない
・説明しすぎない
・少し感情を込める

${userName ? "相手の名前は「"+userName+"」。たまに名前を呼ぶ。" : ""}

例：
「そっか…つらいね」
「大丈夫？無理してない？」
`
        },
        ...memory.map(m=>[
          {role:"user",content:m.user},
          {role:"assistant",content:m.ai}
        ]).flat(),
        {role:"user",content:message}
      ]
    })
  });

  const data=await res.json();
  return data.choices[0].message.content;
}

/* ===== 送信 ===== */
async function send(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text) return;

  input.value="";
  document.getElementById("character").src="typing.png";

  const thinking=startThinking();

  try{
    const reply=await getAIResponse(text);

    clearInterval(thinking);
    await typeText(reply);

    changeEmotion(reply);
    saveMemory(text, reply);

  }catch{
    clearInterval(thinking);
    document.getElementById("bubble").innerText="エラー...";
  }
}

/* ===== 音声入力 ===== */
const micBtn = document.getElementById("mic");
let recognition;

if ('webkitSpeechRecognition' in window) {

  recognition = new webkitSpeechRecognition();
  recognition.lang = 'ja-JP';

  micBtn.onclick = () => {
    recognition.start();
    micBtn.innerText = "🎙️";
    micBtn.style.background = "#ffcccc";
  };

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
    micBtn.innerText = "🎤";
    micBtn.style.background = "#eee";
    send();
  };

  recognition.onerror = () => {
    micBtn.innerText = "🎤";
    micBtn.style.background = "#eee";
  };

  recognition.onend = () => {
    micBtn.innerText = "🎤";
    micBtn.style.background = "#eee";
  };

}else{
  micBtn.onclick = () => {
    alert("この端末は音声入力に対応してないよ🙏");
  };
}
</script>

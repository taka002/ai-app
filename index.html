<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== モードUI ===== */
.mode-housework .card{
  background:#fff8e1;
  border-left:5px solid #ff9800;
}

/* キャラ */
#character{height:26vh;overflow:hidden;}
#character img{width:100%;height:100%;object-fit:cover;}

/* チャット */
#chat{
  flex:1;
  overflow-y:auto;
  padding:12px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(10px);
}

/* 吹き出し */
.msg{
  max-width:85%;
  margin:8px 0;
  padding:12px;
  border-radius:16px;
  animation:fadeIn 0.3s ease;
}

.user{
  background:linear-gradient(135deg,#4facfe,#00c6ff);
  color:#fff;
  margin-left:auto;
}

.ai{
  background:rgba(255,255,255,0.9);
}

/* カード */
.card{
  background:#fff;
  padding:12px;
  border-radius:12px;
  margin-bottom:8px;
}

/* 箇条書き */
.list{
  background:#eef6ff;
  padding:10px;
  border-left:4px solid #4facfe;
  border-radius:8px;
  margin-bottom:6px;
}

/* フロー */
.flow{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.flow div{
  background:#fff;
  padding:8px;
  border-radius:8px;
}

/* 入力 */
#bottom{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  padding:10px;
}
#controls{
  display:flex;
  gap:8px;
}
#input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  outline:none;
}
button{
  border:none;
  border-radius:20px;
  background:#667eea;
  color:white;
  padding:10px 14px;
}

/* モーダル */
#modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}
#modalContent{
  background:#222;
  color:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
}
#modal input,#modal textarea,#modal select{
  width:100%;
  margin:6px 0;
  padding:8px;
}

/* アニメーション */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div id="character">
  <img id="avatar" src="normal.png">
</div>

<div id="chat"></div>

<div id="bottom">
  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button id="sendBtn">送信</button>
    <button onclick="clearMemory()">🧹</button>
  </div>
  <button id="settingBtn">⚙ 設定</button>
</div>

<div id="modal">
<div id="modalContent">

APIキー
<input id="apiKey">

プロンプト
<textarea id="prompt"></textarea>

モード
<select id="mode">
<option value="teacher">家庭教師</option>
<option value="counselor">カウンセラー</option>
<option value="sales">営業</option>
<option value="medical">医療</option>
<option value="housework">家事</option>
<option value="normal">通常</option>
</select>

音声 <input type="checkbox" id="voiceToggle">

<button onclick="saveSettings()">保存</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let voiceOn=localStorage.getItem("voiceOn")==="true";

/* 会話履歴 */
let history = JSON.parse(localStorage.getItem("history") || "[]");
history = history.filter(m => typeof m==="object" && m.role && m.content);

/* モードUI */
function applyModeUI(mode){
  document.body.className="";
  document.body.classList.add("mode-"+mode);
}
applyModeUI(localStorage.getItem("mode")||"teacher");

/* 表示（修正版） */
function formatMessage(text){

  text = text.replace(/\*/g,"");

  const lines = text.split("\n").filter(t=>t.trim());

  if(lines.length===0){
    return `<div class="card">${text}</div>`;
  }

  return lines.map(line=>{

    if(line.includes("→")){
      return `<div class="flow">
        ${line.split("→").map(s=>`<div>${s}</div>`).join("")}
      </div>`;
    }

    if(line.startsWith("・") || line.startsWith("-")){
      return `<div class="list">${line}</div>`;
    }

    return `<div class="card">${line}</div>`;

  }).join("");
}

/* メッセージ */
function addMessage(text,cls){
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML=formatMessage(text);

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;

  if(cls==="ai") speak(text);
}

/* 音声 */
function speak(text){
  if(!voiceOn) return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

/* 表情 */
function changeFace(text){
  let f="normal.png";
  if(text.includes("疲")) f="sleepy.png";
  if(text.includes("悲")) f="sad.png";
  document.getElementById("avatar").src=f;
}

/* 医療 */
function medicalSafety(text){
  if(text.includes("死にたい")){
    return "すぐに医療機関へ相談してください。";
  }
  return text;
}

/* 記憶削除 */
function clearMemory(){
  history=[];
  localStorage.removeItem("history");
  addMessage("記憶リセットしました","ai");
}

/* 送信 */
async function sendMessage(){

  const text=input.value;
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  const apiKey=localStorage.getItem("apiKey");
  if(!apiKey){
    addMessage("APIキー未設定","ai");
    return;
  }

  history.push({role:"user",content:text});

  const prompt=localStorage.getItem("prompt")||"";
  const mode=localStorage.getItem("mode")||"teacher";

  let modePrompt="";
  if(mode==="teacher") modePrompt="わかりやすく説明";
  if(mode==="counselor") modePrompt="優しく寄り添う";
  if(mode==="sales") modePrompt="提案型";
  if(mode==="medical") modePrompt="安全に説明";
  if(mode==="housework") modePrompt="家事のコツを簡単に説明";

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:prompt+"\n"+modePrompt},
          ...history
        ]
      })
    });

    const data=await res.json();

    if(!data.choices){
      addMessage("エラー\n"+JSON.stringify(data,null,2),"ai");
      return;
    }

    let reply=data.choices[0].message.content;
    if(mode==="medical") reply=medicalSafety(reply);

    addMessage(reply,"ai");
    changeFace(reply);

    history.push({role:"assistant",content:reply});
    localStorage.setItem("history",JSON.stringify(history));

  }catch(e){
    addMessage("通信エラー","ai");
  }
}

document.getElementById("sendBtn").onclick=sendMessage;

/* 設定 */
document.getElementById("settingBtn").onclick=()=>{
  modal.style.display="flex";
  apiKey.value=localStorage.getItem("apiKey")||"";
  prompt.value=localStorage.getItem("prompt")||"";
  mode.value=localStorage.getItem("mode")||"teacher";
  voiceToggle.checked=voiceOn;
};

function saveSettings(){
  localStorage.setItem("apiKey",apiKey.value);
  localStorage.setItem("prompt",prompt.value);
  localStorage.setItem("mode",mode.value);

  voiceOn=voiceToggle.checked;
  localStorage.setItem("voiceOn",voiceOn);

  applyModeUI(mode.value);

  modal.style.display="none";
}
</script>

</body>
</html>

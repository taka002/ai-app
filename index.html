<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
}

#app{
  display:flex;
  flex-direction:column;
  height:100%;
}

/* 上 */
#avatarArea{
  height:20%;
}
#avatar{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 中 */
#chatArea{
  flex:1;
  overflow-y:auto;
  padding:8px;
  background:#eef3ff;
}

.msg{
  margin:6px 0;
  padding:8px;
  border-radius:10px;
  max-width:80%;
  font-size:13px;
}

.user{background:#4facfe;color:#fff;margin-left:auto;}
.ai{background:#fff;}

/* 画像 */
.chat-img{
  max-width:70%;
  border-radius:10px;
  display:block;
  margin:5px 0 5px auto;
}

/* 下 */
#inputArea{
  height:18%;
  background:#ddd;
  padding:6px;
  display:flex;
  flex-direction:column;
}

#controls{
  display:flex;
}

input{
  flex:1;
  padding:8px;
  border:none;
  border-radius:10px;
}

button{
  margin-left:4px;
  padding:6px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
  font-size:11px;
}

#settingsBtn{
  background:#333;
  margin-top:4px;
}

/* カメラ */
#camera{
  position:fixed;
  bottom:90px;
  right:10px;
  width:120px;
  display:none;
}

video{
  width:100%;
  border-radius:10px;
}

/* 設定モーダル */
#modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

#modalContent{
  background:#222;
  padding:20px;
  border-radius:15px;
  width:85%;
  color:white;
}

.modalInput{
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<div id="app">

<div id="avatarArea">
  <img id="avatar" src="normal.png">
</div>

<div id="chatArea"></div>

<div id="inputArea">

  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button onclick="send()">送信</button>
    <button onclick="startCamera()">📷</button>
    <button onclick="takePhoto()">📸</button>
  </div>

  <button id="settingsBtn" onclick="openModal()">⚙️設定</button>

</div>

</div>

<!-- カメラ -->
<div id="camera">
  <video id="video" autoplay playsinline></video>
</div>

<!-- 設定 -->
<div id="modal">
  <div id="modalContent">
    <div>APIキー</div>
    <input id="apiInput" class="modalInput">

    <div>プロンプト</div>
    <input id="promptInput" class="modalInput">

    <button onclick="saveSettings()">保存</button>
  </div>
</div>

<script>

let apiKey="";
let promptText="優しいAI";
let stream=null;

/* メッセージ */
function addMessage(text,type){
  const chat=document.getElementById("chatArea");
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* 画像追加 */
function addImage(src){
  const chat=document.getElementById("chatArea");
  const img=document.createElement("img");
  img.src=src;
  img.className="chat-img";
  chat.appendChild(img);
  chat.scrollTop=chat.scrollHeight;
}

/* GPT */
async function askGPT(text){

  if(!apiKey) return "APIキー未設定";

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:promptText},
        {role:"user",content:text}
      ]
    })
  });

  const data=await res.json();
  return data.choices[0].message.content;
}

/* 送信 */
async function send(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text)return;

  addMessage(text,"user");

  const reply=await askGPT(text);
  addMessage(reply,"ai");

  input.value="";
}

/* カメラ */
async function startCamera(){
  const video=document.getElementById("video");
  const cam=document.getElementById("camera");

  stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject=stream;
  cam.style.display="block";
}

/* 撮影 → AI解析 */
function takePhoto(){

  const video=document.getElementById("video");

  const canvas=document.createElement("canvas");
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  const ctx=canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  const img=canvas.toDataURL();

  addImage(img);

  // 🔥 AI解析
  analyzeImage(img);
}

/* 画像解析 */
async function analyzeImage(img){

  if(!apiKey){
    addMessage("APIキー未設定","ai");
    return;
  }

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {
          role:"user",
          content:[
            {type:"text",text:"この画像を説明して"},
            {type:"image_url",image_url:{url:img}}
          ]
        }
      ]
    })
  });

  const data=await res.json();
  addMessage(data.choices[0].message.content,"ai");
}

/* 設定 */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function saveSettings(){
  apiKey=document.getElementById("apiInput").value;
  promptText=document.getElementById("promptInput").value;
  document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>

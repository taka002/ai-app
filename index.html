<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:sans-serif;
  background:#f5f5f5;
  height:100dvh;
  overflow:hidden;
}

/* キャラ */
#character{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

/* 吹き出し */
#bubble{
  position:fixed;
  bottom:140px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.9);
  padding:16px 20px;
  border-radius:25px;
  max-width:80%;
  text-align:center;
  font-size:18px;
  z-index:2;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* 入力 */
#inputArea{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  display:flex;
  gap:10px;
  z-index:2;
}

#input{
  flex:1;
  padding:14px;
  border:none;
  border-radius:25px;
  font-size:16px;
}

#send{
  background:#4da6ff;
  color:white;
  border:none;
  padding:14px 20px;
  border-radius:25px;
}

/* ボタン */
.btn{
  position:fixed;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  background:#fff;
  font-size:22px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  z-index:3;
}

#settingsBtn{ left:20px; top:20px; }
#appBtn{ right:20px; top:20px; }

/* 設定パネル */
.panel{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#fff;
  z-index:5;
  padding:20px;
  display:none;
  overflow:auto;
}

.panel input, .panel textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
}

.panel button{
  margin-top:10px;
  padding:10px;
}
</style>
</head>

<body>

<!-- キャラ -->
<img id="character" src="normal.png">

<!-- 吹き出し -->
<div id="bubble">こんにちは😊</div>

<!-- 入力 -->
<div id="inputArea">
  <input id="input" placeholder="話しかけて">
  <button id="send">送信</button>
</div>

<!-- ボタン -->
<button id="settingsBtn" class="btn">⚙️</button>
<button id="appBtn" class="btn">📱</button>

<!-- 設定 -->
<div id="settingsPanel" class="panel">
  <h2>設定</h2>

  <input id="apiKey" placeholder="APIキー">
  <button onclick="saveKey()">保存</button>

  <textarea id="memoryBox" placeholder="性格・記憶"></textarea>
  <button onclick="saveMemory()">保存</button>

  <textarea id="defaultMessage" placeholder="初期メッセージ"></textarea>
  <button onclick="saveDefault()">保存</button>

  <button onclick="closePanel()">閉じる</button>
</div>

<script>
const bubble = document.getElementById("bubble");
const input = document.getElementById("input");
const character = document.getElementById("character");

/* 起動時 */
window.onload = ()=>{
  const msg = localStorage.getItem("defaultMessage") || "こんにちは😊";
  bubble.innerText = msg;
};

/* 設定 */
document.getElementById("settingsBtn").onclick = ()=>{
  document.getElementById("settingsPanel").style.display="block";
};

function closePanel(){
  document.getElementById("settingsPanel").style.display="none";
}

function saveKey(){
  localStorage.setItem("apiKey", document.getElementById("apiKey").value);
}

function saveMemory(){
  localStorage.setItem("memory", document.getElementById("memoryBox").value);
}

function saveDefault(){
  localStorage.setItem("defaultMessage", document.getElementById("defaultMessage").value);
}

/* アプリボタン */
document.getElementById("appBtn").onclick = ()=>{
  alert("ここに機能追加できる");
};

/* 送信 */
document.getElementById("send").onclick = sendMessage;

async function sendMessage(){
  const text = input.value;
  if(!text) return;

  input.value = "";

  /* 考え中 */
  bubble.innerText = "…";
  character.src = "thinking.png";

  const apiKey = localStorage.getItem("apiKey");
  const memory = localStorage.getItem("memory") || "";

  try{
    const res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:memory},
          {role:"user",content:text}
        ]
      })
    });

    const data = await res.json();
    let reply = data.choices[0].message.content;

    /* 短くする */
    reply = reply.slice(0,60);

    bubble.innerText = reply;

    /* 表情戻す */
    character.src = "normal.png";

  }catch(e){
    bubble.innerText = "エラー";
    character.src = "normal.png";
  }
}

/* Enter送信 */
input.addEventListener("keypress",(e)=>{
  if(e.key==="Enter") sendMessage();
});

/* 画像エラー対策 */
character.onerror = ()=>{
  character.src = "normal.png";
};
</script>

</body>
</html>

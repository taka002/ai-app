<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;color:#222;}

.avatar{
position:absolute;top:0;left:0;width:100%;height:100%;
pointer-events:none;
}

.base-face{
position:absolute;width:100%;height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
transition:transform .2s ease, filter .2s ease;
}

#bubble{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%) translateY(10px);
width:88%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-radius:20px;
padding:10px 12px;
font-size:14px;
line-height:1.5;
text-align:center;
z-index:5;
max-height:160px;
overflow:auto;
opacity:0;
transition:all 0.4s ease;
}

#bubble.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

#bottomBar{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:95%;
display:flex;
align-items:center;
gap:6px;
background:rgba(255,255,255,0.9);
border-radius:20px;
padding:6px;
z-index:10;
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
}

#bottomBar button{
height:36px;
width:36px;
border:none;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
font-size:16px;
}

#send{
border-radius:18px !important;
width:auto !important;
padding:0 10px;
background:#4da6ff !important;
color:#fff;
font-weight:700;
}

#input{
flex:1;
height:36px;
border:none;
border-radius:18px;
padding:0 10px;
min-width:0;
font-size:16px;
}

#status{
position:fixed;
top:10px;
left:10px;
z-index:10;
background:rgba(255,255,255,0.88);
padding:7px 11px;
border-radius:999px;
font-size:12px;
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
box-shadow:0 4px 14px rgba(0,0,0,.06);
}

#settingsOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.24);
z-index:29;
display:none;
}

#settingsSheet{
position:fixed;
left:0;
right:0;
bottom:0;
z-index:30;
background:rgba(255,255,255,0.98);
border-radius:22px 22px 0 0;
padding:14px 14px calc(14px + env(safe-area-inset-bottom));
box-shadow:0 -10px 30px rgba(0,0,0,.12);
transform:translateY(105%);
transition:transform .25s ease;
max-height:78dvh;
overflow:auto;
}

#settingsSheet.show{
transform:translateY(0);
}

.sheetHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.sheetTitle{
font-size:16px;
font-weight:700;
}

.sheetClose{
border:none;
background:#f2f2f2;
border-radius:50%;
width:34px;
height:34px;
font-size:18px;
}

.group{
margin-bottom:12px;
}

.group label{
display:block;
font-size:12px;
font-weight:700;
margin-bottom:6px;
color:#555;
}

.group input,
.group select{
width:100%;
height:42px;
border:none;
border-radius:14px;
background:#f5f6f8;
padding:0 12px;
font-size:14px;
}

.help{
font-size:11px;
line-height:1.4;
color:#777;
margin-top:5px;
}

.sheetActions{
display:flex;
gap:8px;
margin-top:12px;
}

.sheetActions button{
flex:1;
height:44px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:700;
}

#cancelSettings{
background:#eef1f4;
color:#444;
}

#saveSettings{
background:#4da6ff;
color:#fff;
}

.hidden{
display:none !important;
}
</style>
</head>

<body>

<div id="status">OpenAI / やさしい</div>

<div class="avatar">
  <img id="character" src="normal.png" class="base-face">
</div>

<div id="bubble" class="show">どうしたのかな？😊</div>

<div id="bottomBar">
  <button id="mic">🎤</button>
  <input id="input" placeholder="話しかけて">
  <button id="send">送信</button>
  <button id="settingsBtn">⚙️</button>
  <button id="appBtn">📱</button>
</div>

<div id="settingsOverlay" class="hidden"></div>

<div id="settingsSheet">
  <div class="sheetHeader">
    <div class="sheetTitle">設定</div>
    <button id="closeSettings" class="sheetClose">×</button>
  </div>

  <div class="group">
    abel for="apiKeyInput">OpenAI APIキー</label>
    <input id="apiKeyInput" type="password" placeholder="sk-...">
    <div class="help">会話と音声応答に使います。</div>
  </div>

  <div class="group">
    abel for="personaSelect">人格プリセット</label>
    <select id="personaSelect">
      <option value="gentle">やさしい</option>
      <option value="sister">お姉さん</option>
      <option value="counselor">相談役</option>
    </select>
  </div>

  <div class="group">
    abel for="voiceModeSelect">音声応答</label>
    <select id="voiceModeSelect">
      <option value="on">オン</option>
      <option value="off">オフ</option>
    </select>
    <div class="help">OpenAI TTSが失敗した時はブラウザ音声に切り替えます。</div>
  </div>

  <div class="sheetActions">
    <button id="cancelSettings">閉じる</button>
    <button id="saveSettings">保存</button>
  </div>
</div>

<script>
const bubble = document.getElementById("bubble");
const input = document.getElementById("input");
const character = document.getElementById("character");
const sendBtn = document.getElementById("send");
const micBtn = document.getElementById("mic");
const settingsBtn = document.getElementById("settingsBtn");
const appBtn = document.getElementById("appBtn");
const statusEl = document.getElementById("status");

const settingsOverlay = document.getElementById("settingsOverlay");
const settingsSheet = document.getElementById("settingsSheet");
const closeSettingsBtn = document.getElementById("closeSettings");
const cancelSettingsBtn = document.getElementById("cancelSettings");
const saveSettingsBtn = document.getElementById("saveSettings");

const apiKeyInput = document.getElementById("apiKeyInput");
const personaSelect = document.getElementById("personaSelect");
const voiceModeSelect = document.getElementById("voiceModeSelect");

let isSpeaking = false;

const PERSONAS = {
  gentle: {
    label: "やさしい",
    prompt: "優しい女性。共感重視。短く自然に話す。安心感を大切にする。"
  },
  sister: {
    label: "お姉さん",
    prompt: "少しお姉さんっぽい女性。近い距離感で、やわらかく包み込むように話す。"
  },
  counselor: {
    label: "相談役",
    prompt: "傾聴重視の相談役。まず気持ちを受け止めて、落ち着いて整理して話す。"
  }
};

const state = {
  apiKey: "",
  personaKey: "gentle",
  voiceMode: "on"
};

let draftState = {...state};
let conversation = [];

function resetConversation(){
  conversation = [
    {role:"system", content:PERSONAS[state.personaKey].prompt}
  ];
}

function updateStatus(){
  statusEl.textContent = "OpenAI / " + PERSONAS[state.personaKey].label;
}

function showBubble(text){
  bubble.classList.remove("show");
  setTimeout(()=>{
    bubble.innerText = text;
    bubble.classList.add("show");
  },150);
}

function startLipSync(){
  isSpeaking = true;
  let i = 0;
  const frames = ["mouth1.png","mouth2.png","mouth3.png"];
  function loop(){
    if(!isSpeaking) return;
    character.src = frames[i % frames.length];
    i++;
    setTimeout(loop, 95);
  }
  loop();
}

function stopLipSync(){
  isSpeaking = false;
  character.src = "normal.png";
}

async function speakWithBrowser(text){
  if(!("speechSynthesis" in window)) return;
  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang = "ja-JP";
  uttr.onstart = ()=> startLipSync();
  uttr.onend = ()=> stopLipSync();
  uttr.onerror = ()=> stopLipSync();
  speechSynthesis.cancel();
  speechSynthesis.speak(uttr);
}

async function speakWithOpenAI(text){
  if(!state.apiKey) throw new Error("APIキー未設定");

  const res = await fetch("https://api.openai.com/v1/audio/speech",{
    method:"POST",
    headers:{
      "Authorization":"Bearer " + state.apiKey,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      model:"gpt-4o-mini-tts",
      voice:"aria",
      input:text
    })
  });

  if(!res.ok){
    throw new Error(await res.text());
  }

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const audio = new Audio(url);

  audio.onplay = ()=> startLipSync();
  audio.onended = ()=>{
    URL.revokeObjectURL(url);
    stopLipSync();
  };
  audio.onerror = ()=>{
    URL.revokeObjectURL(url);
    stopLipSync();
  };

  await audio.play();
}

async function speak(text){
  if(state.voiceMode === "off") return;

  try{
    await speakWithOpenAI(text);
  }catch(e){
    console.log("OpenAI TTS失敗", e);
    await speakWithBrowser(text);
  }
}

async function getAIResponse(msg){
  if(!state.apiKey){
    return "設定からOpenAIのAPIキーを入れてね。";
  }

  conversation.push({role:"user", content:msg});

  if(conversation.length > 10){
    conversation = [conversation[0], ...conversation.slice(-9)];
  }

  const r = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + state.apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:conversation
    })
  });

  if(!r.ok){
    throw new Error(await r.text());
  }

  const d = await r.json();
  const reply = d.choices?.[0]?.message?.content || "うまく話せない…";
  conversation.push({role:"assistant", content:reply});
  return reply;
}

async function send(){
  const text = input.value.trim();

  if(!text){
    showBubble("何か話して😊");
    return;
  }

  input.value = "";
  character.src = "typing.png";
  showBubble("…");

  await new Promise(r=>setTimeout(r,300));

  try{
    let reply = await getAIResponse(text);
    reply = reply.replace(/。/g,"。… ").replace(/、/g,"、 ");
    showBubble(reply);
    speak(reply);
  }catch(e){
    console.log("会話エラー", e);
    character.src = "normal.png";
    showBubble("ごめんね、今ちょっと通信が不安定みたい…。");
  }
}

function openSettings(){
  draftState = {...state};
  apiKeyInput.value = draftState.apiKey;
  personaSelect.value = draftState.personaKey;
  voiceModeSelect.value = draftState.voiceMode;

  settingsOverlay.classList.remove("hidden");
  settingsOverlay.style.display = "block";
  settingsSheet.classList.add("show");
}

function closeSettings(){
  settingsSheet.classList.remove("show");
  settingsOverlay.style.display = "none";
  settingsOverlay.classList.add("hidden");
}

function saveSettings(){
  state.apiKey = apiKeyInput.value.trim();
  state.personaKey = personaSelect.value;
  state.voiceMode = voiceModeSelect.value;

  resetConversation();
  updateStatus();
  closeSettings();
  showBubble("設定を保存したよ😊");
}

sendBtn.onclick = send;

input.addEventListener("keydown", e=>{
  if(e.key === "Enter") send();
});

if("webkitSpeechRecognition" in window){
  const r = new webkitSpeechRecognition();
  r.lang = "ja-JP";
  r.interimResults = false;
  r.continuous = false;

  micBtn.onclick = ()=> r.start();

  r.onstart = ()=>{
    character.src = "curious.png";
    showBubble("聞いてるよ…");
  };

  r.onresult = e=>{
    input.value = e.results[0][0].transcript;
    character.src = "normal.png";
    send();
  };

  r.onerror = ()=>{
    character.src = "normal.png";
    showBubble("うまく聞き取れなかったみたい…");
  };

  r.onend = ()=>{
    if(!isSpeaking) character.src = "normal.png";
  };
}else{
  micBtn.onclick = ()=>{
    showBubble("この端末では音声入力に対応していないみたい。");
  };
}

settingsBtn.onclick = openSettings;
closeSettingsBtn.onclick = closeSettings;
cancelSettingsBtn.onclick = closeSettings;
saveSettingsBtn.onclick = saveSettings;
settingsOverlay.onclick = closeSettings;

appBtn.onclick = ()=>{
  showBubble("今はここを予備ボタンにしてあるよ。");
};

window.addEventListener("load", ()=>{
  resetConversation();
  updateStatus();
});
</script>

</body>
</html>

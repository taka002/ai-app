<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;}

#character{
position:absolute;top:0;left:0;width:100%;height:100%;
object-fit:cover;object-position:center 28%;transform:scale(1.08);
}

/* ===== 吹き出し（ガラス） ===== */
#bubble{
position:absolute;bottom:65px;left:50%;transform:translateX(-50%);
width:92%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-radius:25px;
padding:14px;
font-size:16px;
line-height:1.4;
text-align:center;
z-index:5;
border:1px solid rgba(255,255,255,0.4);
box-shadow:0 8px 30px rgba(0,0,0,0.15);
}
#bubble::after{display:none;}

/* ===== 考え中アニメ ===== */
@keyframes thinkingFloat{
0%{transform:translateX(-50%) translateY(0);}
50%{transform:translateX(-50%) translateY(-4px);}
100%{transform:translateX(-50%) translateY(0);}
}
#bubble.thinking{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(25px);
animation:thinkingFloat 1.5s infinite;
}

/* ===== 入力 ===== */
#inputArea{
position:fixed;left:50%;transform:translateX(-50%);
width:92%;display:flex;align-items:center;gap:6px;
padding:6px 8px calc(env(safe-area-inset-bottom)+6px);
background:rgba(255,255,255,0.95);
border-radius:18px;bottom:50px;overflow:hidden;
}

#mic{
width:34px;height:34px;flex:0 0 34px;
border-radius:50%;border:none;background:#eee;
}

#input{
flex:1;min-width:0;max-width:60%;
height:34px;padding:0 8px;border-radius:16px;border:none;
font-size:13px;background:#eee;
}

#send{
flex:0 0 auto;height:34px;padding:0 12px;
border:none;border-radius:999px;background:#4da6ff;
color:white;font-size:13px;white-space:nowrap;
}

/* ===== 下ボタン ===== */
#settingsBtn,#appBtn{
position:fixed;bottom:10px;width:36px;height:36px;
border-radius:50%;background:white;
display:flex;align-items:center;justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
font-size:16px;
}
#settingsBtn{left:calc(50% - 45px);}
#appBtn{left:calc(50% + 10px);}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">どうしたのかな？😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");
function saveMemory(u,a){
memory.push({user:u,ai:a});
if(memory.length>20) memory.shift();
localStorage.setItem("memory",JSON.stringify(memory));
}

/* ===== 設定 ===== */
document.getElementById("settingsBtn").onclick = ()=>{
const menu = prompt(`設定
1:APIキー
2:名前
3:性格
4:リセット`);

if(menu==="1"){
const key=prompt("APIキー");
if(key){localStorage.setItem("apiKey",key);API_KEY=key;}
}

if(menu==="2"){
const name=prompt("名前");
if(name){localStorage.setItem("userName",name);}
}

if(menu==="3"){
const mode=prompt("性格（優しい/ツンデレ等）");
if(mode){localStorage.setItem("aiMode",mode);}
}

if(menu==="4"){
localStorage.clear();
alert("リセットしたよ");
}
};

/* ===== 表情 ===== */
const emotionGroups={
happy:["happy.png","smile.png"],
sad:["sad.png","cry.png"],
calm:["normal.png"]
};

function getEmotionGroup(t){
if(/嬉|ありがとう/.test(t)) return "happy";
if(/悲|辛/.test(t)) return "sad";
return "calm";
}

let currentEmotion="";
let lastImage="";

/* ===== 🔥 表情遅延システム ===== */
let emotionTimer=null;
let pendingEmotion=null;

function changeEmotion(text){

const group=getEmotionGroup(text);
if(group===currentEmotion) return;

pendingEmotion=group;

if(emotionTimer) clearTimeout(emotionTimer);

const delay = 700 + Math.random()*800;

emotionTimer=setTimeout(()=>{
applyEmotion(pendingEmotion);
currentEmotion=pendingEmotion;
},delay);
}

function applyEmotion(group){
const list=emotionGroups[group]||["normal.png"];

let img;
do{
img=list[Math.floor(Math.random()*list.length)];
}while(img===lastImage && list.length>1);

lastImage=img;
character.src=img;
}

/* ===== 名前呼び ===== */
function addName(text){
const name=localStorage.getItem("userName");
if(!name) return text;
if(Math.random()<0.4){
return name+"、"+text;
}
return text;
}

/* ===== タイピング ===== */
async function typeText(t){
bubble.innerText="";
for(let c of t){
bubble.innerText+=c;
await new Promise(r=>setTimeout(r,15));
}
}

/* ===== AI ===== */
async function getAIResponse(msg){
if(!API_KEY) return "APIキー入れてね";

const name=localStorage.getItem("userName")||"";
const mode=localStorage.getItem("aiMode")||"優しい";

const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:`${mode}女性キャラ。${name}と自然に会話。短く優しく。`},
...memory.flatMap(m=>[
{role:"user",content:m.user},
{role:"assistant",content:m.ai}
]),
{role:"user",content:msg}
]
})
});

const d=await r.json();
return d.choices?.[0]?.message?.content||"うまく話せない";
}

/* ===== 考え中 ===== */
function startThinking(){
bubble.classList.add("thinking");
let dots=0;
return setInterval(()=>{
dots=(dots+1)%4;
bubble.innerText="考え中" + "…".slice(0,dots+1);
},400);
}

/* ===== 送信 ===== */
async function send(){
const text=input.value;
if(!text) return;

input.value="";
character.src="typing.png";

const thinking=startThinking();

let reply=await getAIResponse(text);

clearInterval(thinking);
bubble.classList.remove("thinking");

reply=addName(reply);

await typeText(reply);
changeEmotion(reply); // 🔥 遅延発動
saveMemory(text,reply);
}

/* ===== 音声入力 ===== */
if ('webkitSpeechRecognition' in window){
const rec=new webkitSpeechRecognition();
rec.lang='ja-JP';
mic.onclick=()=>rec.start();
rec.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}else{
mic.onclick=()=>alert("非対応");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:sans-serif;
  background:#f5f5f5;
  min-height:100dvh;
  overflow:hidden;
  position:relative;
  color:#222;
}

/* 背景キャラ */
.avatar{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  overflow:hidden;
  z-index:1;
  pointer-events:none;
}

.base-face{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center 28%;
  transform:scale(1.08);
  pointer-events:none;
  will-change:transform;
  animation:idleFloat 4.6s ease-in-out infinite;
}

@keyframes idleFloat{
  0%{transform:scale(1.08) translateY(0);}
  25%{transform:scale(1.082) translateY(-2px);}
  50%{transform:scale(1.085) translateY(-4px);}
  75%{transform:scale(1.082) translateY(-2px);}
  100%{transform:scale(1.08) translateY(0);}
}

/* 吹き出し */
#bubble{
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%) translateY(10px);
  width:88%;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:20px;
  padding:10px 12px;
  font-size:14px;
  line-height:1.5;
  text-align:center;
  z-index:5;
  max-height:160px;
  overflow:auto;
  opacity:0;
  transition:all 0.35s ease;
  pointer-events:none;
}

#bubble.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* 下バー */
#bottomBar{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:95%;
  display:flex;
  align-items:center;
  gap:6px;
  background:rgba(255,255,255,0.9);
  border-radius:20px;
  padding:6px;
  z-index:20;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}

#bottomBar button{
  height:36px;
  width:36px;
  border:none;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  font-size:16px;
  flex:0 0 auto;
}

#send{
  border-radius:18px !important;
  width:auto !important;
  padding:0 10px;
  background:#4da6ff !important;
  color:#fff;
  font-weight:700;
}

#input{
  flex:1;
  height:36px;
  border:none;
  border-radius:18px;
  padding:0 10px;
  min-width:0;
  font-size:16px;
  background:#fff;
  color:#222;
}

#input:focus{
  outline:none;
}

/* 設定 */
#settingsOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.24);
  z-index:29;
  display:none;
}

#settingsSheet{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:30;
  background:rgba(255,255,255,0.98);
  border-radius:22px 22px 0 0;
  padding:14px 14px calc(14px + env(safe-area-inset-bottom));
  box-shadow:0 -10px 30px rgba(0,0,0,.12);
  transform:translateY(105%);
  transition:transform .25s ease;
  max-height:78dvh;
  overflow:auto;
}

#settingsSheet.show{
  transform:translateY(0);
}

.sheetHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.sheetTitle{
  font-size:16px;
  font-weight:700;
}

.sheetClose{
  border:none;
  background:#f2f2f2;
  border-radius:50%;
  width:34px;
  height:34px;
  font-size:18px;
}

.group{
  margin-bottom:12px;
}

.group label{
  display:block;
  font-size:12px;
  font-weight:700;
  margin-bottom:6px;
  color:#555;
}

.group input,
.group select{
  width:100%;
  height:42px;
  border:none;
  border-radius:14px;
  background:#f5f6f8;
  padding:0 12px;
  font-size:14px;
  color:#222;
}

.help{
  font-size:11px;
  line-height:1.4;
  color:#777;
  margin-top:5px;
}

.sheetActions{
  display:flex;
  gap:8px;
  margin-top:12px;
}

.sheetActions button{
  flex:1;
  height:44px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:700;
}

#cancelSettings{
  background:#eef1f4;
  color:#444;
}

#saveSettings{
  background:#4da6ff;
  color:#fff;
}

.hidden{
  display:none !important;
}
</style>
</head>

<body>

<div class="avatar">
  <img id="character" src="normal.png" class="base-face" alt="">
</div>

<div id="bubble" class="show">どうしたのかな？😊</div>

<div id="bottomBar">
  <button id="mic" type="button" aria-label="マイク">🎤</button>
  <input id="input" placeholder="話しかけて">
  <button id="send" type="button">送信</button>
  <button id="settingsBtn" type="button" aria-label="設定">⚙️</button>
  <button id="appBtn" type="button" aria-label="アプリ">📱</button>
</div>

<div id="settingsOverlay" class="hidden"></div>

<div id="settingsSheet" aria-hidden="true">
  <div class="sheetHeader">
    <div class="sheetTitle">設定</div>
    <button id="closeSettings" class="sheetClose" type="button">×</button>
  </div>

  <div class="group">
    <label for="apiKeyInput">OpenAI APIキー</label>
    <input id="apiKeyInput" type="password" placeholder="sk-...">
    <div class="help">会話と音声応答に使います。</div>
  </div>

  <div class="group">
    <label for="personaSelect">人格プリセット</label>
    <select id="personaSelect">
      <option value="gentle">やさしい</option>
      <option value="sister">お姉さん</option>
      <option value="counselor">相談役</option>
    </select>
  </div>

  <div class="group">
    <label for="voiceModeSelect">音声応答</label>
    <select id="voiceModeSelect">
      <option value="on">オン</option>
      <option value="off">オフ</option>
    </select>
    <div class="help">OpenAI音声が失敗した時はブラウザ音声に切り替えます。</div>
  </div>

  <div class="sheetActions">
    <button id="cancelSettings" type="button">閉じる</button>
    <button id="saveSettings" type="button">保存</button>
  </div>
</div>

<script>
const bubble = document.getElementById("bubble");
const input = document.getElementById("input");
const character = document.getElementById("character");
const sendBtn = document.getElementById("send");
const micBtn = document.getElementById("mic");
const settingsBtn = document.getElementById("settingsBtn");
const appBtn = document.getElementById("appBtn");

const settingsOverlay = document.getElementById("settingsOverlay");
const settingsSheet = document.getElementById("settingsSheet");
const closeSettingsBtn = document.getElementById("closeSettings");
const cancelSettingsBtn = document.getElementById("cancelSettings");
const saveSettingsBtn = document.getElementById("saveSettings");

const apiKeyInput = document.getElementById("apiKeyInput");
const personaSelect = document.getElementById("personaSelect");
const voiceModeSelect = document.getElementById("voiceModeSelect");

const PERSONAS = {
  gentle: {
    label: "やさしい",
    prompt: "優しい女性。共感重視。短く自然に話す。返答は1〜2文、できるだけ短め。"
  },
  sister: {
    label: "お姉さん",
    prompt: "少しお姉さんっぽい女性。近い距離感で、やわらかく包み込むように話す。返答は1〜2文、短め。"
  },
  counselor: {
    label: "相談役",
    prompt: "傾聴重視の相談役。まず気持ちを受け止めて、落ち着いて整理して話す。返答は1〜2文、短め。"
  }
};

const state = {
  apiKey: "",
  personaKey: "gentle",
  voiceMode: "on"
};

let conversation = [];
let isSpeaking = false;
let recognition = null;
let isSettingsOpen = false;

function safeSetCharacter(src){
  if(character.getAttribute("src") !== src){
    character.setAttribute("src", src);
  }
}

function resetConversation(){
  conversation = [
    { role:"system", content: PERSONAS[state.personaKey].prompt }
  ];
}

function showBubble(text){
  bubble.classList.remove("show");
  setTimeout(() => {
    bubble.innerText = text;
    bubble.classList.add("show");
  }, 120);
}

function startLipSync(){
  if(isSpeaking) return;
  isSpeaking = true;
  let i = 0;
  const frames = ["mouth1.png","mouth2.png","mouth3.png"];

  function loop(){
    if(!isSpeaking) return;
    safeSetCharacter(frames[i % frames.length]);
    i++;
    setTimeout(loop, 90);
  }

  loop();
}

function stopLipSync(){
  isSpeaking = false;
  safeSetCharacter("normal.png");
}

async function speakWithBrowser(text){
  if(!("speechSynthesis" in window)) return;

  try{
    speechSynthesis.cancel();
    speechSynthesis.getVoices();

    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = "ja-JP";
    uttr.rate = 1.0;
    uttr.pitch = 1.0;
    uttr.volume = 1.0;

    uttr.onstart = () => startLipSync();
    uttr.onend = () => stopLipSync();
    uttr.onerror = () => stopLipSync();

    speechSynthesis.speak(uttr);
  }catch(e){
    stopLipSync();
    console.log("ブラウザ音声エラー", e);
  }
}

async function speakWithOpenAI(text){
  if(!state.apiKey) throw new Error("APIキー未設定");

  const res = await fetch("https://api.openai.com/v1/audio/speech", {
    method:"POST",
    headers:{
      "Authorization":"Bearer " + state.apiKey,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      model:"gpt-4o-mini-tts",
      voice:"aria",
      input:text
    })
  });

  if(!res.ok){
    throw new Error(await res.text());
  }

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const audio = new Audio(url);

  audio.onplay = () => startLipSync();
  audio.onended = () => {
    URL.revokeObjectURL(url);
    stopLipSync();
  };
  audio.onerror = () => {
    URL.revokeObjectURL(url);
    stopLipSync();
  };

  await audio.play();
}

async function speak(text){
  if(state.voiceMode !== "on") return;

  try{
    await speakWithOpenAI(text);
  }catch(e){
    console.log("OpenAI TTS失敗", e);
    await speakWithBrowser(text);
  }
}

async function getAIResponse(msg){
  if(!state.apiKey){
    return "設定からOpenAIのAPIキーを入れてね。";
  }

  conversation.push({ role:"user", content:msg });

  if(conversation.length > 10){
    conversation = [conversation[0], ...conversation.slice(-9)];
  }

  const r = await fetch("https://api.openai.com/v1/chat/completions", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + state.apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:conversation,
      max_tokens:60,
      temperature:0.7
    })
  });

  if(!r.ok){
    throw new Error(await r.text());
  }

  const d = await r.json();
  const reply = d.choices?.[0]?.message?.content || "うまく話せない…";
  conversation.push({ role:"assistant", content:reply });
  return reply;
}

async function send(){
  const text = input.value.trim();

  if(!text){
    showBubble("何か話して😊");
    return;
  }

  input.value = "";
  showBubble("…");

  try{
    const reply = (await getAIResponse(text)).replace(/
+/g, " ").trim();
    showBubble(reply);
    await speak(reply);
  }catch(e){
    stopLipSync();
    console.log("会話エラー", e);
    showBubble("ごめんね、今ちょっと通信が不安定みたい…。");
  }
}

function openSettings(){
  isSettingsOpen = true;
  apiKeyInput.value = state.apiKey;
  personaSelect.value = state.personaKey;
  voiceModeSelect.value = state.voiceMode;

  settingsOverlay.classList.remove("hidden");
  settingsOverlay.style.display = "block";
  settingsSheet.classList.add("show");
  settingsSheet.setAttribute("aria-hidden", "false");
}

function closeSettings(){
  isSettingsOpen = false;
  settingsSheet.classList.remove("show");
  settingsSheet.setAttribute("aria-hidden", "true");
  settingsOverlay.style.display = "none";
  settingsOverlay.classList.add("hidden");
}

function saveSettings(){
  state.apiKey = apiKeyInput.value.trim();
  state.personaKey = personaSelect.value;
  state.voiceMode = voiceModeSelect.value;

  resetConversation();
  closeSettings();
  showBubble("設定を保存したよ😊");
}

function setupSpeechRecognition(){
  if(!("webkitSpeechRecognition" in window)) return;

  recognition = new webkitSpeechRecognition();
  recognition.lang = "ja-JP";
  recognition.interimResults = false;
  recognition.continuous = false;

  recognition.onstart = () => {
    showBubble("聞いてるよ…");
  };

  recognition.onresult = (e) => {
    input.value = e.results[0][0].transcript || "";
    send();
  };

  recognition.onerror = () => {
    showBubble("うまく聞き取れなかったみたい…");
  };
}

sendBtn.addEventListener("click", send);

input.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

micBtn.addEventListener("click", () => {
  if(isSettingsOpen) return;

  if(recognition){
    try{
      recognition.start();
    }catch(e){
      console.log("音声認識開始エラー", e);
      showBubble("マイクを開始できなかったみたい。");
    }
  }else{
    showBubble("この端末では音声入力に対応していないみたい。");
  }
});

settingsBtn.addEventListener("click", openSettings);
closeSettingsBtn.addEventListener("click", closeSettings);
cancelSettingsBtn.addEventListener("click", closeSettings);
saveSettingsBtn.addEventListener("click", saveSettings);
settingsOverlay.addEventListener("click", closeSettings);

appBtn.addEventListener("click", () => {
  showBubble("ここは今は使わないよ。");
});

window.addEventListener("load", () => {
  resetConversation();
  stopLipSync();
  setupSpeechRecognition();

  if("speechSynthesis" in window){
    try{
      speechSynthesis.getVoices();
    }catch(e){
      console.log("voices初期化エラー", e);
    }
  }
});
</script>

</body>
</html>

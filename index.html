<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  background:#cfd6e0;
  height:100vh;
  display:flex;
  flex-direction:column;
}

#character{height:28vh;overflow:hidden;}
#character img{width:100%;height:100%;object-fit:cover;}

#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  max-width:85%;
  margin:6px 0;
  padding:12px;
  border-radius:12px;
  white-space:pre-wrap;
}

.user{background:#5aa0e6;color:#fff;margin-left:auto;}
.ai{background:#eee;}

#bottom{background:#ddd;padding:6px;}
#controls{display:flex;gap:6px;}
#input{flex:1;padding:10px;border-radius:10px;border:none;}

button{
  border:none;
  border-radius:10px;
  background:#5aa0e6;
  color:white;
  padding:8px;
}

#settingBtn{
  margin-top:6px;
  width:100%;
  background:#333;
}

/* モーダル */
#modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

#modalContent{
  background:#222;
  color:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
}

#modal input,#modal textarea,#modal select{
  width:100%;
  margin:6px 0;
  padding:8px;
}

/* YouTube */
.ytWrap{
  display:flex;
  gap:8px;
  overflow-x:auto;
  margin-top:6px;
}

.ytCard{
  min-width:140px;
  background:#fff;
  border-radius:10px;
  padding:6px;
  text-align:center;
  font-size:12px;
}

/* スライド */
#slideViewer{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#111;
  z-index:999;
  display:none;
}

#slides{
  display:flex;
  width:100%;
  height:100%;
  overflow-x:auto;
}

.slide{
  min-width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.slideCard{
  background:#fff;
  padding:20px;
  border-radius:12px;
  max-width:90%;
}
</style>
</head>

<body>

<div id="character">
  <img id="avatar" src="normal.png">
</div>

<div id="chat"></div>

<div id="bottom">
  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button id="sendBtn">送信</button>
    <button onclick="toggleSlide()">📊</button>
    <button onclick="clearMemory()">🧹</button>
  </div>
  <button id="settingBtn">⚙ 設定</button>
</div>

<!-- スライド -->
<div id="slideViewer"><div id="slides"></div></div>

<!-- 設定 -->
<div id="modal">
<div id="modalContent">

APIキー
<input id="apiKey">

プロンプト
<textarea id="prompt"></textarea>

モード
<select id="mode">
<option value="teacher">家庭教師</option>
<option value="counselor">カウンセラー</option>
<option value="sales">営業</option>
<option value="medical">医療</option>
<option value="normal">通常</option>
</select>

音声 <input type="checkbox" id="voiceToggle">
スライド <input type="checkbox" id="slideToggle">

<button onclick="saveSettings()">保存</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let slideMode=localStorage.getItem("slideMode")==="true";

/* ===== 会話履歴（修正済） ===== */
let history = JSON.parse(localStorage.getItem("history") || "[]");

// ❗壊れた履歴を除去
history = history.filter(m => typeof m==="object" && m.role && m.content);

/* 表示 */
function formatMessage(text){
  return text.replace(/\n/g,"<br>");
}

/* YouTube */
function showYouTube(text,container){
  const wrap=document.createElement("div");
  wrap.className="ytWrap";

  const queries=[text, text+" 解説", text+" 初心者"];

  queries.forEach(q=>{
    const card=document.createElement("div");
    card.className="ytCard";
    card.innerHTML="▶ "+q.slice(0,20);

    card.onclick=()=>{
      window.open("https://www.youtube.com/results?search_query="+encodeURIComponent(q));
    };

    wrap.appendChild(card);
  });

  container.appendChild(wrap);
}

/* メッセージ */
function addMessage(text,cls){
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML=formatMessage(text);

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;

  if(cls==="ai"){
    speak(text);
    showYouTube(text,div);
  }
}

/* 音声 */
function speak(text){
  if(!voiceOn) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

/* 表情 */
function changeFace(text){
  let f="normal.png";
  if(text.includes("悲")) f="sad.png";
  if(text.includes("疲")) f="sleepy.png";
  if(text.includes("痛")) f="anxiety.png";
  document.getElementById("avatar").src=f;
}

/* 医療安全 */
function medicalSafety(text){
  if(text.includes("死にたい")){
    return "すぐに周囲や医療機関へ相談してください。";
  }
  return text;
}

/* スライド */
function showSlides(text){
  const viewer=document.getElementById("slideViewer");
  const slides=document.getElementById("slides");

  slides.innerHTML="";
  text.split("\n").forEach(t=>{
    if(!t.trim()) return;
    const d=document.createElement("div");
    d.className="slide";
    d.innerHTML=`<div class="slideCard">${t}</div>`;
    slides.appendChild(d);
  });

  viewer.style.display="block";
}

document.getElementById("slideViewer").onclick=()=>{
  document.getElementById("slideViewer").style.display="none";
};

/* トグル */
function toggleSlide(){
  slideMode=!slideMode;
  localStorage.setItem("slideMode",slideMode);
}

/* 記憶リセット */
function clearMemory(){
  history=[];
  localStorage.removeItem("history");
  addMessage("記憶をリセットしました","ai");
}

/* ===== 送信（完全修正版） ===== */
async function sendMessage(){

  const text=input.value;
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  const apiKey=localStorage.getItem("apiKey");

  if(!apiKey){
    addMessage("⚠ APIキー未設定","ai");
    return;
  }

  // ❗履歴再チェック
  history = history.filter(m => typeof m==="object" && m.role && m.content);

  history.push({role:"user",content:text});

  const prompt=localStorage.getItem("prompt")||"";
  const mode=localStorage.getItem("mode")||"teacher";

  let modePrompt="";
  if(mode==="teacher") modePrompt="わかりやすく説明";
  if(mode==="counselor") modePrompt="優しく寄り添う";
  if(mode==="sales") modePrompt="提案型";
  if(mode==="medical") modePrompt="安全に説明";

  try{

    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:prompt+"\n"+modePrompt},
          ...history
        ]
      })
    });

    const data=await res.json();

    if(!data.choices){
      addMessage("⚠ エラー\n"+JSON.stringify(data,null,2),"ai");
      return;
    }

    let reply=data.choices[0].message.content;

    if(mode==="medical") reply=medicalSafety(reply);

    addMessage(reply,"ai");
    changeFace(reply);

    history.push({role:"assistant",content:reply});
    localStorage.setItem("history",JSON.stringify(history));

    if(slideMode){
      showSlides(reply);
    }

  }catch(e){
    addMessage("⚠ 通信エラー","ai");
  }
}

document.getElementById("sendBtn").onclick=sendMessage;

/* 設定 */
document.getElementById("settingBtn").onclick=()=>{
  modal.style.display="flex";
  apiKey.value=localStorage.getItem("apiKey")||"";
  prompt.value=localStorage.getItem("prompt")||"";
  mode.value=localStorage.getItem("mode")||"teacher";
  voiceToggle.checked=voiceOn;
  slideToggle.checked=slideMode;
};

function saveSettings(){
  localStorage.setItem("apiKey",apiKey.value);
  localStorage.setItem("prompt",prompt.value);
  localStorage.setItem("mode",mode.value);

  voiceOn=voiceToggle.checked;
  slideMode=slideToggle.checked;

  localStorage.setItem("voiceOn",voiceOn);
  localStorage.setItem("slideMode",slideMode);

  modal.style.display="none";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:60px;
}

/* 上 */
header{height:28vh;}
header img{width:100%;height:100%;object-fit:cover;}

/* 情報 */
#infoBar{
text-align:center;
font-size:11px;
padding:4px;
background:rgba(255,255,255,0.6);
}

/* チャット */
main{flex:1;overflow-y:auto;padding:10px;}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{padding:10px;border-radius:16px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}

/* 下バー */
footer{
position:fixed;
bottom:0;width:100%;
background:#fff;
padding:6px;
display:flex;
justify-content:center;
}

#dock{
width:100%;max-width:600px;
display:flex;gap:6px;
}

#input{
width:58%;
height:36px;
border-radius:20px;
border:none;
padding:8px;
}

.dockBtn{
width:40px;height:36px;
border:none;border-radius:10px;
background:#eee;
}

/* メニュー */
#menu{
position:fixed;
bottom:-100%;
width:100%;
height:88%;
background:#111;
color:#fff;
display:flex;
flex-direction:column;
border-radius:20px 20px 0 0;
transition:.3s;
z-index:200;
}
#menu.active{bottom:0;}

#menuTop{flex:1;overflow:auto;padding:20px;}

.menuGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

/* アイコン */
.menuItem{
height:90px;
background:#333;
border-radius:16px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
}

/* ぷるぷる */
.editMode .menuItem{
animation:wiggle 0.2s infinite;
}
@keyframes wiggle{
0%{transform:rotate(-2deg);}
50%{transform:rotate(2deg);}
100%{transform:rotate(-2deg);}
}

/* 削除 */
.deleteBtn{
position:absolute;
top:-6px;right:-6px;
width:20px;height:20px;
background:red;color:#fff;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:12px;
}

/* UI */
.menuInput{
width:100%;height:44px;
border-radius:10px;
border:none;
padding:10px;
margin:10px 0;
}

.menuBtn{
width:100%;height:44px;
border:none;border-radius:10px;
margin:5px 0;
background:#444;color:#fff;
}
</style>
</head>

<body>

<header><img src="normal.png"></header>
<div id="infoBar"></div>
<main id="chat"></main>

<footer>
<div id="dock">
<input id="input" placeholder="話しかけてください">
<button class="dockBtn" onclick="send()">➤</button>
<button class="dockBtn" id="micBtn">🎤</button>
<button class="dockBtn" onclick="openMenu()">☰</button>
</div>
</footer>

<!-- メニュー -->
<div id="menu">
<div id="menuTop">

<!-- 🔥 Google検索 -->
<input id="searchBox" class="menuInput" placeholder="Google検索">
<button class="menuBtn" onclick="searchGoogle()">検索</button>

<div class="menuGrid" id="grid">

<div class="menuItem" onclick="openNews()">📰<br>ニュース</div>
<div class="menuItem" onclick="openMap()">🗺<br>地図</div>
<div class="menuItem" onclick="openWeather()">☀️<br>天気</div>

<div class="menuItem" onclick="openTransit()">🚃<br>乗換</div>
<div class="menuItem" onclick="openCalendar()">📅<br>予定</div>
<div class="menuItem" onclick="openGmail()">📧<br>メール</div>

<div class="menuItem" onclick="openYouTube()">▶<br>YouTube</div>

</div>

<h3>設定</h3>

<input id="apiKey" class="menuInput" placeholder="APIキー">

<label>
<input type="checkbox" id="voiceToggle"> 音声ON
</label>

<!-- 🔥 音声タイプ -->
<select id="voiceType" class="menuInput">
<option value="normal">通常</option>
<option value="female">女性っぽい</option>
<option value="slow">ゆっくり</option>
</select>

<button class="menuBtn" onclick="saveSettings()">保存</button>
<button class="menuBtn" onclick="closeMenu()">閉じる</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const menu=document.getElementById("menu");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let voiceType=localStorage.getItem("voiceType")||"normal";
let history=JSON.parse(localStorage.getItem("chatHistory"))||[];

let editMode=false;

/* 表示 */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* 🔥 音声（強化版） */
function speak(t){
if(!voiceOn)return;

speechSynthesis.cancel();

const u=new SpeechSynthesisUtterance(t);
u.lang="ja-JP";

if(voiceType==="female"){u.pitch=1.4;u.rate=1.05;}
else if(voiceType==="slow"){u.rate=0.85;}

speechSynthesis.speak(u);
}

document.body.onclick=()=>speechSynthesis.resume();

/* Chat */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({model:"gpt-4o-mini",messages:history})
});
const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");
speak(reply);
}

/* メニュー */
function openMenu(){
menu.classList.add("active");

apiKey.value=localStorage.getItem("apiKey")||"";
voiceToggle.checked=voiceOn;
voiceType.value=voiceType;
}

function closeMenu(){
menu.classList.remove("active");
disableEdit();
}

function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
localStorage.setItem("voiceOn",voiceToggle.checked);
localStorage.setItem("voiceType",voiceType.value);

voiceOn=voiceToggle.checked;
voiceType=voiceType.value;

add("保存しました","ai");
closeMenu();
}

/* Google検索 */
function searchGoogle(){
const q=document.getElementById("searchBox").value;
if(q){
window.open("https://www.google.com/search?q="+encodeURIComponent(q));
}
}

/* 外部 */
function openNews(){window.open("https://news.yahoo.co.jp/");}
function openMap(){window.open("https://maps.google.com");}
function openWeather(){window.open("https://weather.yahoo.co.jp/");}
function openTransit(){window.open("https://transit.yahoo.co.jp/");}
function openCalendar(){window.open("https://calendar.google.com/");}
function openGmail(){window.open("https://mail.google.com/");}
function openYouTube(){window.open("https://youtube.com");}

/* ===== 編集モード ===== */
function enableEdit(){
editMode=true;
document.body.classList.add("editMode");

document.querySelectorAll(".menuItem").forEach(item=>{
if(item.querySelector(".deleteBtn"))return;

const del=document.createElement("div");
del.className="deleteBtn";
del.innerText="×";

del.onclick=(e)=>{
e.stopPropagation();
item.remove();
};

item.appendChild(del);
});
}

function disableEdit(){
editMode=false;
document.body.classList.remove("editMode");
document.querySelectorAll(".deleteBtn").forEach(d=>d.remove());
}

/* 長押し */
document.querySelectorAll(".menuItem").forEach(item=>{
let t;

item.addEventListener("touchstart",()=>{
t=setTimeout(enableEdit,500);
});

item.addEventListener("touchend",()=>clearTimeout(t));

item.addEventListener("click",()=>{
if(editMode){
disableEdit();
}
});
});

/* スワイプ閉じる */
let startY=0;
menu.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY;
});
menu.addEventListener("touchmove",e=>{
if(e.touches[0].clientY-startY>80){
menu.classList.remove("active");
disableEdit();
}
});

/* 起動 */
window.onload=()=>{
add("こんにちは😊","ai");
};
</script>

</body>
</html>

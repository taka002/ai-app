<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 神アプリ</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:60px;
}
header{height:28vh;}
header img{width:100%;height:100%;object-fit:cover;}

#infoBar{
text-align:center;
font-size:12px;
padding:4px;
background:rgba(255,255,255,0.6);
}

/* 🔥 好感度UI */
#affectionWrap{
padding:6px;
background:rgba(255,255,255,0.7);
}
#affectionBar{
height:8px;
background:#ff6b81;
border-radius:10px;
width:50%;
}

main{flex:1;overflow-y:auto;padding:10px;}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{padding:10px;border-radius:16px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}

footer{
position:fixed;bottom:0;width:100%;
background:#fff;padding:6px;display:flex;justify-content:center;
}
#dock{width:100%;max-width:600px;display:flex;gap:6px;}
#input{width:58%;height:36px;border-radius:20px;border:none;padding:8px;}
.dockBtn{width:40px;height:36px;border:none;border-radius:10px;background:#eee;}

#menu{
position:fixed;bottom:-100%;width:100%;height:88%;
background:#111;color:#fff;
display:flex;flex-direction:column;
border-radius:20px 20px 0 0;
transition:.3s;z-index:1000;
}
#menu.active{bottom:0;}
#menuTop{flex:1;overflow:auto;padding:20px;}

.menuGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;margin-bottom:20px;
}
.menuItem{
height:90px;background:#333;border-radius:16px;
display:flex;flex-direction:column;justify-content:center;align-items:center;
}
.menuInput{
width:100%;height:44px;border-radius:10px;border:none;
padding:10px;margin-bottom:10px;
}
.menuBtn{
width:100%;height:44px;border:none;border-radius:10px;
margin-bottom:10px;background:#444;color:#fff;
}
</style>
</head>

<body>

<header>
<img id="avatar" src="normal.png">
</header>

<div id="infoBar">取得中...</div>

<!-- 🔥 好感度 -->
<div id="affectionWrap">
好感度 ❤️ <span id="affectionText">50</span>
<div style="background:#ddd;border-radius:10px;">
<div id="affectionBar"></div>
</div>
</div>

<main id="chat"></main>

<footer>
<div id="dock">
<input id="input" placeholder="話しかけてください">
<button class="dockBtn" onclick="send()">➤</button>
<button class="dockBtn" id="micBtn">🎤</button>
<button class="dockBtn" onclick="openMenu()">☰</button>
</div>
</footer>

<div id="menu">
<div id="menuTop">

<div class="menuGrid">
<div class="menuItem" onclick="openNews()">📰<br>ニュース</div>
<div class="menuItem" onclick="openMap()">🗺<br>地図</div>
<div class="menuItem" onclick="openWeather()">☀️<br>天気</div>
<div class="menuItem" onclick="openTransit()">🚃<br>乗換</div>
<div class="menuItem" onclick="openCalendar()">📅<br>予定</div>
<div class="menuItem" onclick="openGmail()">📧<br>メール</div>
<div class="menuItem" onclick="openLine()">💬<br>LINE</div>
<div class="menuItem" onclick="openYouTube()">▶<br>YouTube</div>
</div>

<h3>設定</h3>

<input id="apiKey" class="menuInput" placeholder="APIキー">
<input id="userName" class="menuInput" placeholder="あなたの名前">
<input id="charName" class="menuInput" placeholder="キャラ名">
<textarea id="systemPrompt" class="menuInput" style="height:80px;"></textarea>

<input type="file" id="avatarUpload" class="menuInput">

<label><input type="checkbox" id="voiceToggle"> 音声ON</label>

<select id="voiceType" class="menuInput">
<option value="female">女性</option>
<option value="male">男性</option>
<option value="slow">ゆっくり</option>
<option value="veryslow">かなりゆっくり</option>
<option value="ultraslow">超ゆっくり</option>
</select>

<select id="voiceEngine" class="menuInput">
<option value="local">ローカル音声</option>
<option value="openai">高品質音声</option>
</select>

<!-- 🔥課金 -->
<button class="menuBtn" onclick="buyPremium()">💎 プレミアム解放</button>

<button class="menuBtn" onclick="saveSettings()">保存</button>
<button class="menuBtn" onclick="closeMenu()">閉じる</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

/* ===== 状態 ===== */
let history=JSON.parse(localStorage.getItem("chatHistory"))||[];
let affection=parseInt(localStorage.getItem("affection")||"50");
let mood=localStorage.getItem("mood")||"normal";
let isPremium=localStorage.getItem("isPremium")==="true";

/* ===== UI更新 ===== */
function updateAffectionUI(){
document.getElementById("affectionText").innerText=affection;
document.getElementById("affectionBar").style.width=affection+"%";
}

/* ===== 表示 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* ===== 課金 ===== */
function buyPremium(){
if(confirm("プレミアム解放する？")){
localStorage.setItem("isPremium","true");
isPremium=true;
add("プレミアム解放されたよ😊","ai");
}
}

/* ===== AI ===== */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

/* 制限 */
if(!isPremium){
let limit=parseInt(localStorage.getItem("limit")||"20");
if(limit<=0){
add("今日はここまで…プレミアムで続き話そう😊","ai");
return;
}
limit--;
localStorage.setItem("limit",limit);
}

/* 感情変化 */
if(t.includes("好き")||t.includes("ありがとう")){
affection+=5; mood="happy";
}
if(t.includes("嫌い")){
affection-=10; mood="sad";
}
if(!isPremium && affection>70)affection=70;

localStorage.setItem("affection",affection);
localStorage.setItem("mood",mood);

updateAffectionUI();

/* 通信 */
const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:`感情:${mood} 好感度:${affection}`},
...history,
{role:"user",content:t}
]
})
});

const data=await res.json();
let reply=data.choices?.[0]?.message?.content||"エラー";

/* 感情演出 */
if(mood==="love") reply+="…ずっと一緒にいたい😊";
if(mood==="sad") reply="ちょっと寂しい…"+reply;

add(reply,"ai");

history.push({role:"user",content:t});
history.push({role:"assistant",content:reply});
localStorage.setItem("chatHistory",JSON.stringify(history));
}

/* 起動 */
window.onload=()=>{
updateAffectionUI();
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* キャラ */
#character{height:30vh;}
#character img{width:100%;height:100%;object-fit:cover;}

/* チャット */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  padding-bottom:100px;
}

.msg{max-width:85%;margin:8px;}
.user{text-align:right;}
.ai{text-align:left;}

.bubble{
  display:inline-block;
  padding:12px;
  border-radius:16px;
  background:#fff;
  line-height:1.5;
}
.user .bubble{
  background:#0072ff;
  color:#fff;
}

/* 入力 */
#bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:8px;
}
#controls{
  display:flex;
  gap:6px;
}
#input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}
#sendBtn{
  width:44px;height:44px;
  border-radius:50%;
  background:#0072ff;
  color:#fff;
  border:none;
}

/* 設定 */
#fab{
  position:fixed;
  right:10px;
  bottom:90px;
}
#setBtn{
  width:50px;height:50px;
  border-radius:50%;
  background:#333;
  color:#fff;
  border:none;
}

/* モーダル */
#modal{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}
#modalContent{
  background:#222;
  color:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
}
textarea{width:100%;}
</style>
</head>

<body>

<div id="character">
  <img src="normal.png">
</div>

<div id="chat"></div>

<div id="bottom">
<div id="controls">
<input id="input" placeholder="話しかけてください">
<button id="sendBtn">➤</button>
</div>
</div>

<div id="fab">
<button id="setBtn" onclick="openSettings()">⚙</button>
</div>

<!-- 設定 -->
<div id="modal">
<div id="modalContent">

ChatGPTキー<input id="openaiKey">

<h3>モード</h3>
<select id="mode">
<option value="child">子供</option>
<option value="teacher">家庭教師</option>
<option value="counselor">カウンセラー</option>
<option value="boss">上司</option>
</select>

<textarea id="customPrompt" placeholder="カスタム"></textarea>

<button onclick="showMemory()">📖記憶</button>
<button onclick="clearMemory()">🧹リセット</button>

<button onclick="saveSettings()">閉じる</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

/* 状態 */
let history = JSON.parse(localStorage.getItem("history")||"[]");
let memory = JSON.parse(localStorage.getItem("memory")||"[]");

/* 表示 */
function addMessage(text,cls){
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML=`<div class="bubble">${text}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* モード */
function getModePrompt(mode){
  return {
    child:"子供向けに優しく",
    teacher:"わかりやすく教える",
    counselor:"共感して優しく寄り添う",
    boss:"結論と行動を指示する"
  }[mode]||"";
}

/* 送信 */
document.getElementById("sendBtn").onclick=sendMessage;

input.addEventListener("keydown",e=>{
  if(e.key==="Enter") sendMessage();
});

async function sendMessage(){
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  const key=localStorage.getItem("openaiKey");

  if(!key){
    addMessage("APIキー入れて","ai");
    return;
  }

  history.push({role:"user",content:text});
  if(history.length>15) history=history.slice(-15);

  const system =
    getModePrompt(document.getElementById("mode").value) +
    "\n" +
    document.getElementById("customPrompt").value +
    "\nユーザー情報:\n" + memory.join("\n");

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+key
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:system},
          ...history
        ]
      })
    });

    const data=await res.json();

    if(data.error){
      addMessage("エラー: "+data.error.message,"ai");
      return;
    }

    const reply=data.choices?.[0]?.message?.content || "エラー";

    addMessage(reply,"ai");

    history.push({role:"assistant",content:reply});
    localStorage.setItem("history",JSON.stringify(history));

    extractMemory(text);

  }catch(e){
    addMessage("通信エラー","ai");
  }
}

/* 記憶 */
function extractMemory(text){
  if(text.length>5){
    memory.push(text);
    if(memory.length>10) memory=memory.slice(-10);
    localStorage.setItem("memory",JSON.stringify(memory));
  }
}

/* 表示 */
function showMemory(){
  addMessage(memory.join("<br>"),"ai");
}

/* リセット */
function clearMemory(){
  history=[];
  memory=[];
  localStorage.clear();
  chat.innerHTML="";
}

/* 設定 */
function openSettings(){
  modal.style.display="flex";
  openaiKey.value=localStorage.getItem("openaiKey")||"";
}

function saveSettings(){
  localStorage.setItem("openaiKey",openaiKey.value);
  modal.style.display="none";
}

/* 復元 */
history.forEach(m=>addMessage(m.content,m.role==="user"?"user":"ai"));
</script>

</body>
</html>

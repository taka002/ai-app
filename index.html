<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
height:100dvh;
overflow:hidden;
}

/* キャラ（そのまま＋安定） */
#character{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
object-position:center top;
}

/* 吹き出し（少しだけ調整） */
#bubble{
position:absolute;
bottom:90px; /* ←入力と被らない */
left:50%;
transform:translateX(-50%);
width:85%;
background:rgba(255,255,255,0.85);
border-radius:25px;
padding:14px;
font-size:16px;
text-align:center;
backdrop-filter:blur(8px);
}

/* ===== 入力エリア（ここだけ強化） ===== */
#inputArea{
position:fixed;
bottom:0;
left:0;
width:100%;

display:flex;
align-items:center;
gap:8px;

padding:8px 10px calc(env(safe-area-inset-bottom) + 8px);
background:rgba(255,255,255,0.95);
backdrop-filter:blur(8px);

z-index:10;
}

/* 入力 */
#input{
flex:1;
height:44px;
padding:0 14px;
border-radius:22px;
border:none;
font-size:15px;
background:#f1f1f1;
}

/* 送信 */
#send{
flex-shrink:0;
height:44px;
padding:0 16px;
border:none;
border-radius:22px;
background:#4da6ff;
color:white;
font-size:14px;
}

/* 左：設定 */
#settingsBtn{
position:absolute;
top:calc(env(safe-area-inset-top) + 10px);
left:20px;
width:50px;
height:50px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
font-size:22px;
}

/* 右：アプリ */
#appBtn{
position:absolute;
top:calc(env(safe-area-inset-top) + 10px);
right:20px;
width:50px;
height:50px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
font-size:20px;
}
</style>
</head>

<body>

<img id="character" src="normal.png">

<div id="bubble">どうしたのかな？話してくれると嬉しいな😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<input id="input" placeholder="話しかけて" autocomplete="off">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* 設定 */
document.getElementById("settingsBtn").onclick = ()=>{
  const key = prompt("APIキーを入力");
  if(key){
    localStorage.setItem("apiKey", key);
    API_KEY = key;
    alert("保存したよ！");
  }
};

/* 感情 */
function changeEmotion(text){
  let img = "normal.png";

  if(text.includes("疲れ")) img="sad.png";
  else if(text.includes("怒")) img="anger.png";
  else if(text.includes("不安")) img="anxiety.png";
  else if(text.includes("嬉")) img="happy.png";
  else if(text.includes("驚")) img="surprise.png";

  document.getElementById("character").src = img;
}

/* 考え中 */
function startThinking(){
  const bubble = document.getElementById("bubble");
  let dots="";
  let count=0;

  const interval=setInterval(()=>{
    dots+="…";
    bubble.innerText=dots;
    count++;
    if(count>5){dots="";count=0;}
  },300);

  return interval;
}

/* 文字 */
async function typeText(text){
  const bubble=document.getElementById("bubble");
  bubble.innerText="";

  for(let i=0;i<text.length;i++){
    bubble.innerText+=text[i];
    await new Promise(r=>setTimeout(r,20));
  }
}

/* API */
async function getAIResponse(message){
  if(!API_KEY) return "設定からAPIキー入れてね🙏";

  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:"短く優しく返す"},
        {role:"user",content:message}
      ]
    })
  });

  const data = await res.json();
  return data.choices[0].message.content;
}

/* 送信 */
async function send(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text) return;

  input.value="";
  document.getElementById("character").src="typing.png";

  const thinking=startThinking();

  try{
    const reply=await getAIResponse(text);

    clearInterval(thinking);
    await typeText(reply);
    changeEmotion(reply);

  }catch(e){
    clearInterval(thinking);
    document.getElementById("bubble").innerText="エラー…";
    document.getElementById("character").src="glitch.png";
  }
}
</script>

</body>
</html>

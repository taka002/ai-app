<script>

/* ===== 要素 ===== */
const bubble = document.getElementById("bubble");
const input = document.getElementById("input");
const character = document.getElementById("character");
const blinkEye = document.getElementById("blinkEye");

/* 🔥 追加（ボタン取得） */
const sendBtn = document.getElementById("send");
const micBtn = document.getElementById("mic");

/* ===== 状態 ===== */
let isSpeaking = false;
let blinkRunning = false;

/* ===== 音声解析 ===== */
let audioCtx, analyser, dataArray;

/* =========================
   音量取得
========================= */
function getVolume(){

if(!analyser) return 0;

analyser.getByteTimeDomainData(dataArray);

let sum = 0;

for(let i=0;i<dataArray.length;i++){
  const v = (dataArray[i]-128)/128;
  sum += v*v;
}

return Math.sqrt(sum/dataArray.length);
}

/* =========================
   音声同期口パク
========================= */
function startLipSyncFromAudio(){

function loop(){

if(!isSpeaking) return;

const vol = getVolume();

if(vol < 0.02){
  character.src = "normal.png";
}else if(vol < 0.05){
  character.src = "mouth1.png";
}else if(vol < 0.1){
  character.src = "mouth2.png";
}else{
  character.src = "mouth3.png";
}

requestAnimationFrame(loop);
}

loop();
}

/* =========================
   停止
========================= */
function stopLipSync(){

isSpeaking = false;
character.src = "normal.png";

/* 終了瞬き */
setTimeout(()=>{
blink();
},100);
}

/* =========================
   瞬き
========================= */
function blink(){

if(blinkRunning || isSpeaking) return;

blinkRunning = true;

blinkEye.style.transition = "opacity 0.06s";
blinkEye.style.opacity = 1;

setTimeout(()=>{
blinkEye.style.opacity = 0;
blinkRunning = false;
},80);
}

function autoBlink(){

setTimeout(()=>{
if(!isSpeaking) blink();
autoBlink();
},2500 + Math.random()*3000);
}
autoBlink();

/* =========================
   吹き出し
========================= */
function showBubble(text){
bubble.classList.remove("show");
setTimeout(()=>{
bubble.innerText = text;
bubble.classList.add("show");
},150);
}

/* =========================
   音声
========================= */
let API_KEY = localStorage.getItem("apiKey") || "";

async function speak(text){

if(!API_KEY){
const uttr = new SpeechSynthesisUtterance(text);
uttr.lang="ja-JP";
uttr.onstart=()=>isSpeaking=true;
uttr.onend=stopLipSync;
speechSynthesis.speak(uttr);
return;
}

try{

const res = await fetch("https://api.openai.com/v1/audio/speech",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"gpt-4o-mini-tts",
voice:"aria",
input:text
})
});

const blob = await res.blob();
const url = URL.createObjectURL(blob);

const audio = new Audio(url);

audio.onplay = ()=>{

audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const src = audioCtx.createMediaElementSource(audio);
analyser = audioCtx.createAnalyser();
analyser.fftSize = 256;

dataArray = new Uint8Array(analyser.frequencyBinCount);

src.connect(analyser);
analyser.connect(audioCtx.destination);

isSpeaking = true;
startLipSyncFromAudio();
};

audio.onended = stopLipSync;

await audio.play();

}catch(e){
console.log(e);
}

}

/* =========================
   AI
========================= */
async function getAIResponse(msg){
if(!API_KEY) return "APIキー入れてね";

const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"優しい女性。短く自然に。最後は軽く質問。"},
{role:"user",content:msg}
]
})
});

const d=await r.json();
return d.choices?.[0]?.message?.content || "うまく話せない…";
}

/* =========================
   送信
========================= */
async function send(){

const text=input.value;

if(!text.trim()){
showBubble("何か話して😊");
return;
}

input.value="";
showBubble("…");

await new Promise(r=>setTimeout(r,300));

let reply = await getAIResponse(text);

reply = reply
.replace(/。/g,"。… ")
.replace(/、/g,"、 ");

if(reply.length>100) reply=reply.slice(0,100)+"…";

showBubble(reply);
speak(reply);
}

/* 🔥 修正ここ（重要） */
sendBtn.addEventListener("click", send);

/* Enterでも送信 */
input.addEventListener("keydown", e=>{
if(e.key==="Enter") send();
});

/* =========================
   音声入力
========================= */
if('webkitSpeechRecognition' in window){
const r=new webkitSpeechRecognition();
r.lang='ja-JP';

micBtn.onclick=()=>r.start();

r.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}else{
micBtn.onclick=()=>alert("非対応");
}

</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;}

#character{
position:absolute;top:0;left:0;width:100%;height:100%;
object-fit:cover;object-position:center 28%;transform:scale(1.08);
}

#bubble{
position:absolute;
bottom:65px;
left:50%;
transform:translateX(-50%) translateY(10px);
width:88%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
border-radius:20px;
padding:10px 12px;
font-size:14px;
line-height:1.4;
text-align:center;
z-index:5;
max-height:120px;
overflow:hidden;
word-break:break-word;
opacity:0;
transition:all 0.4s ease;
}
#bubble.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

#inputArea{
position:fixed;left:50%;transform:translateX(-50%);
width:92%;display:flex;gap:6px;
bottom:50px;
}

#mic{width:34px;height:34px;border-radius:50%;border:none;}
#input{flex:1;height:34px;border-radius:16px;border:none;}
#send{height:34px;border-radius:999px;background:#4da6ff;color:white;border:none;}

#settingsBtn,#appBtn{
position:fixed;bottom:10px;width:36px;height:36px;border-radius:50%;
background:white;display:flex;align-items:center;justify-content:center;
}
#settingsBtn{left:calc(50% - 45px);}
#appBtn{left:calc(50% + 10px);}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble" class="show">どうしたのかな？😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send">送信</button>
</div>

<script>

/* ===== 要素 ===== */
const settingsBtn = document.getElementById("settingsBtn");
const bubble = document.getElementById("bubble");
const input = document.getElementById("input");

/* ===== 初期 ===== */
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");
function saveMemory(u,a){
memory.push({user:u,ai:a});
if(memory.length>20) memory.shift();
localStorage.setItem("memory",JSON.stringify(memory));
}

/* ===== 設定 ===== */
settingsBtn.onclick = () => {

const box = document.createElement("div");
box.style = `
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:flex;align-items:center;justify-content:center;z-index:999;
`;

box.innerHTML = `
<div style="background:#fff;width:90%;border-radius:20px;padding:20px;font-size:14px;">
<h3>設定</h3>

<label>APIキー</label><br>
<input id="set_api" style="width:100%" value="${localStorage.getItem("apiKey")||""}"><br><br>

<label>名前</label><br>
<input id="set_name" style="width:100%" value="${localStorage.getItem("userName")||""}"><br><br>

<label>性格</label><br>
<select id="set_mode" style="width:100%">
<option ${localStorage.getItem("aiMode")==="優しい"?"selected":""}>優しい</option>
<option ${localStorage.getItem("aiMode")==="元気"?"selected":""}>元気</option>
<option ${localStorage.getItem("aiMode")==="クール"?"selected":""}>クール</option>
</select><br><br>

<label>音声</label><br>
<select id="set_voice" style="width:100%">
<option value="on" ${localStorage.getItem("voice")==="on"?"selected":""}>ON</option>
<option value="off" ${localStorage.getItem("voice")==="off"?"selected":""}>OFF</option>
</select><br><br>

<button id="saveBtn" style="width:100%;padding:10px;border:none;background:#4da6ff;color:#fff;border-radius:10px;">保存</button>
<button id="closeBtn" style="width:100%;margin-top:8px;padding:10px;border:none;background:#ccc;border-radius:10px;">閉じる</button>
</div>
`;

document.body.appendChild(box);

document.getElementById("saveBtn").onclick = () => {
localStorage.setItem("apiKey", document.getElementById("set_api").value);
localStorage.setItem("userName", document.getElementById("set_name").value);
localStorage.setItem("aiMode", document.getElementById("set_mode").value);
localStorage.setItem("voice", document.getElementById("set_voice").value);
API_KEY = localStorage.getItem("apiKey");
alert("保存したよ 👍");
box.remove();
};

document.getElementById("closeBtn").onclick = ()=>box.remove();
};

/* ===== フェード ===== */
function showBubble(text){
bubble.classList.remove("show");
setTimeout(()=>{
bubble.innerText = text;
bubble.classList.add("show");
},150);
}

/* ===== 短縮 ===== */
function shorten(text){
if(text.length <= 100) return text;
const cut = text.slice(0,100);
const idx = cut.lastIndexOf("。");
return idx !== -1 ? cut.slice(0, idx+1) : cut+"…";
}

/* ===== 🔥 音声進化版 ===== */
async function speak(text){

if(localStorage.getItem("voice")==="off") return;

/* 文ごとに分割 */
const parts = text.split("。");

for(let p of parts){

if(!p.trim()) continue;

/* 🔥 間（考えてる感じ） */
await new Promise(r=>setTimeout(r,600));

const uttr = new SpeechSynthesisUtterance(p + "。");
uttr.lang="ja-JP";

/* 🔥 優しさ調整 */
uttr.pitch = 1.2;
uttr.rate = 0.95;
uttr.volume = 0.9;

speechSynthesis.speak(uttr);

/* 🔥 再生待ち */
await new Promise(res=>{
uttr.onend = res;
});

}

}

/* ===== 起動後音声 ===== */
let firstSpeakDone = false;
document.body.addEventListener("click", () => {

if(firstSpeakDone) return;
firstSpeakDone = true;

const g = "どうしたのかな？";
showBubble(g);
speak(g);

});

/* ===== AI ===== */
async function getAIResponse(msg){
if(!API_KEY) return "APIキー入れてね";

const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"優しい女性。短く自然に。途中で切れない。最後は軽く質問。"},
{role:"user",content:msg}
]
})
});

const d=await r.json();
return d.choices?.[0]?.message?.content || "うまく話せない…";
}

/* ===== 送信 ===== */
async function send(){

const text=input.value;
if(!text.trim()){
showBubble("何か話して😊");
return;
}

input.value="";
showBubble("考え中…");

let reply=await getAIResponse(text);

reply = shorten(reply);

if(!reply.match(/？/)){
reply += " どう思う？";
}

showBubble(reply);
speak(reply);
saveMemory(text,reply);
}

document.getElementById("send").onclick = send;

/* ===== 音声入力 ===== */
if('webkitSpeechRecognition' in window){
const r=new webkitSpeechRecognition();
r.lang='ja-JP';
mic.onclick=()=>r.start();
r.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}else{
mic.onclick=()=>alert("非対応");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
height:100dvh;
overflow:hidden;
}

/* キャラ */
#character{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
}

/* 🔥 吹き出し（口元固定） */
#bubble{
position:absolute;
top:58%; /* ←口に合わせる */
left:50%;
transform:translateX(-50%);
width:92%;
max-width:92%;
background:rgba(255,255,255,0.9);
border-radius:25px;
padding:14px;
font-size:16px;
line-height:1.4;
text-align:center;
backdrop-filter:blur(8px);
z-index:5;
}

/* 🔥 しっぽ（下に出す） */
#bubble::after{
content:"";
position:absolute;
bottom:-10px; /* ←口に刺さる */
left:50%;
transform:translateX(-50%) rotate(45deg);
width:20px;
height:20px;
background:rgba(255,255,255,0.9);
}

/* 入力エリア */
#inputArea{
position:fixed;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
align-items:center;
gap:6px;
padding:8px 10px calc(env(safe-area-inset-bottom) + 10px);
background:rgba(255,255,255,0.95);
border-radius:20px;
z-index:10;
bottom:0;
}

#input{
flex:1;
min-width:0;
height:38px;
padding:0 10px;
border-radius:18px;
border:none;
font-size:14px;
background:#eee;
}

#send{
height:38px;
padding:0 14px;
border:none;
border-radius:999px;
background:#4da6ff;
color:white;
font-size:14px;
}

#mic{
width:38px;
height:38px;
border-radius:50%;
border:none;
background:#eee;
font-size:16px;
}

/* ボタン（そのまま） */
#settingsBtn,#appBtn{
position:fixed;
bottom:60px;
width:44px;
height:44px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:20;
font-size:18px;
}

#settingsBtn{left:20px;}
#appBtn{right:20px;}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">どうしたのかな？話してくれると嬉しいな😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");

function saveMemory(user, ai){
  memory.push({user, ai});
  if(memory.length > 20) memory.shift();
  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== 設定 ===== */
settingsBtn.onclick = ()=>{
  const key = prompt("APIキー");
  if(key){
    localStorage.setItem("apiKey", key);
    API_KEY = key;
  }
};

/* ===== 表情（29種対応） ===== */
const emotionGroups = {
  happy:["happy.png","smile.png","applause.png","impressed.png"],
  sad:["sad.png","cry.png"],
  anger:["anger.png","irritation.png"],
  anxiety:["anxiety.png","panic.png"],
  shy:["shy.png","embarrassed.png"],
  surprise:["surprise.png"],
  thinking:["curious.png","focused.png","explaining.png"],
  agree:["agree.png"],
  disagree:["disagree.png","refuse.png"],
  calm:["relieved.png","normal.png"],
  tired:["sleepy.png","hesitation.png"]
};

function getEmotionGroup(text){
  if(/ありがとう|嬉/.test(text)) return "happy";
  if(/悲|辛|泣/.test(text)) return "sad";
  if(/怒/.test(text)) return "anger";
  if(/不安|怖/.test(text)) return "anxiety";
  return "calm";
}

function changeEmotion(text){
  const list = emotionGroups[getEmotionGroup(text)];
  character.src = list[Math.floor(Math.random()*list.length)];
}

/* ===== タイピング ===== */
async function typeText(text){
  bubble.innerText="";
  for(let c of text){
    bubble.innerText+=c;
    await new Promise(r=>setTimeout(r,15));
  }
}

/* ===== AI ===== */
async function getAIResponse(msg){

  const history=[];
  memory.forEach(m=>{
    history.push({role:"user",content:m.user});
    history.push({role:"assistant",content:m.ai});
  });

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:"短く自然に話す女性キャラ"},
        ...history,
        {role:"user",content:msg}
      ]
    })
  });

  const data=await res.json();
  return data.choices?.[0]?.message?.content || "うまく話せなかった…";
}

/* ===== 送信 ===== */
async function send(){
  const text=input.value;
  if(!text) return;

  input.value="";
  character.src="typing.png";

  const reply = await getAIResponse(text);

  await typeText(reply);
  changeEmotion(reply);
  saveMemory(text,reply);
}

/* ===== 音声入力 ===== */
if ('webkitSpeechRecognition' in window){
  const rec=new webkitSpeechRecognition();
  rec.lang='ja-JP';
  mic.onclick=()=>rec.start();
  rec.onresult=e=>{
    input.value=e.results[0][0].transcript;
    send();
  };
}else{
  mic.onclick=()=>alert("非対応");
}
</script>

</body>
</html>

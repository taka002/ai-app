<!-- 省略なしフル -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
/* そのまま */
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:linear-gradient(135deg,#6ec6ff,#a0e0ff);height:100vh;display:flex;flex-direction:column;}
#character{height:30vh;}
#character img{width:100%;height:100%;object-fit:cover;}
#infoBar{text-align:center;font-size:13px;padding:6px;background:rgba(255,255,255,0.7);}
#chat{flex:1;overflow-y:auto;padding:10px;padding-bottom:100px;}
.msg{max-width:85%;margin:8px;}
.user{margin-left:auto;text-align:right;}
.ai{text-align:left;}
.bubble{display:inline-block;padding:12px;border-radius:16px;background:#fff;}
.user .bubble{background:linear-gradient(135deg,#4facfe,#00c6ff);color:#fff;}
#bottom{position:fixed;bottom:0;width:100%;background:#fff;padding:8px;}
#controls{display:flex;gap:6px;max-width:600px;margin:auto;}
#input{flex:1;padding:10px;border-radius:20px;border:none;}
#sendBtn,#micBtn{width:44px;height:44px;border-radius:50%;border:none;color:#fff;}
#sendBtn{background:#0072ff;}
#micBtn{background:#ff4081;}
#fab{position:fixed;right:10px;bottom:90px;}
#setBtn{width:50px;height:50px;border-radius:50%;border:none;background:#333;color:#fff;}
#modal{position:fixed;width:100%;height:100%;display:none;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
#modalContent{background:#222;color:#fff;padding:20px;border-radius:12px;width:90%;}
img.preview{max-width:200px;border-radius:10px;margin-top:10px;}
video{width:90%;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>

<div id="character"><img src="normal.png"></div>
<div id="infoBar"></div>
<div id="chat"></div>

<div id="bottom">
<div id="controls">
<input id="input">
<button id="micBtn">🎤</button>
<button id="sendBtn">➤</button>
</div>
</div>

<div id="fab">
<button onclick="openSettings()">⚙</button>
</div>

<input type="file" id="imageInput" accept="image/*" style="display:none">

<div id="modal">
<div id="modalContent">
Geminiキー<input id="geminiKey">
<button onclick="openCamera()">📷カメラ</button>
<button onclick="openGallery()">🖼画像</button>
<button onclick="analyzeImage()">🤖画像解析</button>
<button onclick="saveSettings()">保存</button>
</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let lastImageBase64="";

/* メッセージ */
function addMessage(text,cls){
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML=`<div class="bubble">${text}</div>`;
  chat.appendChild(div);
}

/* カメラ（背面） */
async function openCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    const video=document.createElement("video");
    video.autoplay=true;
    video.srcObject=stream;
    chat.appendChild(video);
  }catch{alert("カメラ許可");}
}

/* 画像 */
function openGallery(){
  imageInput.click();
}

imageInput.addEventListener("change",e=>{
  const file=e.target.files[0];
  const reader=new FileReader();
  reader.onload=ev=>{
    lastImageBase64=ev.target.result.split(",")[1];
    addMessage(`<img src="${ev.target.result}" class="preview">`,"ai");
  };
  reader.readAsDataURL(file);
});

/* Gemini解析 */
async function analyzeImage(){
  if(!lastImageBase64){addMessage("画像選択して","ai");return;}
  const key=localStorage.getItem("geminiKey");

  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      contents:[{
        parts:[
          {text:"この画像を詳しく説明して"},
          {inline_data:{mime_type:"image/jpeg",data:lastImageBase64}}
        ]
      }]
    })
  });

  const data=await res.json();
  const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"失敗";
  addMessage(text,"ai");
}

/* 保存 */
function saveSettings(){
  localStorage.setItem("geminiKey",geminiKey.value);
  modal.style.display="none";
}
function openSettings(){
  modal.style.display="flex";
}
</script>

</body>
</html>

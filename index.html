<!-- ★変更点：音声コマンド・ナビ・天気更新 追加済み 完全版 -->
<script>

/* ===== コマンド処理 ===== */
function handleVoiceCommand(text){

text = text.toLowerCase();

/* ニュース */
if(text.includes("ニュース")){
openNews();
return true;
}

/* 地図 */
if(text.includes("地図") || text.includes("マップ")){
openMap();
return true;
}

/* 乗換 */
if(text.includes("乗換") || text.includes("電車")){
openTransit();
return true;
}

/* LINE */
if(text.includes("line")){
openLine();
return true;
}

/* 家ナビ */
if(text.includes("家まで") || text.includes("帰る")){
openHomeNav();
return true;
}

/* 予定 */
if(text.includes("予定") || text.includes("スケジュール")){
openCalendar();
return true;
}

/* 天気 */
if(text.includes("天気")){
refreshWeather();
return true;
}

return false;
}

/* ===== 家ナビ ===== */
function openHomeNav(){

const home = localStorage.getItem("homeAddress");

if(!home){
const inputHome = prompt("自宅の住所を入力してください");
if(!inputHome) return;

localStorage.setItem("homeAddress", inputHome);
window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(inputHome)}`);
return;
}

window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(home)}`);
}

/* ===== 天気更新 ===== */
function refreshWeather(){
add("天気を更新します","ai");
getLocation();
}

/* ===== 音声入力（強化版） ===== */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
const recognition = new SpeechRecognition();
recognition.lang="ja-JP";

document.getElementById("micBtn").onclick=()=>{
recognition.start();
};

recognition.onresult=(e)=>{
const text = e.results[0][0].transcript;

add("🎤 "+text,"user");

/* コマンド優先 */
if(handleVoiceCommand(text)){
speak("了解です");
return;
}

/* 通常会話 */
input.value=text;
send();
};
}

/* ===== 起動時さらに優しく ===== */
window.onload=()=>{

const g = greeting();
add(g,"ai");
speak(g);

/* 履歴 */
history.forEach(h=>{
add(h.content, h.role==="user"?"user":"ai");
});

/* 天気 */
getLocation();

/* 追加一言 */
setTimeout(()=>{
const msg="今日も無理せずいきましょうね";
add(msg,"ai");
speak(msg);
},1500);
};

</script>

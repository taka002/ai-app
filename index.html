<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
height:100dvh;
overflow:hidden;
}

/* キャラ */
#character{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
}

/* 吹き出し（さらに下へ） */
#bubble{
position:absolute;
bottom:140px; /* 🔥さらに下げた */
left:50%;
transform:translateX(-50%);
width:92%;
max-width:92%;
background:rgba(255,255,255,0.9);
border-radius:25px;
padding:14px;
font-size:16px;
line-height:1.4;
text-align:center;
backdrop-filter:blur(8px);
z-index:5;
}

/* しっぽ（口元寄り＋逆向き） */
#bubble::after{
content:"";
position:absolute;
bottom:-10px;
left:50%;
transform:translateX(-50%) rotate(225deg); /* 🔥逆向き */
width:22px;
height:22px;
background:rgba(255,255,255,0.9);
}

/* 入力エリア（少し上げて干渉回避） */
#inputArea{
position:fixed;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
align-items:center;
gap:6px;
padding:6px 8px calc(env(safe-area-inset-bottom) + 6px);
background:rgba(255,255,255,0.95);
border-radius:18px;
z-index:10;
bottom:50px; /* 🔥ボタンと被らない */
}

/* 小型化 */
#input{
flex:1;
min-width:0;
height:34px;
padding:0 8px;
border-radius:16px;
border:none;
font-size:13px;
background:#eee;
}

#send{
height:34px;
padding:0 12px;
border:none;
border-radius:999px;
background:#4da6ff;
color:white;
font-size:13px;
}

#mic{
width:34px;
height:34px;
border-radius:50%;
border:none;
background:#eee;
font-size:14px;
}

/* 🔥最下部 横並び */
#settingsBtn,#appBtn{
position:fixed;
bottom:10px;
width:36px;
height:36px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:20;
font-size:16px;
}

/* 中央寄せ */
#settingsBtn{
left:calc(50% - 45px);
}

#appBtn{
left:calc(50% + 10px);
}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">どうしたのかな？話してくれると嬉しいな😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 長期記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");

function saveMemory(user, ai){
  memory.push({user, ai});
  if(memory.length > 20) memory.shift();
  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== 設定 ===== */
document.getElementById("settingsBtn").onclick = ()=>{
  const key = prompt("APIキーを入力");
  if(key){
    localStorage.setItem("apiKey", key);
    API_KEY = key;
    alert("保存したよ！");
  }
};

/* ===== 全画像 ===== */
const emotionGroups = {
  happy:["happy.png","smile.png","applause.png","impressed.png"],
  sad:["sad.png","cry.png"],
  anger:["anger.png","irritation.png"],
  anxiety:["anxiety.png","panic.png"],
  shy:["shy.png","embarrassed.png"],
  surprise:["surprise.png"],
  thinking:["curious.png","focused.png","explaining.png"],
  agree:["agree.png"],
  disagree:["disagree.png","refuse.png"],
  calm:["relieved.png","normal.png"],
  tired:["sleepy.png","hesitation.png"],
  action:["hold.png","typing.png"],
  special:["glitch.png","robot.png"]
};

function getEmotionGroup(text){
  if(/ありがとう|助か|嬉|最高/.test(text)) return "happy";
  if(/悲|辛|しんど|落ち込/.test(text)) return "sad";
  if(/泣/.test(text)) return "sad";
  if(/怒|イライラ|ムカ/.test(text)) return "anger";
  if(/不安|怖|心配/.test(text)) return "anxiety";
  if(/無理|やばい/.test(text)) return "anxiety";
  if(/恥|照/.test(text)) return "shy";
  if(/え|！？|まじ/.test(text)) return "surprise";
  if(/考え|どう思う|説明/.test(text)) return "thinking";
  if(/そうだね|いいね/.test(text)) return "agree";
  if(/違う|やだ/.test(text)) return "disagree";
  if(/安心|よかった/.test(text)) return "calm";
  if(/眠い|疲れ/.test(text)) return "tired";
  return "calm";
}

let lastImage = "";

function hashString(str){
  let hash=0;
  for(let i=0;i<str.length;i++){
    hash = str.charCodeAt(i) + ((hash<<5)-hash);
  }
  return hash;
}

function pickImage(list, text){
  let index = Math.abs(hashString(text)) % list.length;
  let selected = list[index];
  if(selected === lastImage){
    index = (index + 1) % list.length;
    selected = list[index];
  }
  lastImage = selected;
  return selected;
}

function changeEmotion(text){
  const group = getEmotionGroup(text);
  const list = emotionGroups[group] || ["normal.png"];
  const next = pickImage(list, text);
  document.getElementById("character").src = next;
}

function startThinking(){
  const bubble=document.getElementById("bubble");
  let dots=0;
  return setInterval(()=>{
    dots=(dots+1)%4;
    bubble.innerText="・・・".slice(0,dots+1);
  },400);
}

async function typeText(text){
  const bubble=document.getElementById("bubble");
  if(text.length>60){
    bubble.style.fontSize="14px";
  }else{
    bubble.style.fontSize="16px";
  }
  bubble.innerText="";
  for(let i=0;i<text.length;i++){
    bubble.innerText+=text[i];
    await new Promise(r=>setTimeout(r,20));
  }
}

async function getAIResponse(message){
  if(!API_KEY) return "設定からAPIキー入れてね🙏";

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:"優しく寄り添う女性キャラ。自然な会話をする。"},
        ...memory.map(m=>[
          {role:"user",content:m.user},
          {role:"assistant",content:m.ai}
        ]).flat(),
        {role:"user",content:message}
      ]
    })
  });

  const data=await res.json();
  return data.choices[0].message.content;
}

async function send(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text) return;

  input.value="";
  document.getElementById("character").src="typing.png";

  const thinking=startThinking();

  try{
    const reply=await getAIResponse(text);

    clearInterval(thinking);
    await typeText(reply);

    changeEmotion(reply);
    saveMemory(text, reply);

  }catch{
    clearInterval(thinking);
    document.getElementById("bubble").innerText="エラー...";
  }
}

/* 音声入力 */
const micBtn = document.getElementById("mic");
if ('webkitSpeechRecognition' in window) {
  const rec=new webkitSpeechRecognition();
  rec.lang='ja-JP';
  micBtn.onclick=()=>rec.start();
  rec.onresult=e=>{
    input.value=e.results[0][0].transcript;
    send();
  };
}else{
  micBtn.onclick=()=>alert("非対応");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}

html,body{
  margin:0;
  height:100%;
  font-family:sans-serif;
  overflow:hidden;
}

#app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* 上 */
#avatarArea{
  height:22%;
}
#avatar{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 中 */
#chatArea{
  flex:1;
  overflow-y:auto;
  padding:10px;
  padding-bottom:130px; /* ←重要 */
  background:#eef3ff;
}

/* 下（固定🔥） */
#bottomArea{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#ddd;
  padding:8px;
  padding-bottom:env(safe-area-inset-bottom);
}

/* 入力 */
#controls{
  display:flex;
  align-items:center;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}

/* ボタン */
button{
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
  font-size:13px;
}

#settingsBtn{
  width:100%;
  margin-top:6px;
  background:#333;
}

/* メッセージ */
.msg{
  margin:8px 0;
  padding:12px;
  border-radius:12px;
  max-width:80%;
}

.user{background:#4facfe;color:#fff;margin-left:auto;}
.ai{background:#fff;}

/* 画像 */
.chat-img{
  max-width:65%;
  border-radius:10px;
  display:block;
  margin-left:auto;
}

/* モーダル */
#modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

#modalContent{
  background:#222;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-height:80%;
  overflow-y:auto;
  color:white;
}

/* 入力 */
.modalInput{
  width:100%;
  margin:8px 0;
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:14px;
}

#promptInput{
  height:100px;
}

/* スイッチ */
.switch{
  position:relative;
  display:inline-block;
  width:50px;
  height:25px;
}
.switch input{display:none;}

.slider{
  position:absolute;
  background:#ccc;
  border-radius:25px;
  width:100%;height:100%;
}

.slider:before{
  content:"";
  position:absolute;
  height:18px;width:18px;
  left:4px;top:3px;
  background:white;
  border-radius:50%;
  transition:0.3s;
}

input:checked + .slider{
  background:#4facfe;
}

input:checked + .slider:before{
  transform:translateX(24px);
}
</style>
</head>

<body>

<div id="app">

<div id="avatarArea">
  <img id="avatar" src="normal.png">
</div>

<div id="chatArea"></div>

<div id="bottomArea">
  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button onclick="send()">送信</button>
    <button onclick="startCamera()">📷</button>
    <button onclick="takePhoto()">📸</button>
  </div>
  <button id="settingsBtn" onclick="openModal()">⚙️設定</button>
</div>

</div>

<!-- 設定 -->
<div id="modal">
  <div id="modalContent">

    <div>APIキー</div>
    <input id="apiInput" class="modalInput">

    <div>プロンプト（性格）</div>
    <textarea id="promptInput" class="modalInput"></textarea>

    <div>音声</div>
    <label class="switch">
      <input type="checkbox" id="voiceToggle">
      <span class="slider"></span>
    </label>

    <br><br>
    <button onclick="saveSettings()">保存</button>

  </div>
</div>

<video id="video" autoplay playsinline style="display:none;"></video>

<script>

let apiKey="";
let voiceMode=false;

let basePrompt=`
あなたは優しい先生です。
小学生でも分かるように説明してください。
短く・簡単・例えあり。
`;

function addMessage(text,type){
  const chat=document.getElementById("chatArea");
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;

  if(type==="ai" && voiceMode){
    speak(text);
  }
}

function speak(text){
  const uttr=new SpeechSynthesisUtterance(text);
  uttr.lang="ja-JP";
  speechSynthesis.speak(uttr);
}

function addImage(src){
  const chat=document.getElementById("chatArea");
  const img=document.createElement("img");
  img.src=src;
  img.className="chat-img";
  chat.appendChild(img);
}

async function askGPT(text){

  if(!apiKey) return "APIキー未設定";

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:basePrompt},
        {role:"user",content:text}
      ]
    })
  });

  const data=await res.json();
  return data.choices[0].message.content;
}

async function send(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text)return;

  addMessage(text,"user");

  const reply=await askGPT(text);
  addMessage(reply,"ai");

  input.value="";
}

/* カメラ */
let stream;

async function startCamera(){
  stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });
  video.srcObject=stream;
}

function takePhoto(){

  const canvas=document.createElement("canvas");
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  const ctx=canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  const img=canvas.toDataURL();

  addImage(img);
  analyzeImage(img);
}

/* 画像解析 */
async function analyzeImage(img){

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:basePrompt},
        {
          role:"user",
          content:[
            {type:"text",text:"この画像を分かりやすく説明して"},
            {type:"image_url",image_url:{url:img}}
          ]
        }
      ]
    })
  });

  const data=await res.json();
  addMessage(data.choices[0].message.content,"ai");
}

/* 設定 */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function saveSettings(){
  apiKey=document.getElementById("apiInput").value;
  basePrompt=document.getElementById("promptInput").value || basePrompt;
  voiceMode=document.getElementById("voiceToggle").checked;
  document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>

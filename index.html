<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;}

#character{
position:absolute;top:0;left:0;width:100%;height:100%;
object-fit:cover;object-position:center 28%;transform:scale(1.08);
transition:opacity 0.3s ease;
}

/* 吹き出し（🔥切れない版） */
#bubble{
position:absolute;
bottom:65px;
left:50%;
transform:translateX(-50%) translateY(10px);

width:88%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
border-radius:20px;

padding:10px 12px;
font-size:14px;
line-height:1.5;
text-align:center;
z-index:5;

/* 🔥修正 */
max-height:none;
overflow:visible;

word-break:break-word;

opacity:0;
transition:all 0.4s ease;
}

#bubble.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

#inputArea{
position:fixed;left:50%;transform:translateX(-50%);
width:92%;display:flex;gap:6px;
bottom:50px;
}

#mic{width:34px;height:34px;border-radius:50%;border:none;}
#input{flex:1;height:34px;border-radius:16px;border:none;}
#send{height:34px;border-radius:999px;background:#4da6ff;color:white;border:none;}

#settingsBtn,#appBtn{
position:fixed;bottom:10px;width:36px;height:36px;border-radius:50%;
background:white;display:flex;align-items:center;justify-content:center;
}
#settingsBtn{left:calc(50% - 45px);}
#appBtn{left:calc(50% + 10px);}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble" class="show">どうしたのかな？😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send">送信</button>
</div>

<script>

/* ===== 初期 ===== */
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");
function saveMemory(u,a){
memory.push({user:u,ai:a});
if(memory.length>20) memory.shift();
localStorage.setItem("memory",JSON.stringify(memory));
}

/* ===== 表情切替（🔥確実版） ===== */
function changeFace(src){

const img = document.getElementById("character");

/* 同じ画像でも強制切替 */
img.style.opacity = 0;

setTimeout(()=>{
img.src = src + "?t=" + Date.now(); // キャッシュ回避
img.style.opacity = 1;
},150);

}

/* ===== 吹き出し ===== */
function showBubble(text){
bubble.classList.remove("show");
setTimeout(()=>{
bubble.innerText = text;
bubble.classList.add("show");
},150);
}

/* ===== 音声 ===== */
async function speak(text){
if(localStorage.getItem("voice")==="off") return;

const uttr = new SpeechSynthesisUtterance(text);
uttr.lang="ja-JP";
uttr.pitch = 1.2;
speechSynthesis.speak(uttr);
}

/* ===== AI ===== */
async function getAIResponse(msg){
if(!API_KEY) return "APIキー入れてね";

const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:msg}]
})
});

const d=await r.json();
return d.choices?.[0]?.message?.content || "うまく話せない…";
}

/* ===== 送信（🔥完全修正版） ===== */
async function send(){

const text=input.value;
if(!text.trim()){
showBubble("何か話して😊");
return;
}

input.value="";

/* thinking */
showBubble("考え中…");
changeFace("thinking.png");

/* 🔥最低表示時間 */
const start = Date.now();

let reply = await getAIResponse(text);

/* 🔥しっかり見せる */
const wait = Math.max(0, 1200 - (Date.now() - start));
await new Promise(r => setTimeout(r, wait));

/* 戻す */
changeFace("normal.png");

/* 🔥自然な文章（切れにくい） */
if(reply.length > 80){
const cut = reply.slice(0,80);
const last = cut.lastIndexOf("。");
reply = last > 20 ? cut.slice(0,last+1) : cut + "…";
}

/* 表示 */
showBubble(reply);

/* 音声 */
speak(reply);

/* 保存 */
saveMemory(text,reply);
}

document.getElementById("send").onclick = send;

/* ===== 音声入力 ===== */
if('webkitSpeechRecognition' in window){
const r=new webkitSpeechRecognition();
r.lang='ja-JP';
mic.onclick=()=>r.start();
r.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}else{
mic.onclick=()=>alert("非対応");
}

</script>

</body>
</html>

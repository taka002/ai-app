<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
  background:#eef3ff;
}

/* 全体 */
#app{
  display:flex;
  flex-direction:column;
  height:100%;
}

/* 上（固定） */
#avatarArea{
  height:25%;
  flex-shrink:0;
  background:#dbe9ff;
}

#avatar{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 中（スクロール） */
#chatArea{
  height:45%;
  overflow-y:auto;
  padding:8px;
}

/* 吹き出し */
.msg{
  margin:6px 0;
  padding:10px;
  border-radius:10px;
  max-width:80%;
  font-size:14px;
}

.user{
  background:#4facfe;
  color:white;
  margin-left:auto;
}

.ai{
  background:white;
}

/* 下（固定） */
#inputArea{
  height:30%;
  flex-shrink:0;
  background:#ddd;
  padding:8px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* 入力 */
#controls{
  display:flex;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}

button{
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
}

/* 設定 */
#settingsBtn{
  background:#333;
  width:100%;
}
</style>
</head>

<body>

<div id="app">

<!-- 上 -->
<div id="avatarArea">
  <img id="avatar" src="normal.png">
</div>

<!-- 中 -->
<div id="chatArea"></div>

<!-- 下 -->
<div id="inputArea">

  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button onclick="send()">送信</button>
    <button onclick="openCamera()">📷</button>
  </div>

  <button id="settingsBtn" onclick="openSettings()">⚙️ 設定</button>

</div>

</div>

<script>

function addMessage(text,type){
  const chat=document.getElementById("chatArea");
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function changeAvatar(name){
  document.getElementById("avatar").src=name;
}

function aiReply(text){

  let reply="はい！承知しました！";
  let img="normal.png";

  if(text.includes("疲れた")){
    reply="お疲れ様です！無理しないでください！";
    img="relieved.png";
  }

  if(text.includes("楽しい")){
    reply="いいですね！楽しみましょう！";
    img="smile.png";
  }

  if(text.includes("悲しい")){
    reply="大丈夫です、そばにいますよ";
    img="sad.png";
  }

  changeAvatar(img);
  return reply;
}

function send(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text)return;

  addMessage(text,"user");

  setTimeout(()=>{
    addMessage(aiReply(text),"ai");
  },300);

  input.value="";
}

function openCamera(){
  alert("次でカメラ🔥");
}

function openSettings(){
  alert("設定ここ🔥");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
height:100dvh;
overflow:hidden;
}

#character{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
}

#bubble{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:92%;
background:rgba(255,255,255,0.9);
border-radius:25px;
padding:14px;
font-size:16px;
line-height:1.4;
text-align:center;
backdrop-filter:blur(8px);
z-index:5;
}

#bubble::after{
content:"";
position:absolute;
top:-12px;
left:50%;
transform:translateX(-50%) rotate(45deg);
width:22px;
height:22px;
background:rgba(255,255,255,0.9);
}

#inputArea{
position:fixed;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
align-items:center;
gap:6px;
padding:8px 10px calc(env(safe-area-inset-bottom) + 10px);
background:rgba(255,255,255,0.95);
border-radius:20px;
z-index:10;
bottom:0;
}

#input{
flex:1;
height:38px;
padding:0 10px;
border-radius:18px;
border:none;
font-size:14px;
background:#eee;
}

#send{
height:38px;
padding:0 14px;
border:none;
border-radius:999px;
background:#4da6ff;
color:white;
font-size:14px;
}

#mic{
width:38px;
height:38px;
border-radius:50%;
border:none;
background:#eee;
font-size:16px;
}

#settingsBtn,#appBtn{
position:fixed;
bottom:60px;
width:44px;
height:44px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:20;
font-size:18px;
}

#settingsBtn{left:20px;}
#appBtn{right:20px;}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">どうしたのかな？話してくれると嬉しいな😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = sessionStorage.getItem("apiKey") || "";

/* ===== 初回API入力 ===== */
if(!API_KEY){
  setTimeout(()=>{
    const key = prompt("APIキーを入力");
    if(key){
      sessionStorage.setItem("apiKey", key);
      API_KEY = key;
    }
  },500);
}

/* ===== 長期記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");

function saveMemory(user, ai){
  memory.push({user, ai});
  if(memory.length > 20) memory.shift();
  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== 設定（APIキー） ===== */
document.getElementById("settingsBtn").onclick = ()=>{
  const key = prompt("APIキーを入力");
  if(key){
    sessionStorage.setItem("apiKey", key);
    API_KEY = key;
    alert("保存したよ！（このタブのみ有効）");
  }
};

/* ===== 表情 ===== */
const emotionGroups = {
  happy:["happy.png","smile.png"],
  sad:["sad.png","cry.png"],
  anger:["anger.png"],
  anxiety:["anxiety.png"],
  calm:["normal.png"]
};

function getEmotionGroup(text){
  if(/ありがとう|嬉/.test(text)) return "happy";
  if(/悲|辛|泣/.test(text)) return "sad";
  if(/怒/.test(text)) return "anger";
  if(/不安|怖/.test(text)) return "anxiety";
  return "calm";
}

function changeEmotion(text){
  const list = emotionGroups[getEmotionGroup(text)];
  const img = list[Math.floor(Math.random()*list.length)];
  document.getElementById("character").src = img;
}

/* ===== 思考中 ===== */
function startThinking(){
  const bubble=document.getElementById("bubble");
  let dots=0;
  return setInterval(()=>{
    dots=(dots+1)%4;
    bubble.innerText="・・・".slice(0,dots+1);
  },400);
}

/* ===== 文字表示 ===== */
async function typeText(text){
  const bubble=document.getElementById("bubble");
  bubble.innerText="";
  for(let i=0;i<text.length;i++){
    bubble.innerText+=text[i];
    await new Promise(r=>setTimeout(r,15));
  }
}

/* ===== TTS ===== */
async function speak(text){
  if(!API_KEY) return;

  try{
    const res = await fetch("https://api.openai.com/v1/audio/speech",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+API_KEY,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"gpt-4o-mini-tts",
        voice:"alloy",
        input:text
      })
    });

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    new Audio(url).play();

  }catch(e){
    console.log("TTSエラー", e);
  }
}

/* ===== API ===== */
async function getAIResponse(message){

  if(!API_KEY) return "設定からAPIキー入れてね🙏";

  const history = [];
  memory.forEach(m=>{
    history.push({role:"user",content:m.user});
    history.push({role:"assistant",content:m.ai});
  });

  try{
    const res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+API_KEY
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:"短く自然に話す女性キャラ。少し甘め"},
          ...history,
          {role:"user",content:message}
        ]
      })
    });

    const data = await res.json();
    return data.choices?.[0]?.message?.content || "うまく返せなかった💦";

  }catch(e){
    return "通信エラー…";
  }
}

/* ===== 送信 ===== */
async function send(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text) return;

  input.value="";
  document.getElementById("character").src="typing.png";

  const thinking=startThinking();

  const reply = await getAIResponse(text);

  clearInterval(thinking);
  await typeText(reply);
  changeEmotion(reply);
  speak(reply); // 🔥 音声
  saveMemory(text, reply);
}

/* ===== 音声入力 ===== */
const micBtn = document.getElementById("mic");
let recognition;

if ('webkitSpeechRecognition' in window) {

  recognition = new webkitSpeechRecognition();
  recognition.lang = 'ja-JP';

  micBtn.onclick = () => {
    recognition.start();
    micBtn.innerText="🎙️";
    micBtn.style.background="#ffcccc";
  };

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    document.getElementById("input").value=text;
    micBtn.innerText="🎤";
    micBtn.style.background="#eee";
    send();
  };

  recognition.onerror = ()=>{
    micBtn.innerText="🎤";
    micBtn.style.background="#eee";
  };

  recognition.onend = ()=>{
    micBtn.innerText="🎤";
    micBtn.style.background="#eee";
  };

}else{
  micBtn.onclick = ()=>{
    alert("この端末は音声入力に対応してないよ🙏");
  };
}
</script>

</body>
</html>

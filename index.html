<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
overflow:hidden;
}

/* ===== キャラ ===== */
#characterWrap{
position:fixed;
width:100%;
height:100%;
z-index:0;
}

#character{
width:100%;
height:100%;
object-fit:cover;
transition:0.3s;
}

/* ===== UI ===== */
#ui{
position:relative;
z-index:10;
height:100dvh;
display:flex;
flex-direction:column;
justify-content:flex-end;
}

/* 吹き出し */
#bubble{
background:rgba(255,255,255,0.9);
border-radius:25px;
padding:18px;
margin:15px;
font-size:18px;
min-height:60px;
}

/* 入力 */
#inputArea{
display:flex;
gap:8px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
padding:8px;
border-radius:30px;
margin:10px;
}

#inputArea input{
flex:1;
padding:12px;
border:none;
border-radius:20px;
background:transparent;
outline:none;
font-size:16px;
}

#inputArea button{
padding:10px 18px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#6ec6ff,#4fa9ff);
color:#fff;
font-weight:bold;
}

/* ===== ボタン ===== */

/* 左：設定 */
#menuBtn{
position:fixed;
top:15px;
left:15px;
width:50px;
height:50px;
border-radius:50%;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:#555;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.2s;
z-index:20;
}

/* 右：アプリ */
#appBtn{
position:fixed;
top:15px;
right:15px;
width:50px;
height:50px;
border-radius:50%;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:#555;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.2s;
z-index:20;
}

#menuBtn:active,
#appBtn:active{
transform:scale(0.9);
}

/* ===== 設定画面 ===== */
#settings{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:#fff;
z-index:100;
display:none;
padding:20px;
}

#settings input{
width:100%;
margin-top:10px;
padding:10px;
border-radius:10px;
border:none;
}

/* ===== モジャモジャ ===== */
.thinking{
font-size:22px;
letter-spacing:3px;
}

.dot{
display:inline-block;
animation:bounce 1.2s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
.dot:nth-child(4){animation-delay:0.6s;}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);opacity:0.3;}
40%{transform:translateY(-10px);opacity:1;}
}

</style>
</head>

<body>

<!-- キャラ -->
<div id="characterWrap">
<img id="character" src="normal.png">
</div>

<!-- UI -->
<div id="ui">

<div id="bubble">こんにちは😊</div>

<div id="inputArea">
<input id="input" placeholder="話しかけて">
<button onclick="send()">送信</button>
</div>

</div>

<!-- ボタン -->
<div id="menuBtn" onclick="openSettings()">⚙️</div>
<div id="appBtn">📱</div>

<!-- 設定 -->
<div id="settings">
<h2>設定</h2>
APIキー
<input id="apiKeyInput" placeholder="sk-...">
<br><br>
<button onclick="saveSettings()">保存</button>
<button onclick="closeSettings()">閉じる</button>
</div>

<script>

/* ===== APIキー ===== */
let apiKey = localStorage.getItem("apiKey") || "";
document.getElementById("apiKeyInput").value = apiKey;

function saveSettings(){
  apiKey = document.getElementById("apiKeyInput").value;
  localStorage.setItem("apiKey", apiKey);
  alert("保存したよ");
}

function openSettings(){
  document.getElementById("settings").style.display="block";
}

function closeSettings(){
  document.getElementById("settings").style.display="none";
}

/* ===== モジャモジャ ===== */
function startThinking(){
  document.getElementById("bubble").innerHTML = `
    <div>ちょっと待ってね…</div>
    <span class="thinking">
      <span class="dot">・</span>
      <span class="dot">・</span>
      <span class="dot">・</span>
    </span>
  `;
}

/* ===== 感情 ===== */
function changeEmotion(text){

  let img="normal.png";

  if(text.includes("ありがとう")) img="happy.png";
  else if(text.includes("疲れ")) img="sad.png";
  else if(text.includes("不安")) img="anxiety.png";
  else if(text.includes("ごめん")) img="apologize.png";
  else if(text.includes("怒")) img="anger.png";
  else if(text.includes("眠い")) img="sleepy.png";
  else if(text.includes("すごい")) img="impressed.png";
  else if(text.includes("なんで")) img="curious.png";
  else if(text.includes("嫌")) img="refuse.png";
  else if(text.includes("嬉しい")) img="smile.png";
  else if(text.includes("びっくり")) img="surprise.png";

  document.getElementById("character").src = img;
}

/* ===== ChatGPT ===== */
async function getAIResponse(text){

  if(!apiKey){
    return "設定でAPIキー入れてね😊";
  }

  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {
          role:"system",
          content:"あなたは優しくて甘えた性格の女の子AI。短く会話してください。"
        },
        {
          role:"user",
          content:text
        }
      ]
    })
  });

  const data = await res.json();
  return data.choices?.[0]?.message?.content || "うまく話せなかった…";
}

/* ===== 送信 ===== */
async function send(){

  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  input.value="";

  // typing
  document.getElementById("character").src = "typing.png";

  // モジャモジャ
  startThinking();

  try{
    const reply = await getAIResponse(text);

    document.getElementById("bubble").innerText = reply;

    changeEmotion(reply);

  }catch(e){
    document.getElementById("bubble").innerText = "通信エラー...";
    document.getElementById("character").src = "glitch.png";
  }
}

</script>

</body>
</html>

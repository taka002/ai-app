<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
height:100dvh;
overflow:hidden;
}

/* キャラ */
#character{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
}

/* 吹き出し（横だけ拡張） */
#bubble{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:92%;
background:rgba(255,255,255,0.9);
border-radius:25px;
padding:14px;
font-size:16px;
line-height:1.4;
text-align:center;
backdrop-filter:blur(8px);
z-index:5;
}

/* しっぽ */
#bubble::after{
content:"";
position:absolute;
top:-12px;
left:50%;
transform:translateX(-50%) rotate(45deg);
width:22px;
height:22px;
background:rgba(255,255,255,0.9);
}

/* 入力エリア */
#inputArea{
position:fixed;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
align-items:center;
gap:6px;
padding:8px 10px calc(env(safe-area-inset-bottom) + 10px);
background:rgba(255,255,255,0.95);
border-radius:20px;
z-index:10;
bottom:0;
}

#input{
flex:1;
min-width:0;
height:38px;
padding:0 10px;
border-radius:18px;
border:none;
font-size:14px;
background:#eee;
}

#send{
height:38px;
padding:0 14px;
border:none;
border-radius:999px;
background:#4da6ff;
color:white;
font-size:14px;
}

#mic{
width:38px;
height:38px;
border-radius:50%;
border:none;
background:#eee;
font-size:16px;
}

/* ボタン */
#settingsBtn,#appBtn{
position:fixed;
bottom:60px;
width:44px;
height:44px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:20;
font-size:18px;
}

#settingsBtn{left:20px;}
#appBtn{right:20px;}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">どうしたのかな？話してくれると嬉しいな😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 長期記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");

function saveMemory(user, ai){
  memory.push({user, ai});
  if(memory.length > 20) memory.shift();
  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== 設定 ===== */
document.getElementById("settingsBtn").onclick = ()=>{
  const key = prompt("APIキーを入力");
  if(key){
    localStorage.setItem("apiKey", key);
    API_KEY = key;
    alert("保存したよ！");
  }
};

/* ===== 表情グループ ===== */
const emotionGroups = {
  happy:["happy.png","smile.png","applause.png"],
  sad:["sad.png","cry.png"],
  anger:["anger.png","irritation.png"],
  anxiety:["anxiety.png","panic.png"],
  shy:["shy.png","embarrassed.png"],
  surprise:["surprise.png","impressed.png"],
  thinking:["curious.png","focused.png","explaining.png"],
  agree:["agree.png"],
  disagree:["disagree.png","refuse.png"],
  calm:["relieved.png","normal.png"],
  tired:["sleepy.png","hesitation.png"],
  other:["normal.png"]
};

/* ===== 感情分類 ===== */
function getEmotionGroup(text){
  if(/嬉|ありがとう/.test(text)) return "happy";
  if(/悲|辛|泣/.test(text)) return "sad";
  if(/怒|イライラ/.test(text)) return "anger";
  if(/不安|怖/.test(text)) return "anxiety";
  if(/恥|照/.test(text)) return "shy";
  if(/！？|え/.test(text)) return "surprise";
  if(/考え|説明/.test(text)) return "thinking";
  if(/そうだね/.test(text)) return "agree";
  if(/違う|やだ/.test(text)) return "disagree";
  if(/安心|よかった/.test(text)) return "calm";
  if(/眠い|どうしよう/.test(text)) return "tired";
  return "other";
}

/* ===== 被り防止 ===== */
let lastImage = "";

function hashString(str){
  let hash=0;
  for(let i=0;i<str.length;i++){
    hash = str.charCodeAt(i) + ((hash<<5)-hash);
  }
  return hash;
}

function pickImage(list, text){
  let index = Math.abs(hashString(text)) % list.length;
  let selected = list[index];

  if(selected === lastImage){
    index = (index + 1) % list.length;
    selected = list[index];
  }

  lastImage = selected;
  return selected;
}

/* ===== 表情変更 ===== */
function changeEmotion(text){
  const group = getEmotionGroup(text);
  const list = emotionGroups[group];
  const next = pickImage(list, text);
  document.getElementById("character").src = next;
}

/* ===== 考え中 ===== */
function startThinking(){
  const bubble=document.getElementById("bubble");
  let dots=0;
  return setInterval(()=>{
    dots=(dots+1)%4;
    bubble.innerText="・・・".slice(0,dots+1);
  },400);
}

/* ===== 文字表示 ===== */
async function typeText(text){
  const bubble=document.getElementById("bubble");

  if(text.length>60){
    bubble.style.fontSize="14px";
  }else{
    bubble.style.fontSize="16px";
  }

  bubble.innerText="";
  for(let i=0;i<text.length;i++){
    bubble.innerText+=text[i];
    await new Promise(r=>setTimeout(r,20));
  }
}

/* ===== API ===== */
async function getAIResponse(message){
  if(!API_KEY) return "設定からAPIキー入れてね🙏";

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {
          role:"system",
          content:"優しく寄り添う女性キャラ。短く自然に会話。"
        },
        ...memory.map(m=>[
          {role:"user",content:m.user},
          {role:"assistant",content:m.ai}
        ]).flat(),
        {role:"user",content:message}
      ]
    })
  });

  const data=await res.json();
  return data.choices[0].message.content;
}

/* ===== 送信 ===== */
async function send(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text) return;

  input.value="";
  document.getElementById("character").src="typing.png";

  const thinking=startThinking();

  try{
    const reply=await getAIResponse(text);
    clearInterval(thinking);
    await typeText(reply);
    changeEmotion(reply);
    saveMemory(text, reply);
  }catch{
    clearInterval(thinking);
    document.getElementById("bubble").innerText="エラー...";
  }
}

/* ===== 音声入力 ===== */
const micBtn = document.getElementById("mic");
let recognition;

if ('webkitSpeechRecognition' in window) {

  recognition = new webkitSpeechRecognition();
  recognition.lang = 'ja-JP';

  micBtn.onclick = () => {
    recognition.start();
    micBtn.innerText = "🎙️";
    micBtn.style.background = "#ffcccc";
  };

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
    micBtn.innerText = "🎤";
    micBtn.style.background = "#eee";
    send();
  };

  recognition.onerror = () => {
    micBtn.innerText = "🎤";
    micBtn.style.background = "#eee";
  };

  recognition.onend = () => {
    micBtn.innerText = "🎤";
    micBtn.style.background = "#eee";
  };

}else{
  micBtn.onclick = () => {
    alert("この端末は音声入力に対応してないよ🙏");
  };
}
</script>

</body>
</html>

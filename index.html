<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:60px;
}

header{height:28vh;}
header img{width:100%;height:100%;object-fit:cover;}

#infoBar{
text-align:center;
font-size:11px;
padding:4px;
background:rgba(255,255,255,0.6);
}

main{flex:1;overflow-y:auto;padding:10px;}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}

.bubble{
padding:10px;
border-radius:16px;
background:#fff;
}
.user .bubble{background:#0072ff;color:#fff;}

footer{
position:fixed;
bottom:0;width:100%;
background:#fff;
padding:6px;
display:flex;
justify-content:center;
}

#dock{
width:100%;
max-width:600px;
display:flex;
gap:6px;
}

#input{
width:58%;
height:36px;
border-radius:20px;
border:none;
padding:8px;
}

.dockBtn{
width:40px;height:36px;
border:none;border-radius:10px;
background:#eee;
}

#menu{
position:fixed;
bottom:-100%;
width:100%;
height:88%;
background:#111;
color:#fff;
display:flex;
flex-direction:column;
border-radius:20px 20px 0 0;
transition:.3s;
z-index:1000;
}
#menu.active{bottom:0;}

#menuTop{
flex:1;
overflow:auto;
padding:20px;
}

.menuInput{
width:100%;
height:44px;
border-radius:10px;
border:none;
padding:10px;
margin-bottom:10px;
}

.menuBtn{
width:100%;
height:44px;
border:none;
border-radius:10px;
margin-bottom:10px;
background:#444;
color:#fff;
}
</style>
</head>

<body>

<header>
<img id="avatar" src="normal.png">
</header>

<div id="infoBar"></div>
<main id="chat"></main>

<footer>
<div id="dock">
<input id="input" placeholder="話しかけてください">
<button class="dockBtn" onclick="send()">➤</button>
<button class="dockBtn" id="micBtn">🎤</button>
<button class="dockBtn" onclick="openMenu()">☰</button>
</div>
</footer>

<div id="menu">
<div id="menuTop">

<h3>設定</h3>

<input id="apiKey" class="menuInput" placeholder="APIキー">
<input id="userName" class="menuInput" placeholder="あなたの名前">
<input id="charName" class="menuInput" placeholder="キャラ名">

<textarea id="systemPrompt" class="menuInput" placeholder="キャラ設定"></textarea>

<input type="file" id="avatarUpload" class="menuInput">

<label>
<input type="checkbox" id="voiceToggle"> 音声ON
</label>

<select id="voiceType" class="menuInput">
<option value="normal">通常</option>
<option value="female">女性</option>
<option value="male">男性</option>
<option value="slow">ゆっくり</option>
<option value="veryslow">かなりゆっくり</option>
<option value="ultraslow">超ゆっくり</option>
</select>

<button class="menuBtn" onclick="saveSettings()">保存</button>
<button class="menuBtn" onclick="closeMenu()">閉じる</button>

</div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const menu = document.getElementById("menu");
const micBtn = document.getElementById("micBtn");
const avatar = document.getElementById("avatar");

/* 設定要素 */
const apiKey = document.getElementById("apiKey");
const userNameInput = document.getElementById("userName");
const charNameInput = document.getElementById("charName");
const systemPromptInput = document.getElementById("systemPrompt");
const voiceToggle = document.getElementById("voiceToggle");
const voiceTypeSelect = document.getElementById("voiceType");
const avatarUpload = document.getElementById("avatarUpload");

let voiceOn = localStorage.getItem("voiceOn") === "true";
let voiceType = localStorage.getItem("voiceType") || "normal";
let history = JSON.parse(localStorage.getItem("chatHistory")) || [];

/* ===== 表示 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* ===== 音声 ===== */
function speak(text){
if(!voiceOn)return;

speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(text);
u.lang="ja-JP";

switch(voiceType){
case "female": u.pitch=1.4; break;
case "male": u.pitch=0.7; break;
case "slow": u.rate=0.6; break;
case "veryslow": u.rate=0.45; break;
case "ultraslow": u.rate=0.3; break;
}

speechSynthesis.speak(u);
}

document.body.onclick=()=>speechSynthesis.resume();

/* ===== 名前呼び ===== */
function formatReply(text){
const name = localStorage.getItem("userName") || "";

if(!name) return text;

if(!localStorage.getItem("firstTalk")){
localStorage.setItem("firstTalk","1");
return name+"さん、"+text;
}

if(Math.random()<0.3){
return name+"さん、"+text;
}

return text;
}

/* ===== ChatGPT ===== */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

add("考え中...","ai");

const name=localStorage.getItem("userName")||"";
const charName=localStorage.getItem("charName")||"美咲";
const basePrompt=localStorage.getItem("systemPrompt")||"";

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{
role:"system",
content:`あなたの名前は${charName}です。ユーザーは${name}。\n${basePrompt}`
},
...history,
{role:"user",content:t}
]
})
});

const data=await res.json();
let reply=data.choices?.[0]?.message?.content||"エラー";

reply=formatReply(reply);

add(reply,"ai");
speak(reply);

history.push({role:"user",content:t});
history.push({role:"assistant",content:reply});
localStorage.setItem("chatHistory",JSON.stringify(history));
}

/* ===== 音声入力 ===== */
if(window.SpeechRecognition||window.webkitSpeechRecognition){
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const rec=new SR();
rec.lang="ja-JP";

micBtn.onclick=()=>rec.start();

rec.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}

/* ===== 画像変更 ===== */
avatarUpload.addEventListener("change", e=>{
const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();
reader.onload = ev=>{
avatar.src = ev.target.result;
localStorage.setItem("avatar", ev.target.result);
};
reader.readAsDataURL(file);
});

/* ===== メニュー ===== */
function openMenu(){
menu.classList.add("active");

apiKey.value = localStorage.getItem("apiKey") || "";
voiceToggle.checked = voiceOn;
voiceTypeSelect.value = voiceType;
systemPromptInput.value = localStorage.getItem("systemPrompt") || "";
userNameInput.value = localStorage.getItem("userName") || "";
charNameInput.value = localStorage.getItem("charName") || "";
}

function closeMenu(){
menu.classList.remove("active");
}

function saveSettings(){
localStorage.setItem("apiKey", apiKey.value);
localStorage.setItem("voiceOn", voiceToggle.checked);
localStorage.setItem("voiceType", voiceTypeSelect.value);
localStorage.setItem("systemPrompt", systemPromptInput.value);
localStorage.setItem("userName", userNameInput.value);
localStorage.setItem("charName", charNameInput.value);

voiceOn = voiceToggle.checked;
voiceType = voiceTypeSelect.value;

add("保存しました😊","ai");
closeMenu();
}

/* ===== 起動 ===== */
window.onload=()=>{
const name=localStorage.getItem("userName")||"";
const charName=localStorage.getItem("charName")||"美咲";

/* 画像復元 */
const saved=localStorage.getItem("avatar");
if(saved) avatar.src=saved;

if(name){
add(`${charName}だよ😊 ${name}さん、こんにちは！`,"ai");
}else{
add(`${charName}だよ😊 こんにちは！`,"ai");
}
};
</script>

</body>
</html>

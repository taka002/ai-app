<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI Ultimate</title>

<style>
body{margin:0;font-family:sans-serif;background:#cfe9ff;height:100vh;display:flex;flex-direction:column;}
#character{height:20vh;}
#character img{width:100%;height:100%;object-fit:cover;}

#infoBar{font-size:12px;text-align:center;padding:5px;background:#fff;}

#chat{flex:1;overflow-y:auto;padding:10px;}

.msg{max-width:80%;margin:8px;display:flex;flex-direction:column;}
.user{align-items:flex-end;margin-left:auto;}
.ai{align-items:flex-start;}

.bubble{padding:10px;border-radius:14px;background:#fff;}
.user .bubble{background:#4facfe;color:#fff;}

#bottom{position:fixed;bottom:0;width:100%;background:#fff;padding:8px;}
#controls{display:flex;gap:6px;}
#input{flex:1;padding:10px;border-radius:20px;border:none;}

#sendBtn{width:44px;height:44px;border-radius:50%;background:#0072ff;color:#fff;border:none;}

#fab{position:fixed;right:10px;bottom:90px;display:flex;flex-direction:column;gap:8px;}
#fab button{width:48px;height:48px;border-radius:50%;border:none;color:#fff;}
.cam{background:#ff9800;}
.img{background:#4caf50;}
.loc{background:#e91e63;}
.set{background:#333;}

#modal{position:fixed;width:100%;height:100%;display:none;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
#modalContent{background:#222;color:#fff;padding:20px;border-radius:12px;width:90%;}
</style>
</head>

<body>

<div id="character"><img src="normal.png"></div>
<div id="infoBar"></div>
<div id="chat"></div>

<div id="bottom">
<div id="controls">
<input id="input" placeholder="話しかけてください">
<button id="sendBtn">➤</button>
</div>
</div>

<div id="fab">
<button class="cam">📷</button>
<button class="img">🖼</button>
<button class="loc">📍</button>
<button class="set">⚙</button>
</div>

<input type="file" id="imageInput" accept="image/*" style="display:none">

<div id="modal">
<div id="modalContent">
APIキー<input id="apiKey">
Geminiキー<input id="geminiKey">
音声<input type="checkbox" id="voiceToggle">
<button id="saveBtn">保存</button>
</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let history=JSON.parse(localStorage.getItem("history")||"[]");

let locationText="位置未取得";
let weatherText="";

/* 情報バー */
setInterval(()=>{
const d=new Date();
document.getElementById("infoBar").innerHTML=
d.toLocaleString()+"<br>"+locationText+" "+weatherText;
},1000);

/* メッセージ */
function addMessage(text,cls){
const div=document.createElement("div");
div.className="msg "+cls;
div.innerHTML=`<div class="bubble">${text}</div>`;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;

if(cls==="ai"&&voiceOn){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang="ja-JP";
speechSynthesis.speak(u);
}
}

/* AI自動判定 */
async function askAI(text){

// 画像系ワードならGemini
if(text.includes("画像")||text.includes("写真")){
return await askGemini(text);
}
return await askOpenAI(text);
}

async function askOpenAI(text){
const key=localStorage.getItem("apiKey");
const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:text}]
})
});
const d=await res.json();
return d.choices?.[0]?.message?.content;
}

async function askGemini(text){
const key=localStorage.getItem("geminiKey");
const res=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`,
{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({contents:[{parts:[{text:text}]}]})
});
const d=await res.json();
return d.candidates?.[0]?.content?.parts?.[0]?.text;
}

/* 送信 */
async function sendMessage(){
const text=input.value.trim();
if(!text)return;

addMessage(text,"user");
input.value="";

let reply=await askAI(text);
addMessage(reply||"エラー","ai");
}

/* 位置 */
async function getLocation(){
navigator.geolocation.getCurrentPosition(async pos=>{
const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

const geo=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
const g=await geo.json();
locationText="📍"+(g.address.city||g.address.town||"不明");

const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const wd=await w.json();
weatherText="🌡"+wd.current_weather.temperature+"℃";
});
}

/* イベント */
sendBtn.onclick=sendMessage;
input.onkeydown=e=>{if(e.key==="Enter")sendMessage();};
document.querySelector(".loc").onclick=getLocation;
document.querySelector(".set").onclick=()=>modal.style.display="flex";
saveBtn.onclick=()=>{
localStorage.setItem("apiKey",apiKey.value);
localStorage.setItem("geminiKey",geminiKey.value);
voiceOn=voiceToggle.checked;
localStorage.setItem("voiceOn",voiceOn);
modal.style.display="none";
};
document.querySelector(".cam").onclick=()=>imageInput.click();
document.querySelector(".img").onclick=()=>imageInput.click();
</script>

</body>
</html>

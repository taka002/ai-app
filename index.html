<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* キャラ */
#character{height:22vh;}
#character img{width:100%;height:100%;object-fit:cover;}

/* 情報バー */
#infoBar{
  text-align:center;
  font-size:13px;
  padding:6px;
  background:rgba(255,255,255,0.7);
}

/* チャット */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  padding-bottom:90px;
}

.msg{max-width:85%;margin:8px;}
.user{margin-left:auto;text-align:right;}
.ai{text-align:left;}

.bubble{
  display:inline-block;
  padding:10px;
  border-radius:14px;
  background:#fff;
}
.user .bubble{
  background:linear-gradient(135deg,#4facfe,#00c6ff);
  color:#fff;
}

.meta{font-size:10px;color:#555;}

/* 入力 */
#bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:8px;
}
#controls{display:flex;gap:6px;max-width:600px;margin:auto;}
#input{flex:1;padding:10px;border-radius:20px;border:none;}

#sendBtn{
  width:44px;height:44px;border-radius:50%;
  border:none;color:#fff;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
}

/* 設定ボタン */
#fab{
  position:fixed;
  right:10px;
  bottom:80px;
}
#setBtn{
  width:50px;height:50px;border-radius:50%;
  border:none;color:#fff;
  background:#333;
}

/* モーダル */
#modal{
  position:fixed;width:100%;height:100%;
  display:none;background:rgba(0,0,0,0.5);
  justify-content:center;align-items:center;
}
#modalContent{
  background:#222;color:#fff;padding:20px;
  border-radius:12px;width:90%;
  max-height:80%;overflow:auto;
}
#modal input,#modal select,#modal button{
  width:100%;margin:6px 0;padding:10px;
}
</style>
</head>

<body>

<div id="character">
  <img src="normal.png">
</div>

<div id="infoBar"></div>

<div id="chat"></div>

<div id="bottom">
  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button id="sendBtn">➤</button>
  </div>
</div>

<div id="fab">
  <button id="setBtn" onclick="openSettings()">⚙</button>
</div>

<input type="file" id="imageInput" accept="image/*" style="display:none">

<!-- 設定 -->
<div id="modal">
<div id="modalContent">

<h3>🔑 API設定</h3>
ChatGPTキー<input id="apiKey">
Geminiキー<input id="geminiKey">
ElevenLabsキー<input id="elevenKey">

<h3>🎭 モード</h3>
<select id="mode">
<option value="normal">通常</option>
<option value="teacher">家庭教師</option>
<option value="counselor">カウンセラー</option>
<option value="medical">医療</option>
<option value="sales">営業</option>
<option value="secretary">秘書</option>
</select>

音声 <input type="checkbox" id="voiceToggle">

<hr>

<h3>⚙ 機能</h3>
<button onclick="openCamera()">📷 カメラ</button>
<button onclick="openGallery()">🖼 画像</button>
<button onclick="getLocation()">📍 位置＋天気</button>
<button onclick="openCalendar()">📅 カレンダー</button>

<button onclick="saveSettings()">保存</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let history=JSON.parse(localStorage.getItem("history")||"[]");

let locationText="";
let weatherText="";

/* ===== 情報バー ===== */
setInterval(()=>{
const now=new Date();
document.getElementById("infoBar").innerHTML=
now.toLocaleString()+"<br>"+locationText+" "+weatherText;
},1000);

/* ===== メッセージ ===== */
function addMessage(text,cls){
const div=document.createElement("div");
div.className="msg "+cls;
div.innerHTML=`<div class="bubble">${text}</div>`;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;

if(cls==="ai" && voiceOn){
speak(text);
}
}

/* ===== ElevenLabs音声 ===== */
async function speak(text){
const key=localStorage.getItem("elevenKey");
if(!key)return;

const res=await fetch("https://api.elevenlabs.io/v1/text-to-speech/YOUR_VOICE_ID",{
method:"POST",
headers:{
"xi-api-key":key,
"Content-Type":"application/json"
},
body:JSON.stringify({text})
});
const blob=await res.blob();
new Audio(URL.createObjectURL(blob)).play();
}

/* ===== 送信 ===== */
document.getElementById("sendBtn").onclick=sendMessage;
input.addEventListener("keydown",e=>{if(e.key==="Enter")sendMessage();});

async function sendMessage(){
const text=input.value.trim();
if(!text)return;

addMessage(text,"user");
input.value="";

const apiKey=localStorage.getItem("apiKey");
if(!apiKey){addMessage("APIキー未設定","ai");return;}

history.push({role:"user",content:text});

let mode=localStorage.getItem("mode")||"normal";
let sys="";
if(mode==="teacher")sys="わかりやすく説明";
if(mode==="counselor")sys="優しく寄り添う";
if(mode==="medical")sys="医療的に丁寧に";
if(mode==="sales")sys="営業的に提案";
if(mode==="secretary")sys="秘書として整理";

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"system",content:sys},...history.slice(-10)]
})
});

const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

addMessage(reply,"ai");

history.push({role:"assistant",content:reply});
localStorage.setItem("history",JSON.stringify(history));
}

/* ===== 画像 ===== */
function openCamera(){imageInput.setAttribute("capture","environment");imageInput.click();}
function openGallery(){imageInput.removeAttribute("capture");imageInput.click();}

imageInput.onchange=async e=>{
const file=e.target.files[0];
if(!file)return;

addMessage("画像解析中...","ai");

const base64=await new Promise(r=>{
const fr=new FileReader();
fr.onload=()=>r(fr.result);
fr.readAsDataURL(file);
});

const key=localStorage.getItem("geminiKey");

const res=await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
contents:[{parts:[
{text:"この画像を説明して"},
{inline_data:{mime_type:"image/jpeg",data:base64.split(",")[1]}}
]}]
})
});

const data=await res.json();
addMessage(data.candidates?.[0]?.content?.parts?.[0]?.text||"失敗","ai");
};

/* ===== 位置 ===== */
async function getLocation(){
navigator.geolocation.getCurrentPosition(async pos=>{
const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

const geo=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
const geoData=await geo.json();
locationText="📍"+(geoData.address.city||geoData.address.town||geoData.address.village||"");

const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const wData=await w.json();
weatherText=`🌤${wData.current_weather.temperature}℃`;
});
}

/* ===== カレンダー ===== */
function openCalendar(){
window.open("https://calendar.google.com");
}

/* ===== 設定 ===== */
function openSettings(){
modal.style.display="flex";
apiKey.value=localStorage.getItem("apiKey")||"";
geminiKey.value=localStorage.getItem("geminiKey")||"";
elevenKey.value=localStorage.getItem("elevenKey")||"";
mode.value=localStorage.getItem("mode")||"normal";
voiceToggle.checked=voiceOn;
}

function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
localStorage.setItem("geminiKey",geminiKey.value);
localStorage.setItem("elevenKey",elevenKey.value);
localStorage.setItem("mode",mode.value);
voiceOn=voiceToggle.checked;
localStorage.setItem("voiceOn",voiceOn);
modal.style.display="none";
addMessage("設定保存しました","ai");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
height:100dvh;
overflow:hidden;
}

/* キャラ */
#character{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
}

/* 吹き出し */
#bubble{
position:absolute;
bottom:110px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:92%;
background:rgba(255,255,255,0.9);
border-radius:25px;
padding:14px;
font-size:16px;
line-height:1.4;
text-align:center;
backdrop-filter:blur(8px);
z-index:5;
}

/* しっぽ */
#bubble::after{
content:"";
position:absolute;
top:-10px;
left:53%;
transform:translateX(-50%) rotate(45deg);
width:20px;
height:20px;
background:rgba(255,255,255,0.9);
}

/* 入力エリア */
#inputArea{
position:fixed;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
align-items:center;
gap:6px;
padding:8px 10px calc(env(safe-area-inset-bottom) + 10px);
background:rgba(255,255,255,0.95);
border-radius:20px;
z-index:10;
bottom:0;
}

#input{
flex:1;
min-width:0;
height:38px;
padding:0 10px;
border-radius:18px;
border:none;
font-size:14px;
background:#eee;
margin-right:4px;
}

#send{
height:38px;
padding:0 14px;
border:none;
border-radius:999px;
background:#4da6ff;
color:white;
font-size:14px;
flex-shrink:0;
white-space:nowrap;
}

#mic{
width:38px;
height:38px;
border-radius:50%;
border:none;
background:#eee;
font-size:16px;
flex-shrink:0;
}

/* ボタン */
#settingsBtn,#appBtn{
position:fixed;
bottom:70px;
width:36px;
height:36px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
z-index:20;
font-size:14px;
}

#settingsBtn{left:20px;}
#appBtn{right:20px;}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">どうしたのかな？話してくれると嬉しいな😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");
function saveMemory(user, ai){
  memory.push({user, ai});
  if(memory.length > 20) memory.shift();
  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== 設定 ===== */
settingsBtn.onclick = ()=>{
  const key = prompt("APIキー");
  if(key){
    localStorage.setItem("apiKey", key);
    API_KEY = key;
  }
};

/* ===== 表情29種 ===== */
const emotionGroups = {
  happy:["happy.png","smile.png","applause.png","impressed.png"],
  sad:["sad.png","cry.png"],
  anger:["anger.png","irritation.png"],
  anxiety:["anxiety.png","panic.png"],
  shy:["shy.png","embarrassed.png"],
  surprise:["surprise.png","impressed.png"],
  thinking:["curious.png","focused.png","explaining.png"],
  agree:["agree.png"],
  disagree:["disagree.png","refuse.png"],
  calm:["relieved.png","normal.png"],
  tired:["sleepy.png","hesitation.png"],
  action:["hold.png","typing.png"],
  special:["glitch.png","robot.png"]
};

/* 感情判定 */
function getEmotionGroup(text){
  if(/ありがとう|助か|嬉|最高/.test(text)) return "happy";
  if(/悲|辛|しんど|落ち込/.test(text)) return "sad";
  if(/泣/.test(text)) return "sad";
  if(/怒|イライラ|ムカ/.test(text)) return "anger";
  if(/不安|怖|心配/.test(text)) return "anxiety";
  if(/無理|やばい/.test(text)) return "anxiety";
  if(/恥|照/.test(text)) return "shy";
  if(/え|！？|まじ/.test(text)) return "surprise";
  if(/考え|どう思う|説明/.test(text)) return "thinking";
  if(/そうだね|いいね/.test(text)) return "agree";
  if(/違う|やだ/.test(text)) return "disagree";
  if(/安心|よかった/.test(text)) return "calm";
  if(/眠い|疲れ/.test(text)) return "tired";
  return "calm";
}

/* 被り防止 */
let lastImage="";
function hashString(str){
  let hash=0;
  for(let i=0;i<str.length;i++){
    hash = str.charCodeAt(i) + ((hash<<5)-hash);
  }
  return hash;
}

function pickImage(list,text){
  let index=Math.abs(hashString(text))%list.length;
  let selected=list[index];
  if(selected===lastImage){
    index=(index+1)%list.length;
    selected=list[index];
  }
  lastImage=selected;
  return selected;
}

/* 表情変更 */
function changeEmotion(text){
  const group=getEmotionGroup(text);
  const list=emotionGroups[group]||["normal.png"];
  const next=pickImage(list,text);
  character.src=next;
}

/* タイピング */
async function typeText(t){
  bubble.innerText="";
  for(let c of t){
    bubble.innerText+=c;
    await new Promise(r=>setTimeout(r,15));
  }
}

/* AI */
async function getAIResponse(msg){
  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      max_tokens:40,
      messages:[
        {role:"system",content:"短く自然な女性会話"},
        {role:"user",content:msg}
      ]
    })
  });
  const d=await res.json();
  return d.choices?.[0]?.message?.content || "うまく話せなかった";
}

/* 送信 */
async function send(){
  const text=input.value;
  if(!text) return;

  input.value="";
  character.src="typing.png";

  const reply=await getAIResponse(text);

  await typeText(reply);
  changeEmotion(reply);
  saveMemory(text,reply);
}
</script>

</body>
</html>

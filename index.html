<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 神アプリ</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100dvh;
overflow:hidden;
display:flex;
flex-direction:column;
}

/* ===== キャラ ===== */
header{height:28vh;position:relative;}
header img{width:100%;height:100%;object-fit:cover;}

#talkBtn{
position:absolute;
right:20px;
bottom:20px;
width:70px;height:70px;
border-radius:50%;
background:#fff;
display:flex;justify-content:center;align-items:center;
font-size:26px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* ===== チャット ===== */
main{
flex:1;
overflow-y:auto;
padding:10px;
}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{padding:12px;border-radius:16px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}

/* ===== 下バー ===== */
footer{
position:fixed;
bottom:0;width:100%;
background:#fff;
padding:6px;
display:flex;justify-content:center;
}
#dock{
width:100%;max-width:600px;
display:flex;gap:6px;
}
#input{
width:55%;
height:36px;border-radius:20px;border:none;padding:8px;
}
.dockBtn{
width:40px;height:36px;
border:none;border-radius:10px;background:#eee;
}

/* ===== ホーム ===== */
#homeScreen{
position:fixed;
bottom:-100%;
width:100%;
height:100%;
background:linear-gradient(#6ec6ff,#4fa9b5);
transition:.3s;
overflow-y:auto;
padding:20px;
}

#homeScreen.active{bottom:0;}

.menuGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin-top:20px;
}
.menuItem{
height:90px;
background:#333;
color:#fff;
border-radius:16px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* ===== 設定 ===== */
#menu{
position:fixed;
bottom:-100%;
width:100%;
height:88%;
background:#111;color:#fff;
border-radius:20px 20px 0 0;
transition:.3s;
padding:20px;
z-index:2000;
}
#menu.active{bottom:0;}

.menuInput{
width:100%;height:44px;border-radius:10px;
border:none;padding:10px;margin-bottom:10px;
}
.menuBtn{
width:100%;height:44px;border:none;
border-radius:10px;margin-bottom:10px;
background:#444;color:#fff;
}
</style>
</head>

<body>

<header>
<img id="avatar" src="normal.png">
<div id="talkBtn">💬</div>
</header>

<main id="chat"></main>

<footer>
<div id="dock">
<input id="input" placeholder="話しかけてください">
<button class="dockBtn" onclick="send()">➤</button>
<button class="dockBtn" onclick="openHome()">🏠</button>
<button class="dockBtn" onclick="openMenu()">⚙️</button>
</div>
</footer>

<!-- アプリ一覧 -->
<div id="homeScreen">
<div class="menuGrid">
<div class="menuItem" onclick="openSearch()">🔍<br>Google</div>
<div class="menuItem" onclick="openMap()">🗺<br>Map</div>
<div class="menuItem" onclick="openYouTube()">▶<br>YouTube</div>
<div class="menuItem" onclick="openWeather()">☀️<br>Weather</div>
<div class="menuItem" onclick="openTrain()">🚆<br>Train</div>
<div class="menuItem" onclick="openGmail()">📧<br>Mail</div>
<div class="menuItem" onclick="openAmazon()">🛒<br>Shop</div>
<div class="menuItem" onclick="openMemo()">📝<br>Memo</div>
</div>
</div>

<!-- 設定 -->
<div id="menu">
<h2>設定</h2>
<input id="apiKey" class="menuInput" placeholder="APIキー">
<textarea id="systemPrompt" class="menuInput" style="height:80px;" placeholder="キャラ設定"></textarea>
<label><input type="checkbox" id="voiceToggle"> 音声ON</label>
<button class="menuBtn" onclick="saveSettings()">保存</button>
<button class="menuBtn" onclick="closeMenu()">閉じる</button>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const homeScreen=document.getElementById("homeScreen");
const menu=document.getElementById("menu");

/* ===== 表示 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* ===== AI ===== */
async function send(){
const t=input.value.trim();
if(!t)return;
add(t,"user");
input.value="";
add("考え中...","ai");
setTimeout(()=>add("応答サンプル😊","ai"),800);
}

/* ===== マイク ===== */
if(window.SpeechRecognition||window.webkitSpeechRecognition){
const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="ja-JP";
document.getElementById("talkBtn").onclick=()=>rec.start();
rec.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}

/* ===== アプリ ===== */
function openHome(){homeScreen.classList.add("active");}
function closeHome(){homeScreen.classList.remove("active");}

/* ===== スワイプ安定版 ===== */
let startY=0;

document.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{
const endY=e.changedTouches[0].clientY;
const diff=startY-endY;

// 上スワイプ → 開く
if(diff>80 && !homeScreen.classList.contains("active")){
openHome();
}

// 下スワイプ → 閉じる（スクロール最上部のみ）
if(diff<-80 && homeScreen.classList.contains("active") && homeScreen.scrollTop===0){
closeHome();
}
});

/* ===== 設定 ===== */
function openMenu(){menu.classList.add("active");}
function closeMenu(){menu.classList.remove("active");}
function saveSettings(){
add("保存😊","ai");
closeMenu();
}

/* ===== 外部 ===== */
function openSearch(){window.open("https://google.com");}
function openMap(){window.open("https://maps.google.com");}
function openYouTube(){window.open("https://youtube.com");}
function openWeather(){window.open("https://weather.yahoo.co.jp/");}
function openTrain(){window.open("https://maps.google.com");}
function openGmail(){window.open("https://mail.google.com");}
function openAmazon(){window.open("https://amazon.co.jp");}
function openMemo(){window.open("https://keep.google.com");}
</script>

</body>
</html>

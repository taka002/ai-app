<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
  height:100vh;
  display:flex;
  flex-direction:column;
}

#character{height:30vh;}
#character img{width:100%;height:100%;object-fit:cover;}

#infoBar{
  text-align:center;
  font-size:13px;
  padding:6px;
  background:rgba(255,255,255,0.7);
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  padding-bottom:100px;
}

.msg{max-width:85%;margin:8px;}
.user{margin-left:auto;text-align:right;}
.ai{text-align:left;}

.bubble{
  display:inline-block;
  padding:12px;
  border-radius:16px;
  background:#fff;
}
.user .bubble{
  background:linear-gradient(135deg,#4facfe,#00c6ff);
  color:#fff;
}

#bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:8px;
}
#controls{display:flex;gap:6px;max-width:600px;margin:auto;}
#input{flex:1;padding:10px;border-radius:20px;border:none;}

#sendBtn,#micBtn{
  width:44px;height:44px;border-radius:50%;
  border:none;color:#fff;
}
#sendBtn{background:#0072ff;}
#micBtn{background:#ff4081;}

#fab{position:fixed;right:10px;bottom:90px;}
#setBtn{width:50px;height:50px;border-radius:50%;background:#333;color:#fff;border:none;}

#modal{
  position:fixed;width:100%;height:100%;
  display:none;background:rgba(0,0,0,0.5);
  justify-content:center;align-items:center;
}
#modalContent{
  background:#222;color:#fff;padding:20px;
  border-radius:12px;width:90%;
}
#modal input{width:100%;margin:6px 0;padding:10px;}
</style>
</head>

<body>

<div id="character">
<img id="avatar" src="normal.png">
</div>

<div id="infoBar"></div>
<div id="chat"></div>

<div id="bottom">
<div id="controls">
<input id="input">
<button id="micBtn">🎤</button>
<button id="sendBtn">➤</button>
</div>
</div>

<div id="fab">
<button id="setBtn" onclick="openSettings()">⚙</button>
</div>

<div id="modal">
<div id="modalContent">
<h3>APIキー</h3>
<input id="apiKey">
<button onclick="saveSettings()">保存</button>
</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

/* ===== 記憶AI ===== */
let memory=JSON.parse(localStorage.getItem("memory")||"[]");

/* 表示 */
function addMessage(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;

if(c==="ai") speak(t);
}

/* 音声 */
function speak(t){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

/* ===== 外部 ===== */
function openYahooNews(){window.open("https://news.yahoo.co.jp");}
function openGoogleMap(){window.open("https://maps.google.com");}
function openYahooTransit(){window.open("https://transit.yahoo.co.jp");}
function openCalendar(){window.open("https://calendar.google.com");}
function openLine(){window.open("https://line.me");}
function sendToLine(){
const t=document.querySelector(".bubble:last-child")?.innerText;
window.open("https://line.me/R/msg/text/?"+encodeURIComponent(t));
}
function openGmail(){window.open("https://mail.google.com");}

/* ===== ウェイクワード ===== */
function handleCommand(t){
if(!t.includes("美咲")) return t;

let command = t.replace(/美咲[、,\s]?/,"").trim();

if(command.includes("ニュース")) return openYahooNews();
if(command.includes("地図")||command.includes("マップ")) return openGoogleMap();
if(command.includes("乗換")) return openYahooTransit();

if(command.includes("検索")){
let q=command.replace("検索","").replace("して","").trim();
if(q) return window.open("https://google.com/search?q="+encodeURIComponent(q));
}

if(command.includes("LINE送信")) return sendToLine();
if(command.includes("LINE")) return openLine();
if(command.includes("カレンダー")) return openCalendar();
if(command.includes("Gmail")) return openGmail();

if(command.includes("元気出して")){
addMessage("大丈夫、ちゃんと休もうね😊","ai");
return null;
}

return command;
}

/* ===== AI送信 ===== */
sendBtn.onclick=sendMessage;
input.addEventListener("keydown",e=>{if(e.key==="Enter")sendMessage();});

async function sendMessage(){
let t=input.value.trim();
if(!t)return;

addMessage(t,"user");
input.value="";

/* ウェイク */
let result=handleCommand(t);
if(result===null)return;
if(result!==t)t=result;

const key=localStorage.getItem("apiKey");
if(!key)return addMessage("APIキー未設定","ai");

/* ===== 記憶追加 ===== */
memory.push("ユーザー:"+t);
if(memory.length>20) memory.shift();

/* ===== AI ===== */
addMessage("考え中...","ai");

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:memory.join("\n")},
{role:"user",content:t}
]
})
});

const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

addMessage(reply,"ai");

/* 記憶保存 */
memory.push("AI:"+reply);
localStorage.setItem("memory",JSON.stringify(memory));
}

/* ===== 自動提案AI ===== */
let lastTalk=Date.now();

setInterval(()=>{
if(Date.now()-lastTalk>180000){ // 3分放置
addMessage("ニュース見る？","ai");
lastTalk=Date.now();
}
},60000);

/* ===== 音声入力 ===== */
const R=window.SpeechRecognition||window.webkitSpeechRecognition;
if(R){
const rec=new R();
rec.lang="ja-JP";

micBtn.onclick=()=>rec.start();

rec.onresult=e=>{
let t=e.results[0][0].transcript;

if(t.includes("美咲")){
t=t.replace(/美咲[、,\s]?/,"").trim();
input.value=t;
sendMessage();
}else{
addMessage("『美咲』って呼んでね","ai");
}
};
}

/* 設定 */
function openSettings(){
modal.style.display="flex";
apiKey.value=localStorage.getItem("apiKey")||"";
}
function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
modal.style.display="none";
addMessage("保存OK","ai");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
  overflow:hidden;
}

/* キャラ */
#character{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 吹き出し */
#bubble{
  position:fixed;
  bottom:160px; /* 👈 下げた */
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  padding:16px 20px;
  border-radius:20px;
  max-width:80%;
  text-align:center;
  font-size:18px;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

/* しっぽ（下向き＝口から） */
#bubble::after{
  content:"";
  position:absolute;
  bottom:-12px;
  left:50%;
  transform:translateX(-50%);
  border:12px solid transparent;
  border-top-color:#fff;
}

/* ボタン */
.icon{
  position:fixed;
  bottom:110px; /* 👈 少し下げた */
  width:60px;
  height:60px;
  border-radius:50%;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

#settings{ left:20px; }
#apps{ right:20px; }

/* 入力欄 */
#inputArea{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  padding:10px;
  background:#eee;
}

#input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

#send{
  margin-left:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#4da3ff;
  color:#fff;
}

/* 表情フェード */
.fade{
  transition:0.5s;
  opacity:0;
}
</style>
</head>

<body>

<img id="character" src="normal.png">

<div id="bubble">どうしたのかな？話してくれると嬉しいな😊</div>

<div id="settings" class="icon">⚙️</div>
<div id="apps" class="icon">📱</div>

<div id="inputArea">
  <input id="input" placeholder="話しかけて">
  <button id="send" onclick="send()">送信</button>
</div>

<script>
// ===== タイピング表示 =====
function typeText(text){
  return new Promise(resolve=>{
    let i=0;
    const bubble = document.getElementById("bubble");
    bubble.innerText="";

    const interval = setInterval(()=>{
      bubble.innerText += text[i];
      i++;
      if(i>=text.length){
        clearInterval(interval);
        resolve();
      }
    },50);
  });
}

// ===== 思考中アニメ =====
function startThinking(){
  let dots = 0;
  const bubble = document.getElementById("bubble");

  return setInterval(()=>{
    dots = (dots+1)%4;
    bubble.innerText = "考え中" + ".".repeat(dots);
  },400);
}

// ===== 表情変更（フェード付き）=====
function changeEmotion(text){
  const chara = document.getElementById("character");

  let img = "normal.png";

  if(text.includes("嬉") || text.includes("ありがとう"))
    img = "happy.png";

  else if(text.includes("悲") || text.includes("辛") || text.includes("泣"))
    img = "sad.png";

  else if(text.includes("怒") || text.includes("イライラ"))
    img = "anger.png";

  else if(text.includes("不安") || text.includes("怖"))
    img = "anxiety.png";

  else if(text.includes("ごめん"))
    img = "apologize.png";

  else if(text.includes("すごい"))
    img = "impressed.png";

  else if(text.includes("どうして"))
    img = "curious.png";

  else if(text.includes("え") || text.includes("！？"))
    img = "surprise.png";

  else if(text.includes("眠"))
    img = "sleepy.png";

  else if(text.includes("恥"))
    img = "embarrassed.png";

  else if(text.includes("説明") || text.includes("考え"))
    img = "explaining.png";

  else if(text.includes("いいよ"))
    img = "agree.png";

  else if(text.includes("違う"))
    img = "disagree.png";

  // フェード切替
  chara.classList.add("fade");
  setTimeout(()=>{
    chara.src = img;
    chara.classList.remove("fade");
  },300);
}

// ===== ダミーAI =====
async function getAIResponse(text){
  await new Promise(r=>setTimeout(r,1500));
  return "それは辛いね。少しでも話してみる？";
}

// ===== 送信処理 =====
async function send(){
  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  input.value="";

  // typing画像
  document.getElementById("character").src="typing.png";

  const thinking = startThinking();

  try{
    const reply = await getAIResponse(text);

    clearInterval(thinking);

    await typeText(reply);

    // 👇 ここ重要（遅らせる）
    setTimeout(()=>{
      changeEmotion(reply);
    },1000);

  }catch(e){
    clearInterval(thinking);
    document.getElementById("bubble").innerText="エラー...";
    document.getElementById("character").src="glitch.png";
  }
}
</script>

</body>
</html>

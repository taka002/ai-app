<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新人AIアプリ</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#eef3ff;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* 上：キャラ（固定） */
#avatarArea{
  height:30vh;
  flex-shrink:0;
  background:#dbe9ff;
}

#avatar{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 中：チャット（ここだけスクロール） */
#chatArea{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* 吹き出し */
.msg{
  margin:8px 0;
  padding:10px;
  border-radius:10px;
  max-width:80%;
}

.user{
  background:#4facfe;
  color:white;
  margin-left:auto;
}

.ai{
  background:white;
}

/* 下：固定エリア */
#inputArea{
  flex-shrink:0;
  background:#ddd;
  padding:10px;
}

/* 入力行 */
#controls{
  display:flex;
  align-items:center;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}

button{
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
}

/* 下の設定バー */
#bottomBar{
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}

/* 設定ボタン */
#settingsBtn{
  background:#333;
  color:white;
}
</style>
</head>

<body>

<!-- 上：キャラ -->
<div id="avatarArea">
  <img id="avatar" src="normal.png">
</div>

<!-- 中：チャット -->
<div id="chatArea"></div>

<!-- 下：入力＋設定 -->
<div id="inputArea">

  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button onclick="send()">送信</button>
    <button onclick="openCamera()">📷</button>
  </div>

  <div id="bottomBar">
    <button id="settingsBtn" onclick="openSettings()">⚙️ 設定</button>
  </div>

</div>

<script>

// メッセージ追加
function addMessage(text, type){
  const chat = document.getElementById("chatArea");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 画像変更
function changeAvatar(name){
  document.getElementById("avatar").src = name;
}

// AI
function aiReply(text){

  let reply = "はい！承知しました！";
  let img = "normal.png";

  if(text.includes("疲れた")){
    reply = "お疲れ様です！無理しないでください！";
    img = "relieved.png";
  }

  if(text.includes("楽しい")){
    reply = "いいですね！楽しみましょう！";
    img = "smile.png";
  }

  if(text.includes("悲しい")){
    reply = "大丈夫です、そばにいますよ";
    img = "sad.png";
  }

  if(text.includes("ありがとう")){
    reply = "ありがとうございます！嬉しいです！";
    img = "happy.png";
  }

  changeAvatar(img);
  return reply;
}

// 送信
function send(){
  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  addMessage(text, "user");

  setTimeout(()=>{
    addMessage(aiReply(text), "ai");
  }, 300);

  input.value = "";
}

// カメラ
function openCamera(){
  alert("次でカメラ解析🔥");
}

// 設定
function openSettings(){
  alert("音声・AI切替ここに追加🔥");
}

</script>

</body>
</html>

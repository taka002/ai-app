<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
height:100dvh;
overflow:hidden;
}

#character{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
}

#bubble{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:92%;
background:rgba(255,255,255,0.9);
border-radius:25px;
padding:14px;
font-size:16px;
line-height:1.4;
text-align:center;
backdrop-filter:blur(8px);
z-index:5;
}

#bubble::after{
content:"";
position:absolute;
top:-12px;
left:50%;
transform:translateX(-50%) rotate(45deg);
width:22px;
height:22px;
background:rgba(255,255,255,0.9);
}

#inputArea{
position:fixed;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
align-items:center;
gap:6px;
padding:8px 10px calc(env(safe-area-inset-bottom) + 10px);
background:rgba(255,255,255,0.95);
border-radius:20px;
z-index:10;
bottom:0;
}

#input{
flex:1;
height:38px;
padding:0 10px;
border-radius:18px;
border:none;
font-size:14px;
background:#eee;
}

#send{
height:38px;
padding:0 14px;
border:none;
border-radius:999px;
background:#4da6ff;
color:white;
font-size:14px;
}

#mic{
width:38px;
height:38px;
border-radius:50%;
border:none;
background:#eee;
font-size:16px;
}

#settingsBtn,#appBtn{
position:fixed;
bottom:60px;
width:44px;
height:44px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:20;
font-size:18px;
}

#settingsBtn{left:20px;}
#appBtn{right:20px;}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">どうしたのかな？話してくれると嬉しいな😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = sessionStorage.getItem("apiKey") || "";

/* ===== 初回API入力 ===== */
if(!API_KEY){
  setTimeout(()=>{
    const key = prompt("APIキーを入力");
    if(key){
      sessionStorage.setItem("apiKey", key);
      API_KEY = key;
    }
  },500);
}

/* ===== 長期記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");

function saveMemory(user, ai){
  memory.push({user, ai});
  if(memory.length > 20) memory.shift();
  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== 設定 ===== */
document.getElementById("settingsBtn").onclick = ()=>{
  const key = prompt("APIキーを入力");
  if(key){
    sessionStorage.setItem("apiKey", key);
    API_KEY = key;
  }
};

/* ===== 表情 ===== */
const emo={
  happy:["happy.png","smile.png"],
  sad:["sad.png","cry.png"],
  anxiety:["anxiety.png"],
  calm:["normal.png"]
};

function changeEmotion(t){
  if(/嬉|ありがとう/.test(t)) character.src=emo.happy[0];
  else if(/悲|辛/.test(t)) character.src=emo.sad[0];
  else if(/不安|怖/.test(t)) character.src=emo.anxiety[0];
  else character.src=emo.calm[0];
}

/* ===== 会話特化変換 ===== */
function softText(t){

  if(t.includes("。")){
    t = t.split("。")[0] + "。";
  }

  return t
    .replace(/です。/g,"だよ。")
    .replace(/ます。/g,"するね。")
    .replace(/でしょう。/g,"かな。")
    .replace(/と思います。/g,"かな。")
    .replace(/必要があります。/g,"したほうがいいかも。")
    .replace(/本当に/g,"")
    .replace(/少しでも/g,"")
    .slice(0,40);
}

/* ===== タイピング ===== */
async function typeText(t){
  bubble.innerText="";
  for(let c of t){
    bubble.innerText+=c;
    await new Promise(r=>setTimeout(r,15));
  }
}

/* ===== TTS ===== */
async function speak(t){
  if(!API_KEY) return;

  try{
    const r=await fetch("https://api.openai.com/v1/audio/speech",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+API_KEY,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"gpt-4o-mini-tts",
        voice:"alloy",
        input:t
      })
    });

    const b=await r.blob();
    new Audio(URL.createObjectURL(b)).play();

  }catch(e){
    console.log("TTSエラー");
  }
}

/* ===== AI ===== */
async function getAIResponse(msg){

  if(!API_KEY) return "設定からAPIキー入れてね🙏";

  const history=[];
  memory.forEach(m=>{
    history.push({role:"user",content:m.user});
    history.push({role:"assistant",content:m.ai});
  });

  const r=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      max_tokens:30,
      messages:[
        {
          role:"system",
          content:"1文だけで話す女性キャラ。説明は禁止。短く共感だけ返す。語尾はやわらかく。"
        },
        ...history,
        {role:"user",content:msg}
      ]
    })
  });

  const d=await r.json();
  return d.choices?.[0]?.message?.content || "うまく話せなかった…";
}

/* ===== 送信 ===== */
async function send(){
  const text=input.value;
  if(!text) return;

  input.value="";
  character.src="typing.png";

  const thinking=setInterval(()=>{
    bubble.innerText="・・・";
  },400);

  let reply=await getAIResponse(text);

  clearInterval(thinking);

  reply=softText(reply);

  await typeText(reply);
  changeEmotion(reply);
  speak(reply);
  saveMemory(text,reply);
}

/* ===== 音声入力 ===== */
if ('webkitSpeechRecognition' in window){
  const rec=new webkitSpeechRecognition();
  rec.lang='ja-JP';
  mic.onclick=()=>rec.start();
  rec.onresult=e=>{
    input.value=e.results[0][0].transcript;
    send();
  };
}else{
  mic.onclick=()=>alert("非対応");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 神フル版</title>

<style>
body{margin:0;font-family:sans-serif;background:#6ec6ff;height:100vh;display:flex;flex-direction:column;}
#chat{flex:1;overflow:auto;padding:10px;padding-bottom:100px;}
.msg{margin:6px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{padding:10px;border-radius:12px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}

#bottom{position:fixed;bottom:0;width:100%;display:flex;background:#fff;padding:5px;}
#input{flex:1;padding:10px;border:none;}

button{padding:8px;border:none;border-radius:8px;}
button:active{transform:scale(0.9);opacity:0.7;}

#modal,#homeScreen{
position:fixed;top:0;left:0;width:100%;height:100%;
display:none;justify-content:center;align-items:center;
flex-direction:column;z-index:9999;
}

#modal{background:#0008;}
#modalContent{background:#222;color:#fff;padding:15px;width:90%;max-height:80%;overflow:auto;border-radius:10px;}

#homeScreen{
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:#fff;
}

#homeAI{
margin-top:20px;
background:#ffffff33;
padding:15px;
border-radius:12px;
max-width:80%;
text-align:center;
}

#presentation{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#000;color:#fff;
display:none;justify-content:center;align-items:center;
font-size:24px;text-align:center;
}
</style>
</head>

<body>

<!-- ホーム -->
<div id="homeScreen">
<h1>美咲AI</h1>

<button onclick="enterChat()">💬 チャット</button>
<button onclick="startListening()">🎤 音声開始</button>
<button onclick="openYahooNews()">📰 ニュース</button>
<button onclick="openMap()">🗺 マップ</button>
<button onclick="openSettings()">⚙ 設定</button>

<div id="homeAI">準備中...</div>
</div>

<div id="chat"></div>

<div id="bottom">
<input id="input">
<button onclick="startListening()">🎤</button>
<button onclick="send()">➤</button>
<button onclick="togglePresentation()">🎬</button>
<button onclick="showHome()">🏠</button>
</div>

<!-- 設定 -->
<div id="modal">
<div id="modalContent">

<h3>API</h3>
<input id="apiKey">

<h3>プロンプト</h3>
<textarea id="prompt"></textarea>

<button onclick="saveSettings()">保存</button>

<hr>

<button onclick="openGmail()">Gmail</button>
<button onclick="openCalendar()">カレンダー</button>
<button onclick="openLine()">LINE</button>
<button onclick="sendToLine()">LINE送信</button>

<button onclick="openYahooNews()">ニュース</button>
<button onclick="openNewsPicks()">NewsPicks</button>

<button onclick="openMap()">マップ</button>
<button onclick="searchMap()">場所検索</button>

<button onclick="openTransit()">乗換</button>
<button onclick="openJorudan()">ジョルダン</button>

<button onclick="googleSearch()">検索</button>

</div>
</div>

<div id="presentation" onclick="nextSlide()"></div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let state={
memory:JSON.parse(localStorage.getItem("memory")||"[]"),
lastTalk:Date.now(),
slides:[],
i:0
};

/* ===== 表示 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;

if(c==="ai") speak(t);
}

/* ===== 音声 ===== */
function speak(t){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

/* ===== 記憶 ===== */
function saveMemory(u,a){
state.memory.push({u,a});
if(state.memory.length>20) state.memory.shift();
localStorage.setItem("memory",JSON.stringify(state.memory));
}

/* ===== AIコマンド ===== */
function handleCommand(t){

if(t.includes("ニュース")) return openYahooNews();
if(t.includes("地図")) return openMap();
if(t.includes("乗換")) return openTransit();
if(t.includes("LINE")) return openLine();
if(t.includes("天気")) return googleSearch("天気");

return false;
}

/* ===== AI ===== */
async function send(){
let t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";
state.lastTalk=Date.now();

/* コマンド */
if(handleCommand(t)) return;

add("考え中...","ai");

const key=localStorage.getItem("apiKey");
if(!key)return add("APIキー未設定","ai");

const mem=state.memory.map(m=>m.u+m.a).join("\n");

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"自然に会話\n"+mem},
{role:"user",content:t}
]
})
});

const d=await res.json();
const reply=d.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");
saveMemory(t,reply);

/* スライド */
state.slides=reply.split(/[。！？\n]/);
state.i=0;
}

/* ===== プレゼン ===== */
function togglePresentation(){
presentation.style.display=
presentation.style.display==="flex"?"none":"flex";
presentation.innerText=state.slides[state.i]||"";
}
function nextSlide(){
state.i=(state.i+1)%state.slides.length;
presentation.innerText=state.slides[state.i];
}

/* ===== 音声（常時） ===== */
function startListening(){
const R=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!R)return;

const rec=new R();
rec.lang="ja-JP";

rec.onresult=e=>{
let t=e.results[0][0].transcript;

if(t.includes("美咲")){
t=t.replace("美咲","").trim();
input.value=t;
send();
}
};

rec.onend=()=>startListening();
rec.start();
}

/* ===== 自動AI ===== */
setInterval(()=>{
if(Date.now()-state.lastTalk>300000){
add("何かする？ニュース見る？","ai");
}
},60000);

/* ===== ホームAI ===== */
function generateHomeAI(){
const h=new Date().getHours();
let msg=h<10?"おはよう":h<18?"元気？":"お疲れ様";

if(state.memory.length>0){
msg+=" 続き話す？";
}

homeAI.innerText="美咲："+msg;
speak(msg);
}

/* ===== ホーム ===== */
function enterChat(){
homeScreen.style.display="none";
}
function showHome(){
homeScreen.style.display="flex";
generateHomeAI();
}

/* ===== 外部 ===== */
function open(url){window.open(url);}
function openGmail(){open("https://mail.google.com");}
function openCalendar(){open("https://calendar.google.com");}
function openLine(){open("https://line.me");}
function sendToLine(){
const t=document.querySelector(".bubble:last-child")?.innerText;
open("https://line.me/R/msg/text/?"+encodeURIComponent(t));
}
function openYahooNews(){open("https://news.yahoo.co.jp");}
function openNewsPicks(){open("https://newspicks.com");}
function openMap(){open("https://maps.google.com");}
function searchMap(){
const q=prompt("場所");
open("https://www.google.com/maps/search/"+q);
}
function openTransit(){open("https://transit.yahoo.co.jp");}
function openJorudan(){open("https://www.jorudan.co.jp");}
function googleSearch(q){
if(!q) q=prompt("検索");
open("https://google.com/search?q="+q);
}

/* ===== 設定 ===== */
function openSettings(){
modal.style.display="flex";
apiKey.value=localStorage.getItem("apiKey")||"";
prompt.value=localStorage.getItem("prompt")||"";
}
function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
localStorage.setItem("prompt",prompt.value);
modal.style.display="none";
add("保存OK","ai");
}

/* ===== 初期 ===== */
window.onload=()=>{
showHome();
};

/* Enter */
input.addEventListener("keydown",e=>{
if(e.key==="Enter") send();
});
</script>

</body>
</html>

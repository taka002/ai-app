<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIアプリ</title>

<style>
body{margin:0;font-family:sans-serif;background:#6ec6ff;}
#chat{padding:10px;height:80vh;overflow:auto;}
.msg{margin:8px;}
.user{text-align:right;}
.ai{text-align:left;}
.bubble{display:inline-block;padding:10px;border-radius:12px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}
#inputBox{position:fixed;bottom:0;width:100%;display:flex;}
#input{flex:1;padding:10px;}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
<input id="input" placeholder="話す">
<button onclick="send()">送信</button>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

add("考え中...","ai");

try{
const res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:t})
});

const data=await res.json();
console.log(data);

if(data.error){
add("エラー:"+data.error,"ai");
return;
}

const reply=data.choices?.[0]?.message?.content || "返答なし";

add(reply,"ai");

}catch(e){
console.log(e);
add("通信エラー","ai");
}
}
</script>

</body>
</html>

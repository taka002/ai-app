<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>完全AI感情版</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
}

/* キャラ */
#character{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

/* メッセージ */
#bubble{
  position:fixed;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  padding:16px;
  background:rgba(255,255,255,0.85);
  border-radius:25px;
  text-align:center;
  z-index:2;

  backdrop-filter: blur(10px);
}

/* 入力 */
#input{
  position:fixed;
  bottom:20px;
  left:20px;
  width:65%;
  padding:14px;
  border-radius:20px;
  border:none;
  z-index:2;
}

/* 送信 */
#sendBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:80px;
  height:50px;
  border:none;
  border-radius:20px;
  background:#4da6ff;
  color:#fff;
  z-index:2;
}

/* ボタン */
.btn{
  position:fixed;
  top:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  background:#fff;
  font-size:22px;
  z-index:3;
}
#settingsBtn{left:20px;}
#historyBtn{right:20px;}

/* パネル */
.panel{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#ffffffee;
  display:none;
  z-index:10;
  padding:20px;
  overflow:auto;
}

/* 履歴 */
#historyList{
  max-height:80%;
  overflow:auto;
}

.msg{
  margin:10px;
  padding:10px;
  background:#eee;
  border-radius:10px;
}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">こんにちは😊</div>

<input id="input" placeholder="話しかけて">
<button id="sendBtn">送信</button>

<button id="settingsBtn" class="btn">⚙️</button>
<button id="historyBtn" class="btn">💬</button>

<!-- 設定 -->
<div id="settingsPanel" class="panel">
  <h3>設定</h3>
  <input id="apiKey" placeholder="APIキー">
  <button onclick="saveKey()">保存</button>
  <br><br>
  <textarea id="memoryBox" placeholder="性格メモ"></textarea>
  <button onclick="saveMemory()">保存</button>
  <br><br>
  <button onclick="closePanel()">閉じる</button>
</div>

<!-- 履歴 -->
<div id="historyPanel" class="panel">
  <h3>会話履歴</h3>
  <div id="historyList"></div>
  <button onclick="closePanel()">閉じる</button>
</div>

<script>
const bubble = document.getElementById("bubble");
const input = document.getElementById("input");
const character = document.getElementById("character");

/* 保存 */
function saveKey(){
  localStorage.setItem("apiKey", document.getElementById("apiKey").value);
}
function saveMemory(){
  localStorage.setItem("memory", document.getElementById("memoryBox").value);
}

/* パネル */
document.getElementById("settingsBtn").onclick=()=>{
  document.getElementById("settingsPanel").style.display="block";
};
document.getElementById("historyBtn").onclick=()=>{
  loadHistory();
  document.getElementById("historyPanel").style.display="block";
};
function closePanel(){
  document.querySelectorAll(".panel").forEach(p=>p.style.display="none");
}

/* 履歴保存 */
function saveHistory(user,ai){
  let history = JSON.parse(localStorage.getItem("chatHistory")||"[]");
  history.push({user,ai});
  localStorage.setItem("chatHistory", JSON.stringify(history));
}

/* 履歴表示 */
function loadHistory(){
  let list = document.getElementById("historyList");
  list.innerHTML="";
  let history = JSON.parse(localStorage.getItem("chatHistory")||"[]");

  history.forEach(h=>{
    list.innerHTML += `
      <div class="msg">👤 ${h.user}</div>
      <div class="msg">🤖 ${h.ai}</div>
    `;
  });
}

/* 表情 */
function setEmotion(type){
  const img = new Image();
  img.src = type + ".png";
  img.onload = ()=> character.src = img.src;
  img.onerror = ()=> character.src = "normal.png";
}

/* 性格変化 */
function buildPersonality(){
  let memory = localStorage.getItem("memory") || "";
  let history = JSON.parse(localStorage.getItem("chatHistory")||"[]");

  let mood = "";

  if(history.length > 5) mood += "少し親しみやすい性格。";
  if(history.length > 20) mood += "かなり仲良し。甘め。";

  return memory + mood;
}

/* 送信 */
document.getElementById("sendBtn").onclick = async ()=>{
  const text = input.value;
  if(!text) return;

  bubble.innerText = "・・・";
  setEmotion("typing");

  const apiKey = localStorage.getItem("apiKey");
  const personality = buildPersonality();

  try{
    const res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:"短く優しく話すAI。"+personality},
          {role:"user",content:text}
        ]
      })
    });

    const data = await res.json();
    const reply = data.choices[0].message.content;

    bubble.innerText = reply;
    setEmotion("normal");

    saveHistory(text,reply);

  }catch(e){
    bubble.innerText="エラー";
    setEmotion("sad");
  }

  input.value="";
};
</script>

</body>
</html>

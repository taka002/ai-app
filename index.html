<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;}

/* ===== キャラ ===== */
.avatar{
position:absolute;top:0;left:0;width:100%;height:100%;
}

/* ベース顔 */
.base-face{
position:absolute;width:100%;height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
}

/* 瞬きレイヤー（目だけ） */
.eye-layer{
position:absolute;width:100%;height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
pointer-events:none;
opacity:0;
}

/* ===== 吹き出し ===== */
#bubble{
position:absolute;
bottom:65px;
left:50%;
transform:translateX(-50%) translateY(10px);
width:88%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
border-radius:20px;
padding:10px 12px;
font-size:14px;
line-height:1.5;
text-align:center;
z-index:5;
max-height:160px;
overflow:auto;
opacity:0;
transition:all 0.4s ease;
}

#bubble.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

/* ===== 入力 ===== */
#inputArea{
position:fixed;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
gap:6px;
bottom:50px;
}

#mic{width:34px;height:34px;border-radius:50%;border:none;}
#input{flex:1;height:34px;border-radius:16px;border:none;}
#send{height:34px;border-radius:999px;background:#4da6ff;color:white;border:none;}

#settingsBtn,#appBtn{
position:fixed;
bottom:10px;
width:36px;height:36px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
}
#settingsBtn{left:calc(50% - 45px);}
#appBtn{left:calc(50% + 10px);}
</style>
</head>

<body>

<!-- ===== キャラ ===== -->
<div class="avatar">
  <img id="character" src="normal.png" class="base-face">
  <img id="blinkEye" src="blink.png" class="eye-layer">
</div>

<div id="bubble" class="show">どうしたのかな？😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send">送信</button>
</div>

<script>

/* ===== 要素 ===== */
const bubble = document.getElementById("bubble");
const input = document.getElementById("input");
const character = document.getElementById("character");
const blinkEye = document.getElementById("blinkEye");

/* ===== 状態 ===== */
let isSpeaking = false;
let blinkRunning = false;

/* =========================
   口パク
========================= */
const mouthFrames = [
"normal.png",
"mouth1.png",
"mouth2.png",
"mouth3.png",
"mouth2.png",
"mouth1.png"
];

let lipTimer = null;
let lipIndex = 0;

function startLipSync(){
if(lipTimer) return;

isSpeaking = true;

function loop(){
character.src = mouthFrames[lipIndex];
lipIndex = (lipIndex + 1) % mouthFrames.length;
lipTimer = setTimeout(loop, 70 + Math.random()*80);
}
loop();
}

function stopLipSync(){
clearTimeout(lipTimer);
lipTimer = null;
lipIndex = 0;
character.src = "normal.png";

isSpeaking = false;

/* 話し終わり瞬き */
setTimeout(()=>{
blink();
},80 + Math.random()*120);
}

/* =========================
   瞬き（自然・競合なし）
========================= */
function blink(){

if(blinkRunning || isSpeaking) return;

blinkRunning = true;

/* 閉じる */
blinkEye.style.transition = "opacity 0.05s ease-out";
blinkEye.style.opacity = 1;

/* 開く */
setTimeout(()=>{
blinkEye.style.transition = "opacity 0.12s ease-in";
blinkEye.style.opacity = 0;

blinkRunning = false;
},70);
}

/* 自動瞬き */
function autoBlink(){

setTimeout(()=>{

if(!isSpeaking){
  blink();
}

autoBlink();

},2000 + Math.random()*3000);
}

autoBlink();

/* =========================
   吹き出し
========================= */
function showBubble(text){
bubble.classList.remove("show");
setTimeout(()=>{
bubble.innerText = text;
bubble.classList.add("show");
},150);
}

/* =========================
   音声
========================= */
let API_KEY = localStorage.getItem("apiKey") || "";

async function speak(text){

startLipSync();

/* ChatGPT音声 */
if(API_KEY){
try{
const res = await fetch("https://api.openai.com/v1/audio/speech",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"gpt-4o-mini-tts",
voice:"aria",
input:text
})
});

if(res.ok){
const blob = await res.blob();
const url = URL.createObjectURL(blob);
const audio = new Audio(url);

audio.onended = stopLipSync;

await audio.play().catch(()=>setTimeout(()=>audio.play(),300));
return;
}
}catch(e){}
}

/* fallback */
const uttr = new SpeechSynthesisUtterance(text);
uttr.lang="ja-JP";
uttr.pitch = 1.2;
uttr.rate = 0.95;

uttr.onstart = startLipSync;
uttr.onend = stopLipSync;

speechSynthesis.speak(uttr);
}

/* =========================
   AI
========================= */
async function getAIResponse(msg){
if(!API_KEY) return "APIキー入れてね";

const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"優しい女性。短く自然に。最後は軽く質問。"},
{role:"user",content:msg}
]
})
});

const d=await r.json();
return d.choices?.[0]?.message?.content || "うまく話せない…";
}

/* =========================
   送信
========================= */
async function send(){

const text=input.value;

if(!text.trim()){
showBubble("何か話して😊");
return;
}

input.value="";
showBubble("…");

await new Promise(r=>setTimeout(r,400));

let reply = await getAIResponse(text);

/* 間を作る */
reply = reply
.replace(/。/g,"。… ")
.replace(/、/g,"、 ")
.replace(/！/g,"！… ")
.replace(/？/g,"？… ");

if(reply.length>100) reply=reply.slice(0,100)+"…";

showBubble(reply);
speak(reply);
}

send.onclick = send;

/* =========================
   音声入力
========================= */
if('webkitSpeechRecognition' in window){
const r=new webkitSpeechRecognition();
r.lang='ja-JP';

mic.onclick=()=>r.start();

r.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}else{
mic.onclick=()=>alert("非対応");
}

</script>

</body>
</html>

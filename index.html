<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;}

#character{
position:absolute;top:0;left:0;width:100%;height:100%;
object-fit:cover;object-position:center 28%;transform:scale(1.08);
}

/* 吹き出し */
#bubble{
position:absolute;
bottom:65px;
left:50%;
transform:translateX(-50%) translateY(10px);
width:88%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
border-radius:20px;
padding:10px 12px;
font-size:14px;
line-height:1.4;
text-align:center;
z-index:5;
max-height:120px;
overflow:hidden;
word-break:break-word;
opacity:0;
transition:all 0.4s ease;
}

#bubble.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

/* 🔥 モジャモジャ */
.thinking::after{
content:"...";
display:inline-block;
animation:dots 1.2s infinite steps(3);
margin-left:4px;
}

@keyframes dots{
0%{content:".";}
33%{content:"..";}
66%{content:"...";}
100%{content:".";}
}

#inputArea{
position:fixed;left:50%;transform:translateX(-50%);
width:92%;display:flex;gap:6px;
bottom:50px;
}

#mic{width:34px;height:34px;border-radius:50%;border:none;}
#input{flex:1;height:34px;border-radius:16px;border:none;}
#send{height:34px;border-radius:999px;background:#4da6ff;color:white;border:none;}

#settingsBtn,#appBtn{
position:fixed;bottom:10px;width:36px;height:36px;border-radius:50%;
background:white;display:flex;align-items:center;justify-content:center;
}
#settingsBtn{left:calc(50% - 45px);}
#appBtn{left:calc(50% + 10px);}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble" class="show">どうしたのかな？😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send">送信</button>
</div>

<script>

/* ===== 初期 ===== */
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");
function saveMemory(u,a){
memory.push({user:u,ai:a});
if(memory.length>20) memory.shift();
localStorage.setItem("memory",JSON.stringify(memory));
}

/* ===== フェード＋モジャモジャ ===== */
function showBubble(text, thinking=false){

bubble.classList.remove("show");
bubble.classList.remove("thinking");

setTimeout(()=>{
bubble.innerText = text;

if(thinking){
bubble.classList.add("thinking");
}

bubble.classList.add("show");
},150);
}

/* ===== 音声 ===== */
function speak(text){
if(localStorage.getItem("voice")==="off") return;

const uttr = new SpeechSynthesisUtterance(text);
uttr.lang="ja-JP";
uttr.pitch = 1.2;
speechSynthesis.speak(uttr);
}

/* ===== 時間帯あいさつ ===== */
const greetings = {
morning:["おはよう😊","朝の調子どう？","ゆっくり始めようね"],
day:["こんにちは😊","無理してない？","少し休む？"],
evening:["おつかれさま😊","今日はどうだった？","がんばったね"],
night:["こんばんは😊","ゆっくりできてる？","無理しないでね"]
};

function getTimeGreeting(){
const h=new Date().getHours();
let zone="night";
if(h>=5&&h<11) zone="morning";
else if(h<17) zone="day";
else if(h<21) zone="evening";

const list=greetings[zone];
return list[Math.floor(Math.random()*list.length)];
}

/* ===== 初回あいさつ ===== */
let first=false;
document.body.addEventListener("click",()=>{
if(first) return;
first=true;

const g=getTimeGreeting();
showBubble(g);

setTimeout(()=>speak(g),300);

},{once:true});

/* ===== AI ===== */
async function getAIResponse(msg){
if(!API_KEY) return "APIキー入れてね";

const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:msg}]
})
});

const d=await r.json();
return d.choices?.[0]?.message?.content || "うまく話せない…";
}

/* ===== 送信 ===== */
async function send(){

const text=input.value;
if(!text.trim()){
showBubble("何か話して😊");
return;
}

input.value="";
showBubble("考え中", true);

let reply=await getAIResponse(text);

if(reply.length>60) reply=reply.slice(0,60)+"…";

showBubble(reply);
speak(reply);

saveMemory(text,reply);
}

document.getElementById("send").onclick = send;

/* ===== 音声入力 ===== */
if('webkitSpeechRecognition' in window){
const r=new webkitSpeechRecognition();
r.lang='ja-JP';
mic.onclick=()=>r.start();
r.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}else{
mic.onclick=()=>alert("非対応");
}

</script>

</body>
</html>

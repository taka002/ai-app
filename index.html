<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 神アプリ</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100dvh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* ===== キャラ ===== */
header{
height:28vh;
position:relative;
}
header img{
width:100%;
height:100%;
object-fit:cover;
}

/* 吹き出しボタン */
#talkBtn{
position:absolute;
right:20px;
bottom:20px;
width:70px;height:70px;
border-radius:50%;
background:#fff;
display:flex;justify-content:center;align-items:center;
font-size:26px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* ===== チャット ===== */
main{
flex:1;
overflow-y:auto;
padding:10px;
}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{
padding:12px;
border-radius:16px;
background:#fff;
}
.user .bubble{background:#0072ff;color:#fff;}

/* ===== 下バー ===== */
footer{
position:fixed;
bottom:0;
width:100%;
background:#fff;
padding:6px;
display:flex;
justify-content:center;
}
#dock{
width:100%;
max-width:600px;
display:flex;
gap:6px;
}
#input{
width:65%;
height:36px;
border-radius:20px;
border:none;
padding:8px;
}
.dockBtn{
width:40px;height:36px;
border:none;
border-radius:10px;
background:#eee;
}

/* ===== ホーム（アプリ） ===== */
#homeScreen{
position:fixed;
bottom:0;
width:100%;
height:100%;
background:linear-gradient(#6ec6ff,#4fa9b5);
display:none;
overflow-y:auto;
padding:20px;
}

.menuGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin-top:20px;
}
.menuItem{
height:90px;
background:#333;
color:#fff;
border-radius:16px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* 閉じる */
#homeHeader{
position:sticky;
top:0;
text-align:center;
}
#homeHeader button{
border:none;
padding:10px 20px;
border-radius:20px;
}

/* ===== 設定 ===== */
#menu{
position:fixed;
bottom:-100%;
width:100%;
height:88%;
background:#111;
color:#fff;
border-radius:20px 20px 0 0;
transition:.3s;
padding:20px;
}
#menu.active{bottom:0;}

.menuInput{
width:100%;
height:44px;
border-radius:10px;
border:none;
padding:10px;
margin-bottom:10px;
}
.menuBtn{
width:100%;
height:44px;
border:none;
border-radius:10px;
margin-bottom:10px;
background:#444;
color:#fff;
}
</style>
</head>

<body>

<header>
<img id="avatar" src="normal.png">
<div id="talkBtn">💬</div>
</header>

<main id="chat"></main>

<footer>
<div id="dock">
<input id="input" placeholder="話しかけてください">
<button class="dockBtn" onclick="send()">➤</button>
<button class="dockBtn" onclick="openMenu()">⚙️</button>
</div>
</footer>

<!-- ホーム -->
<div id="homeScreen">
<div id="homeHeader">
<button onclick="closeHome()">↓ 閉じる</button>
</div>

<div class="menuGrid">
<div class="menuItem" onclick="openSearch()">🔍<br>Google</div>
<div class="menuItem" onclick="openMap()">🗺<br>Map</div>
<div class="menuItem" onclick="openYouTube()">▶<br>YouTube</div>
<div class="menuItem" onclick="openWeather()">☀️<br>Weather</div>
<div class="menuItem" onclick="openTrain()">🚆<br>Train</div>
<div class="menuItem" onclick="openGmail()">📧<br>Mail</div>
<div class="menuItem" onclick="openAmazon()">🛒<br>Shop</div>
<div class="menuItem" onclick="openMemo()">📝<br>Memo</div>
</div>
</div>

<!-- 設定 -->
<div id="menu">
<h2>設定</h2>

<input id="apiKey" class="menuInput" placeholder="APIキー">
<textarea id="systemPrompt" class="menuInput" style="height:80px;" placeholder="キャラ設定"></textarea>
<input type="file" id="avatarUpload" class="menuInput">
<label><input type="checkbox" id="voiceToggle"> 音声ON</label>

<button class="menuBtn" onclick="saveSettings()">保存</button>
<button class="menuBtn" onclick="closeMenu()">閉じる</button>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const avatar=document.getElementById("avatar");
const menu=document.getElementById("menu");
const homeScreen=document.getElementById("homeScreen");

let voiceOn=false;
let history=[];

/* ===== 表示 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* ===== AI ===== */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

add("考え中...","ai");

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:localStorage.getItem("systemPrompt")||"優しい女性"},
...history,
{role:"user",content:t}
]
})
});

const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");

history.push({role:"user",content:t});
history.push({role:"assistant",content:reply});
}

/* ===== 音声 ===== */
if(window.SpeechRecognition||window.webkitSpeechRecognition){
const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="ja-JP";

function startMic(){rec.start();}

document.getElementById("talkBtn").onclick=startMic;

rec.onresult=e=>{
const text=e.results[0][0].transcript;
input.value=text;
send();
};
}

/* ===== スワイプ ===== */
let startY=0;
homeScreen.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY;
});
homeScreen.addEventListener("touchend",e=>{
const diff=e.changedTouches[0].clientY-startY;
if(diff>80 && homeScreen.scrollTop===0){
closeHome();
}
});

/* ===== 画面切替 ===== */
document.addEventListener("touchend",e=>{
if(e.changedTouches[0].clientY < startY-80){
homeScreen.style.display="block";
}
});

function closeHome(){
homeScreen.style.display="none";
}

/* ===== 設定 ===== */
function openMenu(){menu.classList.add("active");}
function closeMenu(){menu.classList.remove("active");}

function saveSettings(){
localStorage.setItem("apiKey",document.getElementById("apiKey").value);
localStorage.setItem("systemPrompt",document.getElementById("systemPrompt").value);
localStorage.setItem("voiceOn",document.getElementById("voiceToggle").checked);
add("保存😊","ai");
closeMenu();
}

/* ===== アプリ ===== */
function openSearch(){window.open("https://google.com");}
function openMap(){window.open("https://maps.google.com");}
function openWeather(){window.open("https://weather.yahoo.co.jp/");}
function openTrain(){window.open("https://maps.google.com");}
function openYouTube(){window.open("https://youtube.com");}
function openGmail(){window.open("https://mail.google.com");}
function openAmazon(){window.open("https://amazon.co.jp");}
function openMemo(){window.open("https://keep.google.com");}
</script>

</body>
</html>

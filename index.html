<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 神アプリ</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:60px;
}
header{height:28vh;}
header img{width:100%;height:100%;object-fit:cover;}

#infoBar{
text-align:center;
font-size:12px;
padding:4px;
background:rgba(255,255,255,0.6);
}

main{flex:1;overflow-y:auto;padding:10px;}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{padding:10px;border-radius:16px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}

footer{
position:fixed;bottom:0;width:100%;
background:#fff;padding:6px;display:flex;justify-content:center;
}
#dock{width:100%;max-width:600px;display:flex;gap:6px;}
#input{width:58%;height:36px;border-radius:20px;border:none;padding:8px;}
.dockBtn{width:40px;height:36px;border:none;border-radius:10px;background:#eee;}

#menu{
position:fixed;bottom:-100%;width:100%;height:88%;
background:#111;color:#fff;
display:flex;flex-direction:column;
border-radius:20px 20px 0 0;
transition:.3s;z-index:1000;
}
#menu.active{bottom:0;}
#menuTop{flex:1;overflow:auto;padding:20px;}

.menuGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;margin-bottom:20px;
}
.menuItem{
height:90px;background:#333;border-radius:16px;
display:flex;flex-direction:column;justify-content:center;align-items:center;
}
.menuInput{
width:100%;height:44px;border-radius:10px;border:none;
padding:10px;margin-bottom:10px;
}
.menuBtn{
width:100%;height:44px;border:none;border-radius:10px;
margin-bottom:10px;background:#444;color:#fff;
}
</style>
</head>

<body>

<header>
<img id="avatar" src="normal.png">
</header>

<div id="infoBar"></div>
<main id="chat"></main>

<footer>
<div id="dock">
<input id="input" placeholder="話しかけてください">
<button class="dockBtn" onclick="send()">➤</button>
<button class="dockBtn" id="micBtn">🎤</button>
<button class="dockBtn" onclick="openMenu()">☰</button>
</div>
</footer>

<div id="menu">
<div id="menuTop">

<!-- アプリ -->
<div class="menuGrid">
<div class="menuItem" onclick="openNews()">📰<br>ニュース</div>
<div class="menuItem" onclick="openMap()">🗺<br>地図</div>
<div class="menuItem" onclick="openWeather()">☀️<br>天気</div>
<div class="menuItem" onclick="openTransit()">🚃<br>乗換</div>
<div class="menuItem" onclick="openCalendar()">📅<br>予定</div>
<div class="menuItem" onclick="openGmail()">📧<br>メール</div>
<div class="menuItem" onclick="openLine()">💬<br>LINE</div>
<div class="menuItem" onclick="openYouTube()">▶<br>YouTube</div>
</div>

<!-- 🔥 キャラ切替 -->
<h3>キャラ切替</h3>
<div class="menuGrid">
<div class="menuItem" onclick="setCharacter('misaki')">😊<br>美咲</div>
<div class="menuItem" onclick="setCharacter('yandere')">🖤<br>ヤンデレ</div>
<div class="menuItem" onclick="setCharacter('amae')">💗<br>甘え</div>
</div>

<h3>設定</h3>

<input id="apiKey" class="menuInput" placeholder="APIキー">
<input id="userName" class="menuInput" placeholder="あなたの名前">
<input id="charName" class="menuInput" placeholder="キャラ名">

<textarea id="systemPrompt" class="menuInput" style="height:80px;" placeholder="キャラ設定"></textarea>

<label><input type="checkbox" id="voiceToggle"> 音声ON</label>

<select id="voiceEngine" class="menuInput">
<option value="openai">高品質音声</option>
<option value="local">ローカル音声</option>
</select>

<button class="menuBtn" onclick="saveSettings()">保存</button>
<button class="menuBtn" onclick="closeMenu()">閉じる</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const menu=document.getElementById("menu");
const avatar=document.getElementById("avatar");

const apiKey=document.getElementById("apiKey");
const userName=document.getElementById("userName");
const charName=document.getElementById("charName");
const systemPrompt=document.getElementById("systemPrompt");
const voiceToggle=document.getElementById("voiceToggle");
const voiceEngineSelect=document.getElementById("voiceEngine");

let voiceOn=false;
let voiceEngine="openai";
let history=[];

/* ===== キャラ定義 ===== */
const characters={
misaki:{
name:"美咲",
prompt:"優しくて落ち着いた女性。丁寧に寄り添う。",
voice:"nova",
avatar:"normal.png"
},
yandere:{
name:"みさき",
prompt:"嫉妬深く重い愛情の女性。",
voice:"onyx",
avatar:"yandere.png"
},
amae:{
name:"みさき",
prompt:"甘えん坊で距離が近い女性。",
voice:"nova",
avatar:"amae.png"
}
};

/* ===== キャラ切替 ===== */
function setCharacter(type){
const c=characters[type];
if(!c)return;

localStorage.setItem("charName",c.name);
localStorage.setItem("systemPrompt",c.prompt);
localStorage.setItem("voiceType",c.voice);
localStorage.setItem("avatar",c.avatar);

avatar.src=c.avatar;

add("キャラ変更しました😊","ai");
closeMenu();
}

/* 表示 */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* 音声（1つだけ） */
async function speak(text){
if(!voiceOn)return;

/* ローカル */
if(voiceEngine==="local"){
speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(text);
u.lang="ja-JP";
speechSynthesis.speak(u);
return;
}

/* OpenAI */
const key=localStorage.getItem("apiKey");
if(!key)return;

const voiceType=localStorage.getItem("voiceType")||"alloy";

try{
const res=await fetch("https://api.openai.com/v1/audio/speech",{
method:"POST",
headers:{
"Authorization":"Bearer "+key,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"gpt-4o-mini-tts",
voice:voiceType,
input:text
})
});
const blob=await res.blob();
const url=URL.createObjectURL(blob);
new Audio(url).play();
}catch(e){console.log(e);}
}

/* AI送信（1つだけ） */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

add("考え中...","ai");

const char=localStorage.getItem("charName")||"美咲";
const prompt=localStorage.getItem("systemPrompt")||"";

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:`あなたは${char}です。\n${prompt}`},
...history,
{role:"user",content:t}
]
})
});

const data=await res.json();
let reply=data.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");
speak(reply);

history.push({role:"user",content:t});
history.push({role:"assistant",content:reply});
localStorage.setItem("chatHistory",JSON.stringify(history));
}

/* マイク */
if(window.SpeechRecognition||window.webkitSpeechRecognition){
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const rec=new SR();
rec.lang="ja-JP";

document.getElementById("micBtn").onclick=()=>rec.start();

rec.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}

/* メニュー */
function openMenu(){
menu.classList.add("active");

apiKey.value=localStorage.getItem("apiKey")||"";
userName.value=localStorage.getItem("userName")||"";
charName.value=localStorage.getItem("charName")||"";
systemPrompt.value=localStorage.getItem("systemPrompt")||"";
voiceToggle.checked=localStorage.getItem("voiceOn")==="true";
voiceEngineSelect.value=localStorage.getItem("voiceEngine")||"openai";
}

function closeMenu(){menu.classList.remove("active");}

function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
localStorage.setItem("userName",userName.value);
localStorage.setItem("charName",charName.value);
localStorage.setItem("systemPrompt",systemPrompt.value);
localStorage.setItem("voiceOn",voiceToggle.checked);
localStorage.setItem("voiceEngine",voiceEngineSelect.value);

voiceOn=voiceToggle.checked;
voiceEngine=voiceEngineSelect.value;

add("保存しました😊","ai");
closeMenu();
}

/* アプリ */
function openNews(){window.open("https://news.yahoo.co.jp/");}
function openMap(){window.open("https://maps.google.com");}
function openWeather(){window.open("https://weather.yahoo.co.jp/");}
function openTransit(){window.open("https://transit.yahoo.co.jp/");}
function openCalendar(){window.open("https://calendar.google.com/");}
function openGmail(){window.open("https://mail.google.com/");}
function openLine(){window.open("https://line.me");}
function openYouTube(){window.open("https://youtube.com");}

/* 起動 */
window.onload=()=>{
voiceOn=localStorage.getItem("voiceOn")==="true";
voiceEngine=localStorage.getItem("voiceEngine")||"openai";
history=JSON.parse(localStorage.getItem("chatHistory"))||[];

/* 画像復元 */
const savedAvatar=localStorage.getItem("avatar");
if(savedAvatar) avatar.src=savedAvatar;
};
</script>

</body>
</html>

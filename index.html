<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;}

#character{
position:absolute;top:0;left:0;width:100%;height:100%;
object-fit:cover;object-position:center 28%;transform:scale(1.08);
}

#bubble{
position:absolute;bottom:90px;left:50%;transform:translateX(-50%);
width:92%;background:rgba(255,255,255,0.9);border-radius:25px;
padding:14px;font-size:16px;line-height:1.4;text-align:center;
backdrop-filter:blur(8px);z-index:5;
}

#bubble::after{
content:"";position:absolute;top:-11px;left:50%;
transform:translateX(-50%) rotate(45deg);
width:20px;height:20px;background:rgba(255,255,255,0.9);
}

#inputArea{
position:fixed;left:50%;transform:translateX(-50%);
width:92%;display:flex;gap:6px;
padding:8px 10px calc(env(safe-area-inset-bottom) + 10px);
background:rgba(255,255,255,0.95);border-radius:20px;bottom:0;
}

#input{flex:1;height:38px;padding:0 10px;border-radius:18px;border:none;background:#eee;}
#send{height:38px;padding:0 14px;border:none;border-radius:999px;background:#4da6ff;color:white;}
#mic{width:38px;height:38px;border-radius:50%;border:none;background:#eee;}

#settingsBtn,#appBtn{
position:fixed;bottom:60px;width:44px;height:44px;border-radius:50%;
background:white;display:flex;align-items:center;justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
#settingsBtn{left:20px;} #appBtn{right:20px;}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">どうしたのかな？話してくれると嬉しいな😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";
let userName = localStorage.getItem("userName") || "";
let personality = localStorage.getItem("personality") || "優しい";

/* ===== 呼び方自動 ===== */
function getName(){
  if(!userName) return "";

  if(/ちゃん|たん/.test(userName)) return userName;
  if(/子$|み|な|り|え/.test(userName)) return userName+"ちゃん";
  if(userName.length<=3) return userName+"くん";

  return userName+"さん";
}

/* ===== 名前初回 ===== */
if(!userName){
  setTimeout(()=>{
    const name=prompt("名前なんて呼べばいい？");
    if(name){
      userName=name;
      localStorage.setItem("userName",name);
    }
  },500);
}

/* ===== 記憶 ===== */
let memory=JSON.parse(localStorage.getItem("memory")||"[]");
let worries=JSON.parse(localStorage.getItem("worries")||"[]");

function saveMemory(u,a){
  memory.push({user:u,ai:a});
  if(memory.length>20) memory.shift();
  localStorage.setItem("memory",JSON.stringify(memory));
}

function saveWorry(t){
  if(/悩|つら|不安|しんど/.test(t)){
    worries.push(t);
    if(worries.length>10) worries.shift();
    localStorage.setItem("worries",JSON.stringify(worries));
  }
}

/* ===== 性格 ===== */
const personalities={
  優しい:"優しく共感する",
  甘え:"甘えた感じで寄り添う",
  クール:"落ち着いて短く話す",
  元気:"明るく前向き"
};

/* ===== 設定 ===== */
settingsBtn.onclick=()=>{
  const c=prompt(`設定
1:APIキー
2:性格
3:名前`);

  if(c==="1"){
    const k=prompt("APIキー");
    if(k){localStorage.setItem("apiKey",k);API_KEY=k;}
  }

  if(c==="2"){
    const p=prompt("優しい/甘え/クール/元気");
    if(personalities[p]){
      personality=p;
      localStorage.setItem("personality",p);
    }
  }

  if(c==="3"){
    const n=prompt("新しい名前");
    if(n){
      userName=n;
      localStorage.setItem("userName",n);
      bubble.innerText=n+"って呼ぶね😊";
    }
  }
};

/* ===== 表情 ===== */
function changeEmotion(t){
  if(/嬉|ありがとう/.test(t)) character.src="happy.png";
  else if(/悲|辛/.test(t)) character.src="sad.png";
  else character.src="normal.png";
}

/* ===== 会話化 ===== */
function softText(t){
  t=t.split(/[。！？]/)[0];

  t=t
  .replace(/です/g,"だよ")
  .replace(/ます/g,"するね")
  .replace(/必要があります/g,"したほうがいいかも")
  .replace(/危険です/g,"ちょっと心配かも")
  .slice(0,25);

  if(Math.random()<0.6 && userName){
    return getName()+"、"+t;
  }
  return t;
}

/* ===== タイピング ===== */
async function typeText(t){
  bubble.innerText="";
  for(let c of t){
    bubble.innerText+=c;
    await new Promise(r=>setTimeout(r,15));
  }
}

/* ===== TTS ===== */
async function speak(t){
  if(!API_KEY) return;
  const r=await fetch("https://api.openai.com/v1/audio/speech",{
    method:"POST",
    headers:{
      "Authorization":"Bearer "+API_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      model:"gpt-4o-mini-tts",
      voice:"nova",
      speed:1.15,
      input:t
    })
  });
  const b=await r.blob();
  new Audio(URL.createObjectURL(b)).play();
}

/* ===== AI ===== */
async function getAIResponse(msg){

  const history=[];
  memory.forEach(m=>{
    history.push({role:"user",content:m.user});
    history.push({role:"assistant",content:m.ai});
  });

  const r=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      max_tokens:20,
      messages:[
        {role:"system",content:personality+"女性キャラ。一言で共感だけ返す"},
        {role:"system",content:"悩み:"+worries.join("/")},
        ...history,
        {role:"user",content:msg}
      ]
    })
  });

  const d=await r.json();
  return d.choices?.[0]?.message?.content||"うまく話せなかった…";
}

/* ===== 送信 ===== */
async function send(){
  const text=input.value;
  if(!text) return;

  input.value="";
  character.src="typing.png";

  saveWorry(text);

  let reply=await getAIResponse(text);
  reply=softText(reply);

  await typeText(reply);
  changeEmotion(reply);
  speak(reply);
  saveMemory(text,reply);
}

/* ===== 音声入力 ===== */
if ('webkitSpeechRecognition' in window){
  const rec=new webkitSpeechRecognition();
  rec.lang='ja-JP';

  mic.onclick=()=>rec.start();

  rec.onresult=e=>{
    input.value=e.results[0][0].transcript;
    send();
  };
}else{
  mic.onclick=()=>alert("非対応");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100vh;
display:flex;
flex-direction:column;
}

/* 上 */
header{height:30vh;}
header img{
width:100%;
height:100%;
object-fit:cover;
}

/* 天気バーのみ */
#infoBar{
text-align:center;
font-size:13px;
padding:6px;
background:rgba(255,255,255,0.7);
}

/* チャット */
main{
flex:1;
overflow-y:auto;
padding:10px;
padding-bottom:80px;
}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{
display:inline-block;
padding:12px;
border-radius:16px;
background:#fff;
}
.user .bubble{
background:#0072ff;
color:#fff;
}

/* 🎤 浮かせる */
#micBtn{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#0072ff;
color:#fff;
font-size:22px;
border:none;
z-index:100;
}

/* ⚙ 設定ボタン */
#menuBtn{
position:fixed;
bottom:20px;
left:20px;
width:50px;
height:50px;
border-radius:50%;
background:#333;
color:#fff;
border:none;
z-index:100;
}

/* メニュー */
#menu{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#111;
color:#fff;
display:none;
flex-direction:column;
overflow:auto;
padding:20px;
z-index:200;
}

.menuInput{
width:100%;
height:44px;
border-radius:10px;
border:none;
padding:10px;
margin-bottom:10px;
}
.menuBtn{
width:100%;
height:44px;
border:none;
border-radius:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<img src="normal.png">
</header>

<div id="infoBar"></div>

<main id="chat"></main>

<!-- 🎤 -->
<button id="micBtn">🎤</button>

<!-- ⚙ -->
<button id="menuBtn" onclick="openMenu()">⚙</button>

<!-- 設定 -->
<div id="menu">
<h3>設定</h3>
<input id="apiKey" class="menuInput" placeholder="APIキー">
<label><input type="checkbox" id="voiceToggle"> 音声ON</label>
<br><br>
<button class="menuBtn" onclick="saveSettings()">保存</button>
<button class="menuBtn" onclick="closeMenu()">閉じる</button>
</div>

<script>
const chat=document.getElementById("chat");
const infoBar=document.getElementById("infoBar");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let history=JSON.parse(localStorage.getItem("chatHistory"))||[];

let weatherText="";
let weatherCode=null;
let lat=null;
let lon=null;

/* 表示 */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;

history.push({role:c==="user"?"user":"assistant",content:t});
if(history.length>50) history.shift();

localStorage.setItem("chatHistory",JSON.stringify(history));
}

/* 音声 */
function speak(text){
if(!voiceOn) return;
speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(text);
u.lang="ja-JP";
speechSynthesis.speak(u);
}
document.body.onclick=()=>speechSynthesis.resume();

/* ChatGPT */
async function send(text){
add(text,"user");

const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

try{
const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:history
})
});

const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");
speak(reply);

}catch{
add("通信エラー","ai");
}
}

/* 🎤 音声入力（自動送信） */
if(window.SpeechRecognition || window.webkitSpeechRecognition){
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const rec=new SR();
rec.lang="ja-JP";

document.getElementById("micBtn").onclick=()=>{
try{
rec.start();
add("🎤 聞いてます...", "ai");
}catch(e){}
};

rec.onresult=e=>{
const text=e.results[0][0].transcript;
send(text); // 🔥自動送信
};
}

/* 天気 */
function weatherComment(){
if(weatherCode===0) return "☀️ 晴れ";
if(weatherCode<=3) return "☁️ 曇り";
if(weatherCode<=67) return "☔ 雨";
return "⚡ 荒れ気味";
}

function getLocation(){
navigator.geolocation.getCurrentPosition(async pos=>{
lat=pos.coords.latitude;
lon=pos.coords.longitude;

const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const wd=await w.json();

weatherCode=wd.current_weather.weathercode;
weatherText=`${weatherComment()} ${wd.current_weather.temperature}℃`;

infoBar.innerHTML=weatherText;

});
}

/* 起動 */
window.onload=()=>{
history.forEach(h=>add(h.content,h.role==="user"?"user":"ai"));
add("こんにちは😊","ai");
speak("こんにちは");

getLocation();
};

/* 設定 */
function openMenu(){
menu.style.display="flex";
document.getElementById("apiKey").value=localStorage.getItem("apiKey")||"";
document.getElementById("voiceToggle").checked=voiceOn;
}
function closeMenu(){menu.style.display="none";}
function saveSettings(){
localStorage.setItem("apiKey",document.getElementById("apiKey").value);
localStorage.setItem("voiceOn",document.getElementById("voiceToggle").checked);
voiceOn=document.getElementById("voiceToggle").checked;
menu.style.display="none";
add("保存しました","ai");
}
</script>

</body>
</html>

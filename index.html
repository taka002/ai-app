<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:60px;
}

header{height:28vh;position:relative;}
header img{width:100%;height:100%;object-fit:cover;}
#avatarUpload{
position:absolute;bottom:10px;right:10px;
background:#fff;border-radius:8px;
}

#infoBar{
text-align:center;
font-size:12px;
padding:4px;
background:rgba(255,255,255,0.6);
}

main{flex:1;overflow-y:auto;padding:10px;}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}

.bubble{
padding:10px;border-radius:16px;background:#fff;
}
.user .bubble{background:#0072ff;color:#fff;}

footer{
position:fixed;bottom:0;width:100%;
background:#fff;padding:6px;display:flex;justify-content:center;
}

#dock{width:100%;max-width:600px;display:flex;gap:6px;}
#input{
width:58%;height:36px;border-radius:20px;border:none;padding:8px;
}

.dockBtn{
width:40px;height:36px;border:none;border-radius:10px;background:#eee;
}

/* メニュー */
#menu{
position:fixed;bottom:-100%;width:100%;height:88%;
background:#111;color:#fff;
display:flex;flex-direction:column;
border-radius:20px 20px 0 0;
transition:.3s;z-index:1000;
}
#menu.active{bottom:0;}

#menuTop{flex:1;overflow:auto;padding:20px;}

.menuGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;margin-bottom:20px;
}

.menuItem{
height:90px;background:#333;border-radius:16px;
display:flex;flex-direction:column;justify-content:center;align-items:center;
}

.menuInput{
width:100%;height:44px;border-radius:10px;border:none;
padding:10px;margin-bottom:10px;
}

.menuBtn{
width:100%;height:44px;border:none;border-radius:10px;
margin-bottom:10px;background:#444;color:#fff;
}
</style>
</head>

<body>

<header>
<img id="avatar" src="normal.png">
<input type="file" id="avatarUpload">
</header>

<div id="infoBar">取得中...</div>
<main id="chat"></main>

<footer>
<div id="dock">
<input id="input" placeholder="話しかけてください">
<button class="dockBtn" onclick="send()">➤</button>
<button class="dockBtn" id="micBtn">🎤</button>
<button class="dockBtn" onclick="openMenu()">☰</button>
</div>
</footer>

<div id="menu">
<div id="menuTop">

<div class="menuGrid">
<div class="menuItem" onclick="openNews()">📰<br>ニュース</div>
<div class="menuItem" onclick="openMap()">🗺<br>地図</div>
<div class="menuItem" onclick="openWeather()">☀️<br>天気</div>
<div class="menuItem" onclick="openTransit()">🚃<br>乗換</div>
<div class="menuItem" onclick="openCalendar()">📅<br>予定</div>
<div class="menuItem" onclick="openGmail()">📧<br>メール</div>
<div class="menuItem" onclick="openLine()">💬<br>LINE</div>
<div class="menuItem" onclick="openYouTube()">▶<br>YouTube</div>
</div>

<h3>設定</h3>

<input id="apiKey" class="menuInput" placeholder="APIキー">
<input id="userName" class="menuInput" placeholder="あなたの名前">
<input id="charName" class="menuInput" placeholder="キャラ名">

<textarea id="systemPrompt" class="menuInput" style="height:80px;" placeholder="キャラ設定"></textarea>

<label><input type="checkbox" id="voiceToggle"> 音声ON</label>

<select id="voiceType" class="menuInput">
<option value="normal">通常</option>
<option value="female">女性</option>
<option value="male">男性</option>
<option value="slow">ゆっくり</option>
<option value="veryslow">かなりゆっくり</option>
<option value="ultraslow">超ゆっくり</option>
</select>

<button class="menuBtn" onclick="saveSettings()">保存</button>
<button class="menuBtn" onclick="closeMenu()">閉じる</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const infoBar=document.getElementById("infoBar");
const avatar=document.getElementById("avatar");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let voiceType=localStorage.getItem("voiceType")||"normal";
let history=JSON.parse(localStorage.getItem("chatHistory"))||[];

/* 表示 */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* 音声 */
function speak(text){
if(!voiceOn)return;

speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(text);
u.lang="ja-JP";

switch(voiceType){
case "female":u.pitch=1.4;break;
case "male":u.pitch=0.7;break;
case "slow":u.rate=0.6;break;
case "veryslow":u.rate=0.45;break;
case "ultraslow":u.rate=0.3;break;
}

speechSynthesis.speak(u);
}

/* 名前 */
function formatReply(text){
const name=localStorage.getItem("userName");
if(!name)return text;
if(Math.random()<0.3)return name+"さん、"+text;
return text;
}

/* AI */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

add("考え中...","ai");

const char=localStorage.getItem("charName")||"美咲";
const prompt=localStorage.getItem("systemPrompt")||"";

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:`あなたは${char}です。\n${prompt}`},
...history,
{role:"user",content:t}
]
})
});

const data=await res.json();
let reply=data.choices?.[0]?.message?.content||"エラー";

reply=formatReply(reply);

add(reply,"ai");
speak(reply);

history.push({role:"user",content:t});
history.push({role:"assistant",content:reply});
localStorage.setItem("chatHistory",JSON.stringify(history));
}

/* 音声入力 */
if(window.SpeechRecognition||window.webkitSpeechRecognition){
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const rec=new SR();
rec.lang="ja-JP";
micBtn.onclick=()=>rec.start();
rec.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}

/* 天気＋位置 */
async function loadEnv(){
navigator.geolocation.getCurrentPosition(async pos=>{
const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const data=await res.json();

const temp=data.current_weather.temperature;
const time=new Date().toLocaleTimeString();

infoBar.innerText=`${temp}℃ / ${time}`;

startTalk(temp,time);
});
}

/* 起動会話 */
function startTalk(temp,time){
const name=localStorage.getItem("userName")||"";
const char=localStorage.getItem("charName")||"美咲";

let msg=`${char}だよ😊 `;
if(name)msg+=name+"さん、";
msg+=`${time}だね。今${temp}℃だよ`;

add(msg,"ai");
speak(msg);
}

/* 画像 */
avatarUpload.onchange=e=>{
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=ev=>{
avatar.src=ev.target.result;
localStorage.setItem("avatar",ev.target.result);
};
reader.readAsDataURL(file);
};

/* メニュー */
function openMenu(){
menu.classList.add("active");
apiKey.value=localStorage.getItem("apiKey")||"";
userName.value=localStorage.getItem("userName")||"";
charName.value=localStorage.getItem("charName")||"";
systemPrompt.value=localStorage.getItem("systemPrompt")||"";
voiceToggle.checked=voiceOn;
voiceType.value=voiceType;
}

function closeMenu(){menu.classList.remove("active");}

function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
localStorage.setItem("userName",userName.value);
localStorage.setItem("charName",charName.value);
localStorage.setItem("systemPrompt",systemPrompt.value);
localStorage.setItem("voiceOn",voiceToggle.checked);
localStorage.setItem("voiceType",voiceType.value);

voiceOn=voiceToggle.checked;
voiceType=voiceType.value;

add("保存しました😊","ai");
closeMenu();
}

/* アプリ */
function openNews(){window.open("https://news.yahoo.co.jp/");}
function openMap(){window.open("https://maps.google.com");}
function openWeather(){window.open("https://weather.yahoo.co.jp/");}
function openTransit(){window.open("https://transit.yahoo.co.jp/");}
function openCalendar(){window.open("https://calendar.google.com/");}
function openGmail(){window.open("https://mail.google.com/");}
function openLine(){window.open("https://line.me");}
function openYouTube(){window.open("https://youtube.com");}

/* 起動 */
window.onload=()=>{
const saved=localStorage.getItem("avatar");
if(saved) avatar.src=saved;
loadEnv();
};
</script>

</body>
</html>

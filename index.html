<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:60px;
}

/* ===== 上 ===== */
header{height:28vh;}
header img{
width:100%;
height:100%;
object-fit:cover;
}

/* ===== チャット ===== */
main{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}

.bubble{
display:inline-block;
padding:10px 12px;
border-radius:16px;
background:#fff;
font-size:14px;
}
.user .bubble{
background:#0072ff;
color:#fff;
}

/* ===== 下バー ===== */
footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#ffffffee;
padding:6px;
border-top:1px solid #ccc;
z-index:100;
display:flex;
justify-content:center;
}

#dock{
width:100%;
max-width:600px;
display:flex;
align-items:center;
gap:6px;
}

#input{
flex:1;
min-width:0;
height:36px;
padding:8px 10px;
border-radius:20px;
border:none;
font-size:14px;
}

.dockBtn{
flex-shrink:0;
width:36px;
height:36px;
border:none;
border-radius:10px;
background:#eee;
}

/* ===== 下からスライド ===== */
#menu{
position:fixed;
left:0;
bottom:-100%;
width:100%;
height:85%;
background:#111;
color:#fff;
display:flex;
flex-direction:column;
border-radius:20px 20px 0 0;
transition:0.3s;
z-index:200;
}

#menu.active{bottom:0;}

#menuHandle{
width:50px;
height:5px;
background:#666;
border-radius:10px;
margin:8px auto;
}

#menuTop{
flex:1;
overflow-y:auto;
padding:15px;
}

#menuBottom{
padding:12px;
border-top:1px solid #333;
}

/* UI */
#searchBox{
width:100%;
height:48px;
border-radius:12px;
border:none;
padding:10px;
font-size:16px;
margin-bottom:10px;
}

.menuBtn{
width:100%;
height:48px;
border:none;
border-radius:10px;
margin-bottom:10px;
background:#444;
color:#fff;
}

.menuGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:20px;
}

.menuItem{
height:90px;
background:#333;
border-radius:16px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.menuInput{
width:100%;
height:44px;
border-radius:10px;
border:none;
padding:10px;
margin-bottom:10px;
}

.settingRow{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}
</style>
</head>

<body>

<header>
<img src="normal.png">
</header>

<main id="chat"></main>

<footer>
<div id="dock">
<input id="input" placeholder="話しかけてください">
<button class="dockBtn" onclick="send()">➤</button>
<button class="dockBtn" id="micBtn">🎤</button>
<button class="dockBtn" onclick="openMenu()">☰</button>
</div>
</footer>

<!-- メニュー -->
<div id="menu">

<div id="menuHandle"></div>

<div id="menuTop">
<input id="searchBox" placeholder="Google検索">
<button class="menuBtn" onclick="searchGoogle()">検索</button>

<div class="menuGrid">
<div class="menuItem" onclick="openNews()">📰<br>ニュース</div>
<div class="menuItem" onclick="openTransit()">🚃<br>乗換</div>
<div class="menuItem" onclick="openMap()">🗺<br>地図</div>
<div class="menuItem" onclick="openCalendar()">📅<br>予定</div>
<div class="menuItem" onclick="openGmail()">📧<br>メール</div>
<div class="menuItem" onclick="openLine()">💬<br>LINE</div>
<div class="menuItem" onclick="openYouTube()">▶<br>YouTube</div>
</div>
</div>

<div id="menuBottom">
<h3>設定</h3>

<input id="apiKey" class="menuInput" placeholder="APIキー">

<label class="settingRow">
<input type="checkbox" id="voiceToggle"> 音声ON
</label>

<button class="menuBtn" onclick="saveSettings()">保存</button>
<button class="menuBtn" onclick="closeMenu()">閉じる</button>
</div>

</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const menu=document.getElementById("menu");
const micBtn=document.getElementById("micBtn");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let history=JSON.parse(localStorage.getItem("chatHistory"))||[];

/* ===== 表示 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;

history.push({role:c==="user"?"user":"assistant",content:t});
if(history.length>50) history.shift();
localStorage.setItem("chatHistory",JSON.stringify(history));
}

/* ===== 🔥 音声 ===== */
function speak(text){
if(!voiceOn) return;

speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(text);
u.lang="ja-JP";
speechSynthesis.speak(u);
}

/* スマホ対策 */
document.body.addEventListener("click",()=>{
speechSynthesis.resume();
});

/* ===== ChatGPT ===== */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

try{
const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:history
})
});
const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");
speak(reply); // 🔥ここ重要

}catch{
add("通信エラー","ai");
}
}

/* ===== 音声入力 ===== */
if(window.SpeechRecognition || window.webkitSpeechRecognition){
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const rec=new SR();
rec.lang="ja-JP";

micBtn.onclick=()=>rec.start();

rec.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}

/* ===== メニュー ===== */
function openMenu(){
menu.classList.add("active");
document.getElementById("apiKey").value=localStorage.getItem("apiKey")||"";
document.getElementById("voiceToggle").checked=voiceOn;
}

function closeMenu(){
menu.classList.remove("active");
}

function saveSettings(){
localStorage.setItem("apiKey",document.getElementById("apiKey").value);
localStorage.setItem("voiceOn",document.getElementById("voiceToggle").checked);
voiceOn=document.getElementById("voiceToggle").checked;
menu.classList.remove("active");
add("保存しました","ai");
}

/* ===== スワイプで閉じる ===== */
let startY=0;

menu.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY;
});

menu.addEventListener("touchmove",e=>{
let move=e.touches[0].clientY;
if(move-startY>80){
menu.classList.remove("active");
}
});

/* ===== 外部 ===== */
function openNews(){window.open("https://news.yahoo.co.jp/");}
function openTransit(){window.open("https://transit.yahoo.co.jp/");}
function openMap(){window.open("https://www.google.com/maps");}
function openCalendar(){window.open("https://calendar.google.com/");}
function openGmail(){window.open("https://mail.google.com/");}
function openLine(){window.open("https://line.me");}
function openYouTube(){window.open("https://www.youtube.com");}

function searchGoogle(){
const q=document.getElementById("searchBox").value;
if(q) window.open("https://www.google.com/search?q="+encodeURIComponent(q));
}

/* 起動 */
window.onload=()=>{
history.forEach(h=>{
add(h.content,h.role==="user"?"user":"ai");
});
add("こんにちは😊","ai");
};
</script>

</body>
</html>

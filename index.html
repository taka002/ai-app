<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>美咲AI 完全版</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:sans-serif;
  background:#cfd6e0;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* 上：キャラ */
#character{
  height:28vh;
  flex-shrink:0;
  overflow:hidden;
}
#character img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* メッセージ */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* 吹き出し */
.msg{
  max-width:80%;
  margin:6px 0;
  padding:10px;
  border-radius:12px;
  word-break:break-word;
}

.user{
  background:#5aa0e6;
  color:#fff;
  margin-left:auto;
}

.ai{
  background:#eee;
}

/* 下固定 */
#bottom{
  flex-shrink:0;
  background:#ddd;
  padding:6px;
}

/* 入力行 */
#controls{
  display:flex;
  gap:6px;
  align-items:center;
}

/* 入力 */
#input{
  flex:1;
  min-width:0;
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

/* ボタン */
#controls button{
  flex:0 0 44px;
  height:44px;
  border:none;
  border-radius:10px;
  background:#5aa0e6;
  color:white;
  font-size:16px;
}

/* 送信だけ広く */
#sendBtn{
  flex:0 0 60px;
}

/* 設定ボタン */
#settingBtn{
  margin-top:6px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#333;
  color:#fff;
  font-size:16px;
}

/* モーダル */
#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}

#modalContent{
  background:#222;
  color:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-height:80%;
  overflow:auto;
}

#modal input, #modal textarea{
  width:100%;
  margin:6px 0;
  padding:8px;
  border-radius:8px;
  border:none;
}

/* トグル */
.switch{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:10px 0;
}

.switch input{
  transform:scale(1.3);
}
</style>
</head>

<body>

<!-- キャラ -->
<div id="character">
  <img src="normal.png">
</div>

<!-- チャット -->
<div id="chat"></div>

<!-- 下 -->
<div id="bottom">

  <div id="controls">
    <input id="input" placeholder="話しかけてください">

    <button id="sendBtn">送信</button>
    <button id="cameraBtn">📷</button>
    <button id="shutterBtn">📸</button>
  </div>

  <button id="settingBtn">⚙ 設定</button>
</div>

<!-- 設定モーダル -->
<div id="modal">
  <div id="modalContent">

    <h3>設定</h3>

    APIキー
    <input id="apiKey">

    プロンプト（性格）
    <textarea id="prompt" rows="4"></textarea>

    <div class="switch">
      音声ON/OFF
      <input type="checkbox" id="voiceToggle">
    </div>

    <button onclick="saveSettings()">保存</button>
    <button onclick="closeModal()">閉じる</button>

  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let voiceOn = false;

/* メッセージ追加 */
function addMessage(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if(cls === "ai" && voiceOn){
    speak(text);
  }
}

/* 送信 */
document.getElementById("sendBtn").onclick = async ()=>{
  const text = input.value;
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  const apiKey = localStorage.getItem("apiKey");
  const prompt = localStorage.getItem("prompt") || "";

  if(!apiKey){
    addMessage("APIキー未設定","ai");
    return;
  }

  try{
    const res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:prompt},
          {role:"user",content:text}
        ]
      })
    });

    const data = await res.json();
    const reply = data.choices[0].message.content;

    addMessage(reply,"ai");

  }catch(e){
    addMessage("エラー","ai");
  }
};

/* Enter送信 */
input.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    document.getElementById("sendBtn").click();
  }
});

/* 音声 */
function speak(text){
  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang = "ja-JP";
  speechSynthesis.speak(uttr);
}

/* 設定 */
document.getElementById("settingBtn").onclick = ()=>{
  document.getElementById("modal").style.display="flex";
};

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function saveSettings(){
  localStorage.setItem("apiKey",document.getElementById("apiKey").value);
  localStorage.setItem("prompt",document.getElementById("prompt").value);

  voiceOn = document.getElementById("voiceToggle").checked;

  closeModal();
}

/* カメラ */
document.getElementById("cameraBtn").onclick = ()=>{
  alert("カメラ起動（次で実装）");
};

/* シャッター */
document.getElementById("shutterBtn").onclick = ()=>{
  alert("撮影（次で画像解析🔥）");
};
</script>

</body>
</html>

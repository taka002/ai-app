<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
overflow:hidden;
}

/* キャラ */
#characterWrap{
position:fixed;
width:100%;
height:100%;
z-index:0;
}

#character{
width:100%;
height:100%;
object-fit:cover;
transition:0.3s;
}

/* UI */
#ui{
position:relative;
z-index:10;
height:100dvh;
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:10px;
}

/* 吹き出し（1つだけ） */
#bubble{
background:rgba(255,255,255,0.9);
border-radius:20px;
padding:20px;
margin:10px;
font-size:18px;
}

/* 入力 */
#inputArea{
display:flex;
gap:5px;
}

input{
flex:1;
padding:12px;
border-radius:20px;
border:none;
}

button{
padding:12px 18px;
border:none;
border-radius:20px;
background:#007bff;
color:#fff;
}

/* ボタン */
#menuBtn{
position:absolute;
right:10px;
bottom:80px;
width:60px;
height:60px;
border-radius:50%;
background:rgba(0,0,0,0.5);
color:#fff;
display:flex;
align-items:center;
justify-content:center;
}

</style>
</head>

<body>

<div id="characterWrap">
  <img id="character" src="normal.png">
</div>

<div id="ui">

  <div id="bubble">こんにちは😊</div>

  <div id="inputArea">
    <input id="input" placeholder="話しかけて">
    <button onclick="send()">送信</button>
  </div>

</div>

<div id="menuBtn">≡</div>

<script>

/* ===== 記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "{}");

/* ===== 感情 ===== */
function changeEmotion(text){

  let img = "normal.png";

  if(text.includes("ありがとう")) img="happy.png";
  else if(text.includes("疲れ")) img="sad.png";
  else if(text.includes("不安")) img="anxiety.png";
  else if(text.includes("ごめん")) img="apologize.png";
  else if(text.includes("怒")) img="anger.png";
  else if(text.includes("眠い")) img="sleepy.png";
  else if(text.includes("すごい")) img="impressed.png";
  else if(text.includes("なんで")) img="curious.png";
  else if(text.includes("嫌")) img="refuse.png";
  else if(text.includes("嬉しい")) img="smile.png";
  else if(text.includes("びっくり")) img="surprise.png";

  document.getElementById("character").src = img;
}

/* ===== 性格付き返答 ===== */
function getReply(text){

  // 名前記憶
  if(text.includes("名前")){
    return "あなたの名前、教えてほしいな😊";
  }

  if(text.startsWith("私は") || text.startsWith("僕は")){
    const name = text.replace("私は","").replace("僕は","");
    memory.name = name;
    saveMemory();
    return name + "って呼ぶね😊";
  }

  // 個人対応
  if(memory.name){
    if(text.includes("疲れ")){
      return memory.name + "、無理しすぎじゃない？少し休も😊";
    }
  }

  // デフォルト
  const replies = [
    "そうなんだね😊",
    "それ気になる！",
    "もっと聞きたいな😊",
    "大丈夫？"
  ];

  return replies[Math.floor(Math.random()*replies.length)];
}

/* ===== 保存 ===== */
function saveMemory(){
  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== 送信 ===== */
function send(){

  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  const bubble = document.getElementById("bubble");

  // typing
  document.getElementById("character").src = "typing.png";

  setTimeout(()=>{

    const reply = getReply(text);

    bubble.innerText = reply;

    changeEmotion(reply);

  },500);

  input.value="";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;}

#character{
position:absolute;top:0;left:0;width:100%;height:100%;
object-fit:cover;object-position:center 28%;
transform:scale(1.08);
transition:opacity .15s ease;
}

#bubble{
position:absolute;
bottom:65px;
left:50%;
transform:translateX(-50%) translateY(10px);
width:88%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
border-radius:20px;
padding:10px 12px;
font-size:14px;
line-height:1.4;
text-align:center;
z-index:5;
max-height:160px;
overflow:auto;
opacity:0;
transition:all 0.4s ease;
}

#bubble.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

#inputArea{
position:fixed;left:50%;transform:translateX(-50%);
width:92%;display:flex;gap:6px;
bottom:50px;
}

#mic{width:34px;height:34px;border-radius:50%;border:none;}
#input{flex:1;height:34px;border-radius:16px;border:none;}
#send{height:34px;border-radius:999px;background:#4da6ff;color:white;border:none;}

#settingsBtn,#appBtn{
position:fixed;bottom:10px;width:36px;height:36px;border-radius:50%;
background:white;display:flex;align-items:center;justify-content:center;
}
#settingsBtn{left:calc(50% - 45px);}
#appBtn{left:calc(50% + 10px);}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble" class="show">どうしたのかな？😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send">送信</button>
</div>

<script>

/* =========================
   🔥 口パク（安定版）
========================= */
const mouthFrames = [
"normal.png",
"mouth1.png",
"mouth2.png",
"mouth3.png",
"mouth2.png",
"mouth1.png"
];

let lipTimer = null;
let lipIndex = 0;

function startLipSync(){
if(lipTimer) return;

function loop(){
character.src = mouthFrames[lipIndex];
lipIndex = (lipIndex + 1) % mouthFrames.length;

lipTimer = setTimeout(loop, 70 + Math.random()*80);
}
loop();
}

function stopLipSync(){
clearTimeout(lipTimer);
lipTimer = null;
lipIndex = 0;
character.src = "normal.png";
}

/* =========================
   🔥 瞬き（自律・競合なし）
========================= */
let blinkTimer = null;

function startBlink(){

function loop(){
const next = 2000 + Math.random()*4000;

blinkTimer = setTimeout(()=>{

/* 口パク中はスキップ */
if(!lipTimer){
doBlink();
}

loop();

}, next);
}

loop();
}

function doBlink(){

const doubleBlink = Math.random() < 0.3;

character.src = "blink.png";

setTimeout(()=>{
character.src = "normal.png";

/* 2回瞬き */
if(doubleBlink){
setTimeout(()=>{
character.src = "blink.png";

setTimeout(()=>{
character.src = "normal.png";
},120);

},120);
}

},120);
}

/* 起動時 */
startBlink();

/* =========================
   吹き出し
========================= */
function showBubble(text){
bubble.classList.remove("show");
setTimeout(()=>{
bubble.innerText = text;
bubble.classList.add("show");
},150);
}

/* =========================
   音声（口パク連動）
========================= */
function speak(text){
if(localStorage.getItem("voice")==="off") return;

const uttr = new SpeechSynthesisUtterance(text);
uttr.lang="ja-JP";
uttr.pitch=1.2;

uttr.onstart = ()=> startLipSync();
uttr.onend = ()=> stopLipSync();

speechSynthesis.cancel();
speechSynthesis.speak(uttr);
}

/* =========================
   AI
========================= */
let API_KEY = localStorage.getItem("apiKey") || "";

async function getAIResponse(msg){
if(!API_KEY) return "APIキー入れてね";

const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:msg}]
})
});

const d=await r.json();
return d.choices?.[0]?.message?.content || "うまく話せない…";
}

/* =========================
   送信
========================= */
async function send(){
const text=input.value;

if(!text.trim()){
showBubble("何か話して😊");
return;
}

input.value="";
showBubble("考え中…");

let reply=await getAIResponse(text);

if(reply.length>120) reply=reply.slice(0,120)+"…";

showBubble(reply);
speak(reply);
}

send.onclick = send;

/* =========================
   音声入力
========================= */
if('webkitSpeechRecognition' in window){
const r=new webkitSpeechRecognition();
r.lang='ja-JP';

mic.onclick=()=>r.start();

r.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};

}else{
mic.onclick=()=>alert("非対応");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100vh;
display:flex;
flex-direction:column;
}

/* 上 */
header{height:30vh;position:relative;}
header img{width:100%;height:100%;object-fit:cover;}
#infoBar{
position:absolute;bottom:0;width:100%;
background:#ffffffcc;text-align:center;
font-size:14px;padding:6px;
}

/* チャット */
main{flex:1;overflow-y:auto;padding:10px;padding-bottom:80px;}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{display:inline-block;padding:12px;border-radius:16px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}

/* 下 */
footer{
position:fixed;bottom:0;width:100%;
background:#ffffffdd;backdrop-filter:blur(10px);
padding:8px;
}
#dock{display:flex;gap:6px;}
#input{flex:1;padding:10px;border-radius:20px;border:none;}
button{border:none;border-radius:12px;padding:10px;background:#eee;}

/* メニュー */
#menu{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#111;color:#fff;display:none;
flex-direction:column;overflow:auto;padding:20px;
}
.menuGrid{
display:grid;grid-template-columns:repeat(3,1fr);
gap:12px;margin-bottom:20px;
}
.menuGrid button{
height:90px;background:#333;color:#fff;
border-radius:16px;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
}
#searchBox{
width:100%;padding:14px;border-radius:12px;
border:none;font-size:16px;margin-bottom:15px;
}
</style>
</head>

<body>

<header>
<img src="normal.png">
<div id="infoBar"></div>
</header>

<main id="chat"></main>

<footer>
<div id="dock">
<input id="input" placeholder="話しかけてください">
<button onclick="send()">➤</button>
<button onclick="openMenu()">☰</button>
</div>
</footer>

<!-- メニュー -->
<div id="menu">

<input id="searchBox" placeholder="Google検索">
<button onclick="searchGoogle()">検索</button>

<hr>

<div class="menuGrid">
<button onclick="openNews()">📰<br>ニュース</button>
<button onclick="openTransit()">🚃<br>乗換</button>
<button onclick="openMap()">🗺<br>地図</button>
<button onclick="openCalendar()">📅<br>予定</button>
<button onclick="openGmail()">📧<br>メール</button>
<button onclick="openLine()">💬<br>LINE</button>
<button onclick="openYouTube()">▶<br>YouTube</button>
</div>

<hr>

<h3>設定</h3>
<input id="apiKey" placeholder="APIキー">
<br><br>
<label><input type="checkbox" id="voiceToggle"> 音声ON</label>
<br><br>
<button onclick="saveSettings()">保存</button>
<br><br>
<button onclick="closeMenu()">閉じる</button>

</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const infoBar=document.getElementById("infoBar");
const menu=document.getElementById("menu");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let history=JSON.parse(localStorage.getItem("chatHistory"))||[];

let locationText="";
let weatherText="";
let weatherCode=null;
let lat=null;
let lon=null;

/* ===== 音声 ===== */
function speak(text){
if(!voiceOn) return;
speechSynthesis.cancel();
const uttr=new SpeechSynthesisUtterance(text);
uttr.lang="ja-JP";
speechSynthesis.speak(uttr);
}

/* Android対策 */
document.body.addEventListener("click",()=>{
speechSynthesis.resume();
});

/* 表示 */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* 天気コメント */
function weatherComment(){
if(weatherCode===0) return "いい天気ですね☀️";
if(weatherCode<=3) return "曇り気味ですね☁️";
if(weatherCode<=67) return "雨ですね☔ 足元気をつけて";
return "天気荒れ気味⚡ 無理しないで";
}

/* ChatGPT */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

history.push({role:"user",content:t});
if(history.length>20) history.shift();

try{
const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:history
})
});

const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");
speak(reply);

history.push({role:"assistant",content:reply});
localStorage.setItem("chatHistory",JSON.stringify(history));

}catch{
add("通信エラー","ai");
}
}

/* メニュー */
function openMenu(){menu.style.display="flex";}
function closeMenu(){menu.style.display="none";}

/* 外部 */
function openNews(){window.open("https://news.yahoo.co.jp/");}
function openTransit(){window.open("https://transit.yahoo.co.jp/");}
function openMap(){
if(lat && lon){
window.open(`https://www.google.com/maps?q=${lat},${lon}`);
}else{
window.open("https://www.google.com/maps");
}}
function openCalendar(){window.open("https://calendar.google.com/");}
function openGmail(){window.open("https://mail.google.com/");}
function openLine(){window.open("https://line.me");}
function openYouTube(){window.open("https://www.youtube.com");}

/* Google検索 */
function searchGoogle(){
const q=document.getElementById("searchBox").value;
if(q) window.open("https://www.google.com/search?q="+encodeURIComponent(q));
}

/* 位置 */
function getLocation(){
navigator.geolocation.getCurrentPosition(async pos=>{
lat=pos.coords.latitude;
lon=pos.coords.longitude;

const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const wd=await w.json();

weatherCode=wd.current_weather.weathercode;
weatherText=`🌤${wd.current_weather.temperature}℃`;
locationText="📍現在地";

const msg=weatherComment();
add(msg,"ai");
speak(msg);

});
}

/* 時刻 */
setInterval(()=>{
const now=new Date();
infoBar.innerHTML=now.toLocaleString()+"<br>"+locationText+" "+weatherText;
},1000);

/* 起動 */
window.onload=()=>{
add("こんにちは😊","ai");
speak("こんにちは");

history.forEach(h=>{
add(h.content,h.role==="user"?"user":"ai");
});

getLocation();
};

/* 設定 */
function saveSettings(){
localStorage.setItem("apiKey",document.getElementById("apiKey").value);
localStorage.setItem("voiceOn",document.getElementById("voiceToggle").checked);
voiceOn=document.getElementById("voiceToggle").checked;
menu.style.display="none";
add("保存しました","ai");
}
</script>

</body>
</html>

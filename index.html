<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* キャラ */
#character{height:26vh;}
#character img{width:100%;height:100%;object-fit:cover;}

/* チャット */
#chat{
  flex:1;
  overflow-y:auto;
  padding:12px;
  padding-bottom:90px;
}

/* メッセージ */
.msg{
  display:flex;
  flex-direction:column;
  max-width:85%;
  margin:10px;
}

.user{align-items:flex-end;margin-left:auto;}
.ai{align-items:flex-start;}

.bubble{
  padding:12px;
  border-radius:16px;
  background:#fff;
}

.user .bubble{
  background:linear-gradient(135deg,#4facfe,#00c6ff);
  color:#fff;
}

.meta{
  font-size:11px;
  color:#555;
  margin-top:4px;
}

/* 入力 */
#bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:10px;
}

#controls{
  display:flex;
  gap:8px;
  max-width:600px;
  margin:auto;
}

#input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
}

#sendBtn{
  width:46px;
  height:46px;
  border-radius:50%;
  border:none;
  color:#fff;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
}

/* FAB */
#fab{
  position:fixed;
  right:15px;
  bottom:90px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

#fab button{
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  color:#fff;
}

.cam{background:#ff9800;}
.img{background:#4caf50;}
.loc{background:#e91e63;}
.cal{background:#3f51b5;}
.set{background:#333;}

/* モーダル */
#modal{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

#modalContent{
  background:#222;
  color:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
}
</style>
</head>

<body>

<div id="character">
  <img id="avatar" src="normal.png">
</div>

<div id="chat"></div>

<div id="bottom">
  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div id="fab">
  <button class="cam" onclick="openCamera()">📷</button>
  <button class="img" onclick="openGallery()">🖼</button>
  <button class="loc" onclick="getLocation()">📍</button>
  <button class="cal" onclick="openCalendar()">📅</button>
  <button class="set" onclick="openSettings()">⚙</button>
</div>

<input type="file" id="imageInput" accept="image/*" style="display:none">

<div id="modal">
<div id="modalContent">

APIキー<input id="apiKey">
プロンプト<textarea id="prompt"></textarea>

モード
<select id="mode">
<option value="teacher">家庭教師</option>
<option value="counselor">カウンセラー</option>
<option value="sales">営業</option>
<option value="medical">医療</option>
<option value="housework">家事</option>
<option value="secretary">秘書</option>
<option value="normal">通常</option>
</select>

音声 <input type="checkbox" id="voiceToggle">

<button onclick="saveSettings()">保存</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const avatar=document.getElementById("avatar");

let voiceOn=localStorage.getItem("voiceOn")==="true";

/* ===== 記憶 ===== */
let history = JSON.parse(localStorage.getItem("history") || "[]");

/* ===== メッセージ ===== */
function addMessage(text,cls){
  const time=new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});

  const wrap=document.createElement("div");
  wrap.className="msg "+cls;

  wrap.innerHTML=`
    <div class="bubble">${text}</div>
    <div class="meta">${time}</div>
  `;

  chat.appendChild(wrap);
  chat.scrollTop=chat.scrollHeight;

  if(cls==="ai"){
    speak(text);
    changeFace(text);
  }
}

/* ===== 音声 ===== */
function speak(text){
  if(!voiceOn) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

/* ===== 表情 ===== */
function changeFace(text){
  let img="normal.png";
  if(text.includes("嬉")) img="happy.png";
  if(text.includes("疲")) img="sleepy.png";
  if(text.includes("痛")) img="anxiety.png";
  avatar.src=img;
}

/* ===== 送信 ===== */
async function sendMessage(){

  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  const apiKey=localStorage.getItem("apiKey");
  if(!apiKey){
    addMessage("APIキー未設定","ai");
    return;
  }

  history.push({role:"user",content:text});

  const mode=localStorage.getItem("mode")||"normal";
  let modePrompt="";

  if(mode==="teacher") modePrompt="わかりやすく説明";
  if(mode==="secretary") modePrompt="秘書として要点整理・スケジュール整理";

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:modePrompt},
          ...history.slice(-10)
        ]
      })
    });

    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content || "エラー";

    addMessage(reply,"ai");

    history.push({role:"assistant",content:reply});
    localStorage.setItem("history",JSON.stringify(history));

  }catch{
    addMessage("通信エラー","ai");
  }
}

/* ===== カレンダー ===== */
function openCalendar(){
  if(localStorage.getItem("mode")!=="secretary"){
    addMessage("秘書モードで使用できます","ai");
    return;
  }
  window.open("https://calendar.google.com","_blank");
}

/* ===== 画像 ===== */
function openCamera(){imageInput.click();}
function openGallery(){imageInput.click();}

/* ===== 位置 ===== */
function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    addMessage(`📍${pos.coords.latitude},${pos.coords.longitude}`,"ai");
  });
}

/* ===== 設定 ===== */
function openSettings(){
  modal.style.display="flex";
}

function saveSettings(){
  localStorage.setItem("apiKey",apiKey.value);
  localStorage.setItem("mode",mode.value);
  voiceOn=voiceToggle.checked;
  localStorage.setItem("voiceOn",voiceOn);
  modal.style.display="none";
  addMessage("設定保存しました","ai");
}
</script>

</body>
</html>

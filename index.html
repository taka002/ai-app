<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100vh;display:flex;flex-direction:column;
}
#character{height:30vh;}
#character img{width:100%;height:100%;object-fit:cover;}
#infoBar{text-align:center;font-size:13px;padding:6px;background:#fff8;}
#chat{flex:1;overflow:auto;padding:10px;padding-bottom:100px;}
.msg{max-width:85%;margin:8px;}
.user{margin-left:auto;text-align:right;}
.ai{text-align:left;}
.bubble{display:inline-block;padding:12px;border-radius:16px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}

#bottom{position:fixed;bottom:0;width:100%;background:#fff;padding:8px;}
#controls{display:flex;gap:6px;flex-wrap:wrap;}
#input{flex:1;padding:10px;border-radius:20px;border:none;}

button{border:none;border-radius:10px;padding:10px;}

#modal{position:fixed;width:100%;height:100%;display:none;background:#0008;justify-content:center;align-items:center;}
#modalContent{background:#222;color:#fff;padding:20px;border-radius:12px;width:90%;}
</style>
</head>

<body>

<div id="character">
<img src="normal.png">
</div>

<div id="infoBar"></div>
<div id="chat"></div>

<div id="bottom">
<div id="controls">
<input id="input" placeholder="話しかけてください">
<button onclick="send()">➤</button>
<button onclick="openNews()">📰</button>
<button onclick="openTransit()">🚃</button>
<button onclick="openMap()">🗺</button>
<button onclick="openCalendar()">📅</button>
<button onclick="openGmail()">📧</button>
<button onclick="openSettings()">⚙</button>
</div>
</div>

<div id="modal">
<div id="modalContent">

<h3>ChatGPTキー</h3>
<input id="apiKey">

<h3>音声</h3>
<input type="checkbox" id="voiceToggle"> ON

<br><br>
<button onclick="saveSettings()">保存</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const infoBar=document.getElementById("infoBar");

const modal=document.getElementById("modal");
const apiKey=document.getElementById("apiKey");
const voiceToggle=document.getElementById("voiceToggle");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let history=[];

let locationText="";
let weatherText="";
let weatherCode=null;
let lat=null;
let lon=null;

/* ===== 時刻 ===== */
setInterval(()=>{
const now=new Date();
infoBar.innerHTML=now.toLocaleString()+"<br>"+locationText+" "+weatherText;
},1000);

/* ===== 表示 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;

if(c==="ai" && voiceOn){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}
}

/* ===== 挨拶 ===== */
function greeting(){
const h=new Date().getHours();
if(h<5) return "まだ夜ですね";
if(h<11) return "おはようございます☀️";
if(h<17) return "こんにちは😊";
if(h<22) return "こんばんは🌙";
return "夜遅いですね";
}

/* ===== 天気 ===== */
function weatherComment(){
if(weatherCode===0) return "今日は快晴☀️";
if(weatherCode<=3) return "ちょっと曇り☁️";
if(weatherCode<=67) return "雨ですね☔";
if(weatherCode<=77) return "雪かも❄️";
return "天気荒れ気味⚡";
}

/* ===== ChatGPT ===== */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

history.push({role:"user",content:t});
if(history.length>10) history.shift();

try{
const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:history
})
});

const data=await res.json();
add(data.choices?.[0]?.message?.content||"エラー","ai");

}catch(e){
add("通信エラー","ai");
}
}

/* ===== 外部リンク ===== */
function openNews(){
const keyword = locationText.replace("📍","");
if(confirm("OK→Yahoo\nキャンセル→NewsPicks")){
window.open(`https://news.yahoo.co.jp/search?p=${encodeURIComponent(keyword)}`);
}else{
window.open(`https://newspicks.com/search?q=${encodeURIComponent(keyword)}`);
}
}

function openTransit(){
window.open("https://transit.yahoo.co.jp/");
}

function openMap(){
if(lat && lon){
window.open(`https://www.google.com/maps?q=${lat},${lon}`);
}else{
window.open("https://www.google.com/maps");
}
}

function openCalendar(){
window.open("https://calendar.google.com/");
}

function openGmail(){
window.open("https://mail.google.com/");
}

/* ===== 位置＋天気 ===== */
function getLocation(){
navigator.geolocation.getCurrentPosition(async pos=>{
lat=pos.coords.latitude;
lon=pos.coords.longitude;

const geo=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
const g=await geo.json();

const city=g.address.city||g.address.town||g.address.village||"";
locationText=`📍${city}`;

const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const wd=await w.json();

weatherCode=wd.current_weather.weathercode;
weatherText=`🌤${wd.current_weather.temperature}℃`;

add(`現在地：${locationText}<br>${weatherText}`,"ai");
add(weatherComment(),"ai");

},()=>add("位置情報の許可が必要","ai"));
}

/* ===== 起動 ===== */
window.onload=()=>{
add(greeting(),"ai");
getLocation();
};

/* ===== 設定 ===== */
function openSettings(){
modal.style.display="flex";
apiKey.value=localStorage.getItem("apiKey")||"";
voiceToggle.checked=voiceOn;
}

function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
localStorage.setItem("voiceOn",voiceToggle.checked);
voiceOn=voiceToggle.checked;
modal.style.display="none";
add("保存しました","ai");
}
</script>

</body>
</html>

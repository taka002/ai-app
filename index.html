<!-- ★変更部分だけまとめて改善してる -->
<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const infoBar=document.getElementById("infoBar");
const menu=document.getElementById("menu");
const micBtn=document.getElementById("micBtn");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let history=JSON.parse(localStorage.getItem("chatHistory"))||[];

let lat=null, lon=null;
let locationText="", weatherText="";

/* ===== 表示（重複防止版） ===== */
function add(t,c,save=true){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;

if(save){
history.push({role:c==="user"?"user":"assistant",content:t});
if(history.length>50) history.shift();
localStorage.setItem("chatHistory",JSON.stringify(history));
}
}

/* ===== 音声 ===== */
function speak(text){
if(!voiceOn) return;
speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(text);
u.lang="ja-JP";
speechSynthesis.speak(u);
}
document.body.onclick=()=>speechSynthesis.resume();

/* ===== ChatGPT ===== */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

try{
const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:history
})
});
const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");
speak(reply);

}catch{
add("通信エラー","ai");
}
}

/* ===== 音声入力（自動送信） ===== */
if(window.SpeechRecognition || window.webkitSpeechRecognition){
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const rec=new SR();
rec.lang="ja-JP";

micBtn.onclick=()=>{
try{
rec.start();
add("🎤 聞いてます...", "ai", false);
}catch{}
};

rec.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}else{
micBtn.onclick=()=>add("音声非対応","ai");
}

/* ===== メニュー ===== */
function openMenu(){
menu.style.display="flex";
document.getElementById("apiKey").value=localStorage.getItem("apiKey")||"";
document.getElementById("voiceToggle").checked=voiceOn;
}
function closeMenu(){menu.style.display="none";}

/* ===== 設定 ===== */
function saveSettings(){
localStorage.setItem("apiKey",document.getElementById("apiKey").value);
localStorage.setItem("voiceOn",document.getElementById("voiceToggle").checked);
voiceOn=document.getElementById("voiceToggle").checked;
menu.style.display="none";
add("保存しました","ai");
}

/* ===== 天気 ===== */
function getLocation(){
navigator.geolocation.getCurrentPosition(async pos=>{
lat=pos.coords.latitude;
lon=pos.coords.longitude;

const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const wd=await w.json();

const temp=wd.current_weather.temperature;
weatherText=`🌤 ${temp}℃`;
locationText="📍現在地";

infoBar.innerHTML=locationText+" "+weatherText;

},()=>{
infoBar.innerHTML="位置取得できません";
});
}

/* ===== 起動 ===== */
window.onload=()=>{

/* 履歴復元（保存なし） */
history.forEach(h=>{
add(h.content,h.role==="user"?"user":"ai",false);
});

add("こんにちは😊","ai");

getLocation();
};
</script>

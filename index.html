<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全神版</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100vh;display:flex;flex-direction:column;
}

#character{height:28vh;}
#character img{width:100%;height:100%;object-fit:cover;}

#infoBar{text-align:center;font-size:12px;background:#fff8;padding:5px;}

#chat{flex:1;overflow:auto;padding:10px;padding-bottom:120px;}
.msg{margin:6px;max-width:85%;}
.user{margin-left:auto;text-align:right;}
.ai{text-align:left;}
.bubble{padding:12px;border-radius:16px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}

#bottom{position:fixed;bottom:0;width:100%;background:#fff;padding:8px;}
#controls{display:flex;gap:6px;}
#input{flex:1;padding:10px;border-radius:20px;border:none;}

button{border:none;border-radius:10px;padding:10px;}

#fab{position:fixed;right:10px;bottom:90px;}
#setBtn{width:50px;height:50px;border-radius:50%;background:#333;color:#fff;}

#modal{
position:fixed;width:100%;height:100%;
display:none;background:#0008;
justify-content:center;align-items:center;
}
#modalContent{
background:#222;color:#fff;padding:15px;
width:90%;max-height:80%;overflow:auto;
border-radius:10px;
}
</style>
</head>

<body>

<div id="character">
<img id="avatar" src="normal.png">
</div>

<div id="infoBar"></div>
<div id="chat"></div>

<div id="bottom">
<div id="controls">
<input id="input">
<button onclick="startVoice()">🎤</button>
<button onclick="send()">➤</button>
<button onclick="openSettings()">⚙</button>
</div>
</div>

<div id="fab"></div>

<!-- 設定 -->
<div id="modal">
<div id="modalContent">

<h3>API</h3>
<input id="apiKey" placeholder="ChatGPT">

<h3>モード</h3>
<select id="mode">
<option value="normal">通常</option>
<option value="teacher">家庭教師</option>
<option value="counselor">カウンセラー</option>
<option value="medical">医療</option>
</select>

<hr>

<button onclick="openYahooNews()">Yahooニュース</button>
<button onclick="openNewsPicks()">NewsPicks</button>

<button onclick="openMap()">マップ</button>
<button onclick="openTransit()">乗換</button>

<input id="searchText" placeholder="Google検索">
<button onclick="googleSearch()">検索</button>

<input id="ytText" placeholder="YouTube検索">
<button onclick="youtubeSearch()">YouTube</button>

<button onclick="openGmail()">Gmail</button>
<button onclick="openLine()">LINE</button>
<button onclick="sendToLine()">LINE送信</button>

<button onclick="openCalendar()">カレンダー</button>

<button onclick="saveSettings()">保存</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const avatar=document.getElementById("avatar");

/* ===== 状態 ===== */
let memory=JSON.parse(localStorage.getItem("memory")||"[]");
let history=[];
let lastTalk=Date.now();

/* ===== 表示 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;

if(c==="ai"){
changeFace(t);
speak(t);
}
}

/* 表情 */
function changeFace(t){
if(t.includes("ありがとう")) avatar.src="agree.png";
else avatar.src="normal.png";
}

/* 音声 */
function speak(t){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

/* ===== AI ===== */
async function send(){
let t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";
lastTalk=Date.now();

/* ===== ウェイクワード ===== */
if(t.includes("美咲")){
t=t.replace(/美咲[、,\s]?/,"").trim();

if(t.includes("ニュース")) return openYahooNews();
if(t.includes("地図")) return openMap();
if(t.includes("乗換")) return openTransit();
}

/* ===== 記憶 ===== */
memory.push("ユーザー:"+t);
if(memory.length>20) memory.shift();

const key=localStorage.getItem("apiKey");
if(!key) return add("APIキー未設定","ai");

add("考え中...","ai");

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:memory.join("\n")},
{role:"user",content:t}
]
})
});

const d=await res.json();
const reply=d.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");

/* 記憶保存 */
memory.push("AI:"+reply);
localStorage.setItem("memory",JSON.stringify(memory));
}

/* ===== 自動提案 ===== */
setInterval(()=>{
if(Date.now()-lastTalk>180000){
add("ニュース見る？","ai");
lastTalk=Date.now();
}
},60000);

/* ===== 音声入力 ===== */
function startVoice(){
const R=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!R)return;

const rec=new R();
rec.lang="ja-JP";

rec.onresult=e=>{
let t=e.results[0][0].transcript;

if(t.includes("美咲")){
t=t.replace(/美咲[、,\s]?/,"").trim();
input.value=t;
send();
}else{
add("『美咲』って呼んでね","ai");
}
};

rec.start();
}

/* ===== 外部 ===== */
function openYahooNews(){window.open("https://news.yahoo.co.jp");}
function openNewsPicks(){window.open("https://newspicks.com");}
function openMap(){window.open("https://maps.google.com");}
function openTransit(){window.open("https://transit.yahoo.co.jp");}
function openCalendar(){window.open("https://calendar.google.com");}
function openLine(){window.open("https://line.me");}
function openGmail(){window.open("https://mail.google.com");}

function sendToLine(){
const t=document.querySelector(".bubble:last-child")?.innerText;
window.open("https://line.me/R/msg/text/?"+encodeURIComponent(t));
}

function googleSearch(){
const q=document.getElementById("searchText").value;
window.open("https://google.com/search?q="+encodeURIComponent(q));
}

function youtubeSearch(){
const q=document.getElementById("ytText").value;
window.open("https://youtube.com/results?search_query="+encodeURIComponent(q));
}

/* ===== 設定 ===== */
function openSettings(){
modal.style.display="flex";
apiKey.value=localStorage.getItem("apiKey")||"";
}

function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
modal.style.display="none";
add("保存OK","ai");
}
</script>

</body>
</html>

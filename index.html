<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:60px;
}

/* 上 */
header{height:28vh;}
header img{width:100%;height:100%;object-fit:cover;}

/* 情報バー */
#infoBar{
text-align:center;
font-size:11px;
padding:4px;
background:rgba(255,255,255,0.6);
}

/* チャット */
main{flex:1;overflow-y:auto;padding:10px;}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}

.bubble{
display:inline-block;
padding:10px 12px;
border-radius:16px;
background:#fff;
font-size:14px;
}
.user .bubble{background:#0072ff;color:#fff;}

/* 下バー */
footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#ffffffee;
padding:6px;
border-top:1px solid #ccc;
display:flex;
justify-content:center;
}

#dock{
width:100%;
max-width:600px;
display:flex;
gap:6px;
align-items:center;
}

#input{
flex:1;
height:36px;
padding:8px;
border-radius:20px;
border:none;
}

.dockBtn{
width:36px;height:36px;
border:none;border-radius:10px;
background:#eee;
}

/* メニュー */
#menu{
position:fixed;
bottom:-100%;
width:100%;
height:85%;
background:#111;
color:#fff;
display:flex;
flex-direction:column;
border-radius:20px 20px 0 0;
transition:.3s;
}

#menu.active{bottom:0;}

#menuHandle{
width:50px;height:5px;
background:#666;
margin:8px auto;
border-radius:10px;
}

#menuTop{flex:1;overflow:auto;padding:15px;}
#menuBottom{padding:12px;border-top:1px solid #333;}

.menuGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.menuItem{
height:90px;
background:#333;
border-radius:16px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.menuBtn{
width:100%;height:48px;
margin:10px 0;
border:none;border-radius:10px;
background:#444;color:#fff;
}

.menuInput{
width:100%;height:44px;
border-radius:10px;
border:none;padding:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<img src="normal.png">
</header>

<div id="infoBar"></div>

<main id="chat"></main>

<footer>
<div id="dock">
<input id="input" placeholder="話しかけてください">
<button class="dockBtn" onclick="send()">➤</button>
<button class="dockBtn" id="micBtn">🎤</button>
<button class="dockBtn" onclick="openMenu()">☰</button>
</div>
</footer>

<!-- メニュー -->
<div id="menu">
<div id="menuHandle"></div>

<div id="menuTop">
<input id="searchBox" placeholder="Google検索">
<button class="menuBtn" onclick="searchGoogle()">検索</button>

<div class="menuGrid">
<div class="menuItem" onclick="openNews()">📰<br>ニュース</div>
<div class="menuItem" onclick="openMap()">🗺<br>地図</div>
<div class="menuItem" onclick="openWeather()">☀️<br>天気</div>
</div>
</div>

<div id="menuBottom">
<h3>設定</h3>
<input id="apiKey" class="menuInput" placeholder="APIキー">
<label><input type="checkbox" id="voiceToggle"> 音声ON</label>
<button class="menuBtn" onclick="saveSettings()">保存</button>
<button class="menuBtn" onclick="closeMenu()">閉じる</button>
</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const menu=document.getElementById("menu");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let history=JSON.parse(localStorage.getItem("chatHistory"))||[];

let locationText="";
let weatherText="";
let weatherSpoken=false;

/* 表示 */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
history.push({role:c==="user"?"user":"assistant",content:t});
localStorage.setItem("chatHistory",JSON.stringify(history));
}

/* 音声 */
function speak(t){
if(!voiceOn) return;
speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(t);
u.lang="ja-JP";
speechSynthesis.speak(u);
}
document.body.onclick=()=>speechSynthesis.resume();

/* 時間 */
function getNow(){
const d=new Date();
const w=["日","月","火","水","木","金","土"];
return `${d.getMonth()+1}/${d.getDate()}(${w[d.getDay()]}) ${d.getHours()}:${d.getMinutes()}`;
}

/* 挨拶 */
function greet(){
const h=new Date().getHours();
if(h<11)return"おはようございます";
if(h<18)return"こんにちは";
return"こんばんは";
}

/* 天気 */
async function loadWeather(lat,lon){
const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const d=await res.json();
const w=d.current_weather;

const map={0:"晴れ",1:"晴れ",2:"曇り",3:"曇り",61:"雨"};
const text=map[w.weathercode]||"不明";

weatherText=`${text} ${w.temperature}℃`;

if(!weatherSpoken){
speak(`今日は${text}、気温は${w.temperature}度です`);
weatherSpoken=true;
}
}

/* 位置 */
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(async pos=>{
const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

const res=await fetch(`https://geoapi.heartrails.com/api/json?method=searchByGeoLocation&x=${lon}&y=${lat}`);
const data=await res.json();
locationText=data.response.location[0].city;

loadWeather(lat,lon);
});
}

/* infoBar */
setInterval(()=>{
document.getElementById("infoBar").innerHTML=
getNow()+" "+locationText+" "+weatherText;
},1000);

/* Chat */
async function send(){
const t=input.value.trim();
if(!t)return;
add(t,"user");
input.value="";

const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({model:"gpt-4o-mini",messages:history})
});
const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");
speak(reply);
}

/* メニュー */
function openMenu(){menu.classList.add("active");}
function closeMenu(){menu.classList.remove("active");}
function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
localStorage.setItem("voiceOn",voiceToggle.checked);
voiceOn=voiceToggle.checked;
add("保存しました","ai");
closeMenu();
}

/* 外部 */
function openNews(){window.open("https://news.yahoo.co.jp/");}
function openMap(){window.open("https://maps.google.com");}
function openWeather(){window.open("https://weather.yahoo.co.jp/");}

/* 起動 */
window.onload=()=>{
add(greet()+"😊","ai");
};
</script>

</body>
</html>

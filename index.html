<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;}

#character{
position:absolute;top:0;left:0;width:100%;height:100%;
object-fit:cover;object-position:center 28%;transform:scale(1.08);
}

#bubble{
position:absolute;bottom:65px;left:50%;transform:translateX(-50%);
width:92%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
border-radius:25px;
padding:14px;
font-size:16px;
text-align:center;
z-index:5;
}

#inputArea{
position:fixed;left:50%;transform:translateX(-50%);
width:92%;display:flex;gap:6px;
bottom:50px;
}

#mic{width:34px;height:34px;border-radius:50%;border:none;}
#input{flex:1;height:34px;border-radius:16px;border:none;}
#send{height:34px;border-radius:999px;background:#4da6ff;color:white;border:none;}

#settingsBtn,#appBtn{
position:fixed;bottom:10px;width:36px;height:36px;border-radius:50%;
background:white;display:flex;align-items:center;justify-content:center;
}
#settingsBtn{left:calc(50% - 45px);}
#appBtn{left:calc(50% + 10px);}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">どうしたのかな？😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");
function saveMemory(u,a){
memory.push({user:u,ai:a});
if(memory.length>20) memory.shift();
localStorage.setItem("memory",JSON.stringify(memory));
}

/* ===== 設定 ===== */
settingsBtn.onclick=()=>{
const m=prompt("1:APIキー 2:名前 3:性格 4:リセット");

if(m==="1"){
const k=prompt("APIキー");
if(k){localStorage.setItem("apiKey",k);API_KEY=k;}
}
if(m==="2"){
const n=prompt("名前");
if(n)localStorage.setItem("userName",n);
}
if(m==="3"){
const mode=prompt("性格");
if(mode)localStorage.setItem("aiMode",mode);
}
if(m==="4"){
localStorage.clear();location.reload();
}
};

/* ===== 感情データ ===== */
const emotionGroups = {

happy:["happy.png","smile.png"],
joy:["happy.png","smile.png"],
love:["shy.png","embarrassed.png"],

sad:["sad.png","cry.png"],
depressed:["sad.png","cry.png"],

anger:["anger.png"],
frustration:["irritation.png"],

anxiety:["anxiety.png"],
fear:["panic.png"],

thinking:["thinking.png"],
neutral:["normal.png"],

relief:["relieved.png"],
tired:["sleepy.png"],

surprise:["surprise.png"],

agree:["agree.png"],
disagree:["disagree.png"]
};

/* ===== 感情判定 ===== */
function getEmotionGroup(text){

if(Math.random()<0.15) return "neutral";

if(/ありがとう|嬉しい/.test(text)) return "happy";
if(/好き|大事/.test(text)) return "love";

if(/悲しい|つらい/.test(text)) return "sad";
if(/疲れた/.test(text)) return "tired";

if(/イライラ|ムカ/.test(text)) return "anger";

if(/不安|怖い/.test(text)) return "anxiety";

if(/どう思う|考え/.test(text)) return "thinking";

if(/え？|本当/.test(text)) return "surprise";

if(/いいね/.test(text)) return "agree";
if(/違う/.test(text)) return "disagree";

return "neutral";
}

/* ===== 表情制御 ===== */
let currentEmotion="";
let lastImage="";
let timer=null;

function changeEmotion(text){

const group=getEmotionGroup(text);
if(group===currentEmotion) return;

if(timer) clearTimeout(timer);

const delay=700+Math.random()*800;

timer=setTimeout(()=>{
applyEmotion(group);
currentEmotion=group;
},delay);
}

function applyEmotion(group){

const list=emotionGroups[group]||["normal.png"];

const index=Math.floor(Math.pow(Math.random(),1.5)*list.length);

let img=list[index];

if(img===lastImage && list.length>1){
img=list[(index+1)%list.length];
}

lastImage=img;
character.src=img;
}

/* ===== 名前 ===== */
function addName(text){
const name=localStorage.getItem("userName");
if(name && Math.random()<0.4){
return name+"、"+text;
}
return text;
}

/* ===== タイピング ===== */
async function typeText(t){
bubble.innerText="";
for(let c of t){
bubble.innerText+=c;
await new Promise(r=>setTimeout(r,15));
}
}

/* ===== AI ===== */
async function getAIResponse(msg){

if(!API_KEY) return "APIキー入れてね";

try{

const controller=new AbortController();
setTimeout(()=>controller.abort(),10000);

const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
signal:controller.signal,
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"優しい女性キャラ"},
...memory.flatMap(m=>[
{role:"user",content:m.user},
{role:"assistant",content:m.ai}
]),
{role:"user",content:msg}
]
})
});

if(!r.ok) return "ちょっと調子悪いみたい…";

const d=await r.json();

if(!d.choices) return "うまく考えられない…";

return d.choices[0].message.content;

}catch(e){

if(e.name==="AbortError"){
return "少し時間かかっちゃった…";
}

return "通信が不安定みたい…";
}
}

/* ===== 送信 ===== */
async function send(){

const text=input.value;

if(!text.trim()){
bubble.innerText="何か話して😊";
return;
}

input.value="";
character.src="thinking.png";
bubble.innerText="考え中...";

let reply=await getAIResponse(text);

reply=addName(reply);

await typeText(reply);
changeEmotion(reply);

saveMemory(text,reply);
}

/* ===== 音声 ===== */
if('webkitSpeechRecognition' in window){
const r=new webkitSpeechRecognition();
r.lang='ja-JP';
mic.onclick=()=>r.start();
r.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}else{
mic.onclick=()=>alert("非対応");
}
</script>

</body>
</html>

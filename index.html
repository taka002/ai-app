<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;}

/* ===== 🔥 キャラ2枚（クロスフェード） ===== */
#charA,#charB{
position:absolute;
top:0;left:0;
width:100%;height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
transition:opacity 0.4s ease, transform 0.4s ease;
}

/* 前面・背面 */
#charA{opacity:1;}
#charB{opacity:0;}

/* ===== 吹き出し ===== */
#bubble{
position:absolute;
bottom:65px;
left:50%;
transform:translateX(-50%) translateY(10px);

width:88%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
border-radius:20px;

padding:10px 12px;
font-size:14px;
line-height:1.4;
text-align:center;
z-index:5;

max-height:120px;
overflow:hidden;
word-break:break-word;

opacity:0;
transition:all 0.4s ease;
}

#bubble.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

#inputArea{
position:fixed;left:50%;transform:translateX(-50%);
width:92%;display:flex;gap:6px;
bottom:50px;
}

#mic{width:34px;height:34px;border-radius:50%;border:none;}
#input{flex:1;height:34px;border-radius:16px;border:none;}
#send{height:34px;border-radius:999px;background:#4da6ff;color:white;border:none;}

#settingsBtn,#appBtn{
position:fixed;bottom:10px;width:36px;height:36px;border-radius:50%;
background:white;display:flex;align-items:center;justify-content:center;
}
#settingsBtn{left:calc(50% - 45px);}
#appBtn{left:calc(50% + 10px);}
</style>
</head>

<body>

<!-- 🔥 2枚構成 -->
<img id="charA" src="normal.png">
<img id="charB" src="normal.png">

<div id="bubble"></div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send">送信</button>
</div>

<script>

/* ===== 初期 ===== */
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== メモリ ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");
function saveMemory(u,a){
memory.push({user:u,ai:a});
if(memory.length>20) memory.shift();
localStorage.setItem("memory",JSON.stringify(memory));
}

/* ===== 🔥 バブル ===== */
function showBubble(text){
bubble.classList.remove("show");
setTimeout(()=>{
bubble.innerText = text;
bubble.classList.add("show");
},150);
}

/* ===== 🔥 表情クロスフェード ===== */
let isA = true;

function changeFace(img){
const front = isA ? charA : charB;
const back  = isA ? charB : charA;

back.src = img;

/* 少しズーム差 */
back.style.transform = "scale(1.12)";
front.style.transform = "scale(1.08)";

setTimeout(()=>{
front.style.opacity = 0;
back.style.opacity = 1;
isA = !isA;
},50);
}

/* ===== 🔥 音声 ===== */
async function speak(text){
if(localStorage.getItem("voice")==="off") return;

if(API_KEY){
try{
const res = await fetch("https://api.openai.com/v1/audio/speech",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"gpt-4o-mini-tts",
voice:"aria",
input:text
})
});

if(res.ok){
const blob = await res.blob();
const url = URL.createObjectURL(blob);
const audio = new Audio(url);
await audio.play().catch(()=>setTimeout(()=>audio.play(),300));
return;
}
}catch(e){}
}

/* fallback */
const uttr = new SpeechSynthesisUtterance(text);
uttr.lang="ja-JP";
uttr.pitch = 1.2;
speechSynthesis.speak(uttr);
}

/* ===== AI ===== */
async function getAIResponse(msg){
if(!API_KEY) return "APIキー入れてね";

const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"優しい女性。短く自然。最後に軽く質問"},
...memory.flatMap(m=>[
{role:"user",content:m.user},
{role:"assistant",content:m.ai}
]),
{role:"user",content:msg}
]
})
});

const d=await r.json();
return d.choices?.[0]?.message?.content || "うまく話せない…";
}

/* ===== 送信 ===== */
async function send(){

const text=input.value;
if(!text.trim()){
showBubble("何か話して😊");
return;
}

input.value="";

/* 🔥 考え中 */
showBubble("考え中…");
setTimeout(()=>{
changeFace("thinking.png");
},200);

let reply=await getAIResponse(text);

/* 短く自然 */
if(reply.length>60) reply=reply.slice(0,60)+"…";
if(!reply.match(/？/)) reply+=" どう思う？";

/* 戻す */
changeFace("normal.png");

showBubble(reply);
speak(reply);

saveMemory(text,reply);
}

document.getElementById("send").onclick = send;

/* ===== 音声入力 ===== */
if('webkitSpeechRecognition' in window){
const r=new webkitSpeechRecognition();
r.lang='ja-JP';
mic.onclick=()=>r.start();
r.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}else{
mic.onclick=()=>alert("非対応");
}

/* ===== 起動 ===== */
window.onload=()=>{
const msg="どうしたのかな？😊";
showBubble(msg);
setTimeout(()=>speak(msg),500);
};

</script>

</body>
</html>

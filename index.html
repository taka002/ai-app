<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 神アプリ</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100dvh;
display:flex;
flex-direction:column;
padding-bottom:60px;
}
header{height:28vh;}
header img{width:100%;height:100%;object-fit:cover;}

main{flex:1;overflow-y:auto;padding:10px;}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{padding:10px;border-radius:16px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}

footer{
position:fixed;bottom:0;width:100%;
background:#fff;padding:6px;display:flex;justify-content:center;
}
#dock{width:100%;max-width:600px;display:flex;gap:6px;}
#input{width:58%;height:36px;border-radius:20px;border:none;padding:8px;}
.dockBtn{width:40px;height:36px;border:none;border-radius:10px;background:#eee;}

#menu{
position:fixed;bottom:-100%;width:100%;height:88%;
background:#111;color:#fff;
display:flex;flex-direction:column;
border-radius:20px 20px 0 0;
transition:.3s;
}
#menu.active{bottom:0;}
.menuInput,.menuBtn{width:100%;margin-bottom:10px;}
</style>
</head>

<body>

<header>
<img id="avatar" src="normal.png">
</header>

<main id="chat"></main>

<footer>
<div id="dock">
<input id="input">
<button class="dockBtn" onclick="send()">➤</button>
<button class="dockBtn" id="micBtn">🎤</button>
<button class="dockBtn" onclick="openMenu()">☰</button>
</div>
</footer>

<div id="menu">
<div style="padding:20px">
<input id="apiKey" class="menuInput" placeholder="APIキー">
<textarea id="systemPrompt" class="menuInput" placeholder="キャラ設定"></textarea>
<input type="file" id="avatarUpload" class="menuInput">
<label><input type="checkbox" id="voiceToggle"> 音声ON</label>
<button class="menuBtn" onclick="saveSettings()">保存</button>
<button class="menuBtn" onclick="closeMenu()">閉じる</button>
</div>
</div>

<script>

/* ===== 音声ロック解除 ===== */
document.body.addEventListener("click",()=>{
new Audio().play().catch(()=>{});
},{once:true});

/* ===== 基本 ===== */
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const avatar=document.getElementById("avatar");
const menu=document.getElementById("menu");

let voiceOn=false;
let history=[];
let isListening=false;
let rec=null;

/* ===== 表示 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* ===== 音声（確実版） ===== */
async function speak(text){
if(!voiceOn)return;

const key=localStorage.getItem("apiKey");
if(!key)return;

/* ロック解除 */
speechSynthesis.speak(new SpeechSynthesisUtterance(" "));

try{
const res=await fetch("https://api.openai.com/v1/audio/speech",{
method:"POST",
headers:{
"Authorization":"Bearer "+key,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"gpt-4o-mini-tts",
voice:"nova",
input:text
})
});

if(!res.ok) throw new Error();

const audio=new Audio(URL.createObjectURL(await res.blob()));
await audio.play();

}catch(e){
console.log("fallback",e);
speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}
}

/* ===== AI（プロンプト強制） ===== */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

add("考え中...","ai");

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
temperature:0.7,
messages:[
{
role:"system",
content:`
あなたは絶対にキャラを崩さないAI

【人格】
${localStorage.getItem("systemPrompt")||"優しい女性"}

【ルール】
・人格維持
・口調固定
・説明禁止
・自然会話のみ
`
},
...history,
{role:"user",content:t}
]
})
});

const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");
speak(reply);

history.push({role:"user",content:t});
history.push({role:"assistant",content:reply});
}

/* ===== 🎤 会話モード ===== */
if(window.SpeechRecognition||window.webkitSpeechRecognition){

rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="ja-JP";

const startTalks=[
"どうしたの？話していいよ😊",
"うん、聞くよ",
"なにかあった？",
"呼んだ？"
];

document.getElementById("micBtn").onclick=()=>{

if(!isListening){

rec.start();
isListening=true;

const msg=startTalks[Math.floor(Math.random()*startTalks.length)];

add(msg,"ai");
speak(msg);

}else{

rec.stop();
isListening=false;
add("会話モードOFF","ai");

}
};

rec.onresult=e=>{
input.value=e.results[0][0].transcript;
send();

/* 自動継続 */
if(isListening){
setTimeout(()=>rec.start(),600);
}
};

}

/* ===== 画像変更 ===== */
document.getElementById("avatarUpload").onchange=e=>{
const reader=new FileReader();
reader.onload=ev=>{
avatar.src=ev.target.result;
localStorage.setItem("avatar",ev.target.result);
};
reader.readAsDataURL(e.target.files[0]);
};

/* ===== メニュー ===== */
function openMenu(){menu.classList.add("active");}
function closeMenu(){menu.classList.remove("active");}

function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
localStorage.setItem("systemPrompt",systemPrompt.value);
localStorage.setItem("voiceOn",voiceToggle.checked);

voiceOn=voiceToggle.checked;

add("保存😊","ai");
closeMenu();
}

/* ===== 起動 ===== */
window.onload=()=>{
voiceOn=localStorage.getItem("voiceOn")==="true";
history=JSON.parse(localStorage.getItem("chatHistory"))||[];

const saved=localStorage.getItem("avatar");
if(saved) avatar.src=saved;
};

</script>

</body>
</html>

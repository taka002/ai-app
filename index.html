<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;}

.avatar{position:absolute;top:0;left:0;width:100%;height:100%;}
.base-face,.eye-layer{
position:absolute;width:100%;height:100%;
object-fit:cover;object-position:center 28%;
transform:scale(1.08);
}
.eye-layer{opacity:0;z-index:2;}

#bubble{
position:absolute;bottom:80px;left:50%;
transform:translateX(-50%) translateY(10px);
width:88%;background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);border-radius:20px;
padding:10px;font-size:14px;text-align:center;
z-index:5;opacity:0;transition:0.3s;
}
#bubble.show{opacity:1;transform:translateX(-50%)}

#bottomBar{
position:fixed;bottom:10px;left:50%;
transform:translateX(-50%);
width:95%;display:flex;gap:6px;
background:rgba(255,255,255,0.9);
border-radius:20px;padding:6px;
}

#bottomBar button{
height:36px;width:36px;border:none;border-radius:50%;
}
#send{
width:auto;padding:0 10px;border-radius:18px;
background:#4da6ff;color:#fff;
}
#input{
flex:1;height:36px;border:none;border-radius:18px;
padding:0 10px;
}
</style>
</head>

<body>

<div class="avatar">
<img id="character" src="normal.png" class="base-face">
<img id="blinkEye" src="blink.png" class="eye-layer">
</div>

<div id="bubble" class="show">どうしたのかな？😊</div>

<div id="bottomBar">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send">送信</button>
<button id="settingsBtn">⚙️</button>
<button id="appBtn">📱</button>
</div>

<script>

/* ===== 要素 ===== */
const bubble = document.getElementById("bubble");
const input = document.getElementById("input");
const character = document.getElementById("character");
const blinkEye = document.getElementById("blinkEye");
const sendBtn = document.getElementById("send");
const micBtn = document.getElementById("mic");
const settingsBtn = document.getElementById("settingsBtn");

/* ===== 状態 ===== */
let isSpeaking = false;
let blinkRunning = false;

/* 🔥 追加：音声ON/OFF */
let voiceEnabled = localStorage.getItem("voiceEnabled");
voiceEnabled = voiceEnabled === null ? true : voiceEnabled === "true";

/* ===== 音声解析 ===== */
let audioCtx;

/* ===== 瞬き ===== */
function blink(){
if(blinkRunning || isSpeaking) return;
blinkRunning = true;
blinkEye.style.opacity = 1;
setTimeout(()=>{
blinkEye.style.opacity = 0;
blinkRunning = false;
},90);
}
function autoBlink(){
setTimeout(()=>{
if(!isSpeaking) blink();
autoBlink();
},3000 + Math.random()*3000);
}
autoBlink();

/* ===== 吹き出し ===== */
function showBubble(text){
bubble.classList.remove("show");
setTimeout(()=>{
bubble.innerText = text;
bubble.classList.add("show");
},150);
}

/* ===== 音声 ===== */
let API_KEY = localStorage.getItem("apiKey") || "";

async function speak(text){

/* 🔥 音声OFFなら完全停止 */
if(!voiceEnabled){
isSpeaking = false;
return;
}

if(!audioCtx){
audioCtx = new (window.AudioContext || window.webkitAudioContext)();
await audioCtx.resume();
}

const uttr = new SpeechSynthesisUtterance(text);
uttr.lang="ja-JP";
uttr.pitch=1.2;
uttr.rate=0.95;

uttr.onstart=()=>{isSpeaking=true;};
uttr.onend=()=>{isSpeaking=false; blink();};

speechSynthesis.cancel();
speechSynthesis.speak(uttr);
}

/* ===== AI ===== */
async function getAIResponse(msg){
if(!API_KEY) return "設定でAPIキーを入れてね";

const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"優しい女性。短く自然に"},
{role:"user",content:msg}
]
})
});
const d=await r.json();
return d.choices?.[0]?.message?.content || "うまく話せない…";
}

/* ===== 送信 ===== */
async function send(){
const text=input.value;
if(!text.trim()){showBubble("何か話して😊");return;}
input.value="";
showBubble("…");

let reply = await getAIResponse(text);
showBubble(reply);
speak(reply);
}

sendBtn.onclick = send;
input.addEventListener("keydown",e=>{if(e.key==="Enter")send();});

/* ===== マイク ===== */
if('webkitSpeechRecognition' in window){
const r=new webkitSpeechRecognition();
r.lang='ja-JP';
micBtn.onclick=()=>r.start();
r.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}

/* ===== 設定 ===== */
settingsBtn.onclick = ()=>{

const key = prompt("APIキー入力", API_KEY || "");
if(key){ API_KEY = key; localStorage.setItem("apiKey", key); }

/* 🔥 音声ON/OFF */
const voice = confirm("音声をONにしますか？\nOK=ON / キャンセル=OFF");
voiceEnabled = voice;
localStorage.setItem("voiceEnabled", voice);

alert("設定保存したよ");
};

/* ===== 起動 ===== */
window.onload=()=>{
setTimeout(()=>{
const text="おかえり。今日もお疲れさま。";
showBubble(text);
speak(text);
},800);
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
height:100dvh;
overflow:hidden;
}

/* キャラ */
#character{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
}

/* 吹き出し */
#bubble{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
width:auto;
max-width:92%;
min-width:60%;
max-height:30vh;
overflow-y:auto;
background:rgba(255,255,255,0.9);
border-radius:25px;
padding:14px;
font-size:16px;
line-height:1.4;
text-align:center;
backdrop-filter:blur(8px);
z-index:5;
word-break:break-word;
}

/* しっぽ */
#bubble::after{
content:"";
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%) rotate(45deg);
width:22px;
height:22px;
background:rgba(255,255,255,0.9);
}

/* 入力エリア */
#inputArea{
position:fixed;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
align-items:center;
gap:6px;
padding:8px 10px calc(env(safe-area-inset-bottom) + 10px);
background:rgba(255,255,255,0.95);
border-radius:20px;
z-index:10;
bottom:0;
}

#input{
flex:1;
min-width:0;
height:38px;
padding:0 10px;
border-radius:18px;
border:none;
font-size:14px;
background:#eee;
}

#send{
height:38px;
padding:0 14px;
border:none;
border-radius:999px;
background:#4da6ff;
color:white;
font-size:14px;
}

#mic{
width:38px;
height:38px;
border-radius:50%;
border:none;
background:#eee;
font-size:16px;
}

#settingsBtn,#appBtn{
position:fixed;
bottom:60px;
width:44px;
height:44px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:20;
font-size:18px;
}

#settingsBtn{left:20px;}
#appBtn{right:20px;}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">どうしたのかな？話してくれると嬉しいな😊</div>
<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 設定 ===== */
document.getElementById("settingsBtn").onclick = ()=>{
  const key = prompt("APIキーを入力");
  if(key){
    localStorage.setItem("apiKey", key);
    API_KEY = key;
    alert("保存したよ！");
  }
};

/* ===== 短期記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");

function saveMemory(user, ai){
  memory.push({user, ai});
  if(memory.length > 20) memory.shift();
  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== 長期記憶 ===== */
let longMemory = JSON.parse(localStorage.getItem("longMemory") || "{}");

function saveLongMemory(key, value){
  longMemory[key] = value;
  localStorage.setItem("longMemory", JSON.stringify(longMemory));
}

/* ===== 情報抽出 ===== */
function extractMemory(text){
  if(text.includes("名前")){
    let name = text.replace("名前","").trim();
    if(name) saveLongMemory("name", name);
  }

  if(text.includes("好き")){
    saveLongMemory("like", text);
  }

  if(text.includes("嫌い")){
    saveLongMemory("dislike", text);
  }

  if(text.includes("疲れ") || text.includes("しんど")){
    saveLongMemory("condition", text);
  }
}

/* ===== 感情 ===== */
function getEmotion(text){
  if(/嬉|ありがとう/.test(text)) return "happy.png";
  if(/悲|辛|泣/.test(text)) return "sad.png";
  if(/怒/.test(text)) return "anger.png";
  if(/不安|怖/.test(text)) return "anxiety.png";
  if(/驚|！？/.test(text)) return "surprise.png";
  return "normal.png";
}

let currentEmotion="normal.png";

function changeEmotion(text){
  const chara=document.getElementById("character");
  const next=getEmotion(text);
  if(next===currentEmotion) return;
  currentEmotion=next;

  chara.style.opacity=0;
  setTimeout(()=>{
    chara.src=next;
    chara.style.opacity=1;
  },200);
}

/* ===== thinking ===== */
function startThinking(){
  const bubble=document.getElementById("bubble");
  let dots=0;
  return setInterval(()=>{
    dots=(dots+1)%4;
    bubble.innerText="・・・".slice(0,dots+1);
  },400);
}

/* ===== typing ===== */
async function typeText(text){
  const bubble=document.getElementById("bubble");
  bubble.innerText="";
  for(let i=0;i<text.length;i++){
    bubble.innerText+=text[i];
    await new Promise(r=>setTimeout(r,25));
  }
}

/* ===== メッセージ構築 ===== */
function buildMessages(userMessage){
  let msgs=[{
    role:"system",
    content:`優しく短く会話するAI。
ユーザー情報:${JSON.stringify(longMemory)}`
  }];

  memory.forEach(m=>{
    msgs.push({role:"user",content:m.user});
    msgs.push({role:"assistant",content:m.ai});
  });

  msgs.push({role:"user",content:userMessage});
  return msgs;
}

/* ===== API ===== */
async function getAIResponse(message){
  if(!API_KEY) return "設定からAPIキー入れてね🙏";

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:buildMessages(message)
    })
  });

  const data=await res.json();
  return data.choices[0].message.content;
}

/* ===== 送信 ===== */
async function send(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text) return;

  input.value="";
  extractMemory(text);

  document.getElementById("character").src="typing.png";

  const thinking=startThinking();

  try{
    const reply=await getAIResponse(text);

    clearInterval(thinking);
    await typeText(reply);

    saveMemory(text,reply);

    setTimeout(()=>changeEmotion(reply),800);

  }catch(e){
    clearInterval(thinking);
    document.getElementById("bubble").innerText="エラー...";
    document.getElementById("character").src="glitch.png";
  }
}

/* ===== 音声 ===== */
const micBtn=document.getElementById("mic");
let recognition;

if ('webkitSpeechRecognition' in window) {
  recognition=new webkitSpeechRecognition();
  recognition.lang='ja-JP';

  micBtn.onclick=()=>{
    recognition.start();
    micBtn.innerText="🎙️";
  };

  recognition.onresult=(e)=>{
    const text=e.results[0][0].transcript;
    document.getElementById("input").value=text;
    micBtn.innerText="🎤";
    send();
  };

  recognition.onend=()=>micBtn.innerText="🎤";
}else{
  micBtn.onclick=()=>alert("音声未対応🙏");
}
</script>

</body>
</html>

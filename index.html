<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  background:#cfd6e0;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* キャラ */
#character{
  height:28vh;
  overflow:hidden;
}
#character img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* チャット */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* 吹き出し */
.msg{
  max-width:85%;
  margin:6px 0;
  padding:10px;
  border-radius:12px;
  word-break:break-word;
}

.user{
  background:#5aa0e6;
  color:#fff;
  margin-left:auto;
}

.ai{
  background:#eee;
}

/* 下 */
#bottom{
  background:#ddd;
  padding:6px;
}

#controls{
  display:flex;
  gap:6px;
}

#input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

#controls button{
  width:44px;
  height:44px;
  border:none;
  border-radius:10px;
  background:#5aa0e6;
  color:white;
}

#sendBtn{
  width:60px;
}

/* 設定 */
#settingBtn{
  margin-top:6px;
  width:100%;
  padding:10px;
  background:#333;
  color:#fff;
  border:none;
  border-radius:10px;
}

/* モーダル */
#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

#modalContent{
  background:#222;
  color:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
}

#modal input,#modal textarea{
  width:100%;
  margin:6px 0;
  padding:8px;
}

/* ===== プレゼンUI ===== */
.card{
  background:#fff;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.block{
  background:#fff;
  padding:12px;
  border-left:6px solid #5aa0e6;
  border-radius:10px;
  margin-bottom:8px;
}

.flow{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
}
.flow div{
  background:#fff;
  padding:8px;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- キャラ -->
<div id="character">
  <img id="avatar" src="normal.png">
</div>

<!-- チャット -->
<div id="chat"></div>

<!-- 下 -->
<div id="bottom">
  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button id="sendBtn">送信</button>
    <button>📷</button>
    <button>📸</button>
  </div>
  <button id="settingBtn">⚙ 設定</button>
</div>

<!-- 設定 -->
<div id="modal">
  <div id="modalContent">
    APIキー
    <input id="apiKey">

    プロンプト
    <textarea id="prompt"></textarea>

    音声ON
    <input type="checkbox" id="voiceToggle">

    <br><br>
    <button onclick="saveSettings()">保存</button>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let voiceOn = localStorage.getItem("voiceOn") === "true";

/* ===== プレゼン変換 ===== */
function formatMessage(text){

  // ■ブロック
  if(text.includes("■")){
    return text.split("■").filter(v=>v.trim()).map(b=>
      `<div class="block">${b}</div>`
    ).join("");
  }

  // ・カード
  if(text.includes("・")){
    return text.split("・").filter(v=>v.trim()).map(i=>
      `<div class="card">${i}</div>`
    ).join("");
  }

  // 表
  if(text.includes("：")){
    return "<table style='width:100%'>" +
      text.split("\n").map(r=>{
        const p = r.split("：");
        if(p.length>=2){
          return `<tr>
            <td style="background:#5aa0e6;color:#fff">${p[0]}</td>
            <td>${p[1]}</td>
          </tr>`;
        }
      }).join("") + "</table>";
  }

  // フロー
  if(text.includes("→")){
    return `<div class="flow">` +
      text.split("→").map(s=>`<div>${s}</div>`).join("➡️") +
      `</div>`;
  }

  return text;
}

/* メッセージ */
function addMessage(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;

  div.innerHTML = formatMessage(text);

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if(cls === "ai") speak(text);
}

/* 音声 */
function speak(text){
  if(!voiceOn) return;

  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang = "ja-JP";
  speechSynthesis.cancel();
  speechSynthesis.speak(uttr);
}

/* 表情 */
function changeFace(text){
  let file = "normal.png";

  if(text.includes("疲")) file="sleepy.png";
  else if(text.includes("悲")) file="sad.png";
  else if(text.includes("嬉")) file="happy.png";
  else if(text.includes("怒")) file="anger.png";
  else if(text.includes("不安")) file="anxiety.png";
  else if(text.includes("ごめん")) file="apologize.png";
  else if(text.includes("すごい")) file="applause.png";

  document.getElementById("avatar").src = file;
}

/* 送信 */
async function sendMessage(){
  const text = input.value;
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  document.getElementById("avatar").src="typing.png";

  const apiKey = localStorage.getItem("apiKey");
  const prompt = localStorage.getItem("prompt") || "";

  if(!apiKey){
    addMessage("APIキー未設定","ai");
    return;
  }

  try{
    const res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:prompt},
          {role:"user",content:text}
        ]
      })
    });

    const data = await res.json();
    const reply = data.choices[0].message.content;

    addMessage(reply,"ai");
    changeFace(reply);

  }catch(e){
    addMessage("通信エラー","ai");
    document.getElementById("avatar").src="glitch.png";
  }
}

/* イベント */
document.getElementById("sendBtn").onclick = sendMessage;

input.addEventListener("keydown",e=>{
  if(e.key==="Enter") sendMessage();
});

/* 設定 */
document.getElementById("settingBtn").onclick=()=>{
  document.getElementById("modal").style.display="flex";

  document.getElementById("apiKey").value = localStorage.getItem("apiKey") || "";
  document.getElementById("prompt").value = localStorage.getItem("prompt") || "";
  document.getElementById("voiceToggle").checked = voiceOn;
};

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function saveSettings(){
  localStorage.setItem("apiKey",document.getElementById("apiKey").value);
  localStorage.setItem("prompt",document.getElementById("prompt").value);

  voiceOn = document.getElementById("voiceToggle").checked;
  localStorage.setItem("voiceOn", voiceOn);

  closeModal();
}
</script>

</body>
</html>

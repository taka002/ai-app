<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* UI */
#character{height:26vh;overflow:hidden;}
#character img{width:100%;height:100%;object-fit:cover;}

#chat{
  flex:1;
  overflow-y:auto;
  padding:12px;
  background:rgba(255,255,255,0.25);
}

.msg{
  max-width:85%;
  margin:8px 0;
  padding:12px;
  border-radius:16px;
}

.user{
  background:#4facfe;
  color:#fff;
  margin-left:auto;
}

.ai{
  background:#fff;
}

.card{
  padding:10px;
}

#bottom{padding:10px;}
#controls{display:flex;gap:6px;}
#input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
}

button{
  border:none;
  border-radius:20px;
  background:#667eea;
  color:#fff;
  padding:10px;
}

/* モーダル */
#modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}
#modalContent{
  background:#222;
  color:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
}
</style>
</head>

<body>

<div id="character">
  <img id="avatar" src="normal.png">
</div>

<div id="chat"></div>

<div id="bottom">
  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button id="sendBtn">送信</button>
    <button onclick="openCamera()">📷</button>
    <button onclick="clearMemory()">🧹</button>
  </div>
  <button id="settingBtn">⚙ 設定</button>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<!-- 設定 -->
<div id="modal">
<div id="modalContent">

APIキー
<input id="apiKey">

モード
<select id="mode">
<option value="teacher">家庭教師</option>
<option value="counselor">カウンセラー</option>
<option value="sales">営業</option>
<option value="medical">医療</option>
<option value="housework">家事</option>
<option value="normal">通常</option>
</select>

音声 <input type="checkbox" id="voiceToggle">

<button onclick="saveSettings()">保存</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let history=JSON.parse(localStorage.getItem("history")||"[]");

/* ===== 表示 ===== */
function addMessage(text,cls){
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML=`<div class="card">${text}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* ===== 音声 ===== */
function speak(text){
  if(!voiceOn) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

/* ===== 送信 ===== */
async function sendMessage(){

  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  const apiKey=localStorage.getItem("apiKey");
  if(!apiKey){
    addMessage("⚠ APIキー未設定","ai");
    return;
  }

  history.push({role:"user",content:text});

  try{

    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:history
      })
    });

    const data=await res.json();

    if(!data.choices){
      addMessage("⚠エラー\n"+JSON.stringify(data,null,2),"ai");
      return;
    }

    const reply=data.choices[0].message.content;

    addMessage(reply,"ai");
    speak(reply);

    history.push({role:"assistant",content:reply});
    localStorage.setItem("history",JSON.stringify(history));

  }catch(e){
    addMessage("⚠通信エラー","ai");
  }
}

sendBtn.onclick=sendMessage;

/* ===== カメラ ===== */
function openCamera(){
  cameraInput.click();
}

cameraInput.addEventListener("change", async e=>{

  const file=e.target.files[0];
  if(!file) return;

  const apiKey=localStorage.getItem("apiKey");
  if(!apiKey){
    addMessage("APIキー未設定","ai");
    return;
  }

  addMessage("📷解析中...","ai");

  const base64=await new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[{
        role:"user",
        content:[
          {type:"text",text:"この画像を説明"},
          {type:"image_url",image_url:{url:base64}}
        ]
      }]
    })
  });

  const data=await res.json();
  const reply=data.choices?.[0]?.message?.content || "解析失敗";

  addMessage(reply,"ai");
});

/* ===== 設定 ===== */
settingBtn.onclick=()=>{
  modal.style.display="flex";
  apiKey.value=localStorage.getItem("apiKey")||"";
  mode.value=localStorage.getItem("mode")||"teacher";
  voiceToggle.checked=voiceOn;
};

function saveSettings(){
  localStorage.setItem("apiKey",document.getElementById("apiKey").value);
  localStorage.setItem("mode",document.getElementById("mode").value);

  voiceOn=document.getElementById("voiceToggle").checked;
  localStorage.setItem("voiceOn",voiceOn);

  modal.style.display="none";
  addMessage("設定保存しました","ai");
}

/* 記憶削除 */
function clearMemory(){
  history=[];
  localStorage.removeItem("history");
  addMessage("記憶リセット","ai");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
  background:#eef3ff;
}

#app{
  display:flex;
  flex-direction:column;
  height:100%;
}

/* 上 */
#avatarArea{
  height:22%;
  background:#dbe9ff;
  position:relative;
}

#avatar{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 中 */
#chatArea{
  height:58%;
  overflow-y:auto;
  padding:6px;
}

.msg{
  margin:5px 0;
  padding:8px;
  border-radius:10px;
  max-width:85%;
  font-size:13px;
}

.user{
  background:#4facfe;
  color:white;
  margin-left:auto;
}

.ai{
  background:white;
}

/* 下 */
#inputArea{
  height:20%;
  background:#ddd;
  padding:6px;
  display:flex;
  flex-direction:column;
  gap:5px;
}

#controls{
  display:flex;
}

input{
  flex:1;
  padding:8px;
  border:none;
  border-radius:10px;
}

/* ボタン */
button{
  margin-left:4px;
  padding:8px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
  font-size:12px;
}

/* 設定 */
#settingsBtn{
  background:#333;
  width:100%;
}

/* カメラ表示 */
#camera{
  position:fixed;
  bottom:80px;
  right:10px;
  width:120px;
  height:160px;
  display:none;
  border-radius:10px;
  overflow:hidden;
}

#camera video{
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body>

<div id="app">

<!-- 上 -->
<div id="avatarArea">
  <img id="avatar" src="normal.png">
</div>

<!-- 中 -->
<div id="chatArea"></div>

<!-- 下 -->
<div id="inputArea">

  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button onclick="send()">送信</button>
    <button onclick="toggleCamera()">📷</button>
  </div>

  <button id="settingsBtn" onclick="openSettings()">⚙️ 設定</button>

</div>

</div>

<!-- カメラ -->
<div id="camera">
  <video id="video" autoplay playsinline></video>
</div>

<script>

// 状態
let cameraOn=false;
let voiceOn=false;
let aiMode=true;

// メッセージ
function addMessage(text,type){
  const chat=document.getElementById("chatArea");
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

// 画像変更
function changeAvatar(name){
  document.getElementById("avatar").src=name;
}

// AI
function aiReply(text){

  let reply="はい！承知しました！";
  let img="normal.png";

  if(text.includes("疲れた")){
    reply="お疲れ様です！無理しないでください！";
    img="relieved.png";
  }

  if(text.includes("助けて")){
    reply="大丈夫です！一緒に解決しましょう！";
    img="anxiety.png";
  }

  if(text.includes("悲しい")){
    reply="そばにいますよ";
    img="sad.png";
  }

  changeAvatar(img);

  // 音声ONならしゃべる
  if(voiceOn){
    const uttr=new SpeechSynthesisUtterance(reply);
    uttr.lang="ja-JP";
    speechSynthesis.speak(uttr);
  }

  return reply;
}

// 送信
function send(){
  const input=document.getElementById("input");
  const text=input.value;
  if(!text)return;

  addMessage(text,"user");

  setTimeout(()=>{
    if(aiMode){
      addMessage(aiReply(text),"ai");
    }else{
      addMessage("AIオフです","ai");
    }
  },300);

  input.value="";
}

// カメラON/OFF
async function toggleCamera(){

  const cam=document.getElementById("camera");
  const video=document.getElementById("video");

  if(!cameraOn){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({
        video:true
      });
      video.srcObject=stream;
      cam.style.display="block";
      cameraOn=true;
    }catch(e){
      alert("カメラ許可して🔥");
    }
  }else{
    video.srcObject.getTracks().forEach(track=>track.stop());
    cam.style.display="none";
    cameraOn=false;
  }
}

// 設定
function openSettings(){

  const choice=prompt(
`設定
1: 音声 ON/OFF
2: AI ON/OFF
入力してね`
  );

  if(choice==="1"){
    voiceOn=!voiceOn;
    alert("音声："+(voiceOn?"ON":"OFF"));
  }

  if(choice==="2"){
    aiMode=!aiMode;
    alert("AI："+(aiMode?"ON":"OFF"));
  }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIアプリ 安定版</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:sans-serif;
  background:#eef2f7;
}

/* ===== 画像 ===== */
#headerImg{
  width:100%;
  height:180px;
  object-fit:cover;
  background:#ccc; /* ←画像なくても崩れない */
}

/* ===== チャット ===== */
#chat{
  height:calc(100vh - 260px);
  overflow-y:auto;
  padding:10px;
}

.msg{
  max-width:75%;
  padding:10px;
  margin:5px;
  border-radius:15px;
}

.user{
  background:#4da3ff;
  color:#fff;
  margin-left:auto;
}

.ai{
  background:#fff;
}

/* ===== 入力 ===== */
#inputArea{
  position:fixed;
  bottom:70px;
  width:100%;
  display:flex;
  gap:5px;
  padding:5px;
  background:#eef2f7;
}

#input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
}

/* ===== 下 ===== */
#bottomBar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#222;
  display:flex;
}

#bottomBar button{
  flex:1;
  padding:15px;
  border:none;
  color:#fff;
  background:#4da3ff;
}

/* ===== モーダル ===== */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

#modalContent{
  background:#111;
  color:#fff;
  padding:20px;
  width:90%;
  border-radius:15px;
}

textarea{
  width:100%;
  height:80px;
}
</style>
</head>

<body>

<img id="headerImg" src="img/normal.png" onerror="this.src=''">

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="話しかけてください">
  <button onclick="send()">送信</button>
</div>

<div id="bottomBar">
  <button onclick="openSettings()">⚙設定</button>
  <button onclick="resetMemory()">🧠リセット</button>
</div>

<!-- 設定 -->
<div id="modal">
  <div id="modalContent">
    APIキー<br>
    <input id="apiKey"><br><br>

    プロンプト<br>
    <textarea id="prompt"></textarea><br>

    <button onclick="saveSettings()">保存</button>
    <button onclick="closeSettings()">閉じる</button>
  </div>
</div>

<script>
let memory = JSON.parse(localStorage.getItem("memory")||"[]");

// ===== 送信 =====
async function send(){
  let input = document.getElementById("input").value;
  if(!input) return;

  addMsg(input,"user");
  document.getElementById("input").value="";

  setImg("img/typing.png");

  let apiKey = localStorage.getItem("apiKey");
  let prompt = localStorage.getItem("prompt") || "";

  if(!apiKey){
    addMsg("⚠ APIキー入れて","ai");
    return;
  }

  try{
    let res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:prompt},
          ...memory,
          {role:"user",content:input}
        ]
      })
    });

    let data = await res.json();

    if(!data.choices){
      addMsg("⚠ エラー："+JSON.stringify(data),"ai");
      return;
    }

    let reply = data.choices[0].message.content;

    addMsg(reply,"ai");

    memory.push({role:"user",content:input});
    memory.push({role:"assistant",content:reply});
    localStorage.setItem("memory",JSON.stringify(memory));

    changeImage(reply);

  }catch(e){
    addMsg("⚠ 通信エラー","ai");
  }
}

// ===== 表示 =====
function addMsg(text,type){
  let div = document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=99999;
}

// ===== 画像 =====
function setImg(src){
  document.getElementById("headerImg").src=src;
}

function changeImage(text){
  let img="img/normal.png";

  if(text.match(/嬉|楽/)) img="img/happy.png";
  else if(text.match(/疲|悲/)) img="img/sad.png";
  else if(text.match(/怒/)) img="img/angry.png";

  setImg(img);
}

// ===== 設定 =====
function openSettings(){
  document.getElementById("modal").style.display="flex";
}

function closeSettings(){
  document.getElementById("modal").style.display="none";
}

function saveSettings(){
  localStorage.setItem("apiKey",document.getElementById("apiKey").value);
  localStorage.setItem("prompt",document.getElementById("prompt").value);
  closeSettings();
}

// ===== リセット =====
function resetMemory(){
  localStorage.removeItem("memory");
  memory=[];
  alert("リセット完了");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* キャラ */
#character{height:26vh;}
#character img{width:100%;height:100%;object-fit:cover;}

/* チャット */
#chat{
  flex:1;
  overflow-y:auto;
  padding:12px;
}

/* メッセージ */
.msg{max-width:85%;margin:10px 0;}
.user{margin-left:auto;}
.ai{margin-right:auto;}

.card{
  background:#fff;
  padding:12px;
  border-radius:14px;
  margin-bottom:8px;
}

.user .card{
  background:#4facfe;
  color:#fff;
}

/* リスト */
.list{
  background:#e8f3ff;
  padding:10px;
  border-left:4px solid #4facfe;
  border-radius:10px;
}

/* フロー */
.flow{display:flex;gap:6px;flex-wrap:wrap;}
.flow div{background:#fff;padding:8px;border-radius:8px;}

/* 入力 */
#bottom{padding:10px;}
#controls{display:flex;gap:8px;}
#input{flex:1;padding:12px;border-radius:20px;border:none;}
button{
  border:none;
  border-radius:20px;
  background:#667eea;
  color:white;
  padding:10px 14px;
}

/* 浮かせボタン */
#fab{
  position:fixed;
  right:15px;
  bottom:90px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

#fab button{
  width:50px;
  height:50px;
  border-radius:50%;
  font-size:18px;
}

/* 設定 */
#modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}
#modalContent{
  background:#222;
  color:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
}
#modal input,#modal textarea,#modal select{
  width:100%;
  margin:6px 0;
  padding:8px;
}
</style>
</head>

<body>

<div id="character">
  <img src="normal.png">
</div>

<div id="chat"></div>

<div id="bottom">
  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button onclick="sendMessage()">送信</button>
  </div>
</div>

<!-- 浮かせUI -->
<div id="fab">
  <button onclick="openCamera()">📷</button>
  <button onclick="openGallery()">🖼</button>
  <button onclick="openSettings()">⚙</button>
</div>

<input type="file" id="imageInput" accept="image/*" style="display:none">

<!-- 設定 -->
<div id="modal">
<div id="modalContent">

APIキー
<input id="apiKey">

プロンプト
<textarea id="prompt"></textarea>

モード
<select id="mode">
<option value="teacher">家庭教師</option>
<option value="counselor">カウンセラー</option>
<option value="sales">営業</option>
<option value="medical">医療</option>
<option value="housework">家事</option>
<option value="normal">通常</option>
</select>

音声 <input type="checkbox" id="voiceToggle">

<button onclick="saveSettings()">保存</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let voiceOn=localStorage.getItem("voiceOn")==="true";

/* ===== 表示 ===== */
function formatMessage(text){
  text=text.replace(/\*/g,"");

  return text.split("\n").filter(t=>t.trim()).map(line=>{
    if(line.includes("→")){
      return `<div class="flow">${line.split("→").map(s=>`<div>${s}</div>`).join("")}</div>`;
    }
    if(line.startsWith("・")||line.startsWith("-")){
      return `<div class="list">${line}</div>`;
    }
    return `<div class="card">${line}</div>`;
  }).join("");
}

function addMessage(text,cls){
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML=formatMessage(text);
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;

  if(cls==="ai" && voiceOn){
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="ja-JP";
    speechSynthesis.speak(u);
  }
}

/* ===== 送信 ===== */
async function sendMessage(){
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  const apiKey=localStorage.getItem("apiKey");
  if(!apiKey){
    addMessage("APIキー未設定","ai");
    return;
  }

  const prompt=localStorage.getItem("prompt")||"";
  const mode=localStorage.getItem("mode")||"teacher";

  let modePrompt="";
  if(mode==="teacher") modePrompt="わかりやすく説明";
  if(mode==="counselor") modePrompt="優しく寄り添う";
  if(mode==="sales") modePrompt="提案型";
  if(mode==="medical") modePrompt="安全に説明";
  if(mode==="housework") modePrompt="家事のコツで説明";

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:prompt+"\n"+modePrompt},
          {role:"user",content:text}
        ]
      })
    });

    const data=await res.json();

    if(!data.choices){
      addMessage("エラー\n"+JSON.stringify(data,null,2),"ai");
      return;
    }

    addMessage(data.choices[0].message.content,"ai");

  }catch(e){
    addMessage("通信エラー","ai");
  }
}

/* ===== カメラ＆画像 ===== */
function openCamera(){
  const input=document.getElementById("imageInput");
  input.setAttribute("capture","environment");
  input.click();
}

function openGallery(){
  const input=document.getElementById("imageInput");
  input.removeAttribute("capture");
  input.click();
}

document.getElementById("imageInput").addEventListener("change", async function(e){

  const file=e.target.files[0];
  if(!file) return;

  addMessage("画像解析中...","ai");

  const base64 = await new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });

  const apiKey=localStorage.getItem("apiKey");

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[{
          role:"user",
          content:[
            {type:"text",text:"この画像をわかりやすく説明して"},
            {type:"image_url",image_url:{url:base64}}
          ]
        }]
      })
    });

    const data=await res.json();

    addMessage(data.choices?.[0]?.message?.content || "解析失敗","ai");

  }catch(e){
    addMessage("画像解析エラー","ai");
  }
});

/* ===== 設定 ===== */
function openSettings(){
  modal.style.display="flex";
  apiKey.value=localStorage.getItem("apiKey")||"";
  prompt.value=localStorage.getItem("prompt")||"";
  mode.value=localStorage.getItem("mode")||"teacher";
  voiceToggle.checked=voiceOn;
}

function saveSettings(){
  localStorage.setItem("apiKey",apiKey.value);
  localStorage.setItem("prompt",prompt.value);
  localStorage.setItem("mode",mode.value);

  voiceOn=voiceToggle.checked;
  localStorage.setItem("voiceOn",voiceOn);

  modal.style.display="none";
  addMessage("設定保存しました","ai");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* キャラ */
#character{height:22vh;}
#character img{width:100%;height:100%;object-fit:cover;}

/* 情報バー */
#infoBar{
  text-align:center;
  font-size:13px;
  padding:6px;
  background:rgba(255,255,255,0.7);
}

/* チャット */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  padding-bottom:90px;
}

/* メッセージ */
.msg{max-width:85%;margin:10px;display:flex;flex-direction:column;}
.user{align-items:flex-end;margin-left:auto;}
.ai{align-items:flex-start;}

.bubble{
  padding:10px;
  border-radius:14px;
  background:#fff;
}

.user .bubble{
  background:linear-gradient(135deg,#4facfe,#00c6ff);
  color:#fff;
}

.meta{font-size:10px;color:#666;}

/* 入力 */
#bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:8px;
}
#controls{
  display:flex;
  gap:6px;
  max-width:600px;
  margin:auto;
}
#input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

/* 送信 */
#sendBtn{
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  color:#fff;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
}

/* FAB */
#fab{
  position:fixed;
  right:10px;
  bottom:90px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
#fab button{
  width:48px;
  height:48px;
  border-radius:50%;
  border:none;
  color:#fff;
}
.cam{background:#ff9800;}
.img{background:#4caf50;}
.loc{background:#e91e63;}
.cal{background:#3f51b5;}
.set{background:#333;}

/* モーダル */
#modal{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}
#modalContent{
  background:#222;
  color:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
}
</style>
</head>

<body>

<div id="character">
  <img id="avatar" src="normal.png">
</div>

<div id="infoBar"></div>

<div id="chat"></div>

<div id="bottom">
  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button id="sendBtn">➤</button>
  </div>
</div>

<div id="fab">
  <button class="cam">📷</button>
  <button class="img">🖼</button>
  <button class="loc">📍</button>
  <button class="cal">📅</button>
  <button class="set">⚙</button>
</div>

<input type="file" id="imageInput" accept="image/*" style="display:none">

<div id="modal">
<div id="modalContent">

APIキー<input id="apiKey">
モード
<select id="mode">
<option value="normal">通常</option>
<option value="secretary">秘書</option>
</select>
音声 <input type="checkbox" id="voiceToggle">
<button id="saveBtn">保存</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const avatar=document.getElementById("avatar");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let history=JSON.parse(localStorage.getItem("history")||"[]");

let locationText="位置未取得";
let weatherText="";

/* 情報バー */
function updateInfo(){
  const now=new Date();
  const date=now.toLocaleDateString("ja-JP",{month:"long",day:"numeric"});
  const time=now.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("infoBar").innerHTML=
    `${date} ${time}<br>${locationText}<br>${weatherText}`;
}
setInterval(updateInfo,1000);

/* メッセージ */
function addMessage(text,cls){
  const time=new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML=`<div class="bubble">${text}</div><div class="meta">${time}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;

  if(cls==="ai" && voiceOn){
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="ja-JP";
    speechSynthesis.speak(u);
  }
}

/* 送信 */
async function sendMessage(){
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  const apiKey=localStorage.getItem("apiKey");
  if(!apiKey){
    addMessage("APIキー未設定","ai");
    return;
  }

  history.push({role:"user",content:text});

  try{
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:history.slice(-10)
      })
    });

    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content || "エラー";

    addMessage(reply,"ai");

    history.push({role:"assistant",content:reply});
    localStorage.setItem("history",JSON.stringify(history));

  }catch{
    addMessage("通信エラー","ai");
  }
}

/* 位置＋天気 */
function getLocation(){
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;
    locationText=`📍${lat.toFixed(2)},${lon.toFixed(2)}`;

    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
    const data=await res.json();
    weatherText=`🌡${data.current_weather.temperature}℃`;
  });
}

/* 画像 */
function openImage(){
  document.getElementById("imageInput").click();
}

/* 設定 */
function openSettings(){
  modal.style.display="flex";
}
function saveSettings(){
  localStorage.setItem("apiKey",apiKey.value);
  localStorage.setItem("mode",mode.value);
  voiceOn=voiceToggle.checked;
  localStorage.setItem("voiceOn",voiceOn);
  modal.style.display="none";
}

/* イベント */
document.getElementById("sendBtn").onclick=sendMessage;
input.addEventListener("keydown",e=>{if(e.key==="Enter")sendMessage();});

document.querySelector(".loc").onclick=getLocation;
document.querySelector(".set").onclick=openSettings;
document.getElementById("saveBtn").onclick=saveSettings;
document.querySelector(".cam").onclick=openImage;
document.querySelector(".img").onclick=openImage;
</script>

</body>
</html>

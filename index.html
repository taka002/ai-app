<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>感情AIアプリ</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* キャラ */
#character{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
  transition:0.3s;
}

/* メッセージ */
#bubble{
  position:fixed;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  padding:16px;
  background:rgba(255,255,255,0.85);
  border-radius:25px;
  text-align:center;
  font-size:16px;
  z-index:2;

  backdrop-filter: blur(10px);
  box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

/* 入力 */
#input{
  position:fixed;
  bottom:20px;
  left:20px;
  width:65%;
  padding:14px;
  border-radius:25px;
  border:none;
  font-size:16px;
  z-index:2;

  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* 送信 */
#sendBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:80px;
  height:50px;
  border:none;
  border-radius:25px;
  background:linear-gradient(135deg,#6ec6ff,#4da6ff);
  color:#fff;
  font-size:16px;
  z-index:2;

  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* 左：設定 */
#settingsBtn{
  position:fixed;
  top:20px;
  left:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:24px;
  z-index:3;

  background:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
}

/* 右：アプリ */
#appBtn{
  position:fixed;
  top:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:24px;
  z-index:3;

  background:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
}

/* 設定画面 */
#settingsPanel{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#ffffffee;
  display:none;
  z-index:10;
  padding:20px;
}

#settingsPanel input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* 考え中 */
.typing{
  animation: blink 1s infinite;
}

@keyframes blink{
  0%{opacity:0.3;}
  50%{opacity:1;}
  100%{opacity:0.3;}
}
</style>
</head>

<body>

<img id="character" src="normal.png">

<div id="bubble">こんにちは😊</div>

<input id="input" placeholder="話しかけて">
<button id="sendBtn">送信</button>

<button id="settingsBtn">⚙️</button>
<button id="appBtn">📱</button>

<!-- 設定 -->
<div id="settingsPanel">
  <h3>APIキー設定</h3>
  <input id="apiKey" placeholder="sk-...">
  <button onclick="saveKey()">保存</button>
  <button onclick="closeSettings()">閉じる</button>
</div>

<script>
const character = document.getElementById("character");
const bubble = document.getElementById("bubble");
const input = document.getElementById("input");

/* 表情変更 */
function setEmotion(type){
  character.src = type + ".png";
}

/* 簡易感情 */
function detectEmotion(text){
  if(text.includes("疲れ")) return "tired";
  if(text.includes("楽しい")) return "happy";
  if(text.includes("不安")) return "anxiety";
  if(text.includes("怒")) return "anger";
  return "normal";
}

/* APIキー保存 */
function saveKey(){
  localStorage.setItem("apiKey", document.getElementById("apiKey").value);
  alert("保存したよ");
}

/* 設定開閉 */
document.getElementById("settingsBtn").onclick=()=>{
  document.getElementById("settingsPanel").style.display="block";
};
function closeSettings(){
  document.getElementById("settingsPanel").style.display="none";
}

/* 送信 */
document.getElementById("sendBtn").onclick = async ()=>{
  const text = input.value;
  if(!text) return;

  /* 考え中 */
  bubble.innerText = "・・・";
  bubble.classList.add("typing");
  setEmotion("thinking");

  const apiKey = localStorage.getItem("apiKey");

  try{
    const res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + apiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:"短く優しく話すAI"},
          {role:"user",content:text}
        ]
      })
    });

    const data = await res.json();
    const reply = data.choices[0].message.content;

    /* 表情 */
    setEmotion(detectEmotion(reply));

    bubble.classList.remove("typing");
    bubble.innerText = reply;

  }catch(e){
    bubble.innerText="エラー😢";
    setEmotion("sad");
  }

  input.value="";
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100vh;
display:flex;
flex-direction:column;
}

/* ===== 上 ===== */
header{height:28vh;}
header img{
width:100%;
height:100%;
object-fit:cover;
}

/* ===== 情報バー ===== */
#infoBar{
text-align:center;
font-size:12px;
padding:4px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(6px);
}

/* ===== チャット ===== */
main{
flex:1;
overflow-y:auto;
padding:10px;
padding-bottom:60px;
}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{
display:inline-block;
padding:12px;
border-radius:16px;
background:#fff;
}
.user .bubble{
background:#0072ff;
color:#fff;
}

/* ===== 下（完全最適化） ===== */
footer{
position:fixed;
bottom:env(safe-area-inset-bottom);
width:100%;
background:#ffffffee;
backdrop-filter:blur(10px);
padding:4px 6px;
border-top:1px solid #ccc;
z-index:100;
}

#dock{
display:flex;
gap:4px;
align-items:center;
}

#input{
flex:1;
height:32px;
padding:6px 10px;
border-radius:18px;
border:none;
font-size:13px;
}

button{
width:34px;
height:32px;
border:none;
border-radius:8px;
background:#eee;
font-size:14px;
display:flex;
align-items:center;
justify-content:center;
}

/* ===== メニュー ===== */
#menu{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#111;
color:#fff;
display:none;
flex-direction:column;
overflow:auto;
padding:20px;
z-index:200;
}

.menuGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:20px;
}

.menuGrid button{
height:90px;
background:#333;
color:#fff;
border-radius:16px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#searchBox{
width:100%;
padding:14px;
border-radius:12px;
border:none;
font-size:16px;
margin-bottom:15px;
}
</style>
</head>

<body>

<header>
<img src="normal.png">
</header>

<div id="infoBar"></div>

<main id="chat"></main>

<footer>
<div id="dock">
<input id="input" placeholder="話しかけてください">
<button onclick="send()">➤</button>
<button id="micBtn">🎤</button>
<button onclick="openMenu()">☰</button>
</div>
</footer>

<!-- メニュー -->
<div id="menu">

<input id="searchBox" placeholder="Google検索">
<button onclick="searchGoogle()">検索</button>

<hr>

<div class="menuGrid">
<button onclick="openNews()">📰<br>ニュース</button>
<button onclick="openTransit()">🚃<br>乗換</button>
<button onclick="openMap()">🗺<br>地図</button>
<button onclick="openCalendar()">📅<br>予定</button>
<button onclick="openGmail()">📧<br>メール</button>
<button onclick="openLine()">💬<br>LINE</button>
<button onclick="openYouTube()">▶<br>YouTube</button>
</div>

<hr>

<h3>設定</h3>
<input id="apiKey" placeholder="APIキー">
<br><br>
<label><input type="checkbox" id="voiceToggle"> 音声ON</label>
<br><br>
<button onclick="saveSettings()">保存</button>
<br><br>
<button onclick="closeMenu()">閉じる</button>

</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const infoBar=document.getElementById("infoBar");
const menu=document.getElementById("menu");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let history=JSON.parse(localStorage.getItem("chatHistory"))||[];

let locationText="";
let weatherText="";
let weatherCode=null;
let lat=null;
let lon=null;

/* ===== 音声 ===== */
function speak(text){
if(!voiceOn) return;
speechSynthesis.cancel();
const uttr=new SpeechSynthesisUtterance(text);
uttr.lang="ja-JP";
speechSynthesis.speak(uttr);
}
document.body.addEventListener("click",()=>speechSynthesis.resume());

/* ===== 表示＋保存 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;

history.push({role:c==="user"?"user":"assistant",content:t});
if(history.length>50) history.shift();
localStorage.setItem("chatHistory",JSON.stringify(history));
}

/* ===== ChatGPT ===== */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

try{
const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:history
})
});
const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");
speak(reply);

}catch{
add("通信エラー","ai");
}
}

/* ===== 🎤 音声入力 ===== */
if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window){
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const rec = new SR();
rec.lang="ja-JP";

micBtn.onclick=()=>{
try{rec.start();add("🎤 聞いてます...", "ai");}catch(e){}
};

rec.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};

rec.onerror=()=>add("音声エラー","ai");

}else{
micBtn.onclick=()=>add("音声非対応端末","ai");
}

/* ===== メニュー ===== */
function openMenu(){menu.style.display="flex";}
function closeMenu(){menu.style.display="none";}

/* ===== 外部 ===== */
function openNews(){window.open("https://news.yahoo.co.jp/");}
function openTransit(){window.open("https://transit.yahoo.co.jp/");}
function openMap(){
if(lat && lon){
window.open(`https://www.google.com/maps?q=${lat},${lon}`);
}else{
window.open("https://www.google.com/maps");
}}
function openCalendar(){window.open("https://calendar.google.com/");}
function openGmail(){window.open("https://mail.google.com/");}
function openLine(){window.open("https://line.me");}
function openYouTube(){window.open("https://www.youtube.com");}

/* ===== Google検索 ===== */
function searchGoogle(){
const q=searchBox.value;
if(q) window.open("https://www.google.com/search?q="+encodeURIComponent(q));
}

/* ===== 天気 ===== */
function weatherComment(){
if(weatherCode===0) return "いい天気ですね☀️";
if(weatherCode<=3) return "曇り気味ですね☁️";
if(weatherCode<=67) return "雨ですね☔";
return "天気荒れ気味⚡";
}

/* ===== 位置 ===== */
function getLocation(){
navigator.geolocation.getCurrentPosition(async pos=>{
lat=pos.coords.latitude;
lon=pos.coords.longitude;

const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const wd=await w.json();

weatherCode=wd.current_weather.weathercode;
weatherText=`🌤${wd.current_weather.temperature}℃`;
locationText="📍現在地";

add(weatherComment(),"ai");
});
}

/* ===== 時刻 ===== */
setInterval(()=>{
const now=new Date();
infoBar.innerHTML=`${now.toLocaleString()}<br>${locationText} ${weatherText}`;
},1000);

/* ===== 起動 ===== */
window.onload=()=>{
history.forEach(h=>{
const c=h.role==="user"?"user":"ai";
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${h.content}</div>`;
chat.appendChild(d);
});
add("こんにちは😊","ai");
speak("こんにちは");
getLocation();
};

/* ===== 設定 ===== */
function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
localStorage.setItem("voiceOn",voiceToggle.checked);
voiceOn=voiceToggle.checked;
menu.style.display="none";
add("保存しました","ai");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
height:100dvh;
overflow:hidden;
}

#character{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
}

/* ===== 吹き出し（ガラス） ===== */
#bubble{
position:absolute;
bottom:65px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:92%;

/* 🔥 ガラス */
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border-radius:25px;
padding:14px;
font-size:16px;
line-height:1.4;
text-align:center;
z-index:5;

border:1px solid rgba(255,255,255,0.4);
box-shadow:0 8px 30px rgba(0,0,0,0.15);
}

/* ===== しっぽ（ガラス＋追従） ===== */
#bubble::after{
content:"";
position:absolute;
bottom:-10px;
left:var(--tail-x, 50%);
transform:translateX(-50%) rotate(45deg);

width:22px;
height:22px;

background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border-right:1px solid rgba(255,255,255,0.4);
border-bottom:1px solid rgba(255,255,255,0.4);
}

/* ===== 考え中アニメ ===== */
@keyframes thinkingFloat{
0%{transform:translateX(-50%) translateY(0);}
50%{transform:translateX(-50%) translateY(-4px);}
100%{transform:translateX(-50%) translateY(0);}
}

#bubble.thinking{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(25px);
animation:thinkingFloat 1.5s infinite ease-in-out;
box-shadow:0 8px 30px rgba(0,0,0,0.1),
           inset 0 0 10px rgba(255,255,255,0.3);
}

#bubble.thinking::after{
background:rgba(255,255,255,0.2);
}

/* ===== 入力 ===== */
#inputArea{
position:fixed;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
align-items:center;
gap:6px;
padding:6px 8px calc(env(safe-area-inset-bottom) + 6px);
background:rgba(255,255,255,0.95);
border-radius:18px;
z-index:10;
bottom:50px;
}

#input{
flex:1;
height:34px;
padding:0 8px;
border-radius:16px;
border:none;
font-size:13px;
background:#eee;
}

#send{
height:34px;
padding:0 12px;
border:none;
border-radius:999px;
background:#4da6ff;
color:white;
font-size:13px;
}

#mic{
width:34px;
height:34px;
border-radius:50%;
border:none;
background:#eee;
}

/* ===== 下ボタン ===== */
#settingsBtn,#appBtn{
position:fixed;
bottom:10px;
width:36px;
height:36px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:20;
font-size:16px;
}

#settingsBtn{left:calc(50% - 45px);}
#appBtn{left:calc(50% + 10px);}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">どうしたのかな？話してくれると嬉しいな😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");

function saveMemory(user, ai){
  memory.push({user, ai});
  if(memory.length > 20) memory.shift();
  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ===== 設定 ===== */
settingsBtn.onclick = ()=>{
  const key = prompt("APIキー");
  if(key){
    localStorage.setItem("apiKey", key);
    API_KEY = key;
  }
};

/* ===== 表情 ===== */
const emotionGroups = {
  happy:["happy.png","smile.png"],
  sad:["sad.png","cry.png"],
  calm:["normal.png"]
};

function getEmotionGroup(text){
  if(/嬉|ありがとう/.test(text)) return "happy";
  if(/悲|辛/.test(text)) return "sad";
  return "calm";
}

function changeEmotion(text){
  const list = emotionGroups[getEmotionGroup(text)];
  character.src = list[Math.floor(Math.random()*list.length)];
}

/* ===== タイピング ===== */
async function typeText(text){
  bubble.innerText="";
  for(let c of text){
    bubble.innerText+=c;
    await new Promise(r=>setTimeout(r,15));
  }
}

/* ===== AI ===== */
async function getAIResponse(msg){
  if(!API_KEY) return "設定からAPIキー入れてね🙏";

  const res=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:"短く自然に話す女性キャラ"},
        ...memory.flatMap(m=>[
          {role:"user",content:m.user},
          {role:"assistant",content:m.ai}
        ]),
        {role:"user",content:msg}
      ]
    })
  });

  const data=await res.json();
  return data.choices?.[0]?.message?.content || "うまく話せなかった…";
}

/* ===== 考え中 ===== */
function startThinking(){
  bubble.classList.add("thinking");
  let dots=0;
  return setInterval(()=>{
    dots=(dots+1)%4;
    bubble.innerText="考え中" + "…".slice(0,dots+1);
  },400);
}

/* ===== 送信 ===== */
async function send(){
  const text=input.value;
  if(!text) return;

  input.value="";
  character.src="typing.png";

  const thinking = startThinking();

  const reply = await getAIResponse(text);

  clearInterval(thinking);
  bubble.classList.remove("thinking");

  await typeText(reply);
  changeEmotion(reply);
  saveMemory(text,reply);

  followMouth();
}

/* ===== しっぽ追従 ===== */
function followMouth(){
  const rect = character.getBoundingClientRect();
  const bubbleRect = bubble.getBoundingClientRect();

  const mouthX = rect.left + rect.width * 0.5;
  const offsetX = mouthX - bubbleRect.left;

  bubble.style.setProperty('--tail-x', offsetX + 'px');
}

window.addEventListener("load", followMouth);
window.addEventListener("resize", followMouth);

/* ===== 音声入力 ===== */
if ('webkitSpeechRecognition' in window){
  const rec=new webkitSpeechRecognition();
  rec.lang='ja-JP';
  mic.onclick=()=>rec.start();
  rec.onresult=e=>{
    input.value=e.results[0][0].transcript;
    send();
  };
}else{
  mic.onclick=()=>alert("非対応");
}
</script>

</body>
</html>

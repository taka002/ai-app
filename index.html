<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}
body{margin:0;background:#f5f5f5;font-family:sans-serif;overflow:hidden;}

.avatar{position:absolute;width:100%;height:100%;}
.base-face,.eye-layer{
position:absolute;width:100%;height:100%;
object-fit:cover;transform:scale(1.08);
}
.eye-layer{opacity:0;transition:.1s;}

#bubble{
position:absolute;bottom:70px;left:50%;
transform:translateX(-50%) translateY(10px);
background:rgba(255,255,255,0.3);
padding:10px 14px;border-radius:20px;
opacity:0;transition:.3s;
}
#bubble.show{opacity:1;transform:translateX(-50%) translateY(0);}

#inputArea{position:fixed;bottom:50px;width:100%;display:flex;}
#input{flex:1;border-radius:20px;}
#send{border-radius:20px;}

#settingsBtn{
position:fixed;bottom:10px;left:10px;
background:white;border-radius:50%;
width:40px;height:40px;
display:flex;align-items:center;justify-content:center;
}

/* 設定 */
#settingsPanel{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.5);
display:none;align-items:center;justify-content:center;
}
#settingsBox{
background:#fff;padding:20px;border-radius:15px;width:80%;
}
</style>
</head>

<body>

<div class="avatar">
<img id="character" src="normal.png" class="base-face">
<img id="blinkEye" src="blink.png" class="eye-layer">
</div>

<div id="bubble">どうしたのかな？😊</div>

<div id="settingsBtn">⚙️</div>

<div id="settingsPanel">
<div id="settingsBox">
APIキー<br>
<input id="apiInput"><br>
<button onclick="saveApi()">保存</button>
<button onclick="closeSettings()">閉じる</button>
</div>
</div>

<div id="inputArea">
<input id="input">
<button id="send">送信</button>
</div>

<script>

/* ===== 状態 ===== */
let API_KEY=localStorage.getItem("apiKey")||"";
let isSpeaking=false;
let blinkRunning=false;

/* ===== 要素 ===== */
const character=document.getElementById("character");
const blinkEye=document.getElementById("blinkEye");
const bubble=document.getElementById("bubble");

/* ===== 設定 ===== */
settingsBtn.onclick=()=>{
settingsPanel.style.display="flex";
apiInput.value=API_KEY;
};
function closeSettings(){settingsPanel.style.display="none";}
function saveApi(){
API_KEY=apiInput.value;
localStorage.setItem("apiKey",API_KEY);
alert("保存OK");
}

/* ===== 吹き出し ===== */
function showBubble(t){
bubble.classList.remove("show");
setTimeout(()=>{
bubble.innerText=t;
bubble.classList.add("show");
},100);
}

/* ===== 瞬き ===== */
function blink(){
if(blinkRunning||isSpeaking)return;
blinkRunning=true;
blinkEye.style.opacity=1;
setTimeout(()=>{
blinkEye.style.opacity=0;
blinkRunning=false;
},80);
}
function autoBlink(){
setTimeout(()=>{
if(!isSpeaking)blink();
autoBlink();
},2000+Math.random()*3000);
}
autoBlink();

/* ===== 音声解析口パク ===== */
let audioCtx, analyser, dataArray;

function startLipSync(){
function loop(){
if(!isSpeaking)return;

analyser.getByteTimeDomainData(dataArray);

let sum=0;
for(let i=0;i<dataArray.length;i++){
let v=(dataArray[i]-128)/128;
sum+=v*v;
}
let vol=Math.sqrt(sum/dataArray.length);

if(vol<0.02) character.src="normal.png";
else if(vol<0.05) character.src="mouth1.png";
else if(vol<0.1) character.src="mouth2.png";
else character.src="mouth3.png";

requestAnimationFrame(loop);
}
loop();
}

function stopLipSync(){
isSpeaking=false;
character.src="normal.png";
setTimeout(()=>blink(),120);
}

/* ===== 音声 ===== */
async function speak(text){

if(!API_KEY){alert("APIキー設定");return;}

const res=await fetch("https://api.openai.com/v1/audio/speech",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"gpt-4o-mini-tts",
voice:"aria",
input:text
})
});

const blob=await res.blob();
const url=URL.createObjectURL(blob);

const audio=document.createElement("audio");
audio.src=url;

audio.onplay=async ()=>{
audioCtx=new AudioContext();
const src=audioCtx.createMediaElementSource(audio);
analyser=audioCtx.createAnalyser();
dataArray=new Uint8Array(analyser.frequencyBinCount);
src.connect(analyser);
analyser.connect(audioCtx.destination);

await audioCtx.resume();
isSpeaking=true;
startLipSync();
};

audio.onended=stopLipSync;

audio.play().catch(()=>{
document.body.onclick=()=>audio.play();
});
}

/* ===== AI ===== */
async function getAI(msg){
const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:msg}]
})
});
const d=await r.json();
return d.choices[0].message.content;
}

/* ===== 送信 ===== */
async function send(){
const t=input.value;
if(!t)return;

input.value="";
showBubble("考え中…");

let r=await getAI(t);

showBubble(r);
speak(r);
}
send.onclick=send;

</script>
</body>
</html>

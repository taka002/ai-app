<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 神アプリ</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100dvh;
overflow:hidden;
}

/* ===== 画面 ===== */
.screen{
position:absolute;
width:100%;
height:100%;
display:none;
}
#home{display:block;}

/* ===== 共通 ===== */
main{overflow-y:auto;padding:10px;height:60vh;}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{padding:10px;border-radius:16px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}

header{height:28vh;}
header img{width:100%;height:100%;object-fit:cover;}

footer{
position:absolute;
bottom:0;width:100%;
background:#fff;padding:6px;
display:flex;justify-content:center;
}
#dock{width:100%;max-width:600px;display:flex;gap:6px;}
#input{width:58%;height:36px;border-radius:20px;border:none;padding:8px;}
.dockBtn{width:40px;height:36px;border:none;border-radius:10px;background:#eee;}

/* ===== アプリ画面 ===== */
.menuGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:20px;
}
.menuItem{
height:90px;background:#333;color:#fff;
border-radius:16px;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
}

/* ===== 設定 ===== */
.settingsBox{
padding:20px;
}
.menuInput{
width:100%;height:44px;border-radius:10px;border:none;
padding:10px;margin-bottom:10px;
}
.menuBtn{
width:100%;height:44px;border:none;border-radius:10px;
margin-bottom:10px;background:#444;color:#fff;
}
</style>
</head>

<body>

<!-- ===== ホーム ===== -->
<div id="home" class="screen">

<header>
<img id="avatar" src="normal.png">
</header>

<main id="chat"></main>

<footer>
<div id="dock">
<input id="input" placeholder="話しかけてください">
<button class="dockBtn" onclick="send()">➤</button>
<button class="dockBtn" id="micBtn">🎤</button>
<button class="dockBtn" onclick="show('apps')">☰</button>
</div>
</footer>

</div>

<!-- ===== アプリ ===== -->
<div id="apps" class="screen">

<div class="menuGrid">
<div class="menuItem" onclick="openSearch()">🔍<br>検索</div>
<div class="menuItem" onclick="openMap()">🗺<br>地図</div>
<div class="menuItem" onclick="openWeather()">☀️<br>天気</div>

<div class="menuItem" onclick="openTrain()">🚆<br>電車</div>
<div class="menuItem" onclick="openCalendar()">📅<br>予定</div>
<div class="menuItem" onclick="openGmail()">📧<br>メール</div>

<div class="menuItem" onclick="openYouTube()">▶<br>YouTube</div>
<div class="menuItem" onclick="openAmazon()">🛒<br>買い物</div>
<div class="menuItem" onclick="openMemo()">📝<br>メモ</div>

<div class="menuItem" onclick="openLineMusic()">🎵<br>LINE Music</div>
<div class="menuItem" onclick="openNews()">📰<br>News</div>
<div class="menuItem" onclick="openRakuten()">📚<br>楽天</div>
</div>

<footer>
<button class="menuBtn" onclick="show('home')">←戻る</button>
<button class="menuBtn" onclick="show('settings')">⚙設定</button>
</footer>

</div>

<!-- ===== 設定 ===== -->
<div id="settings" class="screen">

<div class="settingsBox">
<h2>設定</h2>

<input id="apiKey" class="menuInput" placeholder="APIキー">
<textarea id="systemPrompt" class="menuInput" style="height:80px;"></textarea>
<input type="file" id="avatarUpload" class="menuInput">
<label><input type="checkbox" id="voiceToggle"> 音声ON</label>

<button class="menuBtn" onclick="saveSettings()">保存</button>
<button class="menuBtn" onclick="show('home')">戻る</button>
</div>

</div>

<script>

/* ===== 画面切替 ===== */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

/* ===== 基本 ===== */
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let history=[];
let voiceOn=false;

/* ===== 表示 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* ===== AI ===== */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

const key=localStorage.getItem("apiKey");
if(!key){add("APIキー未設定","ai");return;}

add("考え中...","ai");

try{
const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:localStorage.getItem("systemPrompt")||"優しい女性"},
...history,
{role:"user",content:t}
]
})
});

const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");

history.push({role:"user",content:t});
history.push({role:"assistant",content:reply});

}catch{
add("通信エラー","ai");
}
}

/* ===== 音声 ===== */
if(window.SpeechRecognition||window.webkitSpeechRecognition){
const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="ja-JP";

document.getElementById("micBtn").onclick=()=>rec.start();

rec.onresult=e=>{
const text=e.results[0][0].transcript;
handleIntent(text);
};
}

/* ===== intent改善 ===== */
function handleIntent(t){
t=t.toLowerCase();

if(t.includes("音楽")) return openLineMusic();
if(t.includes("ニュース")) return openNews();
if(t.includes("楽天")) return openRakuten();

input.value=t;
send();
}

/* ===== アプリ ===== */
function openSearch(){window.open("https://google.com");}
function openMap(){window.open("https://maps.google.com");}
function openWeather(){window.open("https://weather.yahoo.co.jp");}
function openTrain(){window.open("https://transit.yahoo.co.jp");}
function openCalendar(){window.open("https://calendar.google.com");}
function openGmail(){window.open("https://mail.google.com");}
function openYouTube(){window.open("https://youtube.com");}
function openAmazon(){window.open("https://amazon.co.jp");}
function openMemo(){window.open("https://keep.google.com");}

function openLineMusic(){window.open("https://music.line.me");}
function openNews(){window.open("https://newspicks.com");}
function openRakuten(){window.open("https://magazine.rakuten.co.jp");}

/* ===== 設定 ===== */
function saveSettings(){
localStorage.setItem("apiKey",document.getElementById("apiKey").value);
localStorage.setItem("systemPrompt",document.getElementById("systemPrompt").value);
localStorage.setItem("voiceOn",document.getElementById("voiceToggle").checked);
voiceOn=document.getElementById("voiceToggle").checked;
alert("保存しました");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* キャラ */
#character{height:22vh;}
#character img{width:100%;height:100%;object-fit:cover;}

/* 情報バー */
#infoBar{
  text-align:center;
  font-size:13px;
  padding:6px;
  background:rgba(255,255,255,0.7);
}

/* チャット */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  padding-bottom:90px;
}

/* メッセージ */
.msg{display:flex;flex-direction:column;max-width:85%;margin:8px;}
.user{align-items:flex-end;margin-left:auto;}
.ai{align-items:flex-start;}

.bubble{
  padding:10px;
  border-radius:14px;
  background:#fff;
}
.user .bubble{
  background:linear-gradient(135deg,#4facfe,#00c6ff);
  color:#fff;
}

.meta{font-size:10px;color:#555;}

/* 入力 */
#bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:8px;
}
#controls{display:flex;gap:6px;max-width:600px;margin:auto;}
#input{flex:1;padding:10px;border-radius:20px;border:none;}

#sendBtn{
  width:44px;height:44px;border-radius:50%;
  border:none;color:#fff;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
}

/* FAB */
#fab{
  position:fixed;
  right:10px;
  bottom:80px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
#fab button{
  width:48px;height:48px;border-radius:50%;
  border:none;color:#fff;
}
.cam{background:#ff9800;}
.img{background:#4caf50;}
.loc{background:#e91e63;}
.cal{background:#3f51b5;}
.set{background:#333;}

/* モーダル */
#modal{
  position:fixed;width:100%;height:100%;
  display:none;background:rgba(0,0,0,0.5);
  justify-content:center;align-items:center;
}
#modalContent{
  background:#222;color:#fff;padding:20px;
  border-radius:12px;width:90%;
}
#modal input,#modal select{
  width:100%;margin:6px 0;padding:8px;
}
</style>
</head>

<body>

<div id="character">
  <img id="avatar" src="normal.png">
</div>

<div id="infoBar"></div>

<div id="chat"></div>

<div id="bottom">
  <div id="controls">
    <input id="input" placeholder="話しかけてください">
    <button id="sendBtn">➤</button>
  </div>
</div>

<div id="fab">
  <button class="cam">📷</button>
  <button class="img">🖼</button>
  <button class="loc">📍</button>
  <button class="cal">📅</button>
  <button class="set">⚙</button>
</div>

<input type="file" id="imageInput" accept="image/*" style="display:none">

<div id="modal">
<div id="modalContent">
Geminiキー<input id="geminiKey">

モード
<select id="mode">
<option value="normal">通常</option>
<option value="teacher">家庭教師</option>
<option value="counselor">カウンセラー</option>
<option value="secretary">秘書</option>
</select>

音声 <input type="checkbox" id="voiceToggle">

<button onclick="saveSettings()">保存</button>
</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let history=JSON.parse(localStorage.getItem("history")||"[]");

let locationText="";
let weatherText="";

/* ===== 情報バー ===== */
setInterval(()=>{
const now=new Date();
const date=now.toLocaleDateString("ja-JP",{month:"short",day:"numeric",weekday:"short"});
const time=now.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
document.getElementById("infoBar").innerHTML=
`${date} ${time}<br>${locationText}<br>${weatherText}`;
},1000);

/* ===== メッセージ ===== */
function addMessage(text,cls){
const wrap=document.createElement("div");
wrap.className="msg "+cls;

wrap.innerHTML=`
<div class="bubble">${text}</div>
<div class="meta">${new Date().toLocaleTimeString()}</div>
`;

chat.appendChild(wrap);
chat.scrollTop=chat.scrollHeight;

if(cls==="ai" && voiceOn){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}
}

/* ===== 送信（安全版） ===== */
document.getElementById("sendBtn").onclick=sendMessage;
input.addEventListener("keydown",e=>{if(e.key==="Enter")sendMessage();});

async function sendMessage(){

const text=input.value.trim();
if(!text)return;

addMessage(text,"user");
input.value="";

history.push({role:"user",content:text});

const mode=localStorage.getItem("mode")||"normal";
let modePrompt="";
if(mode==="teacher") modePrompt="わかりやすく説明";
if(mode==="counselor") modePrompt="優しく寄り添う";
if(mode==="secretary") modePrompt="秘書として整理";

try{
const res=await fetch("/api/chat",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
messages:[{role:"system",content:modePrompt},...history.slice(-10)]
})
});

const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

addMessage(reply,"ai");

history.push({role:"assistant",content:reply});
localStorage.setItem("history",JSON.stringify(history));

}catch{
addMessage("通信エラー","ai");
}
}

/* ===== 画像（Gemini） ===== */
document.querySelector(".cam").onclick=()=>{imageInput.setAttribute("capture","environment");imageInput.click();}
document.querySelector(".img").onclick=()=>{imageInput.removeAttribute("capture");imageInput.click();}

imageInput.onchange=async e=>{
const file=e.target.files[0];
if(!file)return;

addMessage("📷解析中...","ai");

const base64=await new Promise(r=>{
const fr=new FileReader();
fr.onload=()=>r(fr.result);
fr.readAsDataURL(file);
});

const key=localStorage.getItem("geminiKey");

if(!key){addMessage("Geminiキー未設定","ai");return;}

const res=await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
contents:[{parts:[
{text:"この画像を説明して"},
{inline_data:{mime_type:"image/jpeg",data:base64.split(",")[1]}}
]}]
})
});

const data=await res.json();
addMessage(data.candidates?.[0]?.content?.parts?.[0]?.text||"失敗","ai");
};

/* ===== 位置＋天気 ===== */
document.querySelector(".loc").onclick=()=>{
navigator.geolocation.getCurrentPosition(async pos=>{
const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

const geo=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
const geoData=await geo.json();
locationText="📍"+(geoData.address.city||geoData.address.town||geoData.address.village||"");

const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const wData=await w.json();
weatherText=`🌤${wData.current_weather.temperature}℃`;
});
};

/* ===== カレンダー ===== */
document.querySelector(".cal").onclick=()=>window.open("https://calendar.google.com");

/* ===== 設定 ===== */
document.querySelector(".set").onclick=()=>{
modal.style.display="flex";
mode.value=localStorage.getItem("mode")||"normal";
voiceToggle.checked=voiceOn;
geminiKey.value=localStorage.getItem("geminiKey")||"";
};

function saveSettings(){
localStorage.setItem("mode",mode.value);
localStorage.setItem("geminiKey",geminiKey.value);
voiceOn=voiceToggle.checked;
localStorage.setItem("voiceOn",voiceOn);
modal.style.display="none";
addMessage("設定保存しました","ai");
}
</script>

</body>
</html>

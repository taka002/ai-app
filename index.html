<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}

html,body{
margin:0;
padding:0;
height:100%;
font-family:sans-serif;
background:#f5f5f5;
overflow:hidden;
}

/* ===== アプリ全体 ===== */
#app{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
}

/* ===== キャラエリア ===== */
#visual{
flex:1;
position:relative;
overflow:hidden;
}

/* キャラ */
#character{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
height:100%;
max-width:100%;
object-fit:contain;
transition:0.3s;
}

/* 吹き出し（顔かぶらない） */
#bubble{
position:absolute;
bottom:110px;
left:50%;
transform:translateX(-50%);
width:85%;
background:rgba(255,255,255,0.85);
border-radius:25px;
padding:12px;
font-size:15px;
text-align:center;
backdrop-filter:blur(6px);
min-height:50px;
}

/* ===== 入力 ===== */
#inputArea{
height:80px;
display:flex;
padding:10px;
background:white;
}

#input{
flex:1;
padding:12px;
border-radius:20px;
border:none;
font-size:16px;
background:#eee;
}

#send{
margin-left:10px;
padding:10px 16px;
border:none;
border-radius:20px;
background:#4da6ff;
color:white;
}

/* ===== ボタン ===== */
#settingsBtn,#appBtn{
position:absolute;
top:15px;
width:50px;
height:50px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:10;
font-size:20px;
}

#settingsBtn{ left:15px; }
#appBtn{ right:15px; }

</style>
</head>

<body>

<div id="app">

  <div id="visual">
    <img id="character" src="normal.png">
    <div id="bubble">どうしたの？😊</div>

    <div id="settingsBtn">⚙️</div>
    <div id="appBtn">📱</div>
  </div>

  <div id="inputArea">
    <input id="input" placeholder="話しかけて">
    <button id="send" onclick="send()">送信</button>
  </div>

</div>

<script>

/* ===== APIキー ===== */
let API_KEY = localStorage.getItem("apiKey") || "";

/* 設定 */
document.getElementById("settingsBtn").onclick = ()=>{
  const key = prompt("APIキー入力");
  if(key){
    localStorage.setItem("apiKey", key);
    API_KEY = key;
    alert("保存したよ！");
  }
};

/* ===== モジャモジャ ===== */
function startThinking(){
  const bubble = document.getElementById("bubble");
  let dots="";
  let count=0;

  const id = setInterval(()=>{
    dots += "…";
    bubble.innerText = dots;
    count++;
    if(count>5){dots="";count=0;}
  },300);

  return id;
}

/* ===== 文字じわ ===== */
async function typeText(text){
  const bubble = document.getElementById("bubble");
  bubble.innerText="";

  for(let i=0;i<text.length;i++){
    bubble.innerText += text[i];
    await new Promise(r=>setTimeout(r,25));
  }
}

/* ===== JSON安全処理 ===== */
function safeParse(text){
  try{
    return JSON.parse(text);
  }catch{
    return {
      text:text.replace(/[{}"]/g,""),
      emotion:"normal"
    };
  }
}

/* ===== 感情リスト ===== */
const emotions = [
"normal","happy","sad","anger",
"anxiety","surprise","shy",
"relieved","impressed","typing"
];

/* ===== AI ===== */
async function getAI(message){

  if(!API_KEY){
    return {text:"設定からAPIキー入れてね🙏", emotion:"shy"};
  }

  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {
          role:"system",
          content:`
あなたは感情を持つキャラクターです。
必ずJSON形式で返してください。

例:
{"text":"大丈夫だよ😊","emotion":"happy"}

emotionは以下のみ:
${emotions.join(",")}

・文章は短く
・自然に
・優しく
`
        },
        {role:"user",content:message}
      ]
    })
  });

  const data = await res.json();
  const raw = data.choices?.[0]?.message?.content || "";

  const parsed = safeParse(raw);

  if(!emotions.includes(parsed.emotion)){
    parsed.emotion = "normal";
  }

  return parsed;
}

/* ===== 送信 ===== */
async function send(){

  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  input.value="";

  const char = document.getElementById("character");

  char.src="typing.png";

  const thinking = startThinking();

  try{
    const ai = await getAI(text);

    clearInterval(thinking);

    await typeText(ai.text);

    char.src = ai.emotion + ".png";

  }catch(e){
    clearInterval(thinking);
    document.getElementById("bubble").innerText="通信エラー";
    char.src="glitch.png";
  }
}

</script>

</body>
</html>

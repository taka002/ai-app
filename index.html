<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI フル完全版</title>

<style>
body{margin:0;font-family:sans-serif;background:#6ec6ff;display:flex;flex-direction:column;height:100vh;}
#chat{flex:1;overflow:auto;padding:10px;}
.msg{margin:6px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{padding:10px;border-radius:12px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}

#bottom{display:flex;padding:5px;background:#fff;}
#input{flex:1;padding:10px;border:none;}

button{padding:8px;border:none;border-radius:8px;}
button:active{transform:scale(0.9);opacity:0.7;}

#modal{position:fixed;width:100%;height:100%;display:none;background:#0008;justify-content:center;align-items:center;}
#modalContent{background:#222;color:#fff;padding:15px;width:90%;max-height:80%;overflow:auto;border-radius:10px;}

#presentation{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;color:#fff;display:none;justify-content:center;align-items:center;font-size:24px;text-align:center;}
</style>
</head>

<body>

<div id="chat"></div>

<div id="bottom">
<input id="input" placeholder="話しかけてください">
<button onclick="startVoice()">🎤</button>
<button onclick="send()">➤</button>
<button onclick="togglePresentation()">🎬</button>
<button onclick="openSettings()">⚙</button>
</div>

<!-- 設定 -->
<div id="modal">
<div id="modalContent">

<h3>API</h3>
<input id="apiKey">

<h3>プロンプト</h3>
<textarea id="prompt"></textarea>

<h3>モード</h3>
<select id="mode">
<option value="normal">通常</option>
<option value="teacher">家庭教師</option>
<option value="counselor">カウンセラー</option>
<option value="medical">医療</option>
</select>

<hr>

<button onclick="openGmail()">Gmail</button>
<button onclick="openCalendar()">カレンダー</button>
<button onclick="openLine()">LINE</button>
<button onclick="sendToLine()">LINE送信</button>

<button onclick="openYahooNews()">Yahooニュース</button>
<button onclick="openNewsPicks()">NewsPicks</button>

<button onclick="openMap()">マップ</button>
<button onclick="searchMap()">場所検索</button>

<button onclick="openTransit()">乗換</button>
<button onclick="openJorudan()">ジョルダン</button>

<button onclick="googleSearch()">検索</button>

<button onclick="saveSettings()">保存</button>

</div>
</div>

<div id="presentation" onclick="nextSlide()"></div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
let state={memory:[],lastTalk:Date.now(),slides:[],i:0};

/* 表示 */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
if(c==="ai") speak(t);
}

/* 音声 */
function speak(t){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

/* AI */
async function send(){
let t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";
state.lastTalk=Date.now();

add("考え中...","ai");

/* コマンド */
if(t.includes("ニュース")) return openYahooNews();
if(t.includes("地図")) return openMap();
if(t.includes("乗換")) return openTransit();

const key=localStorage.getItem("apiKey");
if(!key)return add("APIキー未設定","ai");

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:(localStorage.getItem("prompt")||"")},
{role:"user",content:t}
]
})
});

const d=await res.json();
const reply=d.choices?.[0]?.message?.content||"エラー";

add(reply,"ai");

/* スライド */
state.slides=reply.split(/[。！？\n]/);
state.i=0;
}

/* プレゼン */
function togglePresentation(){
presentation.style.display=
presentation.style.display==="flex"?"none":"flex";
presentation.innerText=state.slides[state.i]||"";
}
function nextSlide(){
state.i=(state.i+1)%state.slides.length;
presentation.innerText=state.slides[state.i];
}

/* 自動AI */
setInterval(()=>{
if(Date.now()-state.lastTalk>300000){
add("ニュース見る？","ai");
}
},60000);

/* 音声入力（ウェイクワード） */
function startVoice(){
const R=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!R)return;

const rec=new R();
rec.lang="ja-JP";

rec.onresult=e=>{
let t=e.results[0][0].transcript;

if(t.includes("美咲")){
t=t.replace("美咲","").trim();
input.value=t;
send();
}else{
add("『美咲』って呼んでね","ai");
}
};

rec.start();
}

/* Enter */
input.addEventListener("keydown",e=>{
if(e.key==="Enter") send();
});

/* 外部 */
function openGmail(){window.open("https://mail.google.com");}
function openCalendar(){window.open("https://calendar.google.com");}
function openLine(){window.open("https://line.me");}
function sendToLine(){
const t=document.querySelector(".bubble:last-child")?.innerText;
window.open("https://line.me/R/msg/text/?"+encodeURIComponent(t));
}
function openYahooNews(){window.open("https://news.yahoo.co.jp");}
function openNewsPicks(){window.open("https://newspicks.com");}
function openMap(){window.open("https://maps.google.com");}
function searchMap(){
const q=prompt("場所");
window.open("https://www.google.com/maps/search/"+q);
}
function openTransit(){window.open("https://transit.yahoo.co.jp");}
function openJorudan(){window.open("https://www.jorudan.co.jp");}
function googleSearch(){
const q=prompt("検索");
window.open("https://google.com/search?q="+q);
}

/* 設定 */
function openSettings(){
modal.style.display="flex";
apiKey.value=localStorage.getItem("apiKey")||"";
prompt.value=localStorage.getItem("prompt")||"";
mode.value=localStorage.getItem("mode")||"normal";
}
function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
localStorage.setItem("prompt",prompt.value);
localStorage.setItem("mode",mode.value);
modal.style.display="none";
add("保存OK","ai");
}
</script>

</body>
</html>

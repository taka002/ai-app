<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ビジュアルAI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#eef2f7;
}

/* キャラ */
.header img{
  width:100%;
  max-height:200px;
  object-fit:cover;
}

/* チャット */
.chat{
  padding:10px;
  height:50vh;
  overflow-y:auto;
}

.msg{
  margin:8px;
  padding:12px;
  border-radius:14px;
  max-width:80%;
}

.user{ background:#5da9e9; color:#fff; margin-left:auto;}
.ai{ background:#fff; }

/* カード */
.card{
  background:#fff;
  border-radius:14px;
  padding:12px;
  margin-top:8px;
}

.diagram{
  font-size:22px;
  text-align:center;
}

.steps{ background:#e3f2fd; padding:8px; border-radius:10px;}
.example{ background:#fff8e1; padding:8px; border-radius:10px;}

.video iframe{
  width:100%;
  height:180px;
}

/* 入力 */
.input-area{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  padding:6px;
  gap:6px;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#5da9e9;
  color:#fff;
}

/* 設定 */
.modal{
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  background:#222;
  color:#fff;
  padding:15px;
  border-radius:12px;
  display:none;
}

textarea{ width:100%; height:80px; }

/* スイッチ */
.switch{
  display:flex;
  align-items:center;
  gap:10px;
}
</style>
</head>

<body>

<div class="header">
<img src="https://via.placeholder.com/400x200">
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="話しかけてください">
<button onclick="send()">送信</button>
<button onclick="openCamera()">📷</button>
<button onclick="openSettings()">⚙</button>
</div>

<!-- 設定 -->
<div class="modal" id="settings">
<h3>設定</h3>

APIキー<br>
<input id="apiKey"><br><br>

プロンプト（性格）<br>
<textarea id="prompt"></textarea><br>

<div class="switch">
音声
<input type="checkbox" id="voice">
</div>

<br>
<button onclick="saveSettings()">保存</button>
<button onclick="resetMemory()">リセット</button>
</div>

<!-- カメラ -->
<video id="video" style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>

let memory = JSON.parse(localStorage.getItem("memory")||"[]");

function addMsg(text, cls){
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML=text;
  chat.appendChild(div);
  chat.scrollTop=9999;
}

function parseAI(text){

  const title = text.match(/【タイトル】([\s\S]*?)【図解】/)?.[1]||"";
  const diagram = text.match(/【図解】([\s\S]*?)【ステップ説明】/)?.[1]||"";
  const steps = text.match(/【ステップ説明】([\s\S]*?)【例え】/)?.[1]||"";
  const example = text.match(/【例え】([\s\S]*?)【まとめ】/)?.[1]||"";
  const summary = text.match(/【まとめ】([\s\S]*?)【動画キーワード】/)?.[1]||"";
  const video = text.match(/【動画キーワード】([\s\S]*)/)?.[1]||"";

  return `
  <div class="card">
    <h3>${title}</h3>
    <div class="diagram">${diagram}</div>
    <div class="steps">${steps}</div>
    <div class="example">${example}</div>
    <b>${summary}</b>
    <div class="video">
      <iframe src="https://www.youtube.com/embed?listType=search&list=${video}"></iframe>
    </div>
  </div>`;
}

async function send(){
  const input = document.getElementById("input").value;
  if(!input)return;

  addMsg(input,"user");
  document.getElementById("input").value="";

  const apiKey = localStorage.getItem("apiKey");
  const prompt = localStorage.getItem("prompt") || "";

  if(!apiKey){
    addMsg("APIキー未設定","ai");
    return;
  }

  const messages = [
    {role:"system",content:prompt},
    ...memory,
    {role:"user",content:input}
  ];

  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages
    })
  });

  const data = await res.json();
  const reply = data.choices[0].message.content;

  memory.push({role:"user",content:input});
  memory.push({role:"assistant",content:reply});
  localStorage.setItem("memory",JSON.stringify(memory));

  const html = parseAI(reply);
  addMsg(html,"ai");

  if(document.getElementById("voice").checked){
    speechSynthesis.speak(new SpeechSynthesisUtterance(reply));
  }
}

/* 設定 */
function openSettings(){
  document.getElementById("settings").style.display="block";
}

function saveSettings(){
  localStorage.setItem("apiKey",document.getElementById("apiKey").value);
  localStorage.setItem("prompt",document.getElementById("prompt").value);
  alert("保存OK");
}

function resetMemory(){
  localStorage.removeItem("memory");
  memory=[];
  alert("リセット完了");
}

/* カメラ */
async function openCamera(){
  const video=document.getElementById("video");
  video.style.display="block";

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" }
  });
  video.srcObject=stream;
  video.play();

  setTimeout(()=>{
    const canvas=document.getElementById("canvas");
    const ctx=canvas.getContext("2d");
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);

    const img = canvas.toDataURL();

    sendImage(img);
  },2000);
}

async function sendImage(img){

  addMsg("<img src='"+img+"' width='150'>","user");

  const apiKey = localStorage.getItem("apiKey");

  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+apiKey
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[{
        role:"user",
        content:[
          {type:"text",text:"この画像を分かりやすく説明"},
          {type:"image_url",image_url:{url:img}}
        ]
      }]
    })
  });

  const data = await res.json();
  const reply = data.choices[0].message.content;

  addMsg(parseAI(reply),"ai");
}

</script>

</body>
</html>

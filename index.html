<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* キャラ */
#character{height:30vh;}
#character img{width:100%;height:100%;object-fit:cover;}

/* 情報 */
#infoBar{
  text-align:center;
  font-size:13px;
  padding:6px;
  background:rgba(255,255,255,0.7);
}

/* チャット */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  padding-bottom:100px;
}
.msg{margin:8px;max-width:85%;}
.user{text-align:right;margin-left:auto;}
.ai{text-align:left;}
.bubble{
  display:inline-block;
  padding:12px;
  border-radius:16px;
  background:#fff;
  line-height:1.6;
}
.user .bubble{
  background:#0072ff;color:#fff;
}

/* 入力 */
#bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:8px;
}
#controls{display:flex;gap:6px;max-width:600px;margin:auto;}
#input{flex:1;padding:10px;border-radius:20px;border:none;}

#sendBtn,#micBtn{
  width:44px;height:44px;border-radius:50%;
  border:none;color:#fff;
}
#sendBtn{background:#0072ff;}
#micBtn{background:#ff4081;}

/* 設定 */
#fab{position:fixed;right:10px;bottom:90px;}
#setBtn{
  width:50px;height:50px;border-radius:50%;
  border:none;background:#333;color:#fff;
}

/* モーダル */
#modal{
  position:fixed;width:100%;height:100%;
  display:none;background:rgba(0,0,0,0.5);
  justify-content:center;align-items:center;
}
#modalContent{
  background:#222;color:#fff;padding:20px;
  border-radius:12px;width:90%;
  max-height:80%;overflow:auto;
}
#modal input,#modal textarea,#modal select,#modal button{
  width:100%;margin:6px 0;padding:10px;
}
</style>
</head>

<body>

<div id="character">
<img id="avatar" src="normal.png">
</div>

<div id="infoBar"></div>

<div id="chat"></div>

<div id="bottom">
<div id="controls">
<input id="input" placeholder="話しかけてください">
<button id="micBtn">🎤</button>
<button id="sendBtn">➤</button>
</div>
</div>

<div id="fab">
<button id="setBtn" onclick="openSettings()">⚙</button>
</div>

<input type="file" id="imageInput" accept="image/*" style="display:none">

<!-- 設定 -->
<div id="modal">
<div id="modalContent">

<h3>🔑 API</h3>
ChatGPT<input id="apiKey">
Gemini<input id="geminiKey">
Eleven<input id="elevenKey">
VoiceID<input id="voiceId">

<h3>🧠 プロンプト</h3>
<textarea id="prompt" placeholder="性格・口調など"></textarea>

<h3>🎭 モード</h3>
<select id="mode">
<option value="normal">通常</option>
<option value="teacher">家庭教師</option>
<option value="counselor">カウンセラー</option>
<option value="medical">医療</option>
<option value="sales">営業</option>
<option value="secretary">秘書</option>
</select>

<h3>🔊 音声</h3>
<select id="voiceType">
<option value="local">ローカル</option>
<option value="eleven">ElevenLabs</option>
</select>

音声ON <input type="checkbox" id="voiceToggle">

<hr>

<button onclick="openGmail()">📧 Gmail</button>
<button onclick="openCalendar()">📅 カレンダー</button>
<button onclick="openLine()">💬 LINE</button>
<button onclick="sendToLine()">📤 LINE送信</button>

<button onclick="openCamera()">📷 画像</button>
<button onclick="getLocation()">📍 天気</button>

<button onclick="saveSettings()">保存</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const avatar=document.getElementById("avatar");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let history=[];

/* 情報 */
let locationText="",weatherText="";
setInterval(()=>{
infoBar.innerHTML=new Date().toLocaleString()+"<br>"+locationText+" "+weatherText;
},1000);

/* 表情 */
function changeFace(t){
if(t.includes("ありがとう")) avatar.src="agree.png";
else if(t.includes("怒")) avatar.src="怒り.png";
else avatar.src="normal.png";
}

/* メッセージ */
function addMessage(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;

if(c==="ai"){
changeFace(t);
if(voiceOn)speak(t);
}
}

/* 音声 */
async function speak(t){
const type=localStorage.getItem("voiceType")||"local";

if(type==="eleven"){
try{
const r=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${localStorage.getItem("voiceId")}`,{
method:"POST",
headers:{
"xi-api-key":localStorage.getItem("elevenKey"),
"Content-Type":"application/json"
},
body:JSON.stringify({text:t})
});
const b=await r.blob();
new Audio(URL.createObjectURL(b)).play();
}catch{speakLocal(t);}
}else speakLocal(t);
}

function speakLocal(t){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

/* 送信 */
sendBtn.onclick=sendMessage;

async function sendMessage(){
const t=input.value.trim();
if(!t)return;

addMessage(t,"user");
input.value="";

const key=localStorage.getItem("apiKey");
if(!key)return addMessage("APIキー未設定","ai");

history.push({role:"user",content:t});

const prompt=localStorage.getItem("prompt")||"";

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:prompt},
...history.slice(-10)
]
})
});

const data=await res.json();
const reply=data.choices?.[0]?.message?.content||"エラー";

addMessage(reply,"ai");

history.push({role:"assistant",content:reply});
}

/* 🎤音声入力 */
const R=window.SpeechRecognition||window.webkitSpeechRecognition;
if(R){
const rec=new R();
rec.lang="ja-JP";

micBtn.onclick=()=>{
rec.start();
micBtn.innerText="🎙️";
};

rec.onresult=e=>{
input.value=e.results[0][0].transcript;
micBtn.innerText="🎤";
sendMessage();
};

rec.onerror=()=>micBtn.innerText="🎤";
}

/* 画像 */
function openCamera(){
imageInput.setAttribute("capture","environment");
imageInput.click();
}

/* 位置＋天気 */
function getLocation(){
navigator.geolocation.getCurrentPosition(async p=>{
const lat=p.coords.latitude,lon=p.coords.longitude;

const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const wd=await w.json();
weatherText="🌤"+wd.current_weather.temperature+"℃";
});
}

/* 外部 */
function openGmail(){window.open("https://mail.google.com");}
function openCalendar(){window.open("https://calendar.google.com");}
function openLine(){
window.open("line://");
setTimeout(()=>window.open("https://line.me"),500);
}

function sendToLine(){
const bubbles=document.querySelectorAll(".bubble");
if(!bubbles.length)return;
const t=bubbles[bubbles.length-1].innerText;
window.open("https://line.me/R/msg/text/?"+encodeURIComponent(t));
}

/* 設定 */
function openSettings(){
modal.style.display="flex";

apiKey.value=localStorage.getItem("apiKey")||"";
geminiKey.value=localStorage.getItem("geminiKey")||"";
elevenKey.value=localStorage.getItem("elevenKey")||"";
voiceId.value=localStorage.getItem("voiceId")||"";
prompt.value=localStorage.getItem("prompt")||"";

voiceType.value=localStorage.getItem("voiceType")||"local";
voiceToggle.checked=voiceOn;
}

function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
localStorage.setItem("geminiKey",geminiKey.value);
localStorage.setItem("elevenKey",elevenKey.value);
localStorage.setItem("voiceId",voiceId.value);
localStorage.setItem("prompt",prompt.value);
localStorage.setItem("voiceType",voiceType.value);

voiceOn=voiceToggle.checked;
localStorage.setItem("voiceOn",voiceOn);

modal.style.display="none";
addMessage("設定保存しました","ai");
}
</script>

</body>
</html>

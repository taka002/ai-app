<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;font-family:sans-serif;
background:linear-gradient(135deg,#6ec6ff,#a0e0ff);
height:100vh;display:flex;flex-direction:column;
}
#character{height:30vh;}
#character img{width:100%;height:100%;object-fit:cover;}
#infoBar{text-align:center;font-size:13px;padding:6px;background:#fff8;}
#chat{flex:1;overflow:auto;padding:10px;padding-bottom:100px;}
.msg{max-width:85%;margin:8px;}
.user{margin-left:auto;text-align:right;}
.ai{text-align:left;}
.bubble{display:inline-block;padding:12px;border-radius:16px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}
#bottom{position:fixed;bottom:0;width:100%;background:#fff;padding:8px;}
#controls{display:flex;gap:6px;}
#input{flex:1;padding:10px;border-radius:20px;border:none;}
button{border:none;border-radius:10px;padding:10px;}
#modal{position:fixed;width:100%;height:100%;display:none;background:#0008;justify-content:center;align-items:center;}
#modalContent{background:#222;color:#fff;padding:20px;border-radius:12px;width:90%;}
</style>
</head>

<body>

<div id="character">
<img src="normal.png">
</div>

<div id="infoBar"></div>
<div id="chat"></div>

<div id="bottom">
<div id="controls">
<input id="input" placeholder="話しかけてください">
<button onclick="send()">➤</button>
<button onclick="openSettings()">⚙</button>
</div>
</div>

<div id="modal">
<div id="modalContent">

<h3>AI選択</h3>
<select id="aiType">
<option value="gpt">ChatGPT</option>
<option value="gemini">Gemini</option>
</select>

<h3>ChatGPTキー</h3>
<input id="apiKey">

<h3>Geminiキー</h3>
<input id="geminiKey">

<h3>NewsAPIキー</h3>
<input id="newsApiKey">

<h3>音声</h3>
<input type="checkbox" id="voiceToggle"> ON

<br><br>
<button onclick="saveSettings()">保存</button>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const infoBar=document.getElementById("infoBar");

const modal=document.getElementById("modal");
const apiKey=document.getElementById("apiKey");
const geminiKey=document.getElementById("geminiKey");
const newsApiKey=document.getElementById("newsApiKey");
const voiceToggle=document.getElementById("voiceToggle");
const aiType=document.getElementById("aiType");

let voiceOn=localStorage.getItem("voiceOn")==="true";
let history=[];

let locationText="";
let weatherText="";
let weatherCode=null;
let prefecture="";

/* ===== 時刻 ===== */
setInterval(()=>{
const now=new Date();
infoBar.innerHTML=now.toLocaleString()+"<br>"+locationText+" "+weatherText;
},1000);

/* ===== 表示 ===== */
function add(t,c){
const d=document.createElement("div");
d.className="msg "+c;
d.innerHTML=`<div class="bubble">${t}</div>`;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;

if(c==="ai" && voiceOn){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}
}

/* ===== 挨拶 ===== */
function greeting(){
const h=new Date().getHours();
if(h<5) return "まだ夜ですね。無理しないでくださいね";
if(h<11) return "おはようございます☀️";
if(h<17) return "こんにちは😊";
if(h<22) return "こんばんは🌙";
return "遅い時間ですね。ゆっくり休んでください";
}

/* ===== 天気コメント ===== */
function weatherComment(){
if(weatherCode===0) return "今日は快晴ですね！☀️";
if(weatherCode<=3) return "少し曇ってますね☁️";
if(weatherCode<=67) return "雨ですね☔";
if(weatherCode<=77) return "雪かも❄️";
return "天気荒れ気味⚡";
}

/* ===== AI送信 ===== */
async function send(){
const t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

const type=localStorage.getItem("aiType") || "gpt";

/* ===== GPT ===== */
if(type==="gpt"){
const key=localStorage.getItem("apiKey");
if(!key){add("GPTキー未設定","ai");return;}

history.push({role:"user",content:t});
if(history.length>10) history.shift();

try{
const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:history
})
});

if(!res.ok){
add("GPTエラー："+res.status,"ai");
return;
}

const data=await res.json();
add(data.choices?.[0]?.message?.content||"エラー","ai");

}catch(e){
add("通信エラー","ai");
}
}

/* ===== Gemini ===== */
if(type==="gemini"){
const key=localStorage.getItem("geminiKey");
if(!key){add("Geminiキー未設定","ai");return;}

try{
const res=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:t}]}]
})
}
);

const data=await res.json();
const reply=data.candidates?.[0]?.content?.parts?.[0]?.text;

add(reply||"Geminiエラー","ai");

}catch(e){
add("通信エラー","ai");
}
}
}

/* ===== 位置＋天気 ===== */
function getLocation(){
navigator.geolocation.getCurrentPosition(async pos=>{
const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

try{
const geo=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
const g=await geo.json();

const city=g.address.city||g.address.town||g.address.village||"";
prefecture=g.address.state||g.address.region||"";

locationText=`📍${city}（${prefecture}）`;

const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
const wd=await w.json();

weatherCode=wd.current_weather.weathercode;
weatherText=`🌤${wd.current_weather.temperature}℃`;

add(`現在地：${locationText}<br>${weatherText}`,"ai");
add(weatherComment(),"ai");

getNews(prefecture);

}catch(e){
add("天気取得失敗","ai");
}

},()=>add("位置情報の許可が必要","ai"));
}

/* ===== ニュース ===== */
async function getNews(area){
const API_KEY=localStorage.getItem("newsApiKey");
if(!API_KEY){add("NewsAPIキー未設定","ai");return;}

try{
const url=`https://api.allorigins.win/get?url=${encodeURIComponent(
`https://newsapi.org/v2/everything?q=${area}&language=jp&pageSize=5&apiKey=${API_KEY}`
)}`;

const res=await fetch(url);
const data=await res.json();
const json=JSON.parse(data.contents);

let text="📰 ニュース<br>";
json.articles?.forEach(a=>{text+=`・${a.title}<br>`});

add(text,"ai");

}catch(e){
add("ニュース取得失敗","ai");
}
}

/* ===== 起動 ===== */
window.onload=()=>{
add(greeting(),"ai");
getLocation();
};

/* ===== 設定 ===== */
function openSettings(){
modal.style.display="flex";
apiKey.value=localStorage.getItem("apiKey")||"";
geminiKey.value=localStorage.getItem("geminiKey")||"";
newsApiKey.value=localStorage.getItem("newsApiKey")||"";
voiceToggle.checked=voiceOn;
aiType.value=localStorage.getItem("aiType")||"gpt";
}

function saveSettings(){
localStorage.setItem("apiKey",apiKey.value);
localStorage.setItem("geminiKey",geminiKey.value);
localStorage.setItem("newsApiKey",newsApiKey.value);
localStorage.setItem("voiceOn",voiceToggle.checked);
localStorage.setItem("aiType",aiType.value);

voiceOn=voiceToggle.checked;
modal.style.display="none";
add("保存しました","ai");
}
</script>

</body>
</html>

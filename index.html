<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美咲AI 完全版</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:linear-gradient(135deg,#6ec6ff,#a0e0ff);height:100vh;display:flex;flex-direction:column;}
#character{height:30vh;}
#character img{width:100%;height:100%;object-fit:cover;}
#infoBar{text-align:center;font-size:13px;padding:6px;background:rgba(255,255,255,0.7);}
#chat{flex:1;overflow-y:auto;padding:10px;padding-bottom:100px;}
.msg{max-width:85%;margin:8px;}
.user{text-align:right;}
.bubble{display:inline-block;padding:12px;border-radius:16px;background:#fff;}
.user .bubble{background:#0072ff;color:#fff;}
#bottom{position:fixed;bottom:0;width:100%;background:#fff;padding:8px;}
#controls{display:flex;gap:6px;}
#input{flex:1;padding:10px;border-radius:20px;border:none;}
#sendBtn,#micBtn{width:44px;height:44px;border-radius:50%;border:none;color:#fff;}
#sendBtn{background:#0072ff;}
#micBtn{background:#ff4081;}
#fab{position:fixed;right:10px;bottom:90px;}
#setBtn{width:50px;height:50px;border-radius:50%;background:#333;color:#fff;}
#modal{position:fixed;width:100%;height:100%;display:none;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
#modalContent{background:#222;color:#fff;padding:20px;border-radius:12px;width:90%;}
img.preview{max-width:200px;border-radius:10px;margin-top:10px;}
video{width:90%;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>

<div id="character"><img src="normal.png"></div>
<div id="infoBar"></div>
<div id="chat"></div>

<div id="bottom">
<div id="controls">
<input id="input">
<button id="micBtn">🎤</button>
<button id="sendBtn">➤</button>
</div>
</div>

<div id="fab">
<button onclick="openSettings()">⚙</button>
</div>

<input type="file" id="imageInput" accept="image/*" style="display:none">

<div id="modal">
<div id="modalContent">
Geminiキー<input id="geminiKey">
<button onclick="openCamera()">📷カメラ</button>
<button onclick="openGallery()">🖼画像</button>
<button onclick="getLocation()">📍位置+天気</button>
<button onclick="openCalendar()">📅カレンダー</button>
<button onclick="saveSettings()">閉じる</button>
</div>
</div>

<script>
const chat=document.getElementById("chat");
let lastImageBase64="";
let currentStream;

/* メッセージ */
function addMessage(text,cls){
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML=`<div class="bubble">${text}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* 音声 */
function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.speak(u);
}

/* 📷 カメラ＋即AI */
async function openCamera(){
  try{
    currentStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"environment"}
    });

    const video=document.createElement("video");
    video.autoplay=true;
    video.srcObject=currentStream;

    const btn=document.createElement("button");
    btn.innerText="📸撮影";

    btn.onclick=async()=>{
      const canvas=document.createElement("canvas");
      canvas.width=video.videoWidth;
      canvas.height=video.videoHeight;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(video,0,0);

      const img=canvas.toDataURL("image/jpeg");
      lastImageBase64=img.split(",")[1];

      addMessage(`<img src="${img}" class="preview">`,"ai");

      currentStream.getTracks().forEach(t=>t.stop());
      video.remove();
      btn.remove();

      await analyzeImage(true); // ←即解析＋音声
    };

    chat.appendChild(video);
    chat.appendChild(btn);

  }catch{
    alert("カメラ許可して");
  }
}

/* 🖼 画像 */
function openGallery(){
  imageInput.click();
}

imageInput.onchange=(e)=>{
  const file=e.target.files[0];
  const reader=new FileReader();
  reader.onload=ev=>{
    lastImageBase64=ev.target.result.split(",")[1];
    addMessage(`<img src="${ev.target.result}" class="preview">`,"ai");
  };
  reader.readAsDataURL(file);
};

/* 🤖 Gemini解析 */
async function analyzeImage(auto=false){
  if(!lastImageBase64){addMessage("画像選択して","ai");return;}

  const key=document.getElementById("geminiKey").value;

  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      contents:[{
        parts:[
          {text:"これは何か説明して"},
          {inline_data:{mime_type:"image/jpeg",data:lastImageBase64}}
        ]
      }]
    })
  });

  const data=await res.json();
  const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"失敗";

  addMessage(text,"ai");
  speak(text); // 🔥 音声
}

/* 📍 位置 */
function getLocation(){
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
    const wd=await w.json();

    addMessage(`📍現在地\n🌤 ${wd.current_weather.temperature}℃`,"ai");

  },()=>alert("位置許可して"));
}

/* 📅 カレンダー */
function openCalendar(){
  const iframe=document.createElement("iframe");
  iframe.src="https://calendar.google.com";
  iframe.style.width="100%";
  iframe.style.height="400px";
  chat.appendChild(iframe);
}

/* 設定 */
function openSettings(){
  modal.style.display="flex";
}
function saveSettings(){
  modal.style.display="none";
}
</script>

</body>
</html>

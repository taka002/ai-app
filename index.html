<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:sans-serif;background:#f5f5f5;height:100dvh;overflow:hidden;}

#character{
position:absolute;top:0;left:0;width:100%;height:100%;
object-fit:cover;object-position:center 28%;transform:scale(1.08);
}

#bubble{
position:absolute;bottom:65px;left:50%;transform:translateX(-50%);
width:92%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
border-radius:25px;
padding:14px;
font-size:16px;
text-align:center;
z-index:5;
}

#inputArea{
position:fixed;left:50%;transform:translateX(-50%);
width:92%;display:flex;gap:6px;
bottom:50px;
}

#mic{width:34px;height:34px;border-radius:50%;border:none;}
#input{flex:1;height:34px;border-radius:16px;border:none;}
#send{height:34px;border-radius:999px;background:#4da6ff;color:white;border:none;}

#settingsBtn,#appBtn{
position:fixed;bottom:10px;width:36px;height:36px;border-radius:50%;
background:white;display:flex;align-items:center;justify-content:center;
}
#settingsBtn{left:calc(50% - 45px);}
#appBtn{left:calc(50% + 10px);}
</style>
</head>

<body>

<img id="character" src="normal.png">
<div id="bubble">どうしたのかな？😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* ===== 音声アンロック（最重要） ===== */
let audioUnlocked = false;
document.body.addEventListener("click", ()=>{
  if(audioUnlocked) return;
  const a = new Audio();
  a.muted = true;
  a.play().catch(()=>{});
  audioUnlocked = true;
}, {once:true});

/* ===== 記憶 ===== */
let memory = JSON.parse(localStorage.getItem("memory") || "[]");
function saveMemory(u,a){
memory.push({user:u,ai:a});
if(memory.length>20) memory.shift();
localStorage.setItem("memory",JSON.stringify(memory));
}

/* ===== 設定 ===== */
settingsBtn.onclick=()=>{
const m=prompt("1:APIキー 2:名前 3:性格 4:履歴 5:音声ON/OFF 6:リセット");

if(m==="1"){
const k=prompt("APIキー");
if(k){localStorage.setItem("apiKey",k);API_KEY=k;}
}
if(m==="2"){
const n=prompt("名前");
if(n)localStorage.setItem("userName",n);
}
if(m==="3"){
const mode=prompt("性格");
if(mode)localStorage.setItem("aiMode",mode);
}
if(m==="4"){
alert(memory.map(m=>"あなた: "+m.user+"\nAI: "+m.ai).join("\n\n"));
}
if(m==="5"){
const flag = localStorage.getItem("voice")==="on" ? "off":"on";
localStorage.setItem("voice",flag);
alert("音声: "+flag);
}
if(m==="6"){
localStorage.clear();location.reload();
}
};

/* ===== 感情 ===== */
const emotionGroups={
happy:["happy.png","smile.png"],
sad:["sad.png","cry.png"],
neutral:["normal.png"],
thinking:["thinking.png"]
};

function getEmotionGroup(t){
if(/嬉|ありがとう/.test(t)) return "happy";
if(/悲|つらい/.test(t)) return "sad";
return "neutral";
}

let currentEmotion="", lastImage="", timer;

function changeEmotion(text){
const group=getEmotionGroup(text);
if(group===currentEmotion) return;

clearTimeout(timer);
timer=setTimeout(()=>{
const list=emotionGroups[group]||["normal.png"];
let img=list[Math.floor(Math.random()*list.length)];
if(img===lastImage && list.length>1) img=list[0];
lastImage=img;
character.src=img;
currentEmotion=group;
},700+Math.random()*800);
}

/* ===== 会話強化 ===== */
function shorten(text){
if(text.length>60) return text.slice(0,60)+"…";
return text;
}

function softenEnding(text){
const endings=["どう思う？","少し話してみる？","今どんな感じ？","もう少し聞いてもいい？"];
if(!text.match(/？|\?/)){
text += " " + endings[Math.floor(Math.random()*endings.length)];
}
return text;
}

function addName(text){
const name=localStorage.getItem("userName");
if(name && Math.random()<0.4){
return name+"、"+text;
}
return text;
}

/* ===== タイピング ===== */
async function typeText(t){
bubble.innerText="";
for(let c of t){
bubble.innerText+=c;
await new Promise(r=>setTimeout(r,15));
}
}

/* ===== 無音 ===== */
function thinkingPause(text){
let delay = 600;
if(text.length > 40) delay = 1200;
if(text.length > 80) delay = 1800;
return delay + Math.random()*400;
}

/* ===== 感情ボイス ===== */
function getVoiceStyle(text){
if(/悲|つらい/.test(text)) return {voice:"verse", speed:0.9};
if(/嬉|ありがとう/.test(text)) return {voice:"aria", speed:1.05};
return {voice:"aria", speed:1.0};
}

/* ===== 🔥 完全音声 ===== */
let currentAudio = null;

async function speak(text){

if(localStorage.getItem("voice")==="off") return;
if(!API_KEY) return;

try{

const short = text.replace(/….*$/,"");
const style = getVoiceStyle(text);

const res = await fetch("https://api.openai.com/v1/audio/speech",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"gpt-4o-mini-tts",
voice:style.voice,
input:short
})
});

if(!res.ok){
console.log("音声APIエラー");
return;
}

const blob = await res.blob();
const url = URL.createObjectURL(blob);

if(currentAudio){
currentAudio.pause();
currentAudio = null;
}

const audio = new Audio(url);
currentAudio = audio;

audio.playbackRate = style.speed;

await audio.play().catch(e=>{
console.log("再生ブロック",e);
});

}catch(e){
console.log("音声失敗",e);
}
}

/* ===== AI ===== */
async function getAIResponse(msg){

if(!API_KEY) return "APIキー入れてね";

try{

const controller=new AbortController();
setTimeout(()=>controller.abort(),10000);

const mode=localStorage.getItem("aiMode")||"優しい";

const r=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
signal:controller.signal,
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:`${mode}女性キャラ。短く優しく、最後は軽く質問。`},
...memory.flatMap(m=>[
{role:"user",content:m.user},
{role:"assistant",content:m.ai}
]),
{role:"user",content:msg}
]
})
});

const d=await r.json();
return d.choices?.[0]?.message?.content || "うまく話せない…もう一回いい？";

}catch(e){
return "通信が不安定みたい…少し待ってね";
}
}

/* ===== 送信 ===== */
async function send(){

const text=input.value;
if(!text.trim()){
bubble.innerText="何か話して😊";
return;
}

input.value="";
character.src="thinking.png";

const tList=["考え中…","うーん…","ちょっと待ってね…"];
bubble.innerText=tList[Math.floor(Math.random()*tList.length)];

let reply=await getAIResponse(text);

await new Promise(r=>setTimeout(r, thinkingPause(reply)));

reply=shorten(reply);
reply=softenEnding(reply);
reply=addName(reply);

await typeText(reply);
changeEmotion(reply);

setTimeout(()=>speak(reply),300);

saveMemory(text,reply);
}

/* ===== 音声入力 ===== */
if('webkitSpeechRecognition' in window){
const r=new webkitSpeechRecognition();
r.lang='ja-JP';
mic.onclick=()=>r.start();
r.onresult=e=>{
input.value=e.results[0][0].transcript;
send();
};
}else{
mic.onclick=()=>alert("非対応");
}
</script>

</body>
</html>

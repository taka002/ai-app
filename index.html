<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>美咲AI</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
height:100dvh;
overflow:hidden;
}

/* キャラ */
#character{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
object-position:center 28%;
transform:scale(1.08);
}

/* 吹き出し（横優先＋高さ制限） */
#bubble{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);

width:92%;
max-width:92%;
min-width:70%;

max-height:26vh;
overflow-y:auto;

background:rgba(255,255,255,0.9);
border-radius:25px;
padding:14px;
font-size:16px;
line-height:1.6;
text-align:center;
backdrop-filter:blur(8px);

z-index:5;

white-space:normal;
word-break:break-word;
}

/* 長文時フォント */
#bubble.small{
font-size:14px;
}

/* しっぽ */
#bubble::after{
content:"";
position:absolute;
top:-12px;
left:50%;
transform:translateX(-50%) rotate(45deg);
width:22px;
height:22px;
background:rgba(255,255,255,0.9);
}

/* 入力エリア */
#inputArea{
position:fixed;
left:50%;
transform:translateX(-50%);
width:92%;

display:flex;
align-items:center;
gap:6px;

padding:8px 10px calc(env(safe-area-inset-bottom) + 10px);
background:rgba(255,255,255,0.95);
border-radius:20px;

z-index:10;
bottom:0;
}

/* 入力 */
#input{
flex:1;
min-width:0;
height:38px;
padding:0 10px;
border-radius:18px;
border:none;
font-size:14px;
background:#eee;
}

/* 送信 */
#send{
height:38px;
padding:0 14px;
border:none;
border-radius:999px;
background:#4da6ff;
color:white;
font-size:14px;
}

/* マイク */
#mic{
width:38px;
height:38px;
border-radius:50%;
border:none;
background:#eee;
font-size:16px;
}

/* ボタン */
#settingsBtn, #appBtn{
position:fixed;
bottom:60px;
width:44px;
height:44px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:20;
font-size:18px;
}

#settingsBtn{ left:20px; }
#appBtn{ right:20px; }
</style>
</head>

<body>

<img id="character" src="normal.png">

<div id="bubble">どうしたのかな？話してくれると嬉しいな😊</div>

<div id="settingsBtn">⚙️</div>
<div id="appBtn">📱</div>

<div id="inputArea">
<button id="mic">🎤</button>
<input id="input" placeholder="話しかけて">
<button id="send" onclick="send()">送信</button>
</div>

<script>
let API_KEY = localStorage.getItem("apiKey") || "";

/* 設定 */
document.getElementById("settingsBtn").onclick = ()=>{
  const key = prompt("APIキーを入力");
  if(key){
    localStorage.setItem("apiKey", key);
    API_KEY = key;
    alert("保存したよ！");
  }
};

/* ===== 感情判定 ===== */
function getEmotion(text){
  if(/嬉|ありがとう|助かった/.test(text)) return "happy.png";
  if(/悲|辛|泣|しんど/.test(text)) return "sad.png";
  if(/怒|イライラ/.test(text)) return "anger.png";
  if(/不安|怖/.test(text)) return "anxiety.png";
  if(/驚|え|！？/.test(text)) return "surprise.png";
  return "normal.png";
}

/* ===== 表情変更（フェード）===== */
let currentEmotion = "";

function changeEmotion(text){
  const chara = document.getElementById("character");
  const next = getEmotion(text);

  if(next === currentEmotion) return;
  currentEmotion = next;

  chara.style.transition = "opacity 0.4s";
  chara.style.opacity = 0;

  setTimeout(()=>{
    chara.src = next;
    chara.style.opacity = 1;
  },200);
}

/* ===== 考え中 ===== */
function startThinking(){
  const bubble = document.getElementById("bubble");
  let dots = 0;

  return setInterval(()=>{
    dots = (dots+1)%4;
    bubble.innerText = "・・・".slice(0,dots+1);
  },400);
}

/* ===== タイピング（長文フォント調整込み）===== */
async function typeText(text){
  const bubble = document.getElementById("bubble");

  /* 長さでフォント調整 */
  if(text.length > 80){
    bubble.classList.add("small");
  }else{
    bubble.classList.remove("small");
  }

  bubble.innerText="";

  for(let i=0;i<text.length;i++){
    bubble.innerText += text[i];
    await new Promise(r=>setTimeout(r,25));
  }
}

/* ===== API ===== */
async function getAIResponse(message){
  if(!API_KEY){
    return "設定からAPIキー入れてね🙏";
  }

  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:"短く優しく会話して"},
        {role:"user",content:message}
      ]
    })
  });

  const data = await res.json();
  return data.choices[0].message.content;
}

/* ===== 送信 ===== */
async function send(){
  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  input.value="";

  const chara = document.getElementById("character");
  chara.src="typing.png";

  const thinking = startThinking();

  try{
    const reply = await getAIResponse(text);

    clearInterval(thinking);

    await typeText(reply);

    setTimeout(()=>{
      changeEmotion(reply);
    },800);

  }catch(e){
    clearInterval(thinking);
    document.getElementById("bubble").innerText="エラー...";
    chara.src="glitch.png";
  }
}

/* 🎤 音声入力 */
const micBtn = document.getElementById("mic");
let recognition;

if ('webkitSpeechRecognition' in window) {
  recognition = new webkitSpeechRecognition();
  recognition.lang = 'ja-JP';

  micBtn.onclick = () => {
    recognition.start();
    micBtn.innerText = "🎙️";
  };

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
    micBtn.innerText = "🎤";
    send();
  };

  recognition.onerror = () => micBtn.innerText = "🎤";
  recognition.onend = () => micBtn.innerText = "🎤";

} else {
  micBtn.onclick = () => {
    alert("この端末は音声入力に対応してないよ🙏");
  };
}
</script>

</body>
</html>
